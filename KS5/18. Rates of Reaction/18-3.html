    p{margin:0 0 12px}.q{font-size:18px;font-weight:700;margin-bottom:12px}.small{font-size:14px}.line-inputs{padding-left:28px;margin:10px 0 22px}.line{border-bottom:2px solid #475569;height:30px;margin-bottom:10px}.answer-input,textarea,input,select{border:1px solid #cbd5e1;border-radius:10px;padding:10px;font-size:16px;outline:none;background:white}textarea{width:100%;resize:vertical;min-height:86px;line-height:1.6}.answer-input:focus,textarea:focus,input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,90,163,.12)}.table-wrap{overflow:hidden;border-radius:10px;border:1px solid var(--purple)}table{border-collapse:collapse;width:100%;font-size:16px}th{background:var(--purple);color:white;padding:12px;font-weight:1000}td{border-top:1px solid #c4a7dc;border-right:1px solid #c4a7dc;padding:12px;vertical-align:top}td:last-child,th:last-child{border-right:0}.blue-table th{background:var(--blue)}.blue-table td{border-color:#90b4dc}.orange-table th{background:var(--orange)}.orange-table td{border-color:#f7a181}.row-tall td{height:105px}.row-xl td{height:145px}.reveal{margin-top:10px;border:1px solid #d1d5db;background:#f8fafc;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:900;cursor:pointer}.hint{margin-top:10px;background:#eff6ff;border-radius:10px;padding:10px 12px;font-size:14px;line-height:1.5}.equation-box{display:inline-block;border:2px solid #93c5fd;background:#eff6ff;border-radius:12px;padding:14px 28px;font-size:30px;font-weight:900}.formula-box{display:inline-block;border:2px solid #fed7aa;background:#fff7ed;border-radius:10px;padding:14px 34px;font-size:30px;font-weight:900}.note-card{border:2px solid #fed7aa;background:#fff7ed;border-radius:12px;padding:12px 28px;text-align:center;font-size:28px;font-weight:900;width:260px;margin:12px auto}.footer{display:grid;grid-template-columns:145px 1fr 280px;gap:14px;margin-top:18px}.key-title{background:var(--orange);color:white;border-radius:12px;display:flex;align-items:center;gap:10px;padding:14px;font-size:25px;font-weight:1000;text-transform:uppercase;line-height:1.05}.key-box{border:1px solid #fdba74;background:#fff7ed;border-radius:12px;padding:12px 16px;font-size:15px;line-height:1.6}.tick{color:var(--orange);font-weight:1000;margin-right:8px}.self{border:2px dashed #fb923c;border-radius:12px;padding:14px}.self h3{margin:0 0 12px;color:var(--orange);font-size:17px;text-transform:uppercase}.self-row{display:flex;align-items:center;justify-content:space-between;margin:10px 0}.dot{width:20px;height:20px;border:2px solid #64748b;border-radius:50%;background:white;margin-left:8px;cursor:pointer}.dot.active{background:var(--orange);border-color:var(--orange)}.center{text-align:center}.mt{margin-top:18px}.mb{margin-bottom:18px}.flex{display:flex}.gap{gap:12px}.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.calc-box{background:#fff7ed;border:1px solid #fed7aa;border-radius:12px;padding:13px;margin:12px 0}.select-row{display:grid;grid-template-columns:1fr 160px;gap:12px;align-items:center;margin-bottom:15px}.result-ok{color:#15803d;font-weight:1000}.result-bad{color:#dc2626;font-size:12px;font-weight:1000}.sketch-card{border:1px solid #60a5fa;border-radius:12px;padding:12px}.sketch-title{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-weight:1000;color:var(--blue)}.mini-btn{border:0;background:#eff6ff;color:#1d4ed8;border-radius:7px;padding:6px 8px;font-size:12px;font-weight:900;cursor:pointer}.svg-graph{width:100%;height:230px;border-radius:10px;background:white;touch-action:none;-webkit-user-select:none;user-select:none}.big-graph{height:520px}.eq-line{display:flex;align-items:center;justify-content:center;white-space:nowrap;font-size:32px;font-weight:900;line-height:1}.coef{width:56px;height:46px;text-align:center;font-size:28px;font-weight:1000;border:2px solid #86efac;border-radius:9px;margin:0 6px}.graph-paper{border:1px solid #d8b4fe;background:#fcfbff;border-radius:12px;padding:12px}.print-only{display:none}
    @media(max-width:900px){.grid2,.grid3,.grid-wide,.footer{grid-template-columns:1fr}.lesson-title{font-size:28px}.lesson-number{font-size:44px}.page-badge,.name-box{min-width:auto;font-size:22px}.toolbar-inner{padding:0 12px;align-items:flex-start;flex-direction:column}.eq-line{font-size:24px;overflow-x:auto;justify-content:flex-start}.big-graph{height:420px}}
    @media print{body{background:white}.toolbar{display:none}.app{max-width:none;padding:0}.worksheet-page{box-shadow:none;border-radius:0;margin:0;page-break-after:always}.reveal,.action,.tab{display:none}.hint{display:none}.answer-input,textarea,input,select{border:1px solid #94a3b8}.print-only{display:block}.panel{break-inside:avoid}.footer{break-inside:avoid}}

<body>
  <div id="root"></div>
  <script type="text/babel">
    const {useMemo,useRef,useState}=React;
    const colours={red:'#ef3b12',blue:'#155aa3',purple:'#6a2ca0',green:'#168f42',orange:'#f05a28'};
    const Icon=({children})=><span style={{fontSize:22,lineHeight:1}}>{children}</span>;
    function Header({page,name=false}){return <header className="header"><div className="lesson-number">18.3</div><div className="lesson-title">Rate–Concentration Graphs<br/>and Initial Rates</div>{name?<label className="name-box">Name:<input/></label>:<div className="page-badge">PAGE {page}</div>}</header>}
    function SectionHeader({number,title,colour='blue',icon}){return <div className={`section-title ${colour}`}><div className="num circle">{icon||number}</div><div className="title-pill">{number} {title}</div></div>}
    function Panel({children,colour='blue',className=''}){return <section className={`panel ${colour} ${className}`}>{children}</section>}
    function RevealButton({label='Reveal',answer}){const[show,setShow]=useState(false);return <div><button className="reveal" onClick={()=>setShow(!show)}>{show?'🙈':'👁'} {label}</button>{show&&<div className="hint">{answer}</div>}</div>}
    function SelfAssess(){const[a,setA]=useState(null),[b,setB]=useState(null);return <div className="self"><h3>Self-assess</h3>{['Confident','Need more practice'].map((l,row)=><div className="self-row" key={l}><span>{l}</span><span>{[1,2,3].map(n=><button key={n} className={`dot ${((row===0?a:b)===n)?'active':''}`} onClick={()=>row===0?setA(n):setB(n)}></button>)}</span></div>)}</div>}
    function Footer({items}){return <footer className="footer"><div className="key-title"><Icon>💡</Icon><span>Key<br/>Ideas</span></div><div className="key-box">{items.map((it,i)=><p key={i}><span className="tick">●</span>{it}</p>)}</div><SelfAssess/></footer>}
    function Table({headers,rows,theme='purple',renderCell}){return <div className={`table-wrap ${theme}-table`}><table><thead><tr>{headers.map(h=><th key={h}>{h}</th>)}</tr></thead><tbody>{rows.map((r,i)=><tr key={i} className="row-tall">{r.map((c,j)=><td key={j}>{renderCell?renderCell(c,i,j):c}</td>)}</tr>)}</tbody></table></div>}
    function Page1(){const[showTable,setShowTable]=useState(false); const tableRows=[['Zero order','rate = k','Horizontal line','No change'],['First order','rate = k[A]','Straight line through origin','Rate doubles'],['Second order','rate = k[A]²','Upward curve','Rate ×4']]; return <div className="worksheet-page"><Header page="1" name/><div className="grid2"><Panel colour="blue"><SectionHeader number="1" title="Starter Retrieval" colour="blue" icon="🎯"/><p>Define the following terms.</p>{['a) Rate of reaction','b) First order reaction','c) Rate constant, k'].map(t=><div key={t} className="mb"><p><b style={{color:colours.blue}}>{t}</b></p><div className="line-inputs"><div className="line"></div><div className="line"></div></div></div>)}</Panel><Panel colour="purple"><SectionHeader number="2" title="Orders from Graph Shapes" colour="purple"/><p>Complete the table below.</p><Table headers={['Order','General Rate Equation','Shape of Graph','Effect of Doubling Concentration']} rows={tableRows} renderCell={(c,i,j)=>j===0?<b>{c}</b>:(showTable?<b style={{color:colours.purple}}>{c}</b>:<textarea style={{minHeight:62}}/>)} /><button className="reveal" onClick={()=>setShowTable(!showTable)}>{showTable?'Hide':'Reveal'} table answers</button></Panel><Panel colour="orange"><SectionHeader number="3" title="Understanding Graph Shapes" colour="orange"/><MatchingTask/></Panel><Panel colour="green"><SectionHeader number="4" title="Why Do the Shapes Differ?" colour="green"/><p>Explain why the graph shapes differ for:</p><ul><li><b>zero order</b></li><li><b>first order</b></li><li><b>second order reactions.</b></li></ul><textarea style={{minHeight:150}}/><RevealButton label="Show explanation hint" answer="The graph shape depends on how rate changes as concentration changes. Zero order: changing concentration has no effect. First order: rate is directly proportional to concentration. Second order: rate is proportional to concentration squared."/></Panel></div><Panel colour="blue" className="mt"><SectionHeader number="5" title="Sketching Rate–Concentration Graphs" colour="blue"/><p>Sketch the following graphs. Draw directly on each set of axes, then use Model to compare.</p><div className="grid3"><SketchGraph title="a) Zero order" type="zero"/><SketchGraph title="b) First order" type="first"/><SketchGraph title="c) Second order" type="second"/></div></Panel><Footer items={['Rate–concentration graphs show how rate changes as concentration changes.','The shape of the graph reveals the order of reaction with respect to that reactant.','These graphs are essential for determining rate equations and rate constants.']}/></div>}
    function MatchingTask(){const items=[['a','A horizontal straight line showing no change in rate with concentration.','Zero order'],['b','A straight line through the origin.','First order'],['c','An upward curve with increasing gradient.','Second order']];const[v,setV]=useState({}),[chk,setChk]=useState(false);return <><p>Match each graph description to the correct order.</p>{items.map(([l,p,a])=><div className="select-row" key={l}><p><b style={{color:colours.orange}}>{l})</b> “{p}”</p><div><select value={v[l]||''} onChange={e=>setV({...v,[l]:e.target.value})}><option value="">Order...</option><option>Zero order</option><option>First order</option><option>Second order</option></select>{chk&&<span style={{marginLeft:8}}>{v[l]===a?'✅':'❌'}</span>}</div></div>)}<button className="action" style={{background:colours.orange}} onClick={()=>setChk(true)}>Check matches</button></>}
    function SketchGraph({title,type}){const[show,setShow]=useState(false),[pts,setPts]=useState([]);const ref=useRef();function add(e){const r=ref.current.getBoundingClientRect();setPts(p=>[...p,{x:e.clientX-r.left,y:e.clientY-r.top}])}const d=pts.map((p,i)=>(i?'L':'M')+p.x+','+p.y).join(' ');const md=type==='zero'?'M45 85 L250 85':type==='first'?'M45 190 L250 40':'M45 190 C115 175 180 120 250 35';return <div className="sketch-card"><div className="sketch-title"><span>{title}</span><span><button className="mini-btn" onClick={()=>setShow(!show)}>Model</button><button className="mini-btn" onClick={()=>setPts([])}>Clear</button></span></div><svg ref={ref} onMouseDown={add} onMouseMove={e=>e.buttons===1&&add(e)} viewBox="0 0 300 220" className="svg-graph"><line x1="45" y1="190" x2="270" y2="190" stroke="black" strokeWidth="2"/><line x1="45" y1="190" x2="45" y2="25" stroke="black" strokeWidth="2"/><polygon points="270,190 260,185 260,195"/><polygon points="45,25 40,35 50,35"/><text x="130" y="215" fontSize="14">[A] / mol dm⁻³</text><text x="17" y="130" fontSize="14" transform="rotate(-90 17 130)">rate / mol dm⁻³ s⁻¹</text>{show&&<path d={md} fill="none" stroke="#16a34a" strokeWidth="4" strokeLinecap="round"/>}<path d={d} fill="none" stroke="#1d4ed8" strokeWidth="3" strokeLinecap="round"/></svg></div>}
    function Page2(){return <div className="worksheet-page"><Header page="2"/><div className="grid2"><Panel colour="blue"><SectionHeader number="6" title="Determining the Rate Constant" colour="blue"/><RateConstantSection/></Panel><Panel colour="purple"><SectionHeader number="7" title="Worked Graph Interpretation" colour="purple"/><GraphInterpretationTable/></Panel><Panel colour="orange"><SectionHeader number="8" title="Log–Log Graphs" colour="orange"/><LogLogSection/></Panel><Panel colour="green"><SectionHeader number="9" title="Stretch Challenge" colour="green" icon="★"/><StretchChallenge/></Panel></div><Footer items={['For a first-order reaction, the gradient of a rate–concentration graph equals k.','Horizontal lines indicate zero order; straight lines through the origin indicate first order.','Log–log graphs allow order (n) and log k to be determined from gradient and intercept.']}/></div>}
    function RateConstantSection(){const[rise,setRise]=useState(''),[run,setRun]=useState('');const grad=useMemo(()=>{const a=parseFloat(rise),b=parseFloat(run);return !isNaN(a)&&!isNaN(b)&&b!==0?(a/b).toFixed(3):''},[rise,run]);return <><p className="q">For a first-order reaction:</p><div className="center mb"><div className="equation-box">rate = k[A]</div></div><p className="q">a) State what the gradient of a rate–concentration graph represents.</p><textarea/><RevealButton label="Reveal hint" answer="For a first-order reaction, the gradient of the graph is equal to the rate constant, k."/><p className="q mt">b) Calculate the gradient for the graph below.</p><div className="field-grid"><label><b>Rise</b><input value={rise} onChange={e=>setRise(e.target.value)} style={{width:'100%',marginTop:6}}/></label><label><b>Run</b><input value={run} onChange={e=>setRun(e.target.value)} style={{width:'100%',marginTop:6}}/></label></div><div className="calc-box"><b>🧮 Gradient Calculator</b><br/>gradient = rise ÷ run = <b>{grad||'?'}</b></div><div className="calc-box" style={{background:'#eff6ff',borderColor:'#bfdbfe'}}><b style={{color:colours.blue}}>Rate constant, k =</b><div className="line"></div><b style={{color:colours.blue}}>Units =</b><div className="line"></div></div></>}
    function GraphInterpretationTable(){const[show,setShow]=useState(false);const rows=[['Horizontal line','Rate does not change with concentration → zero order'],['Straight line through origin','Rate is directly proportional to concentration → first order'],['Curved upward line','Rate increases more rapidly as concentration increases → second order']];return <><p>A rate–concentration graph gives the following information:</p><Table headers={['Observation','Meaning']} rows={rows} renderCell={(c,i,j)=>j===0?<b>{c}</b>:(show?<b style={{color:colours.purple}}>{c}</b>:<textarea style={{minHeight:100}}/>)} /><button className="reveal" onClick={()=>setShow(!show)}>{show?'Hide':'Reveal'} interpretation</button></>}
    function LogLogSection(){return <><p>Complete the notes.</p><p>A graph of:</p><div className="note-card">log(rate)</div><p>against</p><div className="note-card">log[A]</div><p>produces a straight line.</p><p>• gradient gives <span style={{display:'inline-block',width:'55%',borderBottom:'2px solid #475569'}}></span></p><p>• intercept gives <span style={{display:'inline-block',width:'55%',borderBottom:'2px solid #475569'}}></span></p><RevealButton label="Reveal notes" answer="The gradient gives the order, n. The intercept gives log k."/></>}
    function StretchChallenge(){return <><p>The equation below is used in log–log graphs:</p><div className="center mb"><div className="formula-box" style={{borderColor:'#bbf7d0',background:'#f0fdf4'}}>log(rate) = n log[A] + logk</div></div><p>Explain how this equation matches the straight-line equation:</p><div className="center mb"><div className="formula-box" style={{borderColor:'#bbf7d0',background:'#f0fdf4',fontStyle:'italic'}}>y = mx + c</div></div><textarea style={{minHeight:190}}/><RevealButton label="Reveal scaffold" answer="log(rate) corresponds to y, log[A] corresponds to x, n is the gradient (m), and log k is the intercept (c)."/></>}
    function Page3(){return <div className="worksheet-page"><Header page="3"/><div className="grid2"><Panel colour="blue"><SectionHeader number="1" title="Initial Rates" colour="blue" icon="🎯"/><p className="q">10. What is meant by the term “initial rate”?</p><textarea/><RevealButton label="Reveal hint" answer="The initial rate is the rate of reaction measured at the start of the reaction, when t = 0."/><hr style={{border:'0',borderTop:'2px dotted #60a5fa',margin:'22px 0'}}/><p className="q">11. Explain why measuring a tangent at t = 0 can be difficult.</p><textarea style={{minHeight:140}}/><RevealButton label="Reveal explanation" answer="The tangent must be drawn exactly at the start of the graph where data points may be limited. Small errors in drawing the tangent can produce large errors in the gradient."/></Panel><Panel colour="orange"><SectionHeader number="2" title="Clock Reactions" colour="orange" icon="⏳"/><ClockReactionSection/></Panel></div><Panel colour="purple" className="mt"><SectionHeader number="3" title="Iodine Clock Reactions" colour="purple" icon="⚗"/><IodineClockSection/></Panel><div className="stack mt"><Panel colour="green"><SectionHeader number="4" title="Key Equation" colour="green" icon="✓"/><EquationSection/></Panel><Panel colour="blue"><SectionHeader number="5" title="Practical Method" colour="blue" icon="📋"/><PracticalMethodSection/></Panel></div><Footer items={['Initial rate is measured at the start of the reaction (t = 0).','Clock reactions use time for a visible change to estimate the initial rate.','For iodine clock reactions, initial rate ∝ 1/t, so we use 1/t as a measure of rate.']}/></div>}
    function ClockReactionSection(){const[t,setT]=useState('');const val=useMemo(()=>{const n=parseFloat(t);return !isNaN(n)&&n!==0?(1/n).toFixed(4):''},[t]);return <><p className="q">12. Complete the sentence below.</p><div className="center"><p>In a clock reaction:</p><div className="formula-box">initial rate ∝ 1/t</div></div><p className="mt"><b>where:</b><br/><i>t</i> = time taken for the colour change</p><div className="calc-box"><b>Interactive 1/t Calculator</b><br/><label>Time for colour change (s)<input value={t} onChange={e=>setT(e.target.value)} style={{display:'block',width:'100%',marginTop:6}}/></label><p>1/t = <b>{val||'?'}</b></p></div></>}
    function IodineClockSection(){const notes=[['a) Starch is added because:','Starch forms a blue–black complex with iodine, making the colour change visible.'],['b) Sodium thiosulfate is added because:','It reacts with iodine and removes it until all the thiosulfate has been used up.'],['c) The blue–black colour appears when:','All the sodium thiosulfate has reacted, allowing iodine to build up and react with starch.']];return <><p className="q">13. Complete the notes below.</p>{notes.map(([l,a])=><div key={l} className="mb"><p><b style={{color:colours.purple}}>{l}</b></p><textarea/><RevealButton label="Reveal note" answer={a}/></div>)}</>}
    function EquationSection(){const[show,setShow]=useState(false),[co,setCo]=useState(['','','','']);const vals=show?['2','1','1','2']:co;const inp=i=><input className="coef" value={vals[i]} disabled={show} onChange={e=>{const n=[...co];n[i]=e.target.value;setCo(n)}}/>;return <><p className="q">14. Complete and balance the equation.</p><div className="calc-box" style={{background:'#f0fdf4',borderColor:'#86efac',overflowX:'auto'}}><div className="eq-line">{inp(0)}<span>S₂O₃²⁻</span><span style={{margin:'0 10px'}}>+</span>{inp(1)}<span>I₂</span><span style={{margin:'0 16px'}}>→</span>{inp(2)}<span>S₄O₆²⁻</span><span style={{margin:'0 10px'}}>+</span>{inp(3)}<span>I⁻</span></div></div><button className="action" style={{background:colours.green}} onClick={()=>setShow(!show)}>{show?'Hide answer':'Reveal balanced equation'}</button></>}
    function PracticalMethodSection(){const correct=['Change concentration of one reactant','Keep all other concentrations constant','Measure time taken for colour change','Calculate 1/t','Plot graph of 1/t against concentration'];const steps=['Calculate 1/t','Measure time taken for colour change','Change concentration of one reactant','Plot graph of 1/t against concentration','Keep all other concentrations constant'];const[a,setA]=useState({}),[chk,setChk]=useState(false);return <><p className="q">15. Put the steps of the iodine clock method in the correct order.</p><div className="table-wrap blue-table"><table><thead><tr><th>Step</th><th>Order</th></tr></thead><tbody>{steps.map((s,i)=>{const c=correct.indexOf(s)+1;return <tr key={s}><td>{s}</td><td><input style={{width:80,textAlign:'center'}} value={a[i]||''} onChange={e=>setA({...a,[i]:e.target.value})}/>{chk&&<span style={{marginLeft:8}}>{Number(a[i])===c?'✅':<b className="result-bad">{c}</b>}</span>}</td></tr>})}</tbody></table></div><button className="action" style={{background:colours.blue,marginTop:12}} onClick={()=>setChk(true)}>Check order</button></>}
    const data=[{concentration:.05,time:33},{concentration:.04,time:43},{concentration:.03,time:58},{concentration:.02,time:80},{concentration:.01,time:185}];
    function Page4(){return <div className="worksheet-page"><Header page="4"/><div className="grid2"><Panel colour="blue"><SectionHeader number="1" title="Experimental Data" colour="blue" icon="⚗"/><ExperimentalDataSection/></Panel><Panel colour="orange"><SectionHeader number="2" title="Calculate Initial Rate" colour="orange" icon="🧮"/><InitialRateCalculationSection/></Panel></div><div className="grid-wide mt"><Panel colour="purple"><SectionHeader number="3" title="Graph Plotting" colour="purple" icon="📊"/><GraphPlottingSection/></Panel><Panel colour="green"><SectionHeader number="4" title="Analysis Questions" colour="green" icon="?"/><AnalysisQuestionsSection/></Panel></div><div className="grid2 mt"><Panel colour="blue"><SectionHeader number="5" title="Evaluation" colour="blue" icon="⚖"/><EvaluationSection/></Panel><Panel colour="orange"><SectionHeader number="6" title="Extension Challenge" colour="orange" icon="★"/><ExtensionSection/></Panel></div><Footer items={['Clock reactions allow us to estimate initial rate using time measurements.','Plotting 1/t against concentration helps us determine the order of reaction.','Good experimental technique and early colour change give the most accurate results.']}/></div>}
    function ExperimentalDataSection(){return <><p className="q">16. A student carried out an iodine clock experiment.</p><div className="table-wrap blue-table"><table><thead><tr><th>[A] / mol dm⁻³</th><th>Time / s</th></tr></thead><tbody>{data.map(r=><tr key={r.concentration}><td>{r.concentration.toFixed(3)}</td><td>{r.time}</td></tr>)}</tbody></table></div></>}
    function InitialRateCalculationSection(){const[a,setA]=useState({}),[chk,setChk]=useState(false);return <><p className="q">17. Calculate the initial rate for each concentration using:</p><div className="center mb"><div className="formula-box">initial rate ∝ 1/t</div></div><div className="table-wrap orange-table"><table><thead><tr><th>[A] / mol dm⁻³</th><th>Time / s</th><th>1/t / s⁻¹</th></tr></thead><tbody>{data.map((r,i)=>{const c=(1/r.time).toFixed(4),s=a[i]||'';return <tr key={r.concentration}><td>{r.concentration.toFixed(3)}</td><td>{r.time}</td><td><input style={{width:110,textAlign:'center'}} value={s} onChange={e=>setA({...a,[i]:e.target.value})}/>{chk&&<span style={{marginLeft:8}}>{s===c?'✅':<b className="result-bad">{c}</b>}</span>}</td></tr>})}</tbody></table></div><button className="action" style={{background:colours.orange,marginTop:12}} onClick={()=>setChk(true)}>Check answers</button></>}
    function GraphPlottingSection(){const[show,setShow]=useState(false),[pts,setPts]=useState([]);const ref=useRef();const graph={left:70,right:600,top:30,bottom:520,xMax:.06,yMax:.04};const gw=graph.right-graph.left,gh=graph.bottom-graph.top;const sx=x=>graph.left+(x/graph.xMax)*gw,sy=y=>graph.bottom-(y/graph.yMax)*gh;function add(e){const r=ref.current.getBoundingClientRect();setPts(p=>[...p,{x:e.clientX-r.left,y:e.clientY-r.top}])}return <><p className="q">18. Plot a graph of 1/t against concentration.</p><div className="graph-paper"><svg ref={ref} onMouseDown={add} onMouseMove={e=>e.buttons===1&&add(e)} viewBox="0 0 620 585" className="svg-graph big-graph">{Array.from({length:31}).map((_,i)=>{const x=graph.left+i*(gw/30),m=i%5===0;return <line key={'v'+i} x1={x} y1={graph.top} x2={x} y2={graph.bottom} stroke={m?'#d8cde8':'#eee8f7'} strokeWidth={m?1.5:1}/>})}{Array.from({length:41}).map((_,i)=>{const y=graph.bottom-i*(gh/40),m=i%10===0;return <line key={'h'+i} x1={graph.left} y1={y} x2={graph.right} y2={y} stroke={m?'#d8cde8':'#eee8f7'} strokeWidth={m?1.5:1}/>})}{[0,.01,.02,.03,.04,.05,.06].map(t=><text key={'x'+t} x={sx(t)} y="545" textAnchor="middle" fontSize="14">{t===0?'0':t.toFixed(2)}</text>)}{[0,.01,.02,.03,.04].map(t=><text key={'y'+t} x="55" y={sy(t)+5} textAnchor="end" fontSize="14">{t===0?'0':t.toFixed(2)}</text>)}<line x1={graph.left} y1={graph.bottom} x2={graph.right} y2={graph.bottom} stroke={colours.purple} strokeWidth="3"/><line x1={graph.left} y1={graph.bottom} x2={graph.left} y2={graph.top} stroke={colours.purple} strokeWidth="3"/><polygon points={`${graph.right},${graph.bottom} ${graph.right-10},${graph.bottom-5} ${graph.right-10},${graph.bottom+5}`} fill={colours.purple}/><polygon points={`${graph.left},${graph.top} ${graph.left-5},${graph.top+10} ${graph.left+5},${graph.top+10}`} fill={colours.purple}/><text x="300" y="575" fontSize="20">[A] / mol dm⁻³</text><text x="22" y="300" fontSize="20" transform="rotate(-90 22 300)">1/t / s⁻¹</text>{show&&data.map((r,i)=><circle key={i} cx={sx(r.concentration)} cy={sy(1/r.time)} r="5" fill="#16a34a"/>)}{pts.map((p,i)=><circle key={i} cx={p.x} cy={p.y} r="3" fill="#1d4ed8"/>)}</svg></div><button className="action" style={{background:colours.purple,marginTop:12}} onClick={()=>setShow(!show)}>{show?'Hide plotted points':'Reveal plotted points'}</button></>}
    function AnalysisQuestionsSection(){return <><p className="q">19. Describe the shape of your graph.</p><textarea/><p className="q">20. Deduce the order with respect to A.</p><textarea style={{minHeight:70}}/><p className="q">21. Explain how you reached your conclusion.</p><textarea style={{minHeight:125}}/><RevealButton label="Reveal guidance" answer="A straight line through the origin suggests first-order behaviour because rate is directly proportional to concentration."/></>}
    function EvaluationSection(){return <><p className="q">22. Explain why clock reactions only approximate the initial rate.</p><textarea style={{minHeight:190}}/><RevealButton label="Reveal idea" answer="The reaction is not measured exactly at t = 0. Some reactants are used up before the colour change occurs, so the measured value is only an approximation of the true initial rate."/></>}
    function ExtensionSection(){return <><p className="q">23a. Explain why clock reactions become less accurate when the measured time becomes longer.</p><textarea/><p className="q">23b. Explain why clock reactions become less accurate when a larger proportion of reactants is used up.</p><textarea/><RevealButton label="Reveal extension guidance" answer="Longer times allow greater concentration changes during the reaction. If more reactants are used up, the rate changes more before the colour change occurs, making the estimate less representative of the initial rate."/></>}
    function App(){const[page,setPage]=useState(1);const pages=[Page1,Page2,Page3,Page4];const Current=pages[page-1];return <><div className="toolbar"><div className="toolbar-inner"><div className="page-tabs">{[1,2,3,4].map(n=><button key={n} className={`tab ${page===n?'active':''}`} onClick={()=>setPage(n)}>Page {n}</button>)}</div><div className="tool-actions"><button className="action secondary" onClick={()=>setPage(p=>Math.max(1,p-1))}>Previous</button><button className="action secondary" onClick={()=>setPage(p=>Math.min(4,p+1))}>Next</button><button className="action" onClick={()=>window.print()}>Print / Save PDF</button></div></div></div><div className="app"><Current/></div></>}
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
