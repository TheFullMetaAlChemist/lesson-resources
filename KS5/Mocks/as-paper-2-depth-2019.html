<script>
const paper = {"title": "OCR AS Chemistry A H032/02 Depth in Chemistry", "subtitle": "2019 Paper Review: Model Answers, Explanations and Exam Tips", "totalMarks": 70, "questions": [{"id": "q1", "title": "Question 1", "topic": "Strontium, Group 2 and water of crystallisation", "marks": 18, "intro": "This question tests relative atomic mass, metallic bonding, Group 2 reactions and practical calculations using hydrated salts.", "parts": [{"id": "1ai", "label": "1(a)(i)", "title": "Relative atomic mass", "marks": 2, "skill": "Definition", "modelAnswer": "Relative atomic mass is the weighted mean mass of an atom of an element compared with one twelfth of the mass of an atom of carbon-12.", "markBreakdown": ["Weighted mean or average mass of an atom.", "Compared with 1/12 of the mass of a carbon-12 atom."], "explanation": "The key words are weighted mean, atom, and carbon-12. Weighted mean matters because isotopes have different abundances, so the average must take account of how common each isotope is.", "commonMistakes": ["Writing “mass of an element” instead of “mass of an atom”.", "Forgetting that the comparison is with one twelfth of carbon-12.", "Giving a vague answer such as “the average mass of an element”."], "examTip": "For OCR definitions, keep the wording precise. “Atom” is essential here."}, {"id": "1aii", "label": "1(a)(ii)", "title": "Finding the missing isotope", "marks": 2, "skill": "Isotope abundance calculation", "modelAnswer": "The missing isotope has abundance 100 − 82.9 − 6.9 = 10.2%.\n\n87.73 = [(88 × 82.9) + (87 × 6.9) + (A × 10.2)] ÷ 100\n\n8773 = 7295.2 + 600.3 + 10.2A\n\n8773 − 7895.5 = 10.2A\n\nA = 86.03\n\nThe other isotope is Sr-86.", "markBreakdown": ["Uses isotope data correctly, including 87 × 6.9, 88 × 82.9 and 10.2%.", "Calculates the isotopic mass as approximately 86."], "explanation": "The relative atomic mass is a weighted mean. The known isotopes contribute part of the mean, and the missing isotope must account for the remaining mass contribution.", "commonMistakes": ["Writing Sr-86 without showing working.", "Forgetting to calculate the missing percentage abundance first.", "Dividing by 10.2 too early and losing track of the ×100 step."], "examTip": "Always show the weighted mean expression. Even if your final answer is obvious, the working is where the marks are."}, {"id": "1b", "label": "1(b)", "title": "Metallic bonding and physical properties", "marks": 5, "skill": "Structure and bonding explanation", "modelAnswer": "Strontium has a giant metallic structure. It contains a regular lattice of positive strontium ions surrounded by delocalised electrons.\n\nThere is a strong electrostatic attraction between the positive ions and the delocalised electrons. A lot of energy is needed to overcome these strong metallic bonds, so strontium has a high melting point.\n\nStrontium conducts electricity well because the delocalised electrons are mobile and can move through the structure, carrying charge.", "markBreakdown": ["Diagram shows a regular arrangement of labelled positive ions.", "Diagram shows labelled electrons between the positive ions.", "Mentions metallic bonding or attraction between delocalised electrons and positive ions/cations.", "Links strong bonds to high melting point because a lot of energy is needed to break them.", "Links mobile delocalised electrons to good electrical conductivity."], "explanation": "In metallic bonding, outer electrons are delocalised. The positive ions are held together by attraction to these electrons. The same delocalised electrons can also move and carry charge.", "commonMistakes": ["Mentioning intermolecular forces. Strontium is not molecular.", "Saying “free ions conduct electricity”. In solid metals, it is the delocalised electrons that move.", "Drawing random ions rather than a regular lattice."], "examTip": "When a question says “bonding and structure”, explain both the structure and how the bonding causes each property."}, {"id": "1ci", "label": "1(c)(i)", "title": "Equation for strontium with water", "marks": 1, "skill": "Symbol equation", "modelAnswer": "Sr + 2H₂O → Sr(OH)₂ + H₂", "markBreakdown": ["Correct balanced equation. State symbols are not required."], "explanation": "Group 2 metals react with water to form the metal hydroxide and hydrogen gas.", "commonMistakes": ["Forgetting the 2 before water.", "Writing SrO instead of Sr(OH)₂.", "Not balancing the hydrogen atoms."], "examTip": "Group 2 + water gives hydroxide + hydrogen."}, {"id": "1cii", "label": "1(c)(ii)", "title": "Calcium compared with strontium", "marks": 2, "skill": "Group 2 trend application", "modelAnswer": "If calcium was used instead of strontium, the reaction would be less vigorous with slower fizzing. The calcium would dissolve more slowly. The final solution would also be less alkaline, so it would have a lower pH.", "markBreakdown": ["Any two valid differences, such as less vigorous fizzing, slower reaction, lower pH/less alkaline, precipitate forms or lower solubility."], "explanation": "Reactivity increases down Group 2, so strontium reacts more vigorously than calcium. Calcium hydroxide is also less soluble than strontium hydroxide, so the final solution may be less alkaline.", "commonMistakes": ["Saying only “calcium is less reactive” without giving an observation.", "Saying “less gas is produced”. The amount depends on moles, not just reactivity.", "Forgetting that this question asks for differences compared with strontium."], "examTip": "For observation questions, use observable words: fizzing, dissolves, precipitate, pH."}, {"id": "1di", "label": "1(d)(i)", "title": "Water of crystallisation calculation", "marks": 3, "skill": "Hydrated salt calculation", "modelAnswer": "Mass of hydrated strontium chloride = 18.65 − 15.96 = 2.69 g\n\nMass of anhydrous strontium chloride = 17.58 − 15.96 = 1.62 g\n\nMass of water removed = 2.69 − 1.62 = 1.07 g\n\nMoles of SrCl₂ = 1.62 ÷ 158.6 = 0.0102 mol\n\nMoles of H₂O = 1.07 ÷ 18.0 = 0.0594 mol\n\nRatio H₂O : SrCl₂ = 0.0594 ÷ 0.0102 = 5.8\n\nx = 5.8", "markBreakdown": ["Calculates moles of SrCl₂ correctly.", "Calculates moles of H₂O correctly.", "Finds the ratio and gives x = 5.8 to two significant figures."], "explanation": "Heating removes water of crystallisation. The residue is anhydrous SrCl₂. Compare moles of water lost with moles of SrCl₂ to find x.", "commonMistakes": ["Using the first residue mass rather than the final constant mass.", "Forgetting to subtract the empty crucible mass.", "Giving 5.83 instead of rounding to two significant figures."], "examTip": "For hydrated salt calculations, find mass of anhydrous salt and mass of water separately, then convert both to moles."}, {"id": "1dii", "label": "1(d)(ii)", "title": "Repeated heating and weighing", "marks": 1, "skill": "Practical reasoning", "modelAnswer": "The student repeats heating and weighing to make sure all the water has been removed.", "markBreakdown": ["The answer must link repeated heating to complete removal of water."], "explanation": "When two consecutive masses are the same, the sample has reached constant mass, suggesting no more water is being lost.", "commonMistakes": ["Saying “to take an average”.", "Saying only “to improve reliability” without linking to water removal."], "examTip": "In heating-to-constant-mass questions, the purpose is usually to ensure a reaction or water removal is complete."}, {"id": "1diii", "label": "1(d)(iii)", "title": "Reducing percentage uncertainty", "marks": 2, "skill": "Practical improvement", "modelAnswer": "Use a balance that measures to more decimal places. Use a larger mass of hydrated strontium chloride.", "markBreakdown": ["Use a more precise balance or one with smaller divisions.", "Use a larger mass of hydrated strontium chloride."], "explanation": "A more precise balance reduces absolute uncertainty. A larger mass means the same absolute uncertainty is a smaller percentage of the measured value.", "commonMistakes": ["Suggesting repeats and averages, which do not reduce percentage uncertainty in the mass of residue.", "Suggesting a lid, which would prevent water escaping.", "Saying “weigh quickly after heating” without addressing uncertainty."], "examTip": "To reduce percentage uncertainty, either reduce the absolute uncertainty or increase the size of the measurement."}]}, {"id": "q2", "title": "Question 2", "topic": "Magnesium nitrate, solution preparation and redox", "marks": 11, "intro": "This question focuses on preparing a standard solution, reacting magnesium carbonate with acid, and applying oxidation numbers.", "parts": [{"id": "2a", "label": "2(a)*", "title": "Preparing magnesium nitrate solution", "marks": 6, "skill": "Extended practical response", "modelAnswer": "Moles needed = c × V = 0.4000 × 250.0/1000 = 0.1000 mol.\n\nMr of Mg(NO₃)₂•6H₂O = 256.3.\n\nMass needed = n × Mr = 0.1000 × 256.3 = 25.63 g.\n\nWeigh 25.63 g of magnesium nitrate hexahydrate crystals using a balance measuring to at least 2 decimal places. Dissolve the crystals in distilled water in a beaker. Transfer the solution into a 250.0 cm³ volumetric flask using a funnel. Rinse the beaker and funnel with distilled water and add the washings to the flask. Make up to the calibration mark with distilled water, using a dropping pipette for the final few drops so the bottom of the meniscus is on the line. Stopper the flask and invert several times to mix.", "markBreakdown": ["Calculates 0.1000 mol required.", "Calculates correct mass of Mg(NO₃)₂•6H₂O as 25.63 g.", "Weighs the crystals.", "Dissolves in distilled or deionised water.", "Transfers to a 250 cm³ volumetric flask and makes up to the mark.", "Includes fine detail such as rinsing, dropping pipette and inverting to mix."], "explanation": "This is a Level of Response question. To reach Level 3, the answer needs both the correct calculation and a detailed practical method. Practical detail shows that the student understands how to prepare an accurate standard solution.", "commonMistakes": ["Using the Mr of anhydrous Mg(NO₃)₂ instead of the hydrated crystals.", "Making the solution in a beaker instead of a volumetric flask.", "Forgetting to rinse the beaker and funnel into the flask.", "Filling above the mark, which would make the concentration too low."], "examTip": "For standard solution questions, use this sequence: calculate mass, weigh, dissolve, transfer, rinse, make up to mark, invert to mix."}, {"id": "2b", "label": "2(b)", "title": "Minimum volume of nitric acid", "marks": 3, "skill": "Moles and reacting ratios", "modelAnswer": "Moles of Mg(NO₃)₂ = 5.00 ÷ 148.3 = 0.0337 mol.\n\nFrom the equation, 1 mol Mg(NO₃)₂ requires 2 mol HNO₃.\n\nMoles of HNO₃ = 2 × 0.0337 = 0.0674 mol.\n\nVolume = n ÷ c = 0.0674 ÷ 1.75 = 0.0385 dm³.\n\n0.0385 dm³ × 1000 = 38.5 cm³.", "markBreakdown": ["Calculates moles of Mg(NO₃)₂.", "Uses the 2:1 ratio to find moles of HNO₃.", "Calculates volume as 38.5 cm³ to three significant figures."], "explanation": "The acid reacts with magnesium carbonate in a 2:1 ratio. Once the moles of nitric acid are known, use volume = moles ÷ concentration, then convert dm³ to cm³.", "commonMistakes": ["Missing the 2:1 ratio.", "Leaving the answer in dm³.", "Rounding too early."], "examTip": "For acid volume calculations, underline the coefficient in the balanced equation before starting."}, {"id": "2c", "label": "2(c)", "title": "Oxidation numbers in decomposition", "marks": 2, "skill": "Redox analysis", "modelAnswer": "Element oxidised: oxygen, changing from −2 to 0.\n\nElement reduced: nitrogen, changing from +5 to +4.", "markBreakdown": ["Oxygen is oxidised from −2 to 0.", "Nitrogen is reduced from +5 to +4."], "explanation": "Oxygen ends up as O₂, where elements have oxidation number 0. Nitrogen changes from nitrate, where it is +5, to NO₂, where it is +4. Oxidation is an increase in oxidation number; reduction is a decrease.", "commonMistakes": ["Missing the plus signs for +5 and +4.", "Swapping oxidation and reduction.", "Trying to use oxygen loss/gain rather than oxidation number changes."], "examTip": "For oxidation number questions, write the signs clearly. OCR can penalise missing positive signs."}]}, {"id": "q3", "title": "Question 3", "topic": "Halogenoalkanes and mass spectrometry", "marks": 12, "intro": "This question tests nucleophilic substitution, hydrolysis rates, bond enthalpy, mass spectra and structural isomerism.", "parts": [{"id": "3ai", "label": "3(a)(i)", "title": "Nucleophilic substitution mechanism", "marks": 3, "skill": "Organic mechanism", "modelAnswer": "The hydroxide ion, OH⁻, acts as a nucleophile.\n\nA curly arrow should go from the lone pair on the oxygen atom of OH⁻ to the carbon atom bonded to iodine.\n\nThe C–I bond should be shown as polar: Cδ+–Iδ−.\n\nA second curly arrow should go from the C–I bond to the iodine atom.\n\nProducts: CH₃CH₂CH₂CH₂CH₂OH + I⁻", "markBreakdown": ["Curly arrow from OH⁻ to the carbon atom attached to iodine.", "C–I dipole shown and curly arrow from the C–I bond to iodine.", "Correct alcohol product and I⁻ shown."], "explanation": "The carbon attached to iodine is δ+ because iodine is more electronegative. OH⁻ is attracted to this carbon and donates a lone pair. The C–I bond breaks heterolytically, forming iodide.", "commonMistakes": ["Starting the curly arrow from the hydrogen in OH⁻ instead of from the oxygen lone pair or negative charge.", "Forgetting the Cδ+–Iδ− dipole.", "Writing NaI without clearly showing I⁻.", "Using double-headed or half-headed arrows instead of normal curly arrows."], "examTip": "In mechanisms, arrows show movement of electron pairs. The arrow must start from the electron pair or bond that is moving."}, {"id": "3aii", "label": "3(a)(ii)", "title": "Comparing hydrolysis rates", "marks": 1, "skill": "Practical observation", "modelAnswer": "Measure the time taken for the precipitate to appear.", "markBreakdown": ["Mentions both the time and the appearance of a precipitate."], "explanation": "As the halogenoalkane hydrolyses, halide ions are released. These react with silver ions from silver nitrate to form a precipitate. The faster the precipitate appears, the faster the hydrolysis.", "commonMistakes": ["Saying only “measure the time”.", "Forgetting to mention the precipitate.", "Trying to measure pH, which is not the intended comparison here."], "examTip": "For silver nitrate hydrolysis tests, the key observation is the time for a precipitate to form."}, {"id": "3aiii", "label": "3(a)(iii)", "title": "Why 1-iodopentane reacts faster", "marks": 2, "skill": "Bond enthalpy explanation", "modelAnswer": "The C–I bond is weaker than the C–Br bond, so the C–I bond breaks more easily. Since the carbon–halogen bond has to break during hydrolysis, 1-iodopentane reacts faster than 1-bromopentane.", "markBreakdown": ["C–I bond is weaker or has lower bond enthalpy than C–Br.", "The carbon–halogen bond breaks during the reaction."], "explanation": "Hydrolysis of halogenoalkanes involves breaking the carbon–halogen bond. A weaker bond needs less energy to break, so the reaction is faster.", "commonMistakes": ["Saying “iodine is more reactive” without explaining bond strength.", "Referring only to electronegativity rather than bond enthalpy.", "Forgetting to compare C–I with C–Br."], "examTip": "For halogenoalkane rate questions, link rate to carbon–halogen bond strength, not just halogen reactivity."}, {"id": "3bi", "label": "3(b)(i)", "title": "Peak X at m/z = 198", "marks": 1, "skill": "Mass spectrometry interpretation", "modelAnswer": "The peak at m/z = 198 gives the molecular mass, or Mr, of 1-iodopentane.", "markBreakdown": ["Identifies the peak as giving the molecular mass or molar mass."], "explanation": "The molecular ion peak represents the whole molecule after it has lost one electron. For C₅H₁₁I, the mass is (5 × 12) + 11 + 127 = 198.", "commonMistakes": ["Writing only “molecular ion” without linking it to molecular mass.", "Confusing molecular ion peaks with fragment peaks.", "Assuming the tallest peak must be the molecular ion peak."], "examTip": "In mass spectra, the peak with the highest m/z is often the molecular ion peak and gives Mr."}, {"id": "3bii", "label": "3(b)(ii)", "title": "Fragment ions Y and Z", "marks": 2, "skill": "Fragment ion formulae", "modelAnswer": "Y, m/z = 71: CH₃CH₂CH₂CH₂CH₂⁺\n\nZ, m/z = 43: CH₃CH₂CH₂⁺", "markBreakdown": ["Correct structure for Y, C₅H₁₁⁺.", "Correct structure for Z, C₃H₇⁺."], "explanation": "Y has five carbons and eleven hydrogens, so its mass is 71. Z has three carbons and seven hydrogens, so its mass is 43. The positive charge must be shown because these are ions detected by the mass spectrometer.", "commonMistakes": ["Forgetting the positive charge.", "Giving neutral molecules instead of ions.", "Using the iodine-containing fragment for these peaks."], "examTip": "Always check fragment masses using C = 12 and H = 1, then add the positive charge."}, {"id": "3ci", "label": "3(c)(i)", "title": "Structure of 2-iodo-2-methylbutane", "marks": 1, "skill": "Organic structure drawing", "modelAnswer": "One acceptable condensed structural formula is: CH₃C(I)(CH₃)CH₂CH₃.\n\nThis can also be written as: (CH₃)₂C(I)CH₂CH₃.", "markBreakdown": ["Correct structural, displayed or skeletal formula for 2-iodo-2-methylbutane."], "explanation": "The parent chain is butane. Both iodine and a methyl group are attached to carbon 2.", "commonMistakes": ["Putting iodine on carbon 1.", "Drawing 2-iodopentane instead of 2-iodo-2-methylbutane.", "Forgetting that the molecule must still have five carbon atoms in total."], "examTip": "When naming isomers, identify the parent chain first, then place each substituent on the correct carbon."}, {"id": "3cii", "label": "3(c)(ii)", "title": "Comparing mass spectra of isomers", "marks": 2, "skill": "Spectra comparison", "modelAnswer": "Similarity: both compounds have a molecular ion peak at m/z = 198 because they are structural isomers with the same molecular formula.\n\nDifference: 2-iodo-2-methylbutane has no peak at m/z = 43.", "markBreakdown": ["Gives a specific shared peak, such as m/z = 198, 71 or 29.", "States that 2-iodo-2-methylbutane has no peak at m/z = 43."], "explanation": "Structural isomers have the same molecular formula, so their molecular ion peaks can be the same. However, they fragment differently because the atoms are arranged differently.", "commonMistakes": ["Writing vague statements such as “they have different peaks”.", "Not giving specific m/z values.", "Assuming isomers have identical spectra."], "examTip": "For spectra comparison questions, give one precise similarity and one precise difference using m/z values."}]}, {"id": "q4", "title": "Question 4", "topic": "Rates of reaction, graphs and catalysis", "marks": 13, "intro": "This question covers gas volume calculations, graph skills, collision theory and catalyst explanations.", "parts": [{"id": "4a", "label": "4(a)", "title": "Volume of hydrogen produced", "marks": 3, "skill": "Gas volume calculation", "modelAnswer": "n(HCl) = 50.0/1000 × 0.100 = 5.00 × 10⁻³ mol.\n\nFrom Zn + 2HCl → ZnCl₂ + H₂, 2 mol HCl produce 1 mol H₂.\n\nn(H₂) = 5.00 × 10⁻³ ÷ 2 = 2.50 × 10⁻³ mol.\n\nVolume at RTP = n × 24.0 × 1000\n\nVolume = 2.50 × 10⁻³ × 24.0 × 1000 = 60.0 cm³.", "markBreakdown": ["Calculates moles of HCl as 5.00 × 10⁻³ mol.", "Uses the 2:1 ratio to find moles of H₂.", "Calculates volume of H₂ as 60.0 cm³."], "explanation": "Hydrochloric acid is the limiting reagent because zinc is in excess. Use the acid moles, the equation ratio, then the molar gas volume at RTP.", "commonMistakes": ["Forgetting to divide by 2 and getting 120 cm³.", "Multiplying by 2 instead of dividing by 2.", "Forgetting to convert dm³ to cm³."], "examTip": "When a solid is in excess, base the calculation on the reactant that is not in excess."}, {"id": "4bi", "label": "4(b)(i)", "title": "Plotting the graph", "marks": 1, "skill": "Graph plotting", "modelAnswer": "The x-axis should be labelled Time / s and the data points from the table should be plotted accurately.", "markBreakdown": ["Uses a linear numerical scale on the x-axis, labels it Time / s, and plots the points correctly within tolerance."], "explanation": "The y-axis is already volume of gas, so the missing axis must be time. The graph should use a sensible scale that allows all data points to be plotted clearly.", "commonMistakes": ["Forgetting the unit on the x-axis.", "Using uneven spacing for time values.", "Plotting the 160 s and 200 s points incorrectly because the intervals are not all 20 s near the end."], "examTip": "Check the table carefully: time intervals may not always be equal."}, {"id": "4bii", "label": "4(b)(ii)", "title": "Identifying the anomaly", "marks": 1, "skill": "Graph interpretation", "modelAnswer": "The anomalous point is at 80 s, 39 cm³, and should be circled.", "markBreakdown": ["Circles the point at 80 s."], "explanation": "The 80 s value is lower than expected from the trend of the surrounding points, so it does not fit the smooth curve.", "commonMistakes": ["Circling a point just because it is not exactly on a hand-drawn curve.", "Missing the anomaly because the value still increases from the previous reading.", "Circling several points unnecessarily."], "examTip": "An anomaly is a point that does not fit the overall pattern, not just any point that is difficult to draw through."}, {"id": "4biii", "label": "4(b)(iii)", "title": "Drawing the best-fit curve", "marks": 1, "skill": "Best-fit curve", "modelAnswer": "Draw a smooth curve through the points, ignoring the anomalous point at 80 s.", "markBreakdown": ["Smooth curve using all points except the anomalous point at 80 s."], "explanation": "The reaction starts fastest, so the curve should be steepest at the start. It then becomes less steep and levels off as the reaction stops.", "commonMistakes": ["Joining points with straight lines.", "Forcing the curve through the anomaly.", "Drawing a curve that does not level off."], "examTip": "Rate graphs for gas production usually start steep and then flatten as reactants are used up."}, {"id": "4c", "label": "4(c)", "title": "Sketching the curve for higher concentration acid", "marks": 2, "skill": "Graph prediction", "modelAnswer": "The new curve should have a steeper initial gradient and should level off earlier. It should finish at the same final volume of gas, about 58 cm³.", "markBreakdown": ["Initial slope is steeper and the curve levels off earlier.", "Same final volume of gas is produced."], "explanation": "The new acid is more concentrated, so the reaction is faster. However, both experiments contain 0.00500 mol of HCl, so the total amount of hydrogen produced is the same.", "commonMistakes": ["Drawing a higher final volume because the acid is more concentrated.", "Not realising the total moles of acid are unchanged.", "Drawing a straight line rather than a curve that levels off."], "examTip": "Concentration affects rate, but the total moles of limiting reagent affects final yield."}, {"id": "4d", "label": "4(d)", "title": "Why rate decreases over time", "marks": 2, "skill": "Collision theory", "modelAnswer": "As the reaction proceeds, the concentration of hydrochloric acid decreases. This means there are fewer acid particles per unit volume, so there are fewer collisions per second between acid particles and zinc.", "markBreakdown": ["Acid concentration decreases.", "Fewer collisions per second or less frequent collisions."], "explanation": "The rate depends on how often reacting particles collide successfully. As acid particles are used up, collision frequency decreases, so the reaction slows down.", "commonMistakes": ["Saying only “there are fewer collisions” without mentioning time or frequency.", "Saying the zinc disappears, even though zinc is in excess.", "Referring to activation energy, which is not the main reason rate falls over time."], "examTip": "For collision theory rate explanations, include “per second” or “frequency” to make the link to rate clear."}, {"id": "4ei", "label": "4(e)(i)", "title": "How a catalyst increases rate", "marks": 2, "skill": "Catalyst explanation", "modelAnswer": "A catalyst provides an alternative reaction route with a lower activation energy. Therefore, a greater proportion of particles have energy greater than or equal to the activation energy, so more particles can react.", "markBreakdown": ["Catalyst lowers activation energy or provides an alternative route.", "A greater proportion of molecules have energy greater than or equal to activation energy."], "explanation": "Lowering activation energy means more particles have enough energy to react at the same temperature. This increases the rate without the catalyst being used up overall.", "commonMistakes": ["Saying “more successful collisions” without explaining activation energy.", "Saying the catalyst gives particles more energy.", "Forgetting to mention the alternative route."], "examTip": "For catalyst questions, use the phrase: alternative route with lower activation energy."}, {"id": "4eii", "label": "4(e)(ii)", "title": "Homogeneous or heterogeneous catalyst?", "marks": 1, "skill": "Catalyst classification", "modelAnswer": "It is difficult to classify because the reactants are in different physical states. Hydrochloric acid is aqueous, while zinc is solid.", "markBreakdown": ["Recognises that the reactants have different physical states."], "explanation": "Copper(II) sulfate solution is in the same phase as the acid but not in the same phase as the solid zinc. This makes the classification less straightforward.", "commonMistakes": ["Only saying “because it is a solution”.", "Forgetting to compare the catalyst with both reactants.", "Stating simply homogeneous or heterogeneous without explaining the difficulty."], "examTip": "Homogeneous means same phase as the reactants. If the reactants are in different phases, classification can be tricky."}]}, {"id": "q5", "title": "Question 5", "topic": "Alkenes, alcohols, purification and polymers", "marks": 16, "intro": "This question brings together addition reactions of alkenes, dehydration of alcohols, organic purification and polymerisation.", "parts": [{"id": "5ai", "label": "5(a)(i)", "title": "Products of addition reactions", "marks": 3, "skill": "Organic reaction products", "modelAnswer": "Reaction 1 with H₂: CH₃CH₂CH₂CH₂CH₂CH₃, hexane.\n\nReaction 2 with HCl: CH₃CH₂CH₂CH₂CH(Cl)CH₃, 2-chlorohexane as the major product.\n\nReaction 3 with Br₂: CH₃CH₂CH₂CH₂CHBrCH₂Br, 1,2-dibromohexane.", "markBreakdown": ["Correct product from hydrogenation of hex-1-ene.", "Correct major product from addition of HCl.", "Correct dibromo product from addition of Br₂."], "explanation": "Addition reactions open the C=C double bond. Hydrogen adds H to both carbons. HCl adds H and Cl across the double bond, with the major product following the usual carbocation stability pattern. Bromine adds Br to both carbons of the double bond.", "commonMistakes": ["Leaving the double bond in the product.", "Putting chlorine on the wrong carbon for the major HCl product.", "Drawing a substitution product rather than an addition product."], "examTip": "For alkene addition, break the double bond and add one new atom or group to each carbon of the original C=C."}, {"id": "5aii", "label": "5(a)(ii)", "title": "Catalyst for hydrogenation", "marks": 1, "skill": "Recall", "modelAnswer": "Nickel.", "markBreakdown": ["States nickel. Platinum, palladium or rhodium would also be acceptable."], "explanation": "Hydrogenation of alkenes requires a metal catalyst, commonly nickel, to add hydrogen across the double bond.", "commonMistakes": ["Writing iron, which is used in the Haber process.", "Writing phosphoric acid, which is used in hydration of alkenes.", "Forgetting that this is hydrogenation, not hydration."], "examTip": "Hydrogenation = H₂ with Ni catalyst."}, {"id": "5aiii", "label": "5(a)(iii)", "title": "Observation with bromine", "marks": 1, "skill": "Test for unsaturation", "modelAnswer": "Bromine is decolourised, changing from orange to colourless.", "markBreakdown": ["States that bromine is decolourised or changes from orange to colourless."], "explanation": "Bromine reacts with the C=C double bond in hex-1-ene, so the orange bromine colour disappears.", "commonMistakes": ["Saying only “colour change” without giving the colours.", "Writing orange to brown.", "Confusing the test with acidified potassium manganate(VII)."], "examTip": "For alkenes, bromine water changes from orange to colourless."}, {"id": "5bi", "label": "5(b)(i)*", "title": "Preparing and purifying hex-1-ene", "marks": 6, "skill": "Extended calculation and practical method", "modelAnswer": "Moles of hex-1-ene required = 4.20 ÷ 84.0 = 0.0500 mol.\n\nThe expected yield is 62.5%, so the theoretical amount of hex-1-ene needed is 0.0500 × 100/62.5 = 0.0800 mol.\n\nHexan-1-ol has Mr = 102.\n\nMass of hexan-1-ol required = 0.0800 × 102 = 8.16 g.\n\nAfter reflux, pour the mixture into a separating funnel and allow the layers to separate. Collect the organic layer containing hex-1-ene. This is the upper layer because hex-1-ene is less dense than water. Dry the organic layer using an anhydrous salt such as magnesium sulfate. Then distil the liquid and collect the fraction that distils at about 63 °C, the boiling point of hex-1-ene.", "markBreakdown": ["Calculates moles of hex-1-ene from 4.20 g.", "Correctly accounts for 62.5% yield.", "Calculates mass of hexan-1-ol as 8.16 g.", "Uses a separating funnel to separate organic and aqueous layers.", "Dries the organic layer using an anhydrous salt.", "Distils and collects the fraction at about 63 °C."], "explanation": "This Level of Response question needs both calculation and purification. Since the yield is only 62.5%, more hexan-1-ol is needed than the amount predicted by a simple 1:1 mole calculation. Purification then removes water, acid and unreacted alcohol.", "commonMistakes": ["Ignoring percentage yield and calculating 5.10 g.", "Using the percentage yield upside down and getting too small a mass.", "Forgetting the separating funnel stage.", "Saying “distil” without specifying collection near 63 °C.", "Forgetting to dry the organic layer before distillation."], "examTip": "For organic preparation questions, calculation plus purification detail is usually needed for the top level."}, {"id": "5bii", "label": "5(b)(ii)", "title": "Using hexan-2-ol instead", "marks": 2, "skill": "Elimination products", "modelAnswer": "The percentage yield of hex-1-ene would be less. This is because dehydration of hexan-2-ol can form a mixture of hex-1-ene and hex-2-ene, so less of the desired hex-1-ene is produced.", "markBreakdown": ["States that the yield of hex-1-ene would be less.", "Explains that a mixture of hex-1-ene and hex-2-ene forms."], "explanation": "Hexan-2-ol can eliminate water in more than one direction, producing more than one alkene. Since some product is hex-2-ene, the yield of hex-1-ene is reduced.", "commonMistakes": ["Saying the yield is the same because both alcohols have the same molecular formula.", "Saying no hex-1-ene forms at all.", "Not naming hex-2-ene as the alternative product."], "examTip": "Secondary alcohols can often dehydrate to form mixtures of positional alkene isomers."}, {"id": "5ci", "label": "5(c)(i)", "title": "Poly(hex-1-ene)", "marks": 1, "skill": "Addition polymer structure", "modelAnswer": "A correct section containing two repeat units can be shown as:\n\n–CH₂–CH(CH₂CH₂CH₂CH₃)–CH₂–CH(CH₂CH₂CH₂CH₃)–", "markBreakdown": ["Shows two repeat units with a carbon–carbon single bond backbone and butyl side groups."], "explanation": "In addition polymerisation, the C=C double bond opens and the alkene molecules join together. The carbon skeleton from the double bond becomes the polymer backbone, while the rest of the chain becomes a side group.", "commonMistakes": ["Leaving a C=C double bond in the polymer backbone.", "Drawing only one repeat unit when two are requested.", "Forgetting the side links/continuation bonds."], "examTip": "For addition polymers, turn C=C into C–C and show the groups attached to the same carbons as in the monomer."}, {"id": "5cii", "label": "5(c)(ii)", "title": "Useful disposal of polymers", "marks": 2, "skill": "Polymer disposal", "modelAnswer": "Polymers can be disposed of by combustion to produce energy. They can also be used as an organic feedstock to make plastics or other useful organic compounds.", "markBreakdown": ["Combustion for energy production.", "Use as an organic feedstock for plastics or other useful organic compounds."], "explanation": "If recycling is not used, polymers can still be disposed of in ways that recover value. Combustion can recover energy, while feedstock recycling can produce chemicals for new materials.", "commonMistakes": ["Writing landfill, which is disposal but not especially beneficial to the environment.", "Repeating recycling, which the question says to avoid.", "Giving vague answers such as “reuse them” without explaining a disposal method."], "examTip": "When a question asks for methods other than recycling, do not repeat recycling in different words."}]}]};

const icons = {
  model: "✅",
  mark: "📋",
  explain: "📘",
  mistake: "⚠️",
  tip: "💡"
};

let activeId = paper.questions[0].id;

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function listHtml(items) {
  return "<ul>" + items.map(item => `<li>${escapeHtml(item)}</li>`).join("") + "</ul>";
}

function card(icon, title, body, tone, isList=false) {
  return `
    <article class="card ${tone}">
      <div class="card-title"><span>${icon}</span><span>${escapeHtml(title)}</span></div>
      <div class="card-body">${isList ? listHtml(body) : escapeHtml(body)}</div>
    </article>
  `;
}

function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = paper.questions.map(q => `
    <button class="tab ${q.id === activeId ? "active" : ""}" data-id="${q.id}">
      <div class="tab-top"><span>${escapeHtml(q.title)}</span><span class="tab-marks">${q.marks}</span></div>
      <p class="tab-topic">${escapeHtml(q.topic)}</p>
    </button>
  `).join("");
  tabs.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      activeId = btn.dataset.id;
      render();
    });
  });
}

function renderQuestion() {
  const q = paper.questions.find(x => x.id === activeId) || paper.questions[0];
  document.getElementById("questionHead").innerHTML = `
    <div class="badges">
      <span class="badge blue">${q.marks} marks</span>
      <span class="badge green">Content added</span>
    </div>
    <h2>${escapeHtml(q.title)}: ${escapeHtml(q.topic)}</h2>
    <p>${escapeHtml(q.intro)}</p>
  `;

  document.getElementById("parts").innerHTML = q.parts.map((part, index) => `
    <article class="part ${index === 0 ? "open" : ""}">
      <button class="part-btn" type="button">
        <div>
          <div class="badges">
            <span class="badge blue">${escapeHtml(part.label)}</span>
            <span class="badge green">${part.marks} mark${part.marks === 1 ? "" : "s"}</span>
            <span class="badge purple">${escapeHtml(part.skill)}</span>
          </div>
          <div class="part-title">${escapeHtml(part.title)}</div>
        </div>
        <span class="chev">${index === 0 ? "⌄" : "›"}</span>
      </button>
      <div class="part-content">
        ${card(icons.model, "Model answer", part.modelAnswer, "green")}
        ${card(icons.mark, "Mark breakdown", part.markBreakdown, "blue", true)}
        ${card(icons.explain, "Student-friendly explanation", part.explanation, "")}
        ${card(icons.mistake, "Common mistakes", part.commonMistakes, "red", true)}
        ${card(icons.tip, "Exam tip", part.examTip, "amber")}
      </div>
    </article>
  `).join("");

  document.querySelectorAll(".part-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      const part = btn.closest(".part");
      part.classList.toggle("open");
      part.querySelector(".chev").textContent = part.classList.contains("open") ? "⌄" : "›";
    });
  });
}

function render() {
  renderTabs();
  renderQuestion();
}

document.getElementById("paper-title").textContent = paper.title;
document.getElementById("paper-subtitle").textContent = paper.subtitle;
document.getElementById("marks-covered").textContent = `${paper.questions.reduce((sum, q) => sum + q.marks, 0)}/${paper.totalMarks}`;

document.getElementById("expandAll").addEventListener("click", () => {
  document.querySelectorAll(".part").forEach(part => {
    part.classList.add("open");
    part.querySelector(".chev").textContent = "⌄";
  });
});
document.getElementById("collapseAll").addEventListener("click", () => {
  document.querySelectorAll(".part").forEach(part => {
    part.classList.remove("open");
    part.querySelector(".chev").textContent = "›";
  });
});

console.assert(paper.questions.length === 5, "Expected five questions.");
console.assert(paper.questions.reduce((sum, q) => sum + q.marks, 0) === paper.totalMarks, "Marks should add to total.");
render();
</script>
</body>
</html>
