<script>
const S={easy:{label:'Easy',cls:'easy',marks:40,summary:['Metal + acid → salt + hydrogen.','Hydrogen test: lit splint gives a squeaky pop.','Hydrochloric acid forms chlorides; nitric acid forms nitrates; sulfuric acid forms sulfates.','Acids contain H⁺ ions; alkalis contain OH⁻ ions.','Neutralisation ionic equation: H⁺(aq) + OH⁻(aq) → H₂O(l).','Filtration removes insoluble solids; crystallisation produces crystals.','Strong acids fully ionise; weak acids partially ionise.','Always convert cm³ to dm³ in concentration calculations.'],questions:[
{n:'1',t:'Metals reacting with acids',m:5,p:[['1(a)',1,'Complete the general word equation: Metal + acid → __________ + hydrogen','salt',['1 mark for salt'],'Metal + acid produces a salt and hydrogen gas.','Writing water instead of salt.','Metal + acid → salt + hydrogen.'],['1(b)',2,'Describe the test for hydrogen, including the expected positive result.','Hold a lit splint near the gas. A squeaky pop sound is heard.',['1 mark for lit splint.','1 mark for squeaky pop.'],'Hydrogen is flammable and burns rapidly in air.','Using a glowing splint or confusing the oxygen/carbon dioxide tests.','Hydrogen → squeaky pop.'],['1(c)',1,'Which acid should be used to produce magnesium sulfate?','Sulfuric acid.',['1 mark for sulfuric acid.'],'Sulfuric acid forms sulfate salts.','Choosing hydrochloric or nitric acid.','Hydrochloric → chloride; nitric → nitrate; sulfuric → sulfate.'],['1(d)',1,'Write the formula for magnesium sulfate from Mg²⁺ and SO₄²⁻.','MgSO₄',['1 mark for MgSO₄.'],'The 2+ and 2− charges balance in a 1:1 ratio.','Writing Mg₂SO₄ or Mg(SO₄)₂.','Balance ionic charges before writing formulae.']]},
{n:'2',t:'Carbonates and nitric acid',m:4,p:[['2(a)',1,'A student reacts zinc carbonate with nitric acid. Which salt is formed?','Zinc nitrate.',['1 mark for zinc nitrate.'],'Nitric acid forms nitrate salts.','Writing zinc chloride or zinc oxide.','Nitric acid → nitrates.'],['2(b)',2,'Complete the sentences about zinc carbonate reacting with nitric acid.','Fizzing can be observed. This is due to the neutralisation reaction releasing carbon dioxide gas.',['1 mark for fizzing.','1 mark for neutralisation.'],'Carbonates react with acids to produce carbon dioxide.','Choosing decomposition or oxidation.','Fizzing with carbonates usually means CO₂.'],['2(c)',1,'Balance: ZnCO₃ + ___ HNO₃ → Zn(NO₃)₂ + ___ H₂O + CO₂','ZnCO₃ + 2HNO₃ → Zn(NO₃)₂ + H₂O + CO₂',['1 mark for both correct balancing numbers.'],'Two nitrate ions are needed in zinc nitrate.','Forgetting to balance hydrogen/nitrate.','Balance metals, non-metals, hydrogen, then oxygen.']]},
{n:'3',t:'Copper oxide and salt preparation',m:6,p:[['3(a)',1,'Copper oxide reacts with hydrochloric acid. What is the salt? Copper ________','chloride',['1 mark for chloride.'],'Hydrochloric acid forms chloride salts.','Writing sulfate or nitrate.','Hydrochloric acid → chlorides.'],['3(b)',1,'What type of reaction happens when copper oxide reacts with hydrochloric acid?','Neutralisation.',['1 mark for neutralisation.'],'Copper oxide is a base; acid + base forms salt and water.','Writing precipitation or decomposition.','Metal oxides are bases.'],['3(c)',1,'How is unreacted solid copper oxide removed?','Filter the mixture / filtration.',['1 mark for filtration.'],'Filtration separates insoluble solid from solution.','Writing evaporation or distillation.','Insoluble solid → filtration.'],['3(d)',3,'Complete the sentences about extracting salt from the solution.','The salt is extracted by crystallisation. The solution is heated until it is boiling.',['1 mark for salt.','1 mark for crystallisation.','1 mark for boiling.'],'Heating evaporates some water, then cooling allows crystals to form.','Choosing melting or evaporating all water.','Evaporation removes water; crystallisation makes crystals.']]},
{n:'4',t:'pH, indicators and neutralisation',m:12,p:[['4(a)',1,'Which ions make a solution alkaline?','Hydroxide ions / OH⁻.',['1 mark for hydroxide ions or OH⁻.'],'Alkalis release hydroxide ions in water.','Writing hydrogen ions.','Acids → H⁺; alkalis → OH⁻.'],['4(b)',3,'Match pH values to descriptions.','Below 7 = acidic; 7 = neutral; above 7 = alkaline.',['1 mark for each match.'],'pH 0–6 is acidic, 7 neutral, 8–14 alkaline.','Saying pH 7 is alkaline.','Acids below 7; alkalis above 7.'],['4(c)',2,'Identify a colour-change method and a more accurate piece of equipment for pH.','Indicator / universal indicator; pH probe / pH meter.',['1 mark for indicator.','1 mark for pH probe/meter.'],'Indicators estimate pH; probes give more accurate readings.','Writing thermometer.','More accurate pH measurement = pH probe.'],['4(d)',4,'Explain how universal indicator identifies dilute nitric acid, sodium hydroxide and water.','Add universal indicator. Nitric acid turns red, sodium hydroxide turns purple/blue, water turns green.',['1 mark for method.','1 mark for acid colour.','1 mark for alkali colour.','1 mark for water colour.'],'Universal indicator changes colour according to pH.','Confusing acid and alkali colours.','Universal indicator gives a range of colours.'],['4(e)',2,'Write the ionic equation of neutralisation.','H⁺(aq) + OH⁻(aq) → H₂O(l)',['1 mark for H⁺ + OH⁻.','1 mark for H₂O.'],'Hydrogen ions react with hydroxide ions to produce water.','Missing charges or writing a full equation.','This ionic equation is always the same.']]},
{n:'5',t:'Strong and weak acids; titration results',m:8,p:[['5(a)',3,'Complete the sentences about nitric acid, sodium hydroxide and pH.','Hydrogen ions make nitric acid acidic. Hydroxide ions make sodium hydroxide alkaline. Acids have lower pH than alkalis.',['1 mark hydrogen.','1 mark hydroxide.','1 mark lower.'],'H⁺ causes acidity and OH⁻ causes alkalinity.','Writing higher pH for acids.','Low pH acidic; high pH alkaline.'],['5(b)',1,'Weak acids and weak alkalis are ________ ionised in water.','partially',['1 mark for partially.'],'Weak acids/alkalis only partly ionise.','Writing completely or not.','Strength depends on ionisation.'],['5(c)',1,'What technique uses a burette, pipette and conical flask?','Titration.',['1 mark for titration.'],'Titration finds exact reacting volumes.','Writing filtration.','Burette + pipette + flask = titration.'],['5(d)',1,'How did the student know enough sodium hydroxide had been added?','The indicator changed colour.',['1 mark for colour change.'],'The colour change shows the end point.','Saying it stopped fizzing.','Titration end point = colour change.'],['5(e)',2,'Use three results to calculate the mean sodium hydroxide volume.','Use 21.1, 21.0 and 21.1. Mean = 21.07 cm³ ≈ 21.1 cm³.',['1 mark for selecting concordant values.','1 mark for correct mean.'],'21.7 and 21.9 are not concordant with the other three.','Using all five values.','Identify concordant titres first.']]},
{n:'6',t:'Titration calculations',m:4,p:[['6(a)',2,'Calculate moles of NaOH from 17.3 cm³ of 0.100 mol/dm³ NaOH.','17.3 cm³ = 0.0173 dm³. Moles = 0.100 × 0.0173 = 0.00173 mol.',['1 mark for conversion.','1 mark for moles.'],'Use volume in dm³.','Using 17.3 instead of 0.0173.','Divide cm³ by 1000.'],['6(b)',1,'HCl and NaOH react 1:1. State moles of HCl.','0.00173 mol.',['1 mark for 0.00173 mol.'],'1:1 ratio means equal moles react.','Doubling or halving the value.','Check the balanced equation.'],['6(c)',1,'Calculate concentration of hydrochloric acid in 25.0 cm³.','25.0 cm³ = 0.0250 dm³. Concentration = 0.00173 ÷ 0.0250 = 0.0692 mol/dm³.',['1 mark for correct concentration.'],'Concentration = moles ÷ volume.','Not converting volume.','Find moles → use ratio → find concentration.']]},
{n:'7',t:'Excess copper carbonate and filtration',m:1,p:[['7',1,'Why add excess copper carbonate and what is step 3?','C: to ensure all the acid reacts; filtration.',['1 mark for C.'],'Excess insoluble carbonate ensures all acid is neutralised and can be filtered off.','Choosing crystallisation.','Excess insoluble solid is easy to remove by filtration.']]}
]},
medium:{label:'Medium',cls:'medium',marks:56,summary:['Strong acids fully ionise; weak acids partially ionise.','Strong acids have lower pH than weak acids of the same concentration because they produce more H⁺ ions.','Metal + acid reactions produce a salt and hydrogen gas.','Metal + acid reactions can be redox: metals are oxidised and hydrogen ions are reduced.','Soluble salts are prepared by adding excess insoluble solid, filtering, evaporating, cooling and drying crystals.','Neutralisation ionic equation: H⁺(aq) + OH⁻(aq) → H₂O(l).','An alkali is a soluble base; alkaline solutions contain OH⁻ ions.','Use a suitable indicator with a sharp end point and repeat until concordant titres are obtained.','Strength and concentration are different.','For strong acids, a 10× decrease in H⁺ concentration increases pH by 1.'],questions:[
{n:'1',t:'Weak acids, strong acids and vinegar titration',m:11,p:[['1(a)',1,'What ion is present in aqueous solutions of all acids?','Hydrogen ions / H⁺.',['1 mark for hydrogen ions or H⁺.'],'All acids produce hydrogen ions in water.','Writing hydroxide ions.','Acids contain H⁺ ions.'],['1(b)',5,'Discuss the pH difference between a weak acid and a strong acid of the same concentration.','A strong acid has lower pH because it fully ionises. A weak acid only partially ionises, so it produces fewer H⁺ ions. More H⁺ ions means lower pH.',['1 lower pH.','1 fully ionises.','1 partially ionises.','1 more H⁺.','1 link to pH.'],'Strength is about ionisation, not concentration.','Saying weak means dilute.','Strength = ionisation.'],['1(c)',5,'27.00 cm³ of 1.0 mol/dm³ NaOH neutralises 25.00 cm³ vinegar. Calculate ethanoic acid concentration.','Moles NaOH = 1.0 × 0.02700 = 0.0270 mol. Ratio CH₃COOH:NaOH = 1:1, so moles acid = 0.0270 mol. Concentration = 0.0270 ÷ 0.02500 = 1.08 mol/dm³.',['1 moles NaOH.','1 ratio.','1 volume conversion.','1 concentration equation.','1 final answer.'],'Start from the known solution, then use the ratio.','Using cm³ directly.','Known solution → moles → ratio → unknown concentration.']]},
{n:'2',t:'Iron with hydrochloric acid and redox',m:13,p:[['2(a)',2,'Fe + 2HCl → FeCl₂ + _____ . Name and symbol of missing product.','Hydrogen, H₂.',['1 hydrogen.','1 H₂.'],'Metal + acid produces salt and hydrogen.','Writing H instead of H₂.','Hydrogen gas is H₂.'],['2(b)',1,'What class of compound is FeCl₂?','A salt.',['1 mark for salt.'],'Iron chloride is a salt formed from acid.','Writing base or oxide.','Chlorides, nitrates and sulfates are usually salts.'],['2(c)',6,'Describe a suitable method for separating FeCl₂.','Add excess iron, filter off unreacted iron, heat the filtrate to evaporate some water, cool to crystallise, then dry the crystals.',['1 excess iron.','1 filter.','1 heat.','1 evaporate.','1 cool/crystallise.','1 dry/sequence.'],'FeCl₂ is soluble and remains in the filtrate.','Forgetting filtration.','Excess solid → filter → evaporate → cool → dry.'],['2(d)',4,'State the reaction type and use half equations to explain oxidation and reduction.','This is redox. Fe → Fe²⁺ + 2e⁻ shows iron is oxidised. 2H⁺ + 2e⁻ → H₂ shows hydrogen ions are reduced.',['1 redox.','1 oxidation half equation.','1 reduction half equation.','1 electron transfer explanation.'],'Oxidation is loss of electrons; reduction is gain.','Mixing up oxidation and reduction.','Electrons right = oxidation; electrons left = reduction.']]},
{n:'3',t:'Calcium and hydrochloric acid',m:1,p:[['3',1,'Calcium reacts with hydrochloric acid to form calcium chloride and another product. What is it?','C. Hydrogen.',['1 mark for hydrogen.'],'A metal reacting with acid forms a salt and hydrogen.','Choosing carbon dioxide.','Metal + acid → salt + hydrogen.']]},
{n:'4',t:'Indicator colours',m:1,p:[['4',1,'Which indicator displays the correct colour in each solution?','A. Methyl orange.',['1 mark for methyl orange.'],'Methyl orange is red in acid and yellow in alkali.','Choosing phenolphthalein as red in acid.','Methyl orange: red to yellow.']]},
{n:'5',t:'Sulfuric acid neutralisation and titration method',m:10,p:[['5(a)',4,'Explain strong acid and how strength links to pH.','A strong acid fully ionises in water, releasing H⁺ ions. This gives a high H⁺ concentration and a low pH.',['1 fully ionises.','1 releases H⁺.','1 high H⁺ concentration.','1 lower pH.'],'Strong acids completely dissociate into ions.','Saying strong means concentrated.','Strong ≠ concentrated.'],['5(b)',2,'Write the neutralisation ionic equation with state symbols.','H⁺(aq) + OH⁻(aq) → H₂O(l)',['1 equation.','1 state symbols.'],'Spectator ions are omitted.','Missing state symbols.','Ionic equations show only particles that change.'],['5(c)',4,'Describe how to complete the titration, including indicator and colour change.','Add indicator to NaOH in the flask. Fill burette with sulfuric acid. Record readings, add acid while swirling, add dropwise near endpoint, stop at colour change and repeat for concordant results. Phenolphthalein: pink to colourless; methyl orange: yellow to orange/red.',['1 indicator.','1 apparatus/readings.','1 dropwise/swirling.','1 suitable colour change.'],'A suitable indicator changes sharply at the endpoint.','Using universal indicator.','Universal indicator is not suitable for accurate titrations.']]},
{n:'6',t:'Soluble salts and gas collection apparatus',m:7,p:[['6(a)',2,'Give two other substances that react with acid to form soluble salts.','Any two from metal oxides, metal hydroxides, metal carbonates.',['1 each.'],'Bases and carbonates react with acids to form salts.','Writing non-metals.','Bases neutralise acids.'],['6(b)',1,'Formula of magnesium chloride.','MgCl₂',['1 mark.'],'Mg²⁺ needs two Cl⁻ ions.','Writing MgCl.','Balance charges.'],['6(c)',2,'State two observations when calcium reacts with sulfuric acid.','Any two: fizzing, calcium disappears, temperature increases, hydrogen gas produced.',['1 each observation.'],'Fizzing is hydrogen gas.','Saying colour change.','Observation means what you see/feel/measure.'],['6(d)',2,'State the apparatus error and what happens.','The apparatus is not airtight / bung not sealed. Hydrogen escapes, so measured gas volume is too low.',['1 error.','1 consequence.'],'Gas collection only works if all gas is collected.','Saying volume too high.','Check gas apparatus is airtight.']]},
{n:'7',t:'Neutralisation ionic equation',m:1,p:[['7',1,'What is the ionic equation for neutralisation?','C. H⁺(aq) + OH⁻(aq) → H₂O(l).',['1 mark for C.'],'Hydrogen ions react with hydroxide ions to form water.','Wrong state symbols.','Same for all acid-alkali neutralisations.']]},
{n:'8',t:'pH change when acid is added to ammonia',m:1,p:[['8',1,'Sulfuric acid is added to ammonia until excess. What happens to pH?','C. It starts at pH 11 and falls to pH 2.',['1 mark for C.'],'Ammonia is alkaline; excess acid makes solution acidic.','Thinking final pH is neutral.','Adding acid lowers pH.']]},
{n:'9',t:'Bases, alkalis and alkaline solutions',m:7,p:[['9(a)',2,'Name and formula of the ion in aqueous solutions of all alkalis.','Hydroxide ion, OH⁻.',['1 hydroxide ion.','1 OH⁻.'],'Alkalis produce hydroxide ions in water.','Writing H⁺.','Alkalis contain OH⁻.'],['9(b)',3,'Explain base, alkali and alkaline solution.','A base neutralises acid. An alkali is a soluble base. An alkaline solution has pH above 7 because it contains OH⁻ ions.',['1 base.','1 alkali.','1 alkaline solution.'],'Copper oxide is a base but not an alkali because it is insoluble.','Saying all bases are alkalis.','An alkali is a soluble base.'],['9(c)',1,'Name one other type of compound that can neutralise an acid.','Metal carbonate / carbonate.',['1 mark.'],'Carbonates react with acids to form salt, water and CO₂.','Writing water.','Carbonates fizz with acids.'],['9(d)',1,'Write simplest ionic equation for neutralisation.','H⁺(aq) + OH⁻(aq) → H₂O(l)',['1 mark.'],'H⁺ and OH⁻ combine to make water.','Including spectator ions.','Remove spectator ions.']]},
{n:'10',t:'Strong but dilute acids and pH change',m:4,p:[['10(a)',2,'Justify how hydrochloric acid can be strong and dilute.','It is strong because it fully ionises in water. It is dilute because there is a low concentration of acid particles dissolved per unit volume.',['1 strong = fully ionised.','1 dilute = low concentration.'],'Strength and concentration are different.','Saying dilute means weak.','Strength = ionisation; concentration = amount dissolved.'],['10(b)',2,'1.0×10⁻⁴ mol/dm³ HCl has pH 4. What is pH of 1.0×10⁻⁶ mol/dm³ HCl?','pH 6.0. HCl fully ionises. H⁺ concentration decreases by factor 100, so pH increases by 2.',['1 pH 6.0.','1 explanation.'],'The pH scale is logarithmic.','Saying pH becomes 2.','10× lower H⁺ means pH +1.']]}
]},
hard:{label:'Hard',cls:'hard',marks:57,summary:['Soluble salts are prepared using excess insoluble reactant, filtration and crystallisation.','Titration calculations require careful unit conversion and mole ratios.','Sulfuric acid reacts in a 1:2 ratio with sodium hydroxide because it is dibasic.','Concordant titres improve reliability and reduce random error.','Strong acids fully ionise; weak acids partially ionise.','Lower pH means higher hydrogen ion concentration.','Collision theory explains changes in reaction rate.','Neutralisation reactions are usually exothermic.','Universal indicator estimates pH but is unsuitable for precise titration end points.','Carbonates produce carbon dioxide when reacting with acids.'],questions:[
{n:'1',t:'Required practical: preparing a soluble salt',m:10,p:[['1(a)',6,'Describe how to prepare pure dry copper sulfate crystals from copper oxide and sulfuric acid.','Warm dilute sulfuric acid, add copper oxide until excess remains, filter to remove excess solid, heat filtrate to evaporate some water, cool to crystallise, then dry crystals.',['1 warm acid.','1 add excess copper oxide.','1 filter.','1 evaporate/concentrate.','1 cool/crystallise.','1 dry.'],'Excess insoluble copper oxide ensures all acid reacts and can be filtered off.','Adding acid in excess or missing filtration.','Excess solid → filter → crystallise.'],['1(b)',4,'Explain why the solution should not be heated until all water evaporates.','Heating to dryness may decompose the salt or form powder/small crystals. Some water should remain so crystals form slowly on cooling.',['1 decompose/overheat.','1 small crystals.','1 leave some water.','1 cool to crystallise.'],'Crystallisation occurs from a concentrated solution as it cools.','Boiling all water away.','Crystals form best during cooling.']]},
{n:'2',t:'Titration calculations and uncertainty',m:12,p:[['2(a)',5,'25.0 cm³ NaOH requires 18.40 cm³ of 0.200 mol/dm³ sulfuric acid. Calculate NaOH concentration.','Moles H₂SO₄ = 0.200 × 0.01840 = 0.00368 mol. Ratio H₂SO₄:NaOH = 1:2, so moles NaOH = 0.00736 mol. Concentration = 0.00736 ÷ 0.0250 = 0.294 mol/dm³.',['1 conversion.','1 moles acid.','1 ratio.','1 moles NaOH.','1 concentration.'],'Sulfuric acid is dibasic so the ratio with NaOH is 1:2.','Using 1:1 ratio.','Always use the balanced equation.'],['2(b)',3,'Explain why titration is repeated until concordant results are obtained.','Repeats improve reliability and reduce random error. Concordant titres show consistency and allow a reliable mean.',['1 reliability.','1 random error.','1 reliable mean.'],'Repeats help identify anomalous titres.','Confusing reliability and accuracy.','Reliability improves through repeats.'],['2(c)',4,'Suggest two improvements to reduce uncertainty and explain them.','Use a burette with smaller scale divisions to reduce reading uncertainty. Use a white tile or pH probe to identify the endpoint more clearly.',['1 first improvement.','1 explanation.','1 second improvement.','1 explanation.'],'Endpoint judgement is a major source of uncertainty.','Vague improvements without explanation.','Explain how the change reduces uncertainty.']]},
{n:'3',t:'Acid strength and ionisation graphs',m:8,p:[['3(a)',4,'Explain why HCl and ethanoic acid of the same concentration have different pH values.','HCl is strong and fully ionises. Ethanoic acid is weak and partially ionises. HCl produces more H⁺ ions and has lower pH.',['1 HCl fully ionises.','1 ethanoic partially ionises.','1 more H⁺.','1 lower pH.'],'Strength is about ionisation, not concentration.','Saying ethanoic acid is dilute.','Link ionisation → H⁺ concentration → pH.'],['3(b)',4,'Describe expected graph differences for pH against concentration for strong and weak acids.','The strong acid curve has lower pH at the same concentration. Both pH values increase as concentration decreases. The weak acid curve is higher because of partial ionisation.',['1 strong lower pH.','1 pH rises on dilution.','1 weak higher curve.','1 partial ionisation.'],'Both become less acidic when diluted.','Thinking weak acids are always pH 7.','Lower pH means more H⁺.']]},
{n:'4',t:'Rates of reaction with acids',m:9,p:[['4(a)',5,'Explain how increasing acid concentration affects rate using collision theory.','Higher acid concentration means more acid particles per volume. Collisions with marble chips are more frequent, so there are more successful collisions per second and the reaction is faster.',['1 more particles.','1 increased collision frequency.','1 collisions with marble.','1 successful collisions.','1 faster rate.'],'Collision theory links reaction rate to successful collisions.','Saying concentration makes particles move faster.','Concentration changes collision frequency, not speed.'],['4(b)',4,'Suggest two control variables and explain why they matter.','Keep temperature constant because it affects particle energy and rate. Keep mass/surface area of marble chips constant because surface area affects collision frequency. This ensures a fair test.',['1 variable.','1 explanation.','1 second variable.','1 fair test.'],'Only the independent variable should affect results.','Listing variables without explanation.','Explain how each variable affects rate.']]},
{n:'5',t:'Neutralisation and energy changes',m:8,p:[['5(a)',4,'Explain why neutralisation reactions are usually exothermic.','Energy is released when H⁺ ions and OH⁻ ions form water. More energy is released by bond formation than is needed to break bonds, so temperature increases.',['1 energy released.','1 H⁺ + OH⁻.','1 bond formation releases energy.','1 temperature increase.'],'Exothermic reactions transfer energy to surroundings.','Saying energy is created.','Exothermic means temperature rises.'],['5(b)',4,'Why might measured temperature rise be lower than expected and how could method improve?','Some energy is lost to surroundings and apparatus. Use an insulated polystyrene cup and lid to reduce heat loss and improve accuracy.',['1 heat loss surroundings.','1 heat loss apparatus.','1 improvement.','1 explanation.'],'No setup is perfectly insulated.','Saying reaction absorbs heat.','Think heat loss and insulation.']]},
{n:'6',t:'Higher tier multiple-choice review',m:10,p:[['6(a)',2,'Why is sulfuric acid dibasic?','Each sulfuric acid molecule can release two H⁺ ions.',['1 two H⁺.','1 per molecule.'],'H₂SO₄ contains two acidic hydrogens.','Confusing dibasic with concentration.','Look at the number of acidic hydrogens.'],['6(b)',4,'Explain why sodium carbonate and sodium hydroxide give different products with hydrochloric acid.','Carbonate ions react with acids to produce CO₂ and water. Hydroxide ions neutralise acids to produce water but no CO₂.',['1 carbonate ions.','1 CO₂.','1 hydroxide ions make water.','1 comparison.'],'Carbonates always form carbon dioxide with acids.','Saying sodium hydroxide makes hydrogen.','Carbonates fizz because CO₂ forms.'],['6(c)',4,'Explain why universal indicator is useful for comparing pH but unsuitable for titration.','Universal indicator shows many colours across the pH scale, so it estimates pH. It changes gradually over a broad range, so the endpoint is not sharp enough for accurate titration.',['1 colours.','1 estimate pH.','1 gradual change.','1 inaccurate endpoint.'],'Titration indicators should change sharply.','Saying universal indicator cannot measure pH.','Wide-range indicators estimate pH, not exact endpoints.']]}
]}
};
function esc(x){return String(x).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function partHTML(p,cls){return `<article class="card part-card"><div><span class="pill ${cls}-pill">${esc(p[0])}</span><span class="pill mark-pill">${p[1]} mark${p[1]==1?'':'s'}</span></div><div class="question"><strong>Question</strong><br>${esc(p[2])}</div><div class="blocks"><div class="block answer"><h4>✓ Model answer</h4><p><strong>${esc(p[3])}</strong></p></div><div class="block breakdown"><h4>◎ Mark breakdown</h4><ul>${p[4].map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div></div><div class="block explain" style="margin-top:14px"><h4>📘 Explanation</h4><p>${esc(p[5])}</p></div><div class="blocks" style="margin-top:14px"><div class="block mistake"><h4>⚠ Common mistakes</h4><p>${esc(p[6])}</p></div><div class="block tip"><h4>💡 Exam tip</h4><p>${esc(p[7])}</p></div></div></article>`}
function showSection(k,btn){const s=S[k];document.querySelectorAll('.tab').forEach(b=>{b.className='tab'});if(btn)btn.className='tab active '+s.cls;document.getElementById('currentTitle').textContent=s.label;document.getElementById('currentStats').textContent=`${s.questions.length} questions · ${s.questions.reduce((a,q)=>a+q.p.length,0)} answer parts`;document.getElementById('heroTitle').textContent=s.label+' Questions';const nav=document.getElementById('nav');const cont=document.getElementById('content');nav.innerHTML='';cont.innerHTML='';s.questions.forEach((q,i)=>{nav.innerHTML+=`<a href="#${k}-${i}">Q${esc(q.n)}: ${esc(q.t)}</a>`;cont.innerHTML+=`<section class="q question-card" id="${k}-${i}"><div class="qhead"><div><p>Question ${esc(q.n)}</p><h2>${esc(q.t)}</h2></div><div class="marks">${q.m} marks</div></div>${q.p.map(p=>partHTML(p,s.cls)).join('')}</section>`});document.getElementById('summary').innerHTML=`<h2>${s.label} Section Summary</h2><ul>${s.summary.map(x=>`<li>✓ ${esc(x)}</li>`).join('')}</ul>`}
showSection('easy',document.querySelector('.tab'));
</script>
