<script>
const DATA = {"Easy": [{"short": "Q1", "title": "Question 1 — Oxidation & Reduction", "marks": "8 marks", "parts": [{"part": "Q1(a)", "heading": "Oxygen definitions of oxidation and reduction", "marks": "2 marks", "question": "<p>Complete the sentences.</p><p>In terms of oxygen, __________ is the loss of oxygen.</p><p>In terms of oxygen, __________ is the gain of oxygen.</p>", "answer": "<p>In terms of oxygen, <strong>reduction</strong> is the loss of oxygen.</p><p>In terms of oxygen, <strong>oxidation</strong> is the gain of oxygen.</p>", "breakdown": ["1 mark for reduction", "1 mark for oxidation"], "why": "<p>Reduction and oxidation can be defined by oxygen transfer.</p><ul><li><strong>Oxidation</strong> means gain of oxygen.</li><li><strong>Reduction</strong> means loss of oxygen.</li></ul><p>The question specifically says “in terms of oxygen”, so these definitions directly answer the command.</p>", "mistakes": ["Mixing up oxidation and reduction.", "Writing ‘oxidisation’ instead of oxidation.", "Giving only electron definitions when the question asks about oxygen."], "tip": "If oxygen is added, the substance is oxidised. If oxygen is removed, the substance is reduced."}, {"part": "Q1(b)", "heading": "Naming a metal oxide", "marks": "1 mark", "question": "<p>Name the compound formed when cobalt reacts with oxygen.</p>", "answer": "<p><strong>Cobalt oxide</strong></p>", "breakdown": ["1 mark for cobalt oxide"], "why": "<p>When a metal reacts with oxygen, the product is a <strong>metal oxide</strong>.</p><div class='equation'>cobalt + oxygen → cobalt oxide</div>", "mistakes": ["Writing ‘cobalt oxygen’.", "Writing cobalt dioxide without evidence.", "Forgetting the word oxide."], "tip": "For GCSE questions, metal + oxygen usually produces a metal oxide."}, {"part": "Q1(c)", "heading": "Balanced equations for nickel oxides", "marks": "2 marks", "question": "<p>Nickel can react with oxygen to form nickel(II) oxide or nickel(III) oxide.</p><p>Write two balanced symbol equations to show both reactions.</p>", "answer": "<div class='equation'>2Ni + O<sub>2</sub> → 2NiO</div><div class='equation'>4Ni + 3O<sub>2</sub> → 2Ni<sub>2</sub>O<sub>3</sub></div>", "breakdown": ["1 mark for the correct balanced equation forming nickel(II) oxide.", "1 mark for the correct balanced equation forming nickel(III) oxide."], "why": "<p>Nickel can form ions with different charges, so the Roman numeral matters.</p><ul><li>nickel(II) means Ni<sup>2+</sup>, so nickel(II) oxide is NiO.</li><li>nickel(III) means Ni<sup>3+</sup>, so nickel(III) oxide is Ni<sub>2</sub>O<sub>3</sub>.</li></ul><p>Once the formulae are correct, the equations are balanced so atoms are conserved on both sides.</p>", "mistakes": ["Using O instead of O₂.", "Writing NiO₃ for nickel(III) oxide.", "Forgetting to balance the oxygen molecules.", "Writing correct formulae but not balancing the full equation."], "tip": "Write the correct formula first, then balance the equation afterwards."}, {"part": "Q1(d)", "heading": "Reduction of nickel oxide using carbon", "marks": "1 mark", "question": "<p>Complete the word equation: nickel(II) oxide + carbon → __________ + __________</p>", "answer": "<p><strong>nickel + carbon dioxide</strong></p>", "breakdown": ["1 mark for both products correct"], "why": "<p>Carbon removes oxygen from nickel oxide. Nickel is extracted, and carbon gains oxygen.</p><div class='equation'>nickel(II) oxide + carbon → nickel + carbon dioxide</div>", "mistakes": ["Writing carbon monoxide when the expected product is carbon dioxide.", "Leaving nickel oxide as a product.", "Writing only one product."], "tip": "When carbon extracts a metal from a metal oxide, the metal oxide is reduced and carbon is oxidised."}, {"part": "Q1(e)", "heading": "Carbon as the substance oxidised", "marks": "2 marks", "question": "<p>Is carbon oxidised or reduced in the reaction of nickel(II) oxide with carbon? Explain your answer.</p>", "answer": "<p>Carbon is <strong>oxidised</strong>.</p><p>Reason: carbon gains oxygen to form carbon dioxide.</p>", "breakdown": ["1 mark for oxidised", "1 mark for the explanation that carbon gains oxygen"], "why": "<p>Oxidation in terms of oxygen means gain of oxygen.</p><p>Carbon starts as carbon and becomes carbon dioxide, so oxygen has been added to the carbon.</p>", "mistakes": ["Saying carbon is reduced because it helps reduce nickel oxide.", "Confusing the reducing agent with the substance being reduced.", "Not explaining the oxygen gain."], "tip": "The reducing agent causes reduction in another substance, but is itself oxidised."}]}, {"short": "Q2", "title": "Question 2 — Reactivity Series", "marks": "7 marks", "parts": [{"part": "Q2(a)", "heading": "Non-metals in the reactivity series", "marks": "2 marks", "question": "<p>Name two non-metals that commonly appear in the reactivity series.</p>", "answer": "<ul><li>carbon</li><li>hydrogen</li></ul>", "breakdown": ["1 mark for carbon", "1 mark for hydrogen"], "why": "<p>Carbon and hydrogen are useful comparison points in the reactivity series.</p><ul><li>Carbon helps determine which metals can be extracted by reduction with carbon.</li><li>Hydrogen helps predict whether metals react with dilute acids.</li></ul>", "mistakes": ["Naming oxygen.", "Naming nitrogen.", "Giving two metals instead."], "tip": "The two non-metals usually included in the GCSE reactivity series are carbon and hydrogen."}, {"part": "Q2(b)", "heading": "Ordering metals by reactivity", "marks": "3 marks", "question": "<p>Place gold, iron, lithium and magnesium in order from most reactive to least reactive.</p>", "answer": "<ol><li>lithium</li><li>magnesium</li><li>iron</li><li>gold</li></ol>", "breakdown": ["1 mark for lithium as the most reactive.", "1 mark for magnesium above iron.", "1 mark for gold as the least reactive."], "why": "<p>The correct order from the reactivity series is:</p><div class='equation'>lithium &gt; magnesium &gt; iron &gt; gold</div><p>Gold is very unreactive, which is why it can be found naturally as the metal itself.</p>", "mistakes": ["Putting iron above magnesium.", "Thinking gold is reactive because it is valuable.", "Mixing up lithium and magnesium."], "tip": "Group 1 metals are very reactive and are usually placed near the top of the series."}, {"part": "Q2(c)", "heading": "Identifying displacement", "marks": "1 mark", "question": "<p>Sodium is above copper in the reactivity series.</p><div class='equation'>2Na + CuO → Cu + Na<sub>2</sub>O</div><p>What type of reaction is this?</p>", "answer": "<p><strong>Displacement</strong></p>", "breakdown": ["1 mark for displacement"], "why": "<p>Sodium is more reactive than copper, so sodium takes the place of copper in copper oxide.</p><p>A more reactive metal displaces a less reactive metal from its compound.</p>", "mistakes": ["Choosing oxidation.", "Choosing reduction.", "Choosing combustion.", "Missing that one metal replaces another metal in the compound."], "tip": "If one metal replaces another metal from a compound, it is a displacement reaction."}, {"part": "Q2(d)", "heading": "Why sodium is not used industrially", "marks": "1 mark", "question": "<p>Suggest one reason why sodium is not used to extract copper from copper(II) oxide.</p>", "answer": "<p>Sodium is too reactive and dangerous to use.</p>", "breakdown": ["1 mark for any valid reason linked to danger, cost or practicality"], "why": "<p>Although sodium is reactive enough to extract copper, it would be unsafe and difficult to control.</p><p>Carbon is much cheaper and safer for extracting metals below carbon in the reactivity series.</p>", "mistakes": ["Saying sodium is not reactive enough.", "Saying sodium cannot displace copper.", "Ignoring cost and safety in industrial extraction."], "tip": "Industrial extraction methods depend on reactivity, cost, safety and energy use."}]}, {"short": "Q3", "title": "Question 3 — Metals with Water & Acids", "marks": "10 marks", "parts": [{"part": "Q3(a)", "heading": "Coloured flames with cold water", "marks": "2 marks", "question": "<p>Which metals can give a coloured flame when they react with cold water?</p>", "answer": "<ul><li>potassium</li><li>sodium</li></ul>", "breakdown": ["1 mark for potassium", "1 mark for sodium"], "why": "<p>Potassium and sodium are very reactive Group 1 metals. They react vigorously with cold water.</p><ul><li>Sodium can produce a yellow/orange flame.</li><li>Potassium can produce a lilac flame.</li></ul>", "mistakes": ["Choosing zinc.", "Choosing copper.", "Choosing aluminium because it is high in the reactivity series but protected by an oxide layer."], "tip": "The most reactive Group 1 metals can ignite during reactions with water."}, {"part": "Q3(b)", "heading": "Acids and salt names", "marks": "3 marks", "question": "<p>Match each acid to the salt that it forms when reacting with a metal.</p>", "answer": "<table><tr><th>Acid</th><th>Salt formed</th></tr><tr><td>hydrochloric acid</td><td>chloride</td></tr><tr><td>nitric acid</td><td>nitrate</td></tr><tr><td>sulfuric acid</td><td>sulfate</td></tr></table>", "breakdown": ["1 mark for hydrochloric acid → chloride", "1 mark for nitric acid → nitrate", "1 mark for sulfuric acid → sulfate"], "why": "<p>The acid determines the salt ending.</p><p>This is why magnesium reacting with sulfuric acid forms magnesium sulfate, not magnesium chloride.</p>", "mistakes": ["Writing sulfur instead of sulfate.", "Confusing nitrate and nitrite.", "Matching hydrochloric acid with sulfate."], "tip": "Learn the three acid-salt pairs exactly: hydrochloric → chloride, nitric → nitrate, sulfuric → sulfate."}, {"part": "Q3(c)", "heading": "Completing word equations", "marks": "5 marks", "question": "<p>Complete the word equations for potassium with water and magnesium with sulfuric acid.</p>", "answer": "<div class='equation'>potassium + water → potassium hydroxide + hydrogen</div><div class='equation'>magnesium + sulfuric acid → magnesium sulfate + hydrogen</div>", "breakdown": ["1 mark for potassium hydroxide.", "1 mark for hydrogen in the water reaction.", "1 mark for sulfuric acid.", "1 mark for magnesium sulfate.", "1 mark for hydrogen in the acid reaction."], "why": "<p>Reactive metals with water form a metal hydroxide and hydrogen.</p><div class='equation'>metal + water → metal hydroxide + hydrogen</div><p>Metals with acids form a salt and hydrogen.</p><div class='equation'>metal + acid → salt + hydrogen</div>", "mistakes": ["Writing water instead of hydrogen as a product of the acid reaction.", "Writing oxide instead of hydroxide for the water reaction.", "Using chloride instead of sulfate with sulfuric acid."], "tip": "For metals with acids, the acid controls the salt name and hydrogen gas is produced."}]}, {"short": "Q4", "title": "Question 4 — Displacement & Extraction", "marks": "9 marks", "parts": [{"part": "Q4(a)", "heading": "Definition of displacement", "marks": "1 mark", "question": "<p>Which statement about displacement reactions is correct?</p>", "answer": "<p><strong>A more reactive metal displaces a less reactive metal from its compounds.</strong></p>", "breakdown": ["1 mark for the correct statement"], "why": "<p>Displacement reactions only occur when the metal added is more reactive than the metal already in the compound.</p>", "mistakes": ["Choosing that a less reactive metal displaces a more reactive metal.", "Thinking displacement reactions always require heating.", "Confusing displacement with decomposition."], "tip": "A displacement reaction is a more reactive metal ‘taking over’ from a less reactive metal."}, {"part": "Q4(b)", "heading": "Matching metals to extraction methods", "marks": "4 marks", "question": "<p>Match the metal to its method of extraction.</p>", "answer": "<table><tr><th>Metal</th><th>Extraction method</th></tr><tr><td>Zinc</td><td>Reduction with carbon</td></tr><tr><td>Silver</td><td>Found native</td></tr><tr><td>Potassium</td><td>Electrolysis</td></tr><tr><td>Sodium</td><td>Electrolysis</td></tr></table>", "breakdown": ["1 mark for each correct match"], "why": "<p>Metals below carbon can be extracted by reduction with carbon. Very unreactive metals can be found native. Metals above carbon require electrolysis.</p>", "mistakes": ["Putting zinc with electrolysis.", "Thinking silver needs electrolysis.", "Forgetting sodium and potassium are above carbon."], "tip": "Above carbon → electrolysis. Below carbon → reduction with carbon. Very unreactive → found native."}, {"part": "Q4(c)", "heading": "Aluminium and carbon reduction", "marks": "2 marks", "question": "<p>Which metal cannot be extracted by reduction with carbon: aluminium, copper or zinc? Give a reason.</p>", "answer": "<p><strong>Aluminium</strong>, because aluminium is more reactive than carbon.</p>", "breakdown": ["1 mark for aluminium", "1 mark for stating aluminium is more reactive than carbon"], "why": "<p>Carbon can only extract metals that are less reactive than carbon. Aluminium is above carbon in the reactivity series, so it must be extracted by electrolysis.</p>", "mistakes": ["Choosing copper.", "Choosing zinc.", "Saying aluminium is unreactive."], "tip": "If the metal is above carbon in the reactivity series, carbon cannot extract it."}, {"part": "Q4(d)", "heading": "Reduction in the thermite reaction", "marks": "2 marks", "question": "<p>Use the thermite reaction to identify which chemical is reduced. Give a reason.</p><div class='equation'>2Al + Fe<sub>2</sub>O<sub>3</sub> → 2Fe + Al<sub>2</sub>O<sub>3</sub></div>", "answer": "<p><strong>Iron oxide / Fe<sub>2</sub>O<sub>3</sub></strong> is reduced because it loses oxygen to form iron.</p>", "breakdown": ["1 mark for iron oxide / Fe₂O₃", "1 mark for loses oxygen"], "why": "<p>Reduction in terms of oxygen means loss of oxygen. Iron oxide starts with oxygen attached and ends as iron metal.</p>", "mistakes": ["Saying aluminium is reduced.", "Saying iron is oxidised.", "Not mentioning oxygen transfer."], "tip": "In thermite reactions, aluminium is oxidised and the metal oxide is reduced."}]}, {"short": "Q5", "title": "Question 5 — Displacement & Ions", "marks": "10 marks", "parts": [{"part": "Q5(a)", "heading": "Magnesium and silver nitrate", "marks": "1 mark", "question": "<p>Complete the word equation: magnesium + silver nitrate → __________ + __________</p>", "answer": "<p><strong>magnesium nitrate + silver</strong></p>", "breakdown": ["1 mark for both products"], "why": "<p>Magnesium is more reactive than silver, so magnesium displaces silver from silver nitrate. The nitrate ion remains unchanged.</p>", "mistakes": ["Writing magnesium silver.", "Writing silver magnesium nitrate.", "Forgetting nitrate."], "tip": "In displacement reactions, only the metal changes place; the compound ion usually stays the same."}, {"part": "Q5(b)", "heading": "Electron definitions of redox", "marks": "2 marks", "question": "<p>Complete the sentences: In terms of electrons, ______ is the loss of electrons and ______ is the gain of electrons.</p>", "answer": "<p><strong>Oxidation</strong> is the loss of electrons. <strong>Reduction</strong> is the gain of electrons.</p>", "breakdown": ["1 mark for oxidation", "1 mark for reduction"], "why": "<p>This is the electron-transfer definition of redox, often remembered using OIL RIG: Oxidation Is Loss, Reduction Is Gain.</p>", "mistakes": ["Reversing oxidation and reduction.", "Mixing oxygen definitions with electron definitions."], "tip": "Use OIL RIG for electron-transfer questions."}, {"part": "Q5(c)", "heading": "Calcium and zinc sulfate", "marks": "1 mark", "question": "<p>Complete the chemical equation: Ca + ZnSO₄ → __________ + __________</p>", "answer": "<div class='equation'>Ca + ZnSO<sub>4</sub> → CaSO<sub>4</sub> + Zn</div>", "breakdown": ["1 mark for correct products"], "why": "<p>Calcium is more reactive than zinc, so calcium displaces zinc from zinc sulfate.</p>", "mistakes": ["Writing ZnCa.", "Forgetting sulfate.", "Leaving ZnSO₄ as a product."], "tip": "Sulfate ions usually remain unchanged in displacement reactions."}, {"part": "Q5(d)", "heading": "Charge on zinc ions", "marks": "1 mark", "question": "<p>The formula of the sulfate ion is SO₄²⁻. What is the correct charge for a zinc ion in this reaction?</p>", "answer": "<p><strong>2+</strong></p>", "breakdown": ["1 mark for 2+"], "why": "<p>The sulfate ion has a 2− charge. To make the ionic compound neutral, zinc must form Zn<sup>2+</sup>.</p>", "mistakes": ["Writing 1+.", "Writing 2−.", "Forgetting that charges must balance."], "tip": "The total charge in an ionic compound must balance to zero."}, {"part": "Q5(e)", "heading": "Ionic equation for calcium sulfate formation", "marks": "2 marks", "question": "<p>Complete the ionic equation for the formation of calcium sulfate.</p>", "answer": "<div class='equation'>Ca<sup>2+</sup> + SO<sub>4</sub><sup>2−</sup> → CaSO<sub>4</sub></div>", "breakdown": ["1 mark for calcium ion", "1 mark for correct product"], "why": "<p>The positive calcium ion and negative sulfate ion combine to form a neutral ionic compound.</p>", "mistakes": ["Missing charges.", "Writing calcium metal instead of calcium ions.", "Incorrect sulfate formula."], "tip": "Ionic equations should show correct ion charges and balanced overall charge."}, {"part": "Q5(f)", "heading": "Half equation for calcium oxidation", "marks": "1 mark", "question": "<p>Write the half equation showing calcium metal reacting to form calcium ions.</p>", "answer": "<div class='equation'>Ca → Ca<sup>2+</sup> + 2e<sup>−</sup></div>", "breakdown": ["1 mark for the correct half equation"], "why": "<p>Calcium loses two electrons to form a 2+ ion. Loss of electrons is oxidation.</p>", "mistakes": ["Putting electrons on the wrong side.", "Writing only one electron.", "Forgetting the 2+ charge."], "tip": "Electrons appear on the right for oxidation and on the left for reduction."}, {"part": "Q5(g)", "heading": "Zinc ion half equation", "marks": "2 marks", "question": "<p>The half equation is:</p><div class='equation'>Zn<sup>2+</sup> + 2e<sup>−</sup> → Zn</div><p>Does this show oxidation or reduction? Give a reason.</p>", "answer": "<p>The ionic half equation shows <strong>reduction</strong> because zinc ions gain electrons.</p>", "breakdown": ["1 mark for reduction", "1 mark for gains electrons"], "why": "<p>Reduction means gain of electrons. The zinc ion gains two electrons to become zinc metal.</p>", "mistakes": ["Saying oxidation because zinc becomes neutral.", "Mixing up electron gain and electron loss."], "tip": "If electrons are on the left side of a half equation, the species is gaining electrons and being reduced."}]}, {"short": "Q6", "title": "Question 6 — Extraction Multiple Choice", "marks": "1 mark", "parts": [{"part": "Q6", "heading": "Metals that cannot be reduced by carbon", "marks": "1 mark", "question": "<p>Which metal cannot be extracted from its ore by reduction? A. Iron B. Zinc C. Copper D. Lithium</p>", "answer": "<p><strong>D. Lithium</strong></p>", "breakdown": ["1 mark for lithium"], "why": "<p>Lithium is above carbon in the reactivity series. Carbon cannot reduce lithium compounds, so lithium must be extracted by electrolysis.</p>", "mistakes": ["Choosing copper.", "Forgetting Group 1 metals are extremely reactive.", "Thinking all metals can be extracted by carbon."], "tip": "Very reactive metals such as potassium, sodium, lithium, calcium, magnesium and aluminium require electrolysis."}]}], "Medium": [{"short": "Q1", "title": "Question 1 — Oxides & Reactivity Investigations", "marks": "8 marks", "parts": [{"part": "Q1(a)", "heading": "Sodium oxidation", "marks": "1 mark", "question": "<p>Sodium oxide is produced when sodium is heated in oxygen.</p><div class='equation'>4Na + O<sub>2</sub> → 2Na<sub>2</sub>O</div><p>Why is this considered an oxidation reaction?</p>", "answer": "<p>It is oxidation because sodium gains oxygen.</p>", "breakdown": ["1 mark for sodium gains oxygen"], "why": "<p>Oxidation in terms of oxygen means gain of oxygen. Sodium starts as the element and forms sodium oxide.</p>", "mistakes": ["Saying sodium loses oxygen.", "Saying oxygen is oxidised instead of sodium.", "Giving only electron definitions when oxygen transfer is clearer here."], "tip": "For metal + oxygen reactions, the metal is oxidised."}, {"part": "Q1(b)", "heading": "Reduction in terms of oxygen", "marks": "1 mark", "question": "<p>In terms of oxygen, describe what happens to a substance that undergoes reduction.</p>", "answer": "<p>A substance undergoing reduction loses oxygen.</p>", "breakdown": ["1 mark for loss of oxygen"], "why": "<p>Reduction is the removal of oxygen from a substance, such as when a metal oxide is reduced to a metal.</p>", "mistakes": ["Writing gain of oxygen.", "Giving the electron definition without answering the oxygen wording."], "tip": "Reduction = oxygen is removed."}, {"part": "Q1(c)", "heading": "Observation in zinc and copper sulfate", "marks": "1 mark", "question": "<p>Give one observation showing there is a reaction between zinc and copper sulfate solution.</p>", "answer": "<p>The blue solution becomes paler, or an orange-brown copper coating forms on the zinc.</p>", "breakdown": ["1 mark for a correct observation"], "why": "<p>Zinc displaces copper from copper sulfate solution. Copper metal forms and copper ions are removed from the blue solution.</p>", "mistakes": ["Saying bubbles form.", "Saying the solution turns green.", "Saying blue crystals form on the metal."], "tip": "Copper metal is orange-brown; copper sulfate solution is blue."}, {"part": "Q1(d)", "heading": "Ordering magnesium, zinc and copper", "marks": "3 marks", "question": "<p>Use the displacement results to place magnesium, zinc and copper in order of reactivity.</p>", "answer": "<ol><li>magnesium</li><li>zinc</li><li>copper</li></ol>", "breakdown": ["1 mark for magnesium most reactive", "1 mark for zinc in the middle", "1 mark for copper least reactive"], "why": "<p>Magnesium displaces both zinc and copper. Zinc displaces copper only. Copper does not displace either metal, so it is least reactive.</p>", "mistakes": ["Putting copper above zinc.", "Ignoring no reaction results.", "Thinking a tick means the solution is more reactive rather than the solid metal."], "tip": "A metal that displaces another metal must be more reactive."}, {"part": "Q1(e)", "heading": "Why potassium is unsuitable", "marks": "1 mark", "question": "<p>Suggest one reason why potassium should not be used in this investigation.</p>", "answer": "<p>Potassium is too reactive and dangerous because it reacts violently with water.</p>", "breakdown": ["1 mark for a valid safety reason"], "why": "<p>Metal sulfate solutions are aqueous, so potassium would react violently with the water rather than providing a safe displacement test.</p>", "mistakes": ["Saying potassium is unreactive.", "Saying potassium cannot displace metals.", "Ignoring that the solution contains water."], "tip": "Very reactive Group 1 metals are unsuitable for many school solution reactions."}]}, {"short": "Q2", "title": "Question 2 — Reducing Agent", "marks": "1 mark", "parts": [{"part": "Q2", "heading": "Reducing agent in zinc extraction", "marks": "1 mark", "question": "<p>Zinc is extracted from zinc oxide by reduction. Which element acts as the reducing agent? A. Hydrogen B. Oxygen C. Carbon D. Zinc</p>", "answer": "<p><strong>C. Carbon</strong></p>", "breakdown": ["1 mark for carbon"], "why": "<p>Carbon removes oxygen from zinc oxide, causing zinc oxide to be reduced. The substance that causes reduction is the reducing agent.</p>", "mistakes": ["Choosing zinc because zinc is produced.", "Choosing oxygen because oxygen is involved.", "Confusing the reducing agent with the substance reduced."], "tip": "The reducing agent causes another substance to be reduced and is usually oxidised itself."}]}, {"short": "Q3", "title": "Question 3 — Metal Extraction and Discovery", "marks": "10 marks", "parts": [{"part": "Q3(a)", "heading": "Why gold is found native", "marks": "2 marks", "question": "<p>Explain why gold is found in its unreacted form as the metal itself in the Earth.</p>", "answer": "<p>Gold is very unreactive, so it does not react easily with oxygen, water or other substances in the Earth.</p>", "breakdown": ["1 mark for gold being very unreactive", "1 mark for found native / does not readily form compounds"], "why": "<p>Gold is near the bottom of the reactivity series. Very unreactive metals can remain as pure metal over long periods.</p>", "mistakes": ["Saying gold is reactive.", "Talking about electrolysis.", "Saying gold is artificially made in the Earth."], "tip": "Native means found naturally as the uncombined element."}, {"part": "Q3(b)", "heading": "Carbon extracting zinc", "marks": "2 marks", "question": "<p>The equation shows one reaction in zinc extraction.</p><div class='equation'>ZnO + C → Zn + CO</div><p>Explain why carbon is used to extract zinc.</p>", "answer": "<p>Carbon is more reactive than zinc and removes oxygen from zinc oxide, reducing it to zinc.</p>", "breakdown": ["1 mark for carbon more reactive than zinc", "1 mark for removes oxygen / reduces zinc oxide"], "why": "<p>Zinc is below carbon in the reactivity series, so carbon can take oxygen from zinc oxide.</p>", "mistakes": ["Saying zinc is more reactive than carbon.", "Saying carbon reduces itself.", "Not linking to the reactivity series."], "tip": "Carbon reduction works for metals below carbon."}, {"part": "Q3(c)", "heading": "Why sodium was discovered later", "marks": "3 marks", "question": "<p>Sodium is abundant on Earth but was not extracted until 1807. Explain why.</p>", "answer": "<p>Sodium is very reactive and is found in stable compounds. It is above carbon, so it cannot be extracted by carbon reduction. It must be extracted by electrolysis, which required electricity and suitable technology.</p>", "breakdown": ["1 mark for sodium very reactive / found in compounds", "1 mark for cannot be reduced by carbon", "1 mark for electrolysis/electricity needed"], "why": "<p>Highly reactive metals form very stable compounds and need electrical energy to separate them from their ores.</p>", "mistakes": ["Saying sodium is rare.", "Saying sodium is unreactive.", "Forgetting the need for electrolysis."], "tip": "The most reactive metals were generally isolated later because electrolysis technology was needed."}, {"part": "Q3(d)", "heading": "Carbon and hydrogen in the reactivity series", "marks": "3 marks", "question": "<p>State the two non-metals in the reactivity series and give one reason why they are included.</p>", "answer": "<p>The non-metals are carbon and hydrogen. Carbon is included to help decide extraction methods; hydrogen is included to help predict reactions with acids.</p>", "breakdown": ["1 mark for carbon", "1 mark for hydrogen", "1 mark for a valid reason"], "why": "<p>Carbon shows whether carbon reduction can be used. Hydrogen shows which metals can displace hydrogen from acids.</p>", "mistakes": ["Naming oxygen.", "Giving only metals.", "Not explaining why they are included."], "tip": "Carbon helps with extraction; hydrogen helps with acid reactions."}]}, {"short": "Q4", "title": "Question 4 — Copper Extraction and Reactivity", "marks": "12 marks", "parts": [{"part": "Q4(a)", "heading": "Why copper is highly purified", "marks": "3 marks", "question": "<p>Use the graph showing impurities and conductivity to explain why copper is purified to 99.9999% for electrical wiring.</p>", "answer": "<p>As impurities increase, electrical conductivity decreases. Wiring needs very high conductivity, so copper is purified to 99.9999% to reduce resistance and improve electron flow.</p>", "breakdown": ["1 mark for impurities reduce conductivity", "1 mark for reference to high purity / graph trend", "1 mark for link to wiring/electrical use"], "why": "<p>Impurities disrupt the regular metallic lattice and make it harder for delocalised electrons to move through the copper.</p>", "mistakes": ["Saying impurities increase conductivity.", "Talking about strength only.", "Not linking the graph to electrical wiring."], "tip": "Use data/trend evidence from graphs and link it directly to the use in the question."}, {"part": "Q4(b)", "heading": "Iron displacing copper", "marks": "3 marks", "question": "<p>Copper can be extracted from copper salt solutions by adding iron. Explain why.</p>", "answer": "<p>Iron is more reactive than copper, so iron forms positive ions more easily and displaces copper from its salt solution.</p>", "breakdown": ["1 mark for iron more reactive", "1 mark for forms ions / loses electrons more easily", "1 mark for displacement of copper"], "why": "<p>More reactive metals lose electrons more readily. Iron atoms become iron ions while copper ions become copper atoms.</p>", "mistakes": ["Saying copper displaces iron.", "Not mentioning reactivity.", "Confusing this with neutralisation."], "tip": "More reactive metals form positive ions more easily."}, {"part": "Q4(c)", "heading": "Reduction in magnesium and copper sulfate", "marks": "3 marks", "question": "<p>Explain which species is reduced in the reaction:</p><div class='equation'>Mg + CuSO<sub>4</sub> → Cu + MgSO<sub>4</sub></div>", "answer": "<p>Copper ions are reduced because they gain electrons.</p><div class='equation'>Cu<sup>2+</sup> + 2e<sup>−</sup> → Cu</div>", "breakdown": ["1 mark for copper ions", "1 mark for correct half equation", "1 mark for gain of electrons"], "why": "<p>Reduction is gain of electrons. Copper ions gain two electrons to become copper atoms.</p>", "mistakes": ["Saying magnesium is reduced.", "Putting electrons on the wrong side.", "Including sulfate as the reduced species."], "tip": "Electrons on the left of a half equation means reduction."}, {"part": "Q4(d)", "heading": "Copper and sulfuric acid", "marks": "3 marks", "question": "<p>Copper does not react with sulfuric acid, but iron and aluminium do. Explain this trend.</p>", "answer": "<p>Iron and aluminium are above hydrogen in the reactivity series, so they form positive ions and displace hydrogen from acids. Copper is below hydrogen, so it does not react with dilute sulfuric acid.</p>", "breakdown": ["1 mark for iron/aluminium more reactive than copper / above hydrogen", "1 mark for form positive ions more readily", "1 mark for copper below hydrogen / cannot displace hydrogen"], "why": "<p>Metals reacting with acids involves the metal losing electrons and hydrogen ions being reduced to hydrogen gas.</p>", "mistakes": ["Saying copper is too reactive.", "Not comparing with hydrogen.", "Saying all metals react with acids."], "tip": "Use hydrogen as the key comparison point for acid reactions."}]}, {"short": "Q5", "title": "Question 5 — Redox Equations", "marks": "7 marks", "parts": [{"part": "Q5(a)", "heading": "Copper oxide and hydrogen equation", "marks": "2 marks", "question": "<p>Write a balanced symbol equation, including state symbols, for copper(II) oxide reacting with hydrogen to produce copper and water.</p>", "answer": "<div class='equation'>CuO(s) + H<sub>2</sub>(g) → Cu(s) + H<sub>2</sub>O(l)</div>", "breakdown": ["1 mark for correct balanced equation", "1 mark for correct state symbols"], "why": "<p>Hydrogen removes oxygen from copper oxide, producing copper metal and water.</p>", "mistakes": ["Forgetting H₂.", "Missing state symbols.", "Writing Cu₂O instead of CuO."], "tip": "Hydrogen is a reducing agent because it removes oxygen from some metal oxides."}, {"part": "Q5(b)", "heading": "Species oxidised and reduced", "marks": "2 marks", "question": "<p>Identify the species oxidised and the species reduced in this reaction.</p>", "answer": "<p>Hydrogen is oxidised. Copper(II) oxide is reduced.</p>", "breakdown": ["1 mark for hydrogen oxidised", "1 mark for copper oxide reduced"], "why": "<p>Hydrogen gains oxygen to form water, so it is oxidised. Copper oxide loses oxygen to form copper, so it is reduced.</p>", "mistakes": ["Reversing oxidation and reduction.", "Saying copper metal is reduced rather than copper oxide.", "Not tracking oxygen transfer."], "tip": "Follow the oxygen atoms to identify oxidation and reduction."}, {"part": "Q5(c)", "heading": "Overall ionic and half equations", "marks": "3 marks", "question": "<p>Write the overall ionic equation and both half equations for zinc displacing copper from copper(II) sulfate.</p>", "answer": "<div class='equation'>Zn + Cu<sup>2+</sup> → Zn<sup>2+</sup> + Cu</div><div class='equation'>Zn → Zn<sup>2+</sup> + 2e<sup>−</sup></div><div class='equation'>Cu<sup>2+</sup> + 2e<sup>−</sup> → Cu</div>", "breakdown": ["1 mark for overall ionic equation", "1 mark for zinc oxidation half equation", "1 mark for copper reduction half equation"], "why": "<p>Sulfate ions are spectator ions. Zinc loses electrons, and copper ions gain electrons.</p>", "mistakes": ["Including sulfate ions in the ionic equation.", "Putting electrons on the wrong side.", "Missing charges."], "tip": "Remove spectator ions before writing the overall ionic equation."}]}, {"short": "Q6", "title": "Question 6 — Zinc and Hydrochloric Acid", "marks": "1 mark", "parts": [{"part": "Q6", "heading": "Identifying the false statement", "marks": "1 mark", "question": "<p>Which statement is not true for zinc reacting with hydrochloric acid?</p>", "answer": "<p><strong>C. The reaction is less vigorous than that of iron and hydrochloric acid.</strong></p>", "breakdown": ["1 mark for C"], "why": "<p>Zinc is more reactive than iron, so zinc reacts more vigorously with hydrochloric acid, not less vigorously.</p>", "mistakes": ["Forgetting zinc is above iron.", "Thinking the squeaky pop test is false.", "Forgetting a salt forms in metal-acid reactions."], "tip": "Higher reactivity usually means faster, more vigorous acid reactions."}]}, {"short": "Q7", "title": "Question 7 — Fair Test Variables", "marks": "1 mark", "parts": [{"part": "Q7", "heading": "Choosing control variables", "marks": "1 mark", "question": "<p>A student investigates the reactivity of metals in hydrochloric acid. Which pair of control variables makes the experiment fair?</p>", "answer": "<p><strong>C. Size of metal and temperature of acid.</strong></p>", "breakdown": ["1 mark for C"], "why": "<p>The size/surface area of the metal affects reaction rate, and temperature affects particle energy. Both must be controlled.</p>", "mistakes": ["Choosing room temperature instead of acid temperature.", "Ignoring metal surface area.", "Confusing control variables with the independent variable."], "tip": "For rates practicals, control concentration, volume, temperature and surface area where possible."}]}, {"short": "Q8", "title": "Question 8 — Simple Cells and Reactivity", "marks": "9 marks", "parts": [{"part": "Q8(a)", "heading": "Zinc oxidation in a simple cell", "marks": "2 marks", "question": "<p>The zinc half equation is:</p><div class='equation'>Zn → Zn<sup>2+</sup> + 2e<sup>−</sup></div><p>State whether zinc is oxidised or reduced and explain why.</p>", "answer": "<p>Zinc is oxidised because it loses electrons.</p>", "breakdown": ["1 mark for oxidised", "1 mark for loses electrons"], "why": "<p>The electrons appear on the product side, showing zinc atoms lose electrons to form zinc ions.</p>", "mistakes": ["Saying zinc is reduced.", "Saying zinc gains electrons.", "Ignoring the electron position."], "tip": "Electrons on the right side means oxidation."}, {"part": "Q8(b)", "heading": "Copper electrode half equation", "marks": "2 marks", "question": "<p>Write the half equation that occurs at the other electrode in the zinc-copper cell.</p>", "answer": "<div class='equation'>Cu<sup>2+</sup> + 2e<sup>−</sup> → Cu</div>", "breakdown": ["1 mark for copper ions gaining electrons", "1 mark for balanced half equation"], "why": "<p>At the copper electrode, copper ions are reduced to copper atoms by gaining electrons.</p>", "mistakes": ["Writing Cu → Cu²⁺ + 2e⁻.", "Missing charges.", "Using zinc ions instead of copper ions."], "tip": "One electrode has oxidation and the other has reduction."}, {"part": "Q8(c)", "heading": "Least reactive metal from voltage table", "marks": "2 marks", "question": "<p>Use the simple cell voltage table to determine the least reactive metal and explain your answer.</p>", "answer": "<p>Copper is the least reactive because it gives negative voltages when it is metal 2 against more reactive metals.</p>", "breakdown": ["1 mark for copper", "1 mark for table-based explanation"], "why": "<p>A negative voltage means metal 2 is less reactive than metal 1. Copper shows this pattern against several metals.</p>", "mistakes": ["Choosing chromium because it appears first.", "Ignoring the sign of the voltage.", "Only looking at the largest number."], "tip": "Use both the sign and size of cell voltage to interpret reactivity."}, {"part": "Q8(d)", "heading": "Predicting a missing voltage", "marks": "3 marks", "question": "<p>Predict the voltage for a simple cell with iron as metal 1 and copper as metal 2. Explain your answer.</p>", "answer": "<p>The voltage would be negative, about −0.7 V, because copper is less reactive than iron and metal 2 is therefore less reactive than metal 1.</p>", "breakdown": ["1 mark for a sensible magnitude", "1 mark for negative sign", "1 mark for explanation using relative reactivity"], "why": "<p>The table states that a negative voltage is measured when metal 2 is less reactive than metal 1. Copper is less reactive than iron.</p>", "mistakes": ["Giving a positive value.", "Ignoring which metal is metal 1 and metal 2.", "Not explaining the sign."], "tip": "The same pair of metals can change voltage sign if their positions are swapped."}]}, {"short": "Q9", "title": "Question 9 — Zinc and Copper Sulfate Observations", "marks": "1 mark", "parts": [{"part": "Q9", "heading": "Correct observations", "marks": "1 mark", "question": "<p>Which observations are correct for zinc reacting with copper(II) sulfate solution?</p>", "answer": "<p><strong>D. The solution turns paler blue and an orange-brown residue forms on the metal.</strong></p>", "breakdown": ["1 mark for D"], "why": "<p>Copper ions are removed from solution, so the blue colour fades. Copper metal forms as an orange-brown coating on the zinc.</p>", "mistakes": ["Saying the solution turns darker blue.", "Saying blue crystals form.", "Forgetting copper is orange-brown."], "tip": "Copper sulfate solution is blue; copper metal is orange-brown."}]}], "Hard": [{"short": "Q1", "title": "Question 1 — Titanium Extraction", "marks": "10 marks", "parts": [{"part": "Q1(a)", "heading": "Relative reactivities of magnesium, carbon and titanium", "marks": "2 marks", "question": "<p>Carbon cannot replace magnesium in the titanium extraction process because there is no reaction. Explain what this suggests about the relative reactivities of carbon, magnesium and titanium.</p>", "answer": "<p>Magnesium is more reactive than titanium, so it can displace titanium from titanium chloride. Carbon is less reactive than titanium, so it cannot extract titanium.</p>", "breakdown": ["1 mark for magnesium being more reactive than titanium.", "1 mark for carbon being less reactive than titanium."], "why": "<p>A substance can only extract or displace a metal from its compound if it is more reactive than that metal. Since magnesium works but carbon does not, the order must place magnesium above titanium and carbon below titanium.</p>", "mistakes": ["Saying carbon is more reactive than titanium.", "Saying titanium is more reactive than magnesium.", "Not using the evidence that magnesium reacts but carbon does not."], "tip": "If a metal can extract another metal from a compound, it must be higher in the reactivity series."}, {"part": "Q1(b)", "heading": "Comparing rates of production", "marks": "3 marks", "question": "<p>Titanium reactors produce 41.67 kg of titanium per hour. Iron blast furnaces produce 20 000 tonnes of iron per hour. Calculate how many times more iron is produced per hour.</p>", "answer": "<div class='equation'>20 000 tonnes = 20 000 000 kg</div><div class='equation'>20 000 000 ÷ 41.67 = 479 961.6</div><p>To three significant figures, this is <strong>4.80 × 10<sup>5</sup></strong> times more iron per hour.</p>", "breakdown": ["1 mark for converting tonnes to kilograms.", "1 mark for dividing iron production by titanium production.", "1 mark for answer to three significant figures."], "why": "<p>The units must match before division. Since iron production is given in tonnes and titanium production is given in kilograms, iron production must first be converted into kilograms.</p>", "mistakes": ["Forgetting to convert tonnes to kilograms.", "Dividing the wrong way round.", "Giving too many or too few significant figures."], "tip": "Always convert units first before comparing two quantities."}, {"part": "Q1(c)", "heading": "Why titanium is expensive", "marks": "4 marks", "question": "<p>Explain why titanium costs more than steel to produce.</p>", "answer": "<p>Titanium is expensive because it is made using a slow batch process, takes several days, uses expensive magnesium, requires high temperatures and involves separation by hand. Steel can be produced continuously and much faster in blast furnaces using cheaper raw materials.</p>", "breakdown": ["1 mark for slow batch process / takes several days.", "1 mark for expensive magnesium.", "1 mark for high temperature / energy cost.", "1 mark for manual separation or comparison with continuous steel production."], "why": "<p>Costs increase when extraction needs more energy, expensive reactants, longer processing time and more labour. Titanium extraction has all of these disadvantages compared with iron and steel production.</p>", "mistakes": ["Only saying titanium is useful.", "Saying titanium is expensive because it is heavier than steel.", "Not comparing titanium production with steel production."], "tip": "For cost questions, think about energy, time, labour, equipment and raw materials."}, {"part": "Q1(d)", "heading": "Why washing with water is unsuitable", "marks": "1 mark", "question": "<p>Explain why washing the titanium product with water to remove magnesium chloride is not suitable.</p>", "answer": "<p>Unreacted magnesium may still be present and magnesium reacts with water.</p>", "breakdown": ["1 mark for magnesium reacting with water / safety issue."], "why": "<p>Although magnesium chloride dissolves in water, any leftover magnesium metal could react with water and produce hydrogen gas, creating a safety risk.</p>", "mistakes": ["Saying titanium reacts with water.", "Saying magnesium chloride is insoluble.", "Ignoring unreacted magnesium."], "tip": "Purification methods must be chemically safe as well as effective."}]}, {"short": "Q2", "title": "Question 2 — Zinc and Copper Sulfate Practical", "marks": "9 marks", "parts": [{"part": "Q2(a)", "heading": "Showing zinc is not limiting", "marks": "3 marks", "question": "<p>Show that zinc is not the limiting reactant when 5 g zinc powder reacts with 25.0 cm³ of 0.5 mol/dm³ copper(II) sulfate solution.</p>", "answer": "<div class='equation'>moles of CuSO<sub>4</sub> = 0.5 × 0.025 = 0.0125 mol</div><div class='equation'>moles of Zn = 5 ÷ 65 = 0.0769 mol</div><p>The equation has a 1:1 ratio. There are more moles of zinc than copper sulfate, so zinc is not the limiting reactant.</p>", "breakdown": ["1 mark for moles of copper sulfate.", "1 mark for moles of zinc.", "1 mark for comparing the 1:1 ratio and concluding zinc is in excess."], "why": "<p>The limiting reactant is the reactant that runs out first. Since copper sulfate has fewer moles in a 1:1 reaction, copper sulfate limits the reaction and zinc is in excess.</p>", "mistakes": ["Using 25 instead of 0.025 dm³.", "Forgetting to calculate moles of zinc.", "Not using the equation ratio."], "tip": "For limiting reactant questions, calculate moles and compare them using the balanced equation ratio."}, {"part": "Q2(b)", "heading": "Expected observations", "marks": "2 marks", "question": "<p>Describe two observations during the displacement reaction between zinc and copper(II) sulfate.</p>", "answer": "<p>The blue solution becomes paler and an orange-brown copper coating forms on the zinc.</p>", "breakdown": ["1 mark for blue solution becoming paler.", "1 mark for brown/orange copper deposit."], "why": "<p>Zinc displaces copper ions from solution. Copper ions cause the blue colour, and copper metal forms as a brown/orange solid.</p>", "mistakes": ["Saying bubbles are produced.", "Saying the solution becomes darker blue.", "Saying zinc crystals form."], "tip": "Copper sulfate solution is blue; copper metal is orange-brown."}, {"part": "Q2(c)", "heading": "Zinc oxidation half equation", "marks": "2 marks", "question": "<p>Explain whether zinc is oxidised or reduced in this displacement reaction. Include a half equation.</p>", "answer": "<p>Zinc is oxidised because it loses electrons.</p><div class='equation'>Zn → Zn<sup>2+</sup> + 2e<sup>−</sup></div>", "breakdown": ["1 mark for zinc is oxidised / loses electrons.", "1 mark for correct half equation."], "why": "<p>Zinc atoms become zinc ions by losing two electrons. Loss of electrons is oxidation.</p>", "mistakes": ["Saying zinc is reduced.", "Putting electrons on the left side.", "Writing Zn⁺ instead of Zn²⁺."], "tip": "Electrons on the right-hand side of a half equation show oxidation."}, {"part": "Q2(d)", "heading": "Why the full order cannot be determined", "marks": "2 marks", "question": "<p>In a second experiment, copper powder is added to nickel sulfate solution and no reaction occurs. Explain why the order of copper, nickel and zinc cannot be fully determined from the two experiments.</p>", "answer": "<p>The experiments show zinc is more reactive than copper, and nickel is more reactive than copper. However, nickel and zinc have not been tested against each other, so their relative order cannot be confirmed.</p>", "breakdown": ["1 mark for identifying what can be concluded.", "1 mark for explaining that nickel and zinc have not been directly compared."], "why": "<p>To place metals in a complete order, each uncertain comparison must be tested. These results do not show whether nickel is above or below zinc.</p>", "mistakes": ["Saying no conclusions can be made.", "Claiming zinc is definitely above nickel without evidence.", "Ignoring the missing nickel-zinc comparison."], "tip": "A full reactivity order needs enough comparisons to remove all uncertainty."}]}, {"short": "Q3", "title": "Question 3 — Lead Chromate Precipitation", "marks": "7 marks", "parts": [{"part": "Q3(a)", "heading": "State symbols in a precipitation reaction", "marks": "1 mark", "question": "<p>Add state symbols to the equation for lead(II) nitrate solution reacting with potassium chromate solution.</p>", "answer": "<div class='equation'>Pb(NO<sub>3</sub>)<sub>2</sub>(aq) + K<sub>2</sub>CrO<sub>4</sub>(aq) → PbCrO<sub>4</sub>(s) + 2KNO<sub>3</sub>(aq)</div>", "breakdown": ["1 mark for all correct state symbols."], "why": "<p>The two reactants are solutions, so they are aqueous. Lead(II) chromate is the yellow precipitate, so it is solid. Potassium nitrate remains dissolved in solution.</p>", "mistakes": ["Writing the precipitate as aqueous.", "Missing state symbols.", "Writing potassium nitrate as solid."], "tip": "A precipitate is an insoluble solid formed from solutions."}, {"part": "Q3(b)", "heading": "Why this is not redox", "marks": "2 marks", "question": "<p>The formula of the chromate ion is CrO₄²⁻. Explain why the precipitation reaction is not a redox reaction.</p>", "answer": "<p>There is no electron transfer and the oxidation states of the ions do not change.</p>", "breakdown": ["1 mark for no electron transfer.", "1 mark for oxidation states/charges do not change."], "why": "<p>This is a precipitation reaction where ions rearrange to form an insoluble salt. The ions keep their charges, so oxidation and reduction do not occur.</p>", "mistakes": ["Assuming all ionic reactions are redox.", "Saying a precipitate means reduction.", "Only mentioning oxygen without electron transfer or oxidation states."], "tip": "For redox, look for electron transfer or changes in oxidation state."}, {"part": "Q3(c)", "heading": "Obtaining a pure dry precipitate", "marks": "3 marks", "question": "<p>Describe how to obtain a pure, dry sample of solid lead(II) chromate.</p>", "answer": "<p>Filter the mixture to collect the solid precipitate. Wash the precipitate with distilled water to remove soluble impurities. Dry the solid using filter paper or a warm oven.</p>", "breakdown": ["1 mark for filtration.", "1 mark for washing with distilled water.", "1 mark for drying."], "why": "<p>Filtration separates the insoluble precipitate. Washing removes soluble potassium nitrate and excess solution. Drying removes water from the final solid.</p>", "mistakes": ["Evaporating the whole mixture.", "Forgetting to wash the precipitate.", "Heating strongly and decomposing the sample."], "tip": "For an insoluble salt: filter, wash, dry."}, {"part": "Q3(d)", "heading": "Why lead nitrate was replaced", "marks": "1 mark", "question": "<p>Suggest why lead nitrate has been replaced by titanium dioxide in many paints.</p>", "answer": "<p>Lead compounds are toxic / poisonous.</p>", "breakdown": ["1 mark for toxicity / health risk."], "why": "<p>Lead compounds can damage human health and the environment, so safer alternatives such as titanium dioxide are preferred.</p>", "mistakes": ["Saying lead nitrate is too unreactive.", "Saying titanium dioxide is used because it is more poisonous.", "Only saying ‘better’ without a reason."], "tip": "When heavy metals are replaced, toxicity is often the key reason."}]}, {"short": "Q4", "title": "Question 4 — Rusting of Iron", "marks": "1 mark", "parts": [{"part": "Q4", "heading": "Word equation for rusting", "marks": "1 mark", "question": "<p>Hydrated iron(III) oxide forms on block A. Write the word equation for the reaction.</p>", "answer": "<div class='equation'>iron + oxygen + water → hydrated iron(III) oxide</div>", "breakdown": ["1 mark for the correct word equation."], "why": "<p>Rusting requires both oxygen and water. The product is hydrated iron(III) oxide, commonly called rust.</p>", "mistakes": ["Writing only iron + oxygen.", "Forgetting water.", "Writing iron oxide without hydrated iron(III) oxide."], "tip": "Rusting needs both oxygen and water."}]}, {"short": "Q5", "title": "Question 5 — Temperature Change and Reactivity", "marks": "9 marks", "parts": [{"part": "Q5(a)", "heading": "Choosing the graph type", "marks": "1 mark", "question": "<p>A student records temperature increase for different metals reacting with iron sulfate solution. What type of graph should be plotted?</p>", "answer": "<p>A bar chart should be plotted.</p>", "breakdown": ["1 mark for bar chart."], "why": "<p>The independent variable is the type of metal, which is categoric data. Bar charts are used for categoric variables.</p>", "mistakes": ["Choosing a line graph.", "Thinking all numerical results need line graphs.", "Forgetting that metal type is not continuous data."], "tip": "Use a bar chart for categories and a line graph for continuous numerical variables."}, {"part": "Q5(b)", "heading": "Ranking metals from the results", "marks": "4 marks", "question": "<p>Using the results, explain whether it is possible to rank the metals from most to least reactive.</p>", "answer": "<p>It is possible to partly rank them. Magnesium and zinc react with iron sulfate, so both are more reactive than iron. Magnesium gives a larger temperature increase than zinc, so magnesium is more reactive than zinc. Copper gives no temperature rise, so it is less reactive than iron. Iron also gives no temperature rise because it cannot displace itself. A sensible order is magnesium, zinc, iron, copper, but the method has limitations because all metals were only tested with iron sulfate.</p>", "breakdown": ["1 mark for magnesium more reactive than zinc/iron.", "1 mark for zinc more reactive than iron.", "1 mark for copper less reactive than iron.", "1 mark for recognising the limitation involving iron/copper or only using iron sulfate."], "why": "<p>In a displacement reaction, a more reactive metal displaces a less reactive metal from its salt solution. Temperature rise gives evidence that a reaction occurred, but a zero result must be interpreted carefully.</p>", "mistakes": ["Saying copper and iron are equally reactive because both are 0°C.", "Ranking only by temperature without considering displacement.", "Ignoring that iron cannot displace itself."], "tip": "A zero temperature change can mean no reaction, but you must consider why no reaction occurred."}, {"part": "Q5(c)", "heading": "Adapting the method for an unknown metal", "marks": "4 marks", "question": "<p>Describe an adapted method to determine the position of an unknown metal in the reactivity series. The method should give valid results.</p>", "answer": "<p>Test the unknown metal against several different metal sulfate solutions, such as copper sulfate, iron sulfate, zinc sulfate and magnesium sulfate. Use the same volume and concentration of each solution and the same mass or surface area of the unknown metal. Observe whether a reaction occurs, such as a temperature rise, colour change or metal deposit. If the unknown reacts with iron sulfate but not zinc sulfate, it is between iron and zinc in the reactivity series.</p>", "breakdown": ["1 mark for testing the unknown with several known metal salt solutions.", "1 mark for controlling variables such as volume, concentration and surface area.", "1 mark for valid observations.", "1 mark for explaining how reactions/no reactions place the metal in the series."], "why": "<p>Testing against several known ions brackets the unknown metal between two known metals. Controlled variables make the results valid.</p>", "mistakes": ["Testing only one solution.", "Not controlling concentration or surface area.", "Not explaining how the position is decided."], "tip": "To locate an unknown metal, find one metal salt it reacts with and one it does not react with."}]}, {"short": "Q6", "title": "Question 6 — Oxidised Species", "marks": "1 mark", "parts": [{"part": "Q6", "heading": "Oxidation in iron sulfate and magnesium", "marks": "1 mark", "question": "<p>Iron(II) sulfate reacts with magnesium to form magnesium sulfate and iron. Which species has been oxidised?</p>", "answer": "<p><strong>B. Magnesium</strong></p>", "breakdown": ["1 mark for magnesium."], "why": "<p>Magnesium atoms lose electrons to form magnesium ions in magnesium sulfate. Loss of electrons is oxidation.</p>", "mistakes": ["Choosing iron because iron is produced.", "Choosing sulfur because sulfate is present.", "Forgetting sulfate is a spectator ion."], "tip": "In displacement reactions, the more reactive metal is usually oxidised."}]}, {"short": "Q7", "title": "Question 7 — Ionic Equations and Sacrificial Protection", "marks": "6 marks", "parts": [{"part": "Q7(a)", "heading": "Ionic equation for magnesium and copper sulfate", "marks": "1 mark", "question": "<p>A displacement reaction occurs between magnesium and copper(II) sulfate. What is the correct ionic equation?</p>", "answer": "<div class='equation'>Mg(s) + Cu<sup>2+</sup>(aq) → Mg<sup>2+</sup>(aq) + Cu(s)</div>", "breakdown": ["1 mark for option A / correct ionic equation."], "why": "<p>Sulfate ions are spectator ions and are removed from the ionic equation. Magnesium atoms become magnesium ions, and copper ions become copper atoms.</p>", "mistakes": ["Including sulfate ions in the final ionic equation.", "Reversing the reaction.", "Missing charges."], "tip": "Remove spectator ions, but keep charges and state symbols where useful."}, {"part": "Q7(b)", "heading": "Zinc reacting with oxygen as redox", "marks": "3 marks", "question": "<p>After several weeks, the surface of block B appears white because zinc reacts with oxygen. Explain, using equations, how this is a redox reaction.</p>", "answer": "<p>Zinc is oxidised because it loses electrons:</p><div class='equation'>Zn → Zn<sup>2+</sup> + 2e<sup>−</sup></div><p>Oxygen is reduced because it gains electrons:</p><div class='equation'>O<sub>2</sub> + 4e<sup>−</sup> → 2O<sup>2−</sup></div><p>The overall reaction forms zinc oxide:</p><div class='equation'>2Zn + O<sub>2</sub> → 2ZnO</div>", "breakdown": ["1 mark for zinc oxidation / zinc loses electrons.", "1 mark for oxygen reduction / oxygen gains electrons.", "1 mark for a correct overall equation or linked formation of zinc oxide."], "why": "<p>This is redox because oxidation and reduction happen together. Zinc loses electrons and oxygen gains electrons to form zinc oxide.</p>", "mistakes": ["Saying zinc is reduced.", "Saying oxygen loses electrons.", "Only writing zinc + oxygen without explaining electron transfer."], "tip": "Metal + oxygen reactions are redox: the metal is oxidised and oxygen is reduced."}, {"part": "Q7(c)", "heading": "Why iron does not rust", "marks": "2 marks", "question": "<p>Explain why no hydrated iron(III) oxide forms on block C.</p>", "answer": "<p>No hydrated iron(III) oxide forms because the iron is protected by a more reactive metal. The more reactive metal corrodes instead of iron, so iron is not oxidised. This is sacrificial protection.</p>", "breakdown": ["1 mark for more reactive metal protects iron.", "1 mark for the more reactive metal oxidises/corrodes instead of iron."], "why": "<p>Rusting requires iron to lose electrons. If a more reactive metal is attached, it loses electrons more readily and protects the iron.</p>", "mistakes": ["Saying there is no oxygen or water.", "Saying zinc forms rust.", "Not mentioning sacrificial protection or the more reactive metal."], "tip": "Sacrificial protection works because a more reactive metal corrodes instead of iron."}]}]};
const symbols = {"Question":"?","Model Answer":"✓","Mark Breakdown":"★","Why This Gets Full Marks":"⚗","Common Mistakes":"!","Exam Tip":"💡"};
let activeLevel = "Easy";
let activeIndex = 0;
function list(items){return "<ul>"+items.map(x=>"<li>"+x+"</li>").join("")+"</ul>"}
function card(title, html, tone){return `<div class="card ${tone}"><h4><span class="sym">${symbols[title]||"•"}</span>${title}</h4><div>${html}</div></div>`}
function renderTabs(){document.getElementById("tabs").innerHTML=Object.keys(DATA).map(l=>`<button class="tab ${l===activeLevel?'active':''}" onclick="setLevel('${l}')">${l}</button>`).join("")}
function renderSidebar(){const qs=DATA[activeLevel];document.getElementById("sidebar").innerHTML=`<h2 class="side-title">${activeLevel} Questions</h2>`+qs.map((q,i)=>`<button class="nav-btn ${i===activeIndex?'active':''}" onclick="setQuestion(${i})"><span><span class="nav-short">${q.short}</span><span class="nav-title">${q.title.replace(/^Question \\d+ — /,'')}</span></span><strong>›</strong></button>`).join("")}
function renderContent(){const q=DATA[activeLevel][activeIndex];document.getElementById("content").innerHTML=`<div class="intro"><div class="intro-row"><div><div class="level-label">${activeLevel}</div><h2>${q.title}</h2></div><span class="mark">${q.marks}</span></div><p>Use this page to check the answer, understand where each mark comes from, and spot common errors before correcting your work.</p></div>`+q.parts.map(p=>`<article class="part-card"><div class="part-head"><div><div class="part-code">${p.part}</div><h3>${p.heading}</h3></div><span class="mark">${p.marks}</span></div><div class="grid">${card("Question",p.question,"slate")}${card("Model Answer",p.answer,"green")}${card("Mark Breakdown",list(p.breakdown),"blue")}${card("Why This Gets Full Marks",p.why,"slate")}${card("Common Mistakes",list(p.mistakes),"rose")}${card("Exam Tip","<p>"+p.tip+"</p>","amber")}</div></article>`).join("")}
function setLevel(l){activeLevel=l;activeIndex=0;renderAll();document.getElementById("sidebar").classList.remove("show")}
function setQuestion(i){activeIndex=i;renderAll();document.getElementById("sidebar").classList.remove("show");window.scrollTo({top:0,behavior:"smooth"})}
function toggleMenu(){document.getElementById("sidebar").classList.toggle("show")}
function renderAll(){renderTabs();renderSidebar();renderContent()}
renderAll();
</script>
