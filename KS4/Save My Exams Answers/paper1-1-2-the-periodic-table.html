otassium has more electron shells. Its outer electron is further from the nucleus and more shielded, so it is lost more easily. This makes potassium react more vigorously with water.", "marks": "4", "explanation": "Group 1 metals react by losing their outer electron. The easier this electron is lost, the more reactive the metal is.", "tip": "Use the sequence: more shells → more shielding → weaker attraction → electron lost more easily."}, {"part": "c", "answer": "The universal indicator turns purple because potassium reacts with water to form potassium hydroxide, which is a strong alkaline solution containing hydroxide ions.", "marks": "3", "explanation": "Universal indicator is purple in a strongly alkaline solution. The product potassium hydroxide provides hydroxide ions, OH⁻.", "tip": "Purple = strong alkali; link the colour to hydroxide ions."}]}, {"number": "Hard 4", "topic": "Identifying an element from properties", "marks": 9, "parts": [{"part": "a", "answer": "CaI₂", "marks": "4", "explanation": "Element Z must be iodine. The clues show that Z is a Group 7 non-metal because it forms simple molecules with non-metals and forms 1− ions with metals. It is also a solid at room temperature, which fits iodine rather than chlorine, which is a gas, or bromine, which is a liquid. Calcium forms Ca²⁺ ions and iodide forms I⁻ ions, so two iodide ions are needed for each calcium ion, giving CaI₂.", "tip": "Use all of the clues: state at room temperature identifies iodine, then charges give Ca²⁺ + 2I⁻ → CaI₂."}, {"part": "b", "answer": "Magnesium and calcium are both Group 2 metals, so they both have two electrons in their outer shell and react by losing two electrons to form 2+ ions. Calcium is more reactive than magnesium because calcium atoms have more electron shells. The outer electrons in calcium are further from the nucleus and more shielded, so they are lost more easily than magnesium's outer electrons.", "marks": "5", "explanation": "Group 2 metals show similar ch     let active = "easy";

    const slug = text => text.toLowerCase().replaceAll(" ", "-");

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pill(text) {
      return `<span class="pill">${escapeHtml(text)}</span>`;
    }

    function renderTabs() {
      document.getElementById("tabs").innerHTML = sections.map(section => `
        <button class="tab ${section.id === active ? "active" : ""}" data-id="${section.id}">${escapeHtml(section.title)}</button>
      `).join("");
      document.querySelectorAll(".tab").forEach(button => {
        button.addEventListener("click", () => {
          active = button.dataset.id;
          render();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function renderPart(part) {
      const label = part.part ? `Part ${part.part}` : "Answer";
      const markLabel = `${part.marks} mark${String(part.marks) === "1" ? "" : "s"}`;
      return `
        <div class="part-card">
          <div class="part-meta">${pill(label)} ${pill(markLabel)}</div>
          <div class="answer-box">
            <div class="box-label">Model answer</div>
            <p>${escapeHtml(part.answer)}</p>
          </div>
          <details class="explanation" open>
            <summary>Explanation</summary>
            <p>${escapeHtml(part.explanation)}</p>
          </details>
          <details class="tip">
            <summary>Exam tip / common mistake</summary>
            <p>${escapeHtml(part.tip)}</p>
          </details>
        </div>
      `;
    }

    function renderQuestion(question) {
      return `
        <section class="question" id="${slug(question.number)}">
          <div class="qhead">
            <div>
              <h2>${escapeHtml(question.number)}</h2>
              <p>${escapeHtml(question.topic)}</p>
            </div>
            ${pill(`${question.marks} marks`)}
          </div>
          <div class="parts">
            ${question.parts.map(renderPart).join("")}
          </div>
        </section>
      `;
    }

    function render() {
      const current = sections.find(section => section.id === active);
      renderTabs();
      document.getElementById("aside-title").textContent = current.title;
      document.getElementById("aside-subtitle").textContent = current.subtitle;
      document.getElementById("question-links").innerHTML = current.questions.map(q => `
        <a href="#${slug(q.number)}">${escapeHtml(q.number)}</a>
      `).join("");

      document.getElementById("content").innerHTML = `
        <section class="intro">
          <p>${escapeHtml(current.title)}</p>
          <h2>${escapeHtml(current.subtitle)}</h2>
          <p class="help">Use each model answer to correct your work. Open the explanations and exam tips to check the reasoning behind each mark, especially where the question asks you to explain trends using electronic structure.</p>
        </section>
        ${current.questions.map(renderQuestion).join("")}
      `;
    }

    render();
  </script>
