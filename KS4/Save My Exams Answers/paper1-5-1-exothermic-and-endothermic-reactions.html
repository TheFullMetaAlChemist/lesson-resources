<script>
const DATA = {"easy": {"label": "Easy", "marks": 43, "theme": "green", "questions": [{"id": "E1", "title": "Question 1 — Food combustion investigation", "marks": 8, "parts": [{"part": "1(a)", "marks": 4, "question": "Identify the independent and control variables in the food-burning investigation.", "answer": ["Independent variable: type of food.", "Control variables: mass of food; distance between flame and test tube."], "breakdown": ["1 mark for type of food as the independent variable.", "1 mark for mass of food as a control variable.", "1 mark for distance between flame and test tube as a control variable.", "1 mark for correctly not selecting the end temperature of water as a control/independent variable."], "explanation": "The independent variable is the factor deliberately changed by the student. Here, the student changes the type of food being burned. Control variables are factors kept the same to make the test fair. If the mass of food or distance from flame to water changed, the amount of energy transferred to the water could change for reasons unrelated to food type.", "mistakes": ["Choosing the end temperature of the water as the independent variable.", "Forgetting that fair tests require controlled variables.", "Confusing a measured result with a variable that is deliberately changed."], "tip": "Independent = changed. Dependent = measured. Control = kept the same."}, {"part": "1(b)", "marks": 1, "question": "Find the final temperature of the water when the biscuit was burned.", "answer": ["Final temperature = starting temperature + temperature change", "Final temperature = 21 + 9 = 30°C"], "breakdown": ["1 mark for 30°C."], "explanation": "The temperature change tells you how much the water warmed up. Since the biscuit started at 21°C and increased by 9°C, the final temperature was 30°C.", "mistakes": ["Subtracting instead of adding.", "Using the wrong starting temperature.", "Forgetting the °C unit."], "tip": "Check whether the table gives starting temperature, final temperature or temperature change before calculating."}, {"part": "1(c)", "marks": 2, "question": "Which food released the most energy? Give a reason.", "answer": ["Crisp.", "It caused the largest temperature increase in the water, 11°C."], "breakdown": ["1 mark for crisp.", "1 mark for explaining that it produced the greatest temperature rise / released the most energy."], "explanation": "The greater the temperature rise of the water, the more energy was transferred from the burning food to the water. The crisp caused the biggest temperature change.", "mistakes": ["Choosing the food with the highest final temperature rather than the largest temperature change.", "Giving an unsupported answer without using the data.", "Saying it burned fastest when this was not measured."], "tip": "In simple calorimetry questions, the largest temperature increase usually means the most energy transferred."}, {"part": "1(d)", "marks": 1, "question": "What word describes the reaction when food burns?", "answer": ["Exothermic."], "breakdown": ["1 mark for exothermic."], "explanation": "Burning is combustion. Combustion reactions transfer energy to the surroundings as heat, so they are exothermic.", "mistakes": ["Confusing exothermic with endothermic.", "Thinking burning must be endothermic because a flame is needed to start it."], "tip": "Combustion reactions are always exothermic overall."}]}, {"id": "E2", "title": "Question 2 — Exothermic and endothermic reactions", "marks": 10, "parts": [{"part": "2(a)", "marks": 1, "question": "Choose the correct statement about exothermic and endothermic reactions.", "answer": ["In an endothermic reaction, energy is transferred from the surroundings and the temperature of the surroundings decreases."], "breakdown": ["1 mark for the correct statement."], "explanation": "Endothermic reactions absorb energy from the surroundings. The surroundings lose thermal energy, so their temperature decreases.", "mistakes": ["Saying endothermic reactions transfer energy to the surroundings.", "Thinking exothermic reactions make the surroundings colder."], "tip": "Endothermic reactions make the surroundings feel colder because energy is taken in."}, {"part": "2(b)", "marks": 1, "question": "Hydrochloric acid reacts with sodium hydroxide exothermically. Would the mixture rise or fall in temperature?", "answer": ["The temperature would rise."], "breakdown": ["1 mark for rise."], "explanation": "An exothermic reaction transfers energy to the surroundings. In this case the reaction mixture warms up.", "mistakes": ["Saying fall because energy is being used.", "Mixing up exothermic and endothermic."], "tip": "Exothermic = energy exits to the surroundings = temperature rises."}, {"part": "2(c)", "marks": 1, "question": "What happens to the total amount of energy in the universe once the reaction has taken place?", "answer": ["It stays the same."], "breakdown": ["1 mark for it stays the same."], "explanation": "Energy cannot be created or destroyed. A reaction only transfers energy from one store/place to another.", "mistakes": ["Saying energy increases because heat is produced.", "Saying energy decreases because reactants are used up."], "tip": "The total energy in the universe is conserved."}, {"part": "2(d)", "marks": 3, "question": "Complete the sentences using exothermic or endothermic.", "answer": ["Thermal decomposition reactions are endothermic.", "Combustion reactions are exothermic.", "Citric acid reacting with sodium hydrogencarbonate is endothermic."], "breakdown": ["1 mark for endothermic for thermal decomposition.", "1 mark for exothermic for combustion.", "1 mark for endothermic for citric acid + sodium hydrogencarbonate."], "explanation": "Thermal decomposition requires energy input to break compounds down. Combustion releases energy. Citric acid and sodium hydrogencarbonate is a common endothermic reaction used to show cooling.", "mistakes": ["Assuming all reactions release energy.", "Confusing decomposition with combustion."], "tip": "Combustion = exothermic. Thermal decomposition usually needs heating, so it is endothermic."}, {"part": "2(e)", "marks": 4, "question": "Give two everyday examples of exothermic/endothermic reactions and identify each type.", "answer": ["Hand warmers — exothermic.", "Sports injury cold packs — endothermic."], "breakdown": ["1 mark for a suitable everyday example.", "1 mark for correctly identifying its reaction type.", "1 mark for a second suitable everyday example.", "1 mark for correctly identifying its reaction type."], "explanation": "Hand warmers release energy to the surroundings, making them warm. Cold packs absorb energy from the surroundings, making them cold.", "mistakes": ["Giving examples without naming the type of reaction.", "Swapping the reaction types.", "Using vague examples such as ‘heat’ without a named use."], "tip": "Warmer object = exothermic. Colder object = endothermic."}]}, {"id": "E3", "title": "Question 3 — Reaction profile label X", "marks": 1, "parts": [{"part": "3", "marks": 1, "question": "What does label X represent on the reaction profile?", "answer": ["A. Activation energy."], "breakdown": ["1 mark for activation energy."], "explanation": "The arrow labelled X shows the energy needed to start the reaction. Activation energy is the minimum energy particles need for successful collisions.", "mistakes": ["Choosing overall energy change.", "Confusing the reactants or products with the activation energy arrow."], "tip": "Vertical arrow from reactants to peak = activation energy. Difference between reactants and products = overall energy change."}]}, {"id": "E4", "title": "Question 4 — Neutralisation temperature change practical", "marks": 9, "parts": [{"part": "4(a)", "marks": 2, "question": "Match the measurements to the most suitable apparatus.", "answer": ["25 cm³ of HCl — measuring cylinder.", "Temperature of solution — thermometer."], "breakdown": ["1 mark for measuring cylinder.", "1 mark for thermometer."], "explanation": "A measuring cylinder measures liquid volume. A thermometer measures temperature changes during the reaction.", "mistakes": ["Choosing a beaker for accurate volume measurement.", "Choosing a conical flask for temperature."], "tip": "Volume = measuring cylinder. Temperature = thermometer. Mass = balance."}, {"part": "4(b)", "marks": 1, "question": "Why use a polystyrene cup instead of a glass beaker?", "answer": ["Polystyrene is a good thermal insulator, so it reduces energy transfer to the surroundings."], "breakdown": ["1 mark for reducing heat loss / insulation."], "explanation": "The cup helps keep energy in the reaction mixture, making the measured temperature change more accurate.", "mistakes": ["Saying it is cheaper.", "Saying it stops the reaction.", "Not mentioning heat or energy transfer."], "tip": "Polystyrene cups are used in calorimetry to reduce unwanted heat transfer."}, {"part": "4(c)", "marks": 2, "question": "Calculate the mean maximum temperature when 25 cm³ of hydrochloric acid is added.", "answer": ["Mean = (32.6 + 32.2 + 32.4) ÷ 3", "Mean = 97.2 ÷ 3 = 32.4°C"], "breakdown": ["1 mark for correct method.", "1 mark for 32.4°C."], "explanation": "To calculate a mean, add the repeat results and divide by the number of results.", "mistakes": ["Forgetting to divide by 3.", "Using the wrong row.", "Rounding incorrectly."], "tip": "Check for anomalous results before calculating a mean."}, {"part": "4(d)", "marks": 1, "question": "Identify the anomalous result.", "answer": ["15 cm³ hydrochloric acid, first trial."], "breakdown": ["1 mark for 15 cm³ and first trial."], "explanation": "At 15 cm³, the first trial was 23.5°C, while the other two values were 28.9°C and 29.3°C. It does not fit the pattern.", "mistakes": ["Choosing a result that is only slightly different.", "Giving only the volume but not the trial."], "tip": "An anomalous result is far away from the other repeats or does not fit the trend."}, {"part": "4(e)", "marks": 3, "question": "Evaluate the conclusion that the reaction is endothermic.", "answer": ["The student is incorrect.", "The temperature increased during the reaction.", "Energy was transferred to the surroundings, so the reaction is exothermic."], "breakdown": ["1 mark for incorrect.", "1 mark for temperature increase.", "1 mark for energy transferred to surroundings / exothermic."], "explanation": "The results show temperatures rising from about 20°C to over 32°C. A rise in temperature shows that energy has been released to the surroundings.", "mistakes": ["Saying temperature increase means endothermic.", "Not referring to the results.", "Not mentioning energy transfer."], "tip": "Temperature rises in exothermic reactions and falls in endothermic reactions."}]}, {"id": "E5", "title": "Question 5 — Bond energy and reaction profile errors", "marks": 8, "parts": [{"part": "5(a)", "marks": 3, "question": "Calculate the overall energy change for chlorine reacting with methane.", "answer": ["Bonds broken: C–H + Cl–Cl = 412 + 242 = 654 kJ/mol.", "Bonds formed: C–Cl + H–Cl = 328 + 431 = 759 kJ/mol.", "Overall energy change = 654 − 759 = −105 kJ/mol."], "breakdown": ["1 mark for energy needed to break bonds.", "1 mark for energy released forming bonds.", "1 mark for correct overall energy change with sign."], "explanation": "Breaking bonds requires energy. Forming bonds releases energy. Since more energy is released forming new bonds than is absorbed breaking old bonds, the overall change is negative.", "mistakes": ["Adding all the bond energies together.", "Mixing up bonds broken and formed.", "Forgetting the negative sign."], "tip": "Overall energy change = bonds broken − bonds formed."}, {"part": "5(b)", "marks": 3, "question": "Complete the sentences about the overall energy change.", "answer": ["The reaction is exothermic.", "This is because the energy given out forming new bonds is greater than the energy needed to break existing bonds."], "breakdown": ["1 mark for exothermic.", "1 mark for given out.", "1 mark for greater."], "explanation": "The reaction releases more energy during bond formation than it takes in during bond breaking.", "mistakes": ["Using ‘taken in’ instead of ‘given out’.", "Using ‘less’ instead of ‘greater’."], "tip": "Energy released greater than energy absorbed = exothermic."}, {"part": "5(c)", "marks": 2, "question": "Identify two errors with the reaction profile.", "answer": ["The arrow for the activation energy should start from the reactants.", "The arrow of the overall energy change should be in the opposite direction."], "breakdown": ["1 mark for each correct error."], "explanation": "Activation energy is measured from the reactant energy level to the peak. For an exothermic reaction, the overall energy change arrow should point down from reactants to products.", "mistakes": ["Thinking products should be higher for an exothermic reaction.", "Confusing activation energy with overall energy change."], "tip": "Exothermic profiles have products lower than reactants and a downward overall energy change arrow."}]}, {"id": "E6", "title": "Question 6 — Thermometer reading", "marks": 1, "parts": [{"part": "6", "marks": 1, "question": "Read the thermometer.", "answer": ["B. 28.6°C."], "breakdown": ["1 mark for 28.6°C."], "explanation": "The thermometer scale increases in 0.1°C intervals. The liquid level is at 28.6°C.", "mistakes": ["Counting the small divisions incorrectly.", "Rounding to the wrong tenth.", "Reading from the wrong labelled line."], "tip": "Work out the value of each small division before reading a scale."}]}, {"id": "E7", "title": "Question 7 — Reaction profile labels", "marks": 6, "parts": [{"part": "7(a)", "marks": 4, "question": "Match labels A, B, C and D to the correct reaction profile features.", "answer": ["A — Reactants.", "B — Progress of reaction.", "C — Overall energy change.", "D — Activation energy."], "breakdown": ["1 mark for each correct match."], "explanation": "Reactants are shown at the start of the profile. Progress of reaction is the x-axis. Activation energy goes from the reactants to the peak. Overall energy change compares reactants and products.", "mistakes": ["Mixing up activation energy and overall energy change.", "Confusing x-axis and y-axis labels."], "tip": "Learn the standard reaction profile layout; it is tested often."}, {"part": "7(b)", "marks": 1, "question": "Does the reaction profile show an exothermic or endothermic reaction? Give a reason.", "answer": ["Exothermic.", "The products are at a lower energy level than the reactants, so energy has been released to the surroundings."], "breakdown": ["1 mark for exothermic with a correct reason."], "explanation": "Products lower than reactants means energy has left the chemicals and been transferred to the surroundings.", "mistakes": ["Saying endothermic because the curve goes up first.", "Only referring to the activation energy hump."], "tip": "Ignore the hump when identifying reaction type; compare start and end levels."}, {"part": "7(c)", "marks": 1, "question": "What is meant by activation energy?", "answer": ["Activation energy is the minimum amount of energy particles need for a successful collision and for the reaction to occur."], "breakdown": ["1 mark for minimum energy needed for reaction / successful collision."], "explanation": "Particles must collide with enough energy to start breaking bonds. If they do not have enough energy, no reaction occurs.", "mistakes": ["Saying activation energy is energy produced.", "Forgetting successful collisions."], "tip": "Use the phrase ‘minimum energy needed for a successful collision’."}]}]}, "medium": {"label": "Medium", "marks": 48, "theme": "orange", "questions": [{"id": "M1", "title": "Question 1 — Combustion of methane bond energies", "marks": 10, "parts": [{"part": "1(a)", "marks": 4, "question": "Identify the number and type of bonds broken and formed when methane combusts.", "answer": ["Bonds broken: 4 × C–H and 2 × O=O.", "Bonds formed: 2 × C=O and 4 × H–O."], "breakdown": ["1 mark for 4 × C–H broken.", "1 mark for 2 × O=O broken.", "1 mark for 2 × C=O formed.", "1 mark for 4 × H–O formed."], "explanation": "The balanced equation is CH₄ + 2O₂ → CO₂ + 2H₂O. Methane contains four C–H bonds. Two oxygen molecules contain two O=O bonds. Carbon dioxide contains two C=O bonds, and two water molecules contain four H–O bonds in total.", "mistakes": ["Forgetting there are two oxygen molecules.", "Forgetting there are two water molecules.", "Counting atoms instead of bonds."], "tip": "For bond energy questions, use the displayed formula and count the actual lines between atoms."}, {"part": "1(b)", "marks": 4, "question": "Calculate the total energy changes involved in breaking and forming these bonds.", "answer": ["Energy needed to break bonds = (4 × 412) + (2 × 498) = 1648 + 996 = 2644 kJ/mol.", "Energy released forming bonds = (2 × 805) + (4 × 464) = 1610 + 1856 = 3466 kJ/mol.", "Overall energy change = 2644 − 3466 = −822 kJ/mol."], "breakdown": ["1 mark for correct energy needed to break bonds.", "1 mark for correct energy released forming bonds.", "1 mark for subtracting energy released from energy needed.", "1 mark for −822 kJ/mol."], "explanation": "Bond breaking requires energy, while bond forming releases energy. The overall energy change is found by subtracting the energy released when bonds form from the energy needed to break bonds.", "mistakes": ["Using 2 H–O bonds instead of 4.", "Forgetting the coefficients in the balanced equation.", "Leaving the answer as positive.", "Adding all bond energies together."], "tip": "Set your working out under two headings: bonds broken and bonds formed."}, {"part": "1(c)", "marks": 2, "question": "Describe what the results from part (b) tell you about the overall reaction.", "answer": ["The reaction is exothermic.", "More energy is released when new bonds form than is needed to break the original bonds, so energy is transferred to the surroundings."], "breakdown": ["1 mark for identifying the reaction as exothermic / energy released.", "1 mark for explaining that bond forming releases more energy than bond breaking absorbs."], "explanation": "The bonds broken require 2644 kJ/mol, but the bonds formed release 3466 kJ/mol. Since more energy is released than absorbed, the overall energy change is negative.", "mistakes": ["Saying it is endothermic because energy is needed to break bonds.", "Not comparing bond breaking with bond forming.", "Forgetting that negative energy change means energy released overall."], "tip": "Combustion reactions are exothermic, but in bond energy questions you should still prove this using the data."}]}, {"id": "M2", "title": "Question 2 — Chemical energy changes table", "marks": 1, "parts": [{"part": "2", "marks": 1, "question": "Choose the correct statement about energy flow and temperature change.", "answer": ["A — exothermic; energy flows to the surroundings; temperature of surroundings increases."], "breakdown": ["1 mark for A."], "explanation": "In an exothermic reaction, energy is transferred from the reacting chemicals to the surroundings. The surroundings gain thermal energy, so their temperature increases.", "mistakes": ["Choosing B because it says exothermic but has the energy direction wrong.", "Thinking endothermic reactions increase the temperature of the surroundings."], "tip": "The surroundings get warmer in exothermic reactions and colder in endothermic reactions."}]}, {"id": "M3", "title": "Question 3 — Activation energy from reaction profile", "marks": 1, "parts": [{"part": "3", "marks": 1, "question": "Find the activation energy for the reaction profile for making nitrogen monoxide.", "answer": ["C. +320 kJ."], "breakdown": ["1 mark for +320 kJ."], "explanation": "Activation energy is measured from the reactants to the top of the curve. From the diagram, this is 180 kJ + 140 kJ = 320 kJ.", "mistakes": ["Choosing 140 kJ, which is only from products to the peak.", "Choosing 180 kJ, which is the overall energy change.", "Choosing a negative value for activation energy."], "tip": "Activation energy is always measured from the reactant energy level to the peak of the curve."}]}, {"id": "M4", "title": "Question 4 — Nitrogen monoxide in lightning", "marks": 11, "parts": [{"part": "4(a)", "marks": 2, "question": "Explain how the reaction profile shows the reaction is endothermic.", "answer": ["The products, nitrogen monoxide, are at a higher energy level than the reactants, nitrogen and oxygen.", "This shows that energy has been taken in from the surroundings."], "breakdown": ["1 mark for products higher in energy than reactants.", "1 mark for energy taken in / absorbed from surroundings."], "explanation": "In an endothermic reaction, the products store more energy than the reactants. The extra energy must come from the surroundings.", "mistakes": ["Saying it is endothermic simply because the curve rises first.", "Referring only to activation energy.", "Not comparing reactants and products."], "tip": "To identify reaction type from a profile, compare the start and end energy levels."}, {"part": "4(b)", "marks": 2, "question": "Explain activation energy and its significance using particle theory.", "answer": ["Activation energy is the minimum energy particles need to react successfully when they collide.", "Particles must collide with enough energy to break bonds and start the reaction."], "breakdown": ["1 mark for minimum energy needed for a reaction.", "1 mark for linking to successful collisions / particles needing enough energy to react."], "explanation": "Not every collision causes a reaction. For a reaction to happen, particles must collide with enough energy and usually in the correct orientation.", "mistakes": ["Saying activation energy is the energy released.", "Confusing activation energy with total energy change.", "Forgetting the link to particles or collisions."], "tip": "Use the phrase ‘minimum energy needed for a successful collision’."}, {"part": "4(c)", "marks": 4, "question": "Calculate the total energy change for N₂ + O₂ → 2NO using bond energies.", "answer": ["Displayed formula equation: N≡N + O=O → 2N=O.", "Energy needed to break bonds = 945 + 498 = 1443 kJ.", "Energy released forming bonds = 2 × 630 = 1260 kJ.", "Overall energy change = 1443 − 1260 = +183 kJ/mol."], "breakdown": ["1 mark for correct displayed formula equation.", "1 mark for energy needed to break bonds.", "1 mark for energy released forming bonds.", "1 mark for +183 kJ/mol."], "explanation": "One N≡N bond and one O=O bond are broken. Two N=O bonds are formed. The reaction is positive overall because breaking bonds requires more energy than is released by forming the new bonds.", "mistakes": ["Forgetting that two N=O bonds are formed.", "Using 630 once instead of twice.", "Missing the positive sign.", "Writing an unbalanced displayed equation."], "tip": "A positive overall energy change means the reaction is endothermic."}, {"part": "4(d)", "marks": 3, "question": "Use the bond energies to explain why the reaction is endothermic.", "answer": ["More energy is needed to break the N≡N and O=O bonds than is released when the N=O bonds form.", "The bonds broken require 1443 kJ, but the bonds formed release only 1260 kJ.", "Therefore energy is taken in overall."], "breakdown": ["1 mark for more energy needed to break bonds than released forming bonds.", "1 mark for using correct values.", "1 mark for linking this to energy being taken in / endothermic."], "explanation": "Because 1443 kJ is greater than 1260 kJ, the reaction must absorb the missing energy from the surroundings.", "mistakes": ["Saying it is endothermic just because bonds are broken.", "Not comparing the two energy values.", "Forgetting that forming bonds releases energy."], "tip": "Use the exact calculated values to support explanations in bond energy questions."}]}, {"id": "M5", "title": "Question 5 — Energy to break nitrogen bonds", "marks": 1, "parts": [{"part": "5", "marks": 1, "question": "Calculate the energy needed to break all bonds in 0.025 g of nitrogen gas.", "answer": ["C. 844 J.", "Mr of N₂ = 28.", "Moles of N₂ = 0.025 ÷ 28 = 0.000893 mol.", "Energy = 0.000893 × 945 = 0.844 kJ = 844 J."], "breakdown": ["1 mark for C, 844 J."], "explanation": "The bond energy is given per mole, so the mass must first be converted into moles. Since nitrogen gas is N₂, its relative formula mass is 28.", "mistakes": ["Using 14 instead of 28 for nitrogen gas.", "Forgetting nitrogen is diatomic.", "Leaving the answer in kJ rather than converting to J."], "tip": "Remember the common diatomic elements: H₂, N₂, O₂, F₂, Cl₂, Br₂ and I₂."}]}, {"id": "M6", "title": "Question 6 — Emergency sports injury packs", "marks": 1, "parts": [{"part": "6", "marks": 1, "question": "Choose the true statement about endothermic sports injury packs.", "answer": ["C. They usually contain ammonium nitrate and water in separate compartments."], "breakdown": ["1 mark for C."], "explanation": "Cold packs often use an endothermic dissolving process. When the inner compartment is broken, ammonium nitrate dissolves in water and absorbs energy from the surroundings, making the pack cold.", "mistakes": ["Saying the pack transfers energy to the injury.", "Saying it can be re-used.", "Saying the surroundings increase in temperature."], "tip": "Cold pack = endothermic = absorbs energy from surroundings."}]}, {"id": "M7", "title": "Question 7 — Metal displacement temperature changes", "marks": 16, "parts": [{"part": "7(a)", "marks": 3, "question": "Plot the displacement reaction data as a bar chart.", "answer": ["Use metals on the x-axis and temperature increase in °C on the y-axis.", "Plot separate bars: copper 0°C, iron 15°C, zinc 19°C, magnesium 42°C."], "breakdown": ["1 mark for suitable labelled axes.", "1 mark for suitable linear scale.", "1 mark for correctly plotted bars."], "explanation": "A bar chart is appropriate because the x-axis contains categories: copper, iron, zinc and magnesium. Bars should not be joined because the metals are not continuous data.", "mistakes": ["Drawing a line graph.", "Missing axis labels.", "Plotting copper above zero.", "Using an uneven scale."], "tip": "Use a bar chart for categories and a line/scatter graph for continuous numerical data."}, {"part": "7(b)", "marks": 2, "question": "Give two reasons why the student’s endothermic conclusion is not correct.", "answer": ["The temperature increased for iron, zinc and magnesium.", "A temperature increase shows energy was transferred to the surroundings, so these reactions were exothermic."], "breakdown": ["1 mark for stating that temperature increased.", "1 mark for linking temperature increase to exothermic / energy transferred to surroundings."], "explanation": "Endothermic reactions cause a decrease in temperature because energy is taken in from the surroundings. Most of these reactions caused the temperature to increase, meaning energy was released.", "mistakes": ["Only saying copper did not react.", "Not linking temperature increase to exothermic.", "Confusing the reaction mixture with the surroundings."], "tip": "Temperature increase = exothermic. Temperature decrease = endothermic."}, {"part": "7(c)", "marks": 6, "question": "Describe a valid method to compare an unknown metal’s reactivity with the known metals.", "answer": ["Measure a fixed volume of copper sulfate solution into a polystyrene cup.", "Measure the starting temperature.", "Add a fixed mass of the unknown metal powder and stir.", "Measure the highest temperature reached and calculate the temperature increase.", "Repeat and calculate a mean.", "Compare the temperature increase with copper, iron, zinc and magnesium. Keep variables the same, such as volume/concentration of copper sulfate, mass/surface area of metal, starting temperature, insulation and stirring."], "breakdown": ["1 mark for measuring a fixed volume of copper sulfate.", "1 mark for measuring starting temperature.", "1 mark for adding a known/fixed mass of unknown metal.", "1 mark for measuring maximum/final temperature.", "1 mark for repeats and calculating a mean.", "1 mark for controlling variables / comparing with known metals."], "explanation": "More reactive metals release more energy when they displace copper from copper sulfate solution. A greater temperature rise suggests a more reactive metal.", "mistakes": ["Not measuring the starting temperature.", "Using different masses of metal.", "Not comparing with the known metals.", "Forgetting repeats or means."], "tip": "For 6-mark methods, include apparatus, measurements, control variables, repeats and how results will be used."}, {"part": "7(d)", "marks": 5, "question": "Draw and label a reaction profile for zinc reacting with copper sulfate solution.", "answer": ["Label the y-axis energy and the x-axis progress of reaction.", "Label reactants as zinc + copper sulfate and products as zinc sulfate + copper.", "Draw products lower in energy than reactants.", "Label activation energy from reactants to the peak.", "Label overall energy change as a downward arrow from reactants to products."], "breakdown": ["1 mark for labelled axes.", "1 mark for reactants and products labelled.", "1 mark for products lower than reactants.", "1 mark for activation energy labelled correctly.", "1 mark for overall energy change labelled correctly."], "explanation": "The reaction is exothermic because the temperature increases. In an exothermic profile, the products are lower in energy than the reactants and the energy change arrow points downwards.", "mistakes": ["Drawing products above reactants.", "Labelling activation energy from products rather than reactants.", "Forgetting the energy change arrow.", "Missing axis labels."], "tip": "If a reaction causes temperature to increase, draw an exothermic reaction profile."}]}, {"id": "M8", "title": "Question 8 — Bromination of methane bond energy", "marks": 7, "parts": [{"part": "8(a)", "marks": 4, "question": "Calculate the bond energy X for the C–Br bond.", "answer": ["Bonds broken: C–H + Br–Br = 412 + 193 = 605 kJ/mol.", "Bonds formed: C–Br + H–Br = X + 366.", "Overall energy change: 605 − (X + 366) = −51.", "239 − X = −51, so X = 290 kJ/mol."], "breakdown": ["1 mark for identifying bonds broken.", "1 mark for identifying bonds formed.", "1 mark for correct equation using overall energy change.", "1 mark for 290 kJ/mol."], "explanation": "The overall energy change is −51 kJ/mol, so the reaction releases 51 kJ/mol overall. The energy released by forming C–Br and H–Br bonds must be 51 kJ/mol greater than the energy needed to break the C–H and Br–Br bonds.", "mistakes": ["Ignoring the negative sign.", "Adding 51 without setting up the full equation.", "Treating C–Br as a bond broken rather than formed."], "tip": "For unknown bond energy questions, write ΔH = bonds broken − bonds formed, then substitute carefully."}, {"part": "8(b)", "marks": 3, "question": "State whether the reaction is endothermic or exothermic and explain why.", "answer": ["The reaction is exothermic.", "The overall energy change is negative, so energy is transferred to the surroundings.", "More energy is released when new bonds form than is needed to break the original bonds."], "breakdown": ["1 mark for exothermic.", "1 mark for negative overall energy change / energy transferred to surroundings.", "1 mark for more energy released forming bonds than absorbed breaking bonds."], "explanation": "A negative energy change shows that energy leaves the reaction and is transferred to the surroundings. This is why the reaction is exothermic.", "mistakes": ["Saying it is endothermic because bonds are broken.", "Not mentioning the negative sign.", "Forgetting the direction of energy transfer."], "tip": "Negative energy change = exothermic. Positive energy change = endothermic."}]}]}, "hard": {"label": "Hard", "marks": 46, "theme": "red", "questions": [{"id": "H1", "title": "Question 1 — Neutralisation graph analysis", "marks": 9, "parts": [{"part": "1(a)", "marks": 2, "question": "Draw two straight lines of best fit on the graph.", "answer": ["Draw one increasing straight line through the points from about 5 cm³ to 25 cm³ potassium hydroxide.", "Draw one decreasing straight line through the points from about 25 cm³ to 40 cm³ potassium hydroxide."], "breakdown": ["1 mark for suitable increasing line of best fit.", "1 mark for suitable decreasing line of best fit."], "explanation": "The graph rises as more potassium hydroxide reacts with hydrochloric acid and releases energy. After the maximum temperature is reached, extra potassium hydroxide no longer reacts and the temperature falls.", "mistakes": ["Drawing curved lines instead of straight lines.", "Joining point-to-point.", "Drawing only one line of best fit."], "tip": "For neutralisation practical graphs, examiners often expect two straight lines so the peak can be estimated accurately."}, {"part": "1(b)", "marks": 3, "question": "Explain why the graph has this shape.", "answer": ["The temperature increases up to about 25 cm³ because more hydrochloric acid is being neutralised, releasing more energy.", "The highest temperature is reached at about 25 cm³ where the acid and alkali have reacted completely.", "After this, extra potassium hydroxide does not react and cools/dilutes the mixture so the temperature decreases."], "breakdown": ["1 mark for temperature increasing as more neutralisation occurs.", "1 mark for maximum temperature at about 25 cm³ / equivalence point.", "1 mark for temperature decreasing because excess alkali is added / dilution or cooling effect."], "explanation": "Neutralisation reactions are exothermic. Initially, more reacting particles means more energy released. Once all the acid has reacted, extra potassium hydroxide simply lowers the measured temperature.", "mistakes": ["Saying the reaction becomes endothermic after 25 cm³.", "Not referring to data from the graph.", "Saying more alkali always means a higher temperature."], "tip": "The peak of a neutralisation graph usually shows the point where the reactants are in the correct reacting ratio."}, {"part": "1(c)", "marks": 2, "question": "Suggest one change that would give more accurate results and explain why.", "answer": ["Use a lid on the polystyrene cup.", "This would reduce energy transfer to the surroundings so the measured temperature change would be more accurate."], "breakdown": ["1 mark for a valid improvement.", "1 mark for explaining how it improves accuracy."], "explanation": "Some energy is lost to the surroundings during the experiment. Reducing heat loss gives a result closer to the true temperature change.", "mistakes": ["Saying ‘use better equipment’ without specifying what.", "Giving an improvement without explaining why it helps.", "Suggesting changes unrelated to accuracy."], "tip": "Always explain what source of error your suggested improvement reduces."}, {"part": "1(d)", "marks": 2, "question": "Use the graph to decide whether the reaction is exothermic or endothermic.", "answer": ["The reaction is exothermic.", "The temperature increases during the reaction, showing that energy is transferred to the surroundings."], "breakdown": ["1 mark for exothermic.", "1 mark for temperature increase / energy transferred to surroundings."], "explanation": "An increase in temperature shows that thermal energy is being released from the reaction mixture into the surroundings.", "mistakes": ["Saying the reaction is endothermic because the graph later decreases.", "Ignoring the initial temperature rise.", "Not mentioning energy transfer."], "tip": "Focus on the temperature change caused by the reaction, not the later cooling effect."}]}, {"id": "H2", "title": "Question 2 — Combustion of methanol", "marks": 7, "parts": [{"part": "2(a)", "marks": 3, "question": "Calculate the overall energy change for the combustion of methanol.", "answer": ["Energy needed to break bonds = 5613 kJ.", "Energy released forming bonds = 6932 kJ.", "Overall energy change = 5613 − 6932 = −1319 kJ."], "breakdown": ["1 mark for correct total energy needed to break bonds.", "1 mark for correct total energy released forming bonds.", "1 mark for −1319 kJ."], "explanation": "Combustion reactions release more energy forming product bonds than they absorb breaking reactant bonds. The negative answer confirms the reaction is exothermic.", "mistakes": ["Forgetting there are two methanol molecules.", "Using the wrong number of water molecules.", "Missing the negative sign."], "tip": "Multiply every bond count by the coefficient in the balanced equation."}, {"part": "2(b)", "marks": 1, "question": "Explain why the combustion of methanol is exothermic.", "answer": ["More energy is released when new bonds form than is needed to break the bonds in the reactants."], "breakdown": ["1 mark for more energy released forming bonds than absorbed breaking bonds."], "explanation": "Bond breaking absorbs energy while bond forming releases energy. In an exothermic reaction, the energy released is greater overall.", "mistakes": ["Saying breaking bonds releases energy.", "Giving only the word exothermic without explaining why."], "tip": "Use both phrases: breaking bonds needs energy; forming bonds releases energy."}, {"part": "2(c)", "marks": 3, "question": "Complete the reaction profile for methanol combustion.", "answer": ["Label the products at a lower energy level than the reactants.", "Show the overall energy change as a downward arrow.", "Show the activation energy from the reactants to the top of the curve."], "breakdown": ["1 mark for products labelled correctly.", "1 mark for overall energy change shown correctly.", "1 mark for activation energy shown correctly."], "explanation": "Methanol combustion is exothermic so the products are lower in energy than the reactants. The reaction still requires activation energy to begin.", "mistakes": ["Putting products above reactants.", "Drawing the overall energy change arrow upwards.", "Drawing activation energy from products rather than reactants."], "tip": "Exothermic profile = products lower than reactants and a downward energy change arrow."}]}, {"id": "H3", "title": "Question 3 — Citric acid and sodium hydrogencarbonate investigation", "marks": 12, "parts": [{"part": "3(a)", "marks": 6, "question": "Describe a method that could have produced the graph results.", "answer": ["Measure a fixed volume of sodium hydrogencarbonate solution into a polystyrene cup.", "Measure the starting temperature.", "Add a measured mass of citric acid and stir.", "Measure the lowest temperature reached.", "Repeat using increasing masses of citric acid.", "Repeat each test and calculate a mean while keeping control variables constant."], "breakdown": ["1 mark for measuring a fixed volume of sodium hydrogencarbonate solution.", "1 mark for measuring starting temperature.", "1 mark for adding measured masses of citric acid.", "1 mark for measuring lowest/final temperature.", "1 mark for repeating with different masses.", "1 mark for repeats / means / control variables."], "explanation": "The reaction is endothermic, so the temperature decreases as energy is absorbed from the surroundings. The experiment measures how changing the mass of citric acid affects the temperature change.", "mistakes": ["Not measuring the starting temperature.", "Not using measured masses of citric acid.", "Forgetting repeats or control variables."], "tip": "For 6-mark methods: measure → mix → record → repeat → control variables → improve reliability."}, {"part": "3(b)", "marks": 2, "question": "Suggest two reasons for the anomalous result at 1.2 g citric acid.", "answer": ["The mass of citric acid may have been measured incorrectly.", "The thermometer may have been misread or the mixture not stirred properly."], "breakdown": ["1 mark for each sensible reason."], "explanation": "An anomalous result is a result that does not fit the pattern of the other data. This is often caused by measurement or procedural errors.", "mistakes": ["Saying only ‘human error’ without explaining the specific error.", "Giving the same idea twice.", "Suggesting impossible reasons unrelated to the experiment."], "tip": "Avoid vague answers like ‘mistake’ — explain exactly what may have gone wrong."}, {"part": "3(c)", "marks": 2, "question": "Use the graph to explain why the reaction is endothermic and estimate when the reaction reaches completion.", "answer": ["The graph shows the temperature decreases as citric acid is added, showing the reaction is endothermic.", "The reaction appears to reach completion at about 3.0 g of citric acid because this is where the lowest temperature is reached before the graph rises again."], "breakdown": ["1 mark for temperature decrease showing endothermic reaction.", "1 mark for approximately 3.0 g citric acid needed for completion."], "explanation": "Endothermic reactions absorb energy from the surroundings, causing the temperature to fall. Once all the sodium hydrogencarbonate has reacted, adding more citric acid no longer causes further cooling.", "mistakes": ["Saying completion occurs at 4.0 g because it is the end of the graph.", "Saying the reaction becomes exothermic later.", "Not using data from the graph."], "tip": "The minimum point on a graph often shows where the limiting reactant has been completely used up."}, {"part": "3(d)", "marks": 2, "question": "Explain why the temperature increases between 3.0 g and 4.0 g of citric acid.", "answer": ["The sodium hydrogencarbonate has already been used up so no more endothermic reaction occurs.", "The cooler solution gains thermal energy from the surroundings so the temperature rises back towards room temperature."], "breakdown": ["1 mark for sodium hydrogencarbonate already used up / reaction complete.", "1 mark for energy transferred from surroundings into the solution."], "explanation": "Once the reaction is complete, extra citric acid cannot cause more cooling. The solution then slowly warms up from the surroundings.", "mistakes": ["Saying the reaction becomes exothermic.", "Saying citric acid releases heat.", "Not explaining why the temperature rises."], "tip": "A temperature rise after a minimum does not necessarily mean the reaction has become exothermic."}]}, {"id": "H4", "title": "Question 4 — Sports injury packs and activation energy", "marks": 7, "parts": [{"part": "4(a)", "marks": 3, "question": "Choose the most suitable reaction profile for a sports injury pack and explain why.", "answer": ["Reaction B would be most suitable.", "It is endothermic so it absorbs energy from the surroundings and produces a cooling effect.", "It has a larger overall energy change than the other endothermic reaction so it would cool more effectively."], "breakdown": ["1 mark for choosing the correct endothermic profile.", "1 mark for explaining that endothermic reactions absorb energy.", "1 mark for linking larger energy change to greater cooling effect."], "explanation": "Sports injury packs need a reaction that takes in energy from the surroundings to make the pack cold.", "mistakes": ["Choosing an exothermic profile because it releases energy.", "Choosing the profile with the highest activation energy.", "Not linking the answer to cooling."], "tip": "For cold packs, look for products higher than reactants and a positive energy change."}, {"part": "4(b)", "marks": 2, "question": "Define activation energy and explain how it is shown on a reaction profile.", "answer": ["Activation energy is the minimum energy particles need to react.", "It is shown by a vertical arrow from the reactants to the highest point of the curve."], "breakdown": ["1 mark for minimum energy needed for reaction.", "1 mark for arrow from reactants to peak."], "explanation": "Even endothermic reactions need activation energy to start because particles must collide with enough energy to begin breaking bonds.", "mistakes": ["Confusing activation energy with overall energy change.", "Drawing the arrow from products to peak.", "Describing activation energy as energy released."], "tip": "Activation energy is always measured from the reactants to the peak of the profile."}, {"part": "4(c)", "marks": 2, "question": "Explain why a lower activation energy would be more suitable in a sports injury pack.", "answer": ["A lower activation energy means the reaction starts more easily.", "A high activation energy reaction may not happen quickly enough at room temperature so the cold pack would not work effectively."], "breakdown": ["1 mark for lower activation energy meaning reaction starts more easily.", "1 mark for quicker/more effective cooling at room temperature."], "explanation": "Sports injury packs need to work immediately when activated. If too much energy is needed to start the reaction, the cooling effect may be too slow.", "mistakes": ["Saying lower activation energy makes the reaction more endothermic.", "Confusing activation energy with overall energy change.", "Not linking to the practical use."], "tip": "Activation energy affects how easily a reaction starts, not whether it is exothermic or endothermic."}]}, {"id": "H5", "title": "Question 5 — Sodium chloride dissolving investigation", "marks": 10, "parts": [{"part": "5(a)", "marks": 4, "question": "Plot the graph and draw two straight lines of best fit.", "answer": ["Plot all points correctly.", "Draw one decreasing line of best fit from 15 g to 40 g.", "Draw one horizontal line of best fit from 40 g to 50 g at about 1.0°C."], "breakdown": ["1 mark for correctly plotting most points.", "1 mark for suitable labelled axes.", "1 mark for decreasing line of best fit.", "1 mark for horizontal line of best fit."], "explanation": "The temperature decreases because dissolving sodium chloride is endothermic. The graph levels off at about 1.0°C, showing that adding more sodium chloride no longer lowers the temperature further.", "mistakes": ["Joining the points dot-to-dot.", "Drawing only one curved line.", "Missing the plateau section.", "Forgetting units on axes."], "tip": "When a graph falls then levels off, examiners often expect two lines of best fit rather than a single curve."}, {"part": "5(b)", "marks": 2, "question": "Estimate the room temperature using the graph.", "answer": ["Extend the decreasing line of best fit back to 0 g sodium chloride.", "Estimated room temperature ≈ 20°C."], "breakdown": ["1 mark for extending the line back to 0 g.", "1 mark for a sensible estimate around 20°C."], "explanation": "Before any sodium chloride is added, the water would be at room temperature. Extrapolating the graph back to 0 g estimates this value.", "mistakes": ["Using the minimum temperature instead.", "Reading from the plateau value.", "Not showing extrapolation on the graph."], "tip": "For extrapolation questions, extend the line of best fit rather than guessing from the table."}, {"part": "5(c)", "marks": 2, "question": "Suggest further experimental work to find the exact mass giving the minimum temperature.", "answer": ["Repeat the experiment using smaller mass intervals near the minimum temperature.", "For example test 38 g, 39 g, 40 g, 41 g and 42 g and calculate mean temperatures."], "breakdown": ["1 mark for using smaller intervals near the minimum.", "1 mark for repeats / means."], "explanation": "The original experiment only used 5 g intervals, so the exact minimum may be between two measured points. Smaller intervals give more precise data.", "mistakes": ["Repeating the same intervals.", "Testing a much wider range instead.", "Forgetting repeats."], "tip": "Collect more detailed data around the important part of the graph."}, {"part": "5(d)", "marks": 2, "question": "Predict what would happen if 200 cm³ of water was used instead of 100 cm³.", "answer": ["The minimum final temperature would be higher / the temperature decrease would be smaller.", "The same amount of sodium chloride would absorb energy from a larger volume of water so the cooling effect would be spread through more water."], "breakdown": ["1 mark for higher minimum temperature / smaller temperature drop.", "1 mark for explaining that more water requires more energy for the same temperature change."], "explanation": "A larger volume of water has a greater thermal mass, so the same endothermic process causes a smaller temperature decrease.", "mistakes": ["Saying the final temperature would be lower because there is more water.", "Not linking the answer to energy transfer.", "Ignoring the effect of thermal mass."], "tip": "More water usually means a smaller temperature change for the same energy transfer."}]}, {"id": "H6", "title": "Question 6 — Chlorination of methane multiple choice", "marks": 1, "parts": [{"part": "6", "marks": 1, "question": "Find the value of X for the C–Cl bond energy.", "answer": ["C. 346 kJ."], "breakdown": ["1 mark for C, 346 kJ."], "explanation": "The reaction has an overall energy change of −122 kJ/mol. Using ΔH = bonds broken − bonds formed gives X = 346 kJ/mol.", "mistakes": ["Ignoring the negative sign.", "Treating C–Cl as a bond broken.", "Adding all values together."], "tip": "For substitution reactions like methane + chlorine, only one C–H bond is replaced by one C–Cl bond."}]}]}};
let level = 'easy';
let revealAll = false;
const icons = {easy:'🔥',medium:'📊',hard:'❄️'};
function totalQuestions(){return Object.values(DATA).reduce((s,x)=>s+x.questions.length,0)}
function totalMarks(){return Object.values(DATA).reduce((s,x)=>s+x.questions.reduce((a,q)=>a+q.marks,0),0)}
function filtered(){const q=document.getElementById('search')?.value.toLowerCase().trim()||'';const qs=DATA[level].questions;if(!q)return qs;return qs.filter(x=>x.title.toLowerCase().includes(q)||x.parts.some(p=>p.part.toLowerCase().includes(q)||p.question.toLowerCase().includes(q)||p.answer.join(' ').toLowerCase().includes(q)))}
function list(items){return '<ul>'+items.map(i=>`<li>${i}</li>`).join('')+'</ul>'}
function box(cls,icon,title,content){return `<div class="box ${cls}"><h3>${icon} ${title}</h3>${content}</div>`}
function partHTML(p,idx){const open=revealAll||idx===0?' open':'';return `<div class="part${open}"><button class="partBtn" onclick="this.parentElement.classList.toggle('open')"><div><div class="badges"><span class="badge dark">${p.part}</span><span class="badge light">${p.marks} mark${p.marks===1?'':'s'}</span></div><div class="partQ">${p.question}</div></div><span class="chev">⌄</span></button><div class="panel">${box('answer','✅','Model answer',list(p.answer))}${box('mark','📘','Mark breakdown',list(p.breakdown))}${box('explain','⚛️','Explanation',`<p>${p.explanation}</p>`)}${box('mistake','⚠️','Common mistakes',list(p.mistakes))}${box('tip','💡','Exam tip',`<p>${p.tip}</p>`)}</div></div>`}
function render(){const section=DATA[level];const qs=filtered();document.getElementById('progressText').textContent=`${totalQuestions()}/21 questions`;document.getElementById('tabs').innerHTML=Object.entries(DATA).map(([k,s])=>`<button class="tab ${k===level?'active':''}" onclick="level='${k}';document.getElementById('search').value='';render()"><span>${icons[k]} ${s.label}</span><span>${s.questions.length} Qs</span></button>`).join('');document.getElementById('nav').innerHTML=qs.map(q=>`<a href="#${q.id}">${q.title.replace('Question ','Q')}</a>`).join('');let loaded=section.questions.reduce((s,q)=>s+q.marks,0);document.getElementById('app').innerHTML=`<section class="hero"><div class="heroHead ${section.theme}"><small>${section.label} section</small><h2>Model Answers & Mark Scheme Support</h2><p>Each answer includes a student-friendly model answer, mark breakdown, explanation, common mistakes and exam tip. All Easy, Medium and Hard questions are loaded.</p></div><div class="stats"><div class="stat"><small>Section marks</small><strong>${loaded}/${section.marks}</strong></div><div class="stat"><small>Questions loaded</small><strong>${section.questions.length}/${section.questions.length}</strong></div><div class="stat"><small>Format</small><strong>SME-style</strong></div></div></section>`+ (qs.length?qs.map(q=>`<section class="question" id="${q.id}"><h2>${q.title}</h2><div class="qmeta">Total: ${q.marks} mark${q.marks===1?'':'s'}</div>${q.parts.map(partHTML).join('')}</section>`).join(''):`<section class="question"><h2>No questions found</h2><p>Try clearing the search.</p></section>`);document.getElementById('toggleBtn').textContent=revealAll?'Collapse answers':'Reveal all answers'}
function toggleAll(){revealAll=!revealAll;render()}function printAll(){revealAll=true;render();setTimeout(()=>window.print(),100)}render();
</script>
</body>
</html>
