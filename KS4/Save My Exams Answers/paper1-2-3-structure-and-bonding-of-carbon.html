    let currentDifficulty = 'easy';
    let currentQuestionId = QUESTION_DATA.easy[0].id;

    const questionList = document.getElementById('questionList');
    const content = document.getElementById('content');
    const currentTitle = document.getElementById('currentTitle');

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<sub>', '[[SUB_OPEN]]')
        .replaceAll('</sub>', '[[SUB_CLOSE]]')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('[[SUB_OPEN]]', '<sub>')
        .replaceAll('[[SUB_CLOSE]]', '</sub>');
    }

    function renderAnswer(answer) {
      if (Array.isArray(answer)) {
        return `<ul>${answer.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
      }
      return `<p>${escapeHtml(answer)}</p>`;
    }

    function renderList(items) {
      return `<ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function infoBlock(title, tone, html) {
      return `
        <div class="block">
          <h4>${title}</h4>
          <div class="block-content ${tone}">
            ${html}
          </div>
        </div>
      `;
    }

    function renderQuestions() {
      const questions = QUESTION_DATA[currentDifficulty];
      questionList.innerHTML = questions.map(question => `
        <button class="question-btn ${question.id === currentQuestionId ? 'active' : ''}" data-question="${question.id}">
          ${question.title}
        </button>
      `).join('');

      document.querySelectorAll('.question-btn').forEach(button => {
        button.addEventListener('click', () => {
          currentQuestionId = button.dataset.question;
          render();
        });
      });
    }

    function renderContent() {
      const questions = QUESTION_DATA[currentDifficulty];
      const question = questions.find(q => q.id === currentQuestionId) || questions[0];
      currentTitle.textContent = question.title;

      content.innerHTML = question.parts.map(part => `
        <section class="question-card">
          <div class="question-header">
            <h3>${escapeHtml(part.title)}</h3>
            <span class="marks">${escapeHtml(part.marks)}</span>
          </div>
          <div class="question-body">
            ${infoBlock('Model Answer', 'green', renderAnswer(part.answer))}
            ${infoBlock('Why This Is Correct', 'blue', `<p>${escapeHtml(part.explanation)}</p>`)}
            ${infoBlock('Common Mistakes', 'amber', renderList(part.mistakes))}
            ${infoBlock('Exam Tip', 'violet', `<p>${escapeHtml(part.tip)}</p>`)}
            <a href="#top" class="top-link">Back to top ↑</a>
          </div>
        </section>
      `).join('');
    }

    function render() {
      renderQuestions();
      renderContent();
      document.querySelectorAll('.difficulty-btn').forEach(button => {
        button.classList.toggle('active', button.dataset.difficulty === currentDifficulty);
      });
    }

    document.querySelectorAll('.difficulty-btn').forEach(button => {
      button.addEventListener('click', () => {
        currentDifficulty = button.dataset.difficulty;
        currentQuestionId = QUESTION_DATA[currentDifficulty][0].id;
        render();
      });
    });

    render();
  </script>
