const { useState } = React;

const easyQuestions = [
  {
    id: 'easy-q1',
    number: 'Question 1',
    title: 'States of matter, Group 7 trends and state symbols',
    marks: 10,
    parts: [
      {
        part: '1(a)', marks: 3,
        question: 'Table 1 shows the melting and boiling points of fluorine, chlorine and bromine. Give the state of each substance at 50 °C.',
        answer: ['Fluorine: gas', 'Chlorine: gas', 'Bromine: liquid'],
        breakdown: ['Fluorine = gas ✓', 'Chlorine = gas ✓', 'Bromine = liquid ✓'],
        explanation: 'To work out the state, compare the temperature in the question with both the melting point and the boiling point. If the temperature is above the boiling point, the substance is a gas. If it is between the melting point and boiling point, the substance is a liquid. At 50 °C, fluorine and chlorine are both above their boiling points, so they are gases. Bromine boils at 59 °C, so at 50 °C it has not yet boiled and is still a liquid.',
        mistakes: ['Forgetting that bromine only boils at 59 °C, so at 50 °C it is still liquid.', 'Mixing up melting point and boiling point.', 'Assuming all Group 7 elements are gases.'],
        tip: 'Always compare the temperature in the question to both the melting point and the boiling point before deciding the state.'
      },
      {
        part: '1(b)', marks: 3,
        question: 'Use the information from Table 1 to complete the sentence about melting points down Group 7.',
        answer: ['Going down Group 7, the melting points increase.', 'This is because the size of the molecules increases so the forces between the molecules get stronger.'],
        breakdown: ['increase ✓', 'increases ✓', 'stronger ✓'],
        explanation: 'Going down Group 7, the halogen molecules become larger and contain more electrons. This means the intermolecular forces between molecules become stronger. More energy is needed to overcome these forces, so the melting points increase.',
        mistakes: ['Saying covalent bonds become stronger. The question is about forces between molecules, not bonds inside the molecules.', 'Writing “weaker” because the elements become more reactive going up the group.', 'Forgetting that Group 7 elements exist as molecules such as F₂, Cl₂ and Br₂.'],
        tip: 'For simple molecular substances: bigger molecule = stronger intermolecular forces = higher melting and boiling points.'
      },
      {
        part: '1(c)', marks: 4,
        question: 'Pb(NO₃)₂(aq) + 2KBr(aq) → 2KNO₃(aq) + PbBr₂(s). What information does the equation tell you about the products made in this reaction?',
        answer: ['The products are potassium nitrate and lead bromide.', 'Potassium nitrate is aqueous, so it is dissolved in water.', 'Lead bromide is a solid.', 'The solid lead bromide forms as a precipitate.'],
        breakdown: ['potassium nitrate identified ✓', 'lead bromide identified ✓', 'potassium nitrate is aqueous / dissolved in water ✓', 'lead bromide is solid / precipitate ✓'],
        explanation: 'The products are the substances on the right-hand side of the arrow. The state symbols give extra information about their physical states. KNO₃(aq) means potassium nitrate is dissolved in water. PbBr₂(s) means lead bromide is a solid. Because it forms from two solutions, this solid is called a precipitate.',
        mistakes: ['Naming the reactants instead of the products.', 'Ignoring the state symbols.', 'Saying lead bromide is dissolved because the reactants are aqueous.', 'Forgetting that (s) means solid.'],
        tip: 'Everything on the right of the arrow is a product. State symbols often provide easy marks, so use them in your answer.'
      }
    ]
  },
  {
    id: 'easy-q2', number: 'Question 2', title: 'Metals, alloys and metallic bonding', marks: 8,
    parts: [
      {part:'2(a)',marks:2,question:'Magnesium can be shaped easily. Tick two reasons which explain why metals can be shaped.',answer:['The atoms can slide over each other.','The atoms are in layers.'],breakdown:['atoms can slide over each other ✓','atoms are in layers ✓'],explanation:'Metals are malleable because their atoms are arranged in layers. When a force is applied, these layers can slide over one another without the metallic bonding completely breaking, so the metal can be bent or shaped.',mistakes:['Choosing ionic bonds. Metals have metallic bonding, not ionic bonding.','Thinking atoms being small explains why metals are malleable.','Forgetting the key idea of layers sliding.'],tip:'If a question asks why metals can bend, be shaped or hammered: think “layers of atoms can slide”.'},
      {part:'2(b)',marks:2,question:'Match the properties of magnesium with the correct explanation.',answer:['High melting point → magnesium has strong metallic bonds.','Conducts electricity → magnesium has delocalised electrons.'],breakdown:['high melting point linked to strong metallic bonds ✓','conducts electricity linked to delocalised electrons ✓'],explanation:'Magnesium has a high melting point because there are strong metallic bonds between positive metal ions and delocalised electrons. Magnesium conducts electricity because the delocalised electrons are free to move through the metal and carry charge.',mistakes:['Saying ions move through the solid metal to conduct electricity.','Choosing weak intermolecular forces. Metals do not have simple intermolecular forces between molecules.','Confusing metallic bonding with ionic bonding.'],tip:'Electrical conductivity in metals is always linked to delocalised electrons.'},
      {part:'2(c)',marks:1,question:'What is meant by an alloy?',answer:['An alloy is a mixture of a metal with other elements.'],breakdown:['mixture ✓'],explanation:'An alloy contains a metal mixed with one or more other elements. The elements are not chemically combined in fixed ratios, so an alloy is a mixture rather than a compound.',mistakes:['Calling an alloy a compound.','Saying alloys only contain metals. Some alloys contain non-metals, such as carbon in steel.'],tip:'The key word for alloy questions is mixture.'},
      {part:'2(d)',marks:2,question:'Complete the sentence to explain why an alloy is harder than a pure metal.',answer:['The atoms in an alloy are different sizes so the layers are unable to slide over each other when pressure is applied.'],breakdown:['different sizes ✓','slide ✓'],explanation:'In a pure metal, the atoms are the same size and arranged in regular layers, so the layers can slide over each other easily. In an alloy, different-sized atoms distort the layers. This makes it harder for the layers to slide, so the alloy is harder.',mistakes:['Writing different shapes instead of different sizes.','Saying the atoms cannot move at all.','Forgetting to link hardness to layers being unable to slide.'],tip:'Pure metal = regular layers that slide easily. Alloy = distorted layers that do not slide easily.'},
      {part:'2(e)',marks:1,question:'Why is it incorrect to describe an alloy as a compound?',answer:['An alloy is a mixture, not a compound.'],breakdown:['states that an alloy is a mixture / not chemically bonded in fixed proportions ✓'],explanation:'A compound contains elements chemically bonded together in fixed proportions. An alloy is a mixture of elements, so the elements are not chemically combined in a fixed ratio in the same way as a compound.',mistakes:['Explaining why alloys are hard rather than why they are not compounds.','Saying alloys only contain one element.','Forgetting to use the word mixture.'],tip:'When asked why an alloy is not a compound, focus on mixture and no fixed chemical formula.'}
    ]
  },
  {
    id:'easy-q3',number:'Question 3',title:'Silicon dioxide and giant covalent structures',marks:7,
    parts:[
      {part:'3(a)',marks:2,question:'Which two elements are found in silicon dioxide?',answer:['Silicon','Oxygen'],breakdown:['silicon ✓','oxygen ✓'],explanation:'The name silicon dioxide tells you the elements present. “Silicon” is the first element. “Dioxide” means oxygen is also present, with two oxygen atoms for each silicon atom in the formula SiO₂.',mistakes:['Writing “silica” instead of the elements.','Writing only the formula when the question asks for elements.','Missing oxygen because it is hidden in the word dioxide.'],tip:'When a compound name ends in “oxide”, oxygen is one of the elements present.'},
      {part:'3(b)',marks:5,question:'Use the words in the box to complete the sentences explaining why silicon dioxide can be used in furnace bricks.',answer:['Silicon dioxide has a giant structure.','Each silicon atom is joined to four oxygen atoms by strong covalent bonds.','These bonds need lots of energy to break.','Silicon dioxide therefore has a high melting point.'],breakdown:['giant ✓','four ✓','strong ✓','energy ✓','high ✓'],explanation:'Silicon dioxide is a giant covalent structure. It does not exist as small separate molecules. Instead, many atoms are joined together by strong covalent bonds in a continuous network. A large amount of energy is needed to break these bonds, so silicon dioxide has a very high melting point and can withstand the high temperatures inside furnaces.',mistakes:['Choosing ionic instead of giant.','Saying silicon dioxide has weak intermolecular forces.','Writing “low” melting point because it is not a metal.','Forgetting that silicon is bonded to four oxygen atoms in the structure.'],tip:'Diamond and silicon dioxide are classic examples of giant covalent structures with very high melting points.'}
    ]
  },
  {
    id:'easy-q4',number:'Question 4',title:'Recognising structures: metal, diamond, graphite and methane',marks:7,
    parts:[
      {part:'4(a)',marks:4,question:'The structures of five substances are represented. Give one substance, A–E, that matches each description.',answer:['Is a metal → A','Represents the structure of diamond → B','Is soft and slippery → E','Is a compound → C'],breakdown:['A for metal ✓','B for diamond ✓','E for soft and slippery ✓','C for compound ✓'],explanation:'A shows a regular arrangement of particles like a metallic structure. B shows a giant covalent network like diamond. E shows layered graphite, which is soft and slippery because the layers can slide over each other. C shows methane, CH₄, which is a compound because it contains carbon and hydrogen chemically bonded together.',mistakes:['Mixing up diamond and graphite.','Thinking graphite is hard because it is made from carbon.','Forgetting that a compound must contain two or more different elements chemically bonded together.'],tip:'Graphite has layers. Diamond has a 3D giant covalent network. Methane is a small molecule and a compound.'},
      {part:'4(b)',marks:1,question:'Which element are substances B and E made from?',answer:['Carbon'],breakdown:['carbon ✓'],explanation:'Substances B and E represent diamond and graphite. Diamond and graphite are different forms of the same element, carbon. Different structural forms of the same element are called allotropes.',mistakes:['Writing graphite or diamond instead of carbon.','Thinking B and E must be different elements because they have different properties.'],tip:'The question asks for the element, not the name of the structure.'},
      {part:'4(c)',marks:2,question:'Substance C is methane, CH₄. Tick two correct boxes about this substance.',answer:['It has weak intermolecular forces.','It has a low boiling point.'],breakdown:['weak intermolecular forces ✓','low boiling point ✓'],explanation:'Methane is a simple molecular substance. The covalent bonds within each methane molecule are strong, but the forces between methane molecules are weak intermolecular forces. These weak forces require little energy to overcome, so methane has a low boiling point. Methane does not conduct electricity because it has no mobile ions or delocalised electrons.',mistakes:['Saying methane conducts electricity.','Saying methane has a high melting point.','Thinking that weak intermolecular forces means the covalent bonds inside methane are weak.'],tip:'Simple molecular substances usually have low melting and boiling points and do not conduct electricity.'}
    ]
  },
  {
    id:'easy-q5',number:'Question 5',title:'Calcium chloride and ionic compound properties',marks:6,
    parts:[
      {part:'5(a)',marks:1,question:'Calcium chloride has the formula CaCl₂. What is the total number of atoms in calcium chloride?',answer:['3'],breakdown:['3 atoms ✓'],explanation:'The formula CaCl₂ contains one calcium atom and two chlorine atoms. The total number of atoms is therefore 1 + 2 = 3.',mistakes:['Writing 2 because of the small ₂ after chlorine.','Forgetting to count the calcium atom.','Confusing atoms with different elements.'],tip:'Add up all the atoms shown in the formula. If there is no small number after a symbol, it means 1.'},
      {part:'5(b)',marks:1,question:'What type of bonding is found in calcium chloride?',answer:['Ionic'],breakdown:['ionic ✓'],explanation:'Calcium is a metal and chlorine is a non-metal. Compounds formed between metals and non-metals usually have ionic bonding. Calcium forms Ca²⁺ ions and chlorine forms Cl⁻ ions.',mistakes:['Choosing covalent because chlorine is a non-metal.','Choosing metallic because calcium is a metal.','Forgetting that the compound contains both a metal and a non-metal.'],tip:'Metal + non-metal usually means ionic bonding.'},
      {part:'5(c)',marks:1,question:'How many negative ions are there in the formula for calcium chloride?',answer:['2'],breakdown:['two negative chloride ions ✓'],explanation:'In CaCl₂, the negative ions are chloride ions, Cl⁻. The small ₂ after Cl shows that there are two chloride ions for every one calcium ion.',mistakes:['Writing 1 because there is one calcium ion.','Writing 3 by counting the total number of ions or atoms incorrectly.','Forgetting that chloride ions are the negative ions.'],tip:'In ionic formulae, the small number after an ion shows how many of that ion are present.'},
      {part:'5(d)',marks:3,question:'Suggest three properties of calcium chloride.',answer:['Any three from:','High melting point.','Conducts electricity when molten.','Conducts electricity when dissolved in water.','Brittle.','Often soluble in water.'],breakdown:['any three correct ionic compound properties ✓✓✓'],explanation:'Calcium chloride is an ionic compound, so it has typical ionic properties. Ionic compounds have strong electrostatic attractions between oppositely charged ions, giving them high melting points. They do not conduct electricity as solids because the ions are fixed in place, but they conduct when molten or dissolved because the ions are free to move and carry charge.',mistakes:['Saying it conducts electricity as a solid.','Saying it has a low melting point.','Saying it is soft or malleable like a metal.','Forgetting to link conductivity to molten or dissolved states.'],tip:'For ionic compounds, conductivity depends on whether the ions can move: solid = fixed ions, molten/aqueous = mobile ions.'}
    ]
  }
];

const mediumQuestions = [
  {id:'medium-q1',number:'Question 1',title:'Identifying structures, balancing equations and particle model limits',marks:11,parts:[
    {part:'1(a)',marks:5,question:'Identify each substance in Figure 1 by writing the correct letter next to each sentence.',answer:['This substance is a liquid: D','This substance is a gas: A','This substance is a metal: C','This substance is diamond: E','This substance is ionic: B'],breakdown:['D identified as liquid ✓','A identified as gas ✓','C identified as metal ✓','E identified as diamond ✓','B identified as ionic ✓'],explanation:'A gas has particles that are far apart and randomly arranged. A liquid has particles close together but arranged randomly. A metal is shown by a regular lattice of positive metal ions with delocalised electrons. Diamond is a giant covalent structure with each carbon atom bonded in a strong 3D network. Ionic substances are shown as a regular lattice of oppositely charged ions.',mistakes:['Confusing liquid and gas particle diagrams.','Thinking all regular structures are metals.','Mixing up diamond and ionic lattices because both are giant structures.','Forgetting that diamond is made from carbon atoms joined in a covalent network.'],tip:'For structure diagrams, focus on arrangement and bonding: far apart = gas, close random = liquid, regular charged lattice = ionic, layers or networks = giant covalent.'},
    {part:'1(b)',marks:3,question:'Balance the equation for magnesium reacting with oxygen and give the meaning of the state symbols (s) and (g).',answer:['2Mg(s) + O₂(g) → 2MgO(s)','(s) means solid.','(g) means gas.'],breakdown:['balanced equation with 2Mg, 1O₂ and 2MgO ✓','(s) means solid ✓','(g) means gas ✓'],explanation:'The equation must have the same number of magnesium and oxygen atoms on both sides. Oxygen exists as O₂, so two magnesium atoms are needed to react with one oxygen molecule and form two units of magnesium oxide. The state symbols tell us the physical state of each substance in the reaction.',mistakes:['Writing Mg + O → MgO and forgetting oxygen is O₂.','Putting a 2 in the middle of MgO, such as MgO₂, instead of using a coefficient.','Writing “state” rather than the actual meaning of the state symbol.','Thinking (g) means grams.'],tip:'When balancing equations, change the big numbers in front of formulae, not the small numbers inside formulae.'},
    {part:'1(c)',marks:3,question:'State three limitations of common particle diagrams used to represent the three states of matter.',answer:['Any three from:','Particles are not shown to scale.','Particles are shown as simple circles or spheres, which is not always accurate.','The diagrams do not show the forces between particles.','The diagrams do not show the movement of particles clearly.','The diagrams do not show that particles in solids vibrate.','The spaces between particles may not be accurately represented.'],breakdown:['any valid limitation ✓','second valid limitation ✓','third valid limitation ✓'],explanation:'Particle diagrams are useful models, but they are simplified. They help students visualise the arrangement of particles in solids, liquids and gases, but they do not show everything accurately. For example, real particles are much smaller than the gaps shown in many diagrams, and the forces and motion of particles are usually not represented.',mistakes:['Describing the properties of solids, liquids and gases instead of limitations.','Saying particles are small, which is true but not a limitation of the model.','Only saying “it is not accurate” without explaining what is not accurate.'],tip:'A limitation is something the model fails to show properly, not just a description of what the model shows.'}
  ]},
  {id:'medium-q2',number:'Question 2',title:'Ionic compounds, graphite and alloys',marks:10,parts:[
    {part:'2(a)',marks:1,question:'A calcium salt has a very high melting point, does not conduct electricity as a solid, but conducts when dissolved in water. What type of bonding is present?',answer:['Ionic bonding'],breakdown:['ionic bonding ✓'],explanation:'These are typical properties of an ionic compound. Ionic compounds usually have high melting points because of strong electrostatic attractions between oppositely charged ions. They do not conduct electricity when solid because the ions are fixed in position, but they do conduct when dissolved because the ions are free to move.',mistakes:['Choosing metallic bonding because the solution conducts electricity.','Choosing covalent bonding because many salts contain non-metals.','Forgetting that calcium forms positive ions in ionic compounds.'],tip:'High melting point + conducts when dissolved or molten = strong clue for ionic bonding.'},
    {part:'2(b)',marks:2,question:'Explain why solid Y does not conduct electricity but its aqueous solution does.',answer:['In solid Y, the ions are fixed in position and cannot move.','When Y is dissolved in water, the ions are free to move and carry charge.'],breakdown:['ions fixed in the solid ✓','ions free to move in solution and carry charge ✓'],explanation:'Electrical conduction requires charged particles that are able to move. In a solid ionic lattice, the ions are charged but held in fixed positions by strong electrostatic attractions. When the compound dissolves, the lattice breaks apart and the ions can move through the solution, allowing the solution to conduct electricity.',mistakes:['Saying electrons move through ionic compounds.','Saying the ions are not charged in the solid.','Forgetting to mention movement of ions.','Saying water itself conducts instead of the dissolved ions conducting.'],tip:'For ionic compounds, always link conductivity to mobile ions.'},
    {part:'2(c)',marks:1,question:'Figure 1 shows the bonding arrangement of an allotrope. What is the element?',answer:['Carbon'],breakdown:['carbon ✓'],explanation:'The diagram represents graphite, which is an allotrope of carbon. The question asks for the element, so the answer is carbon rather than graphite.',mistakes:['Ticking graphite even though graphite is the structure, not the element.','Choosing silicon because silicon also forms giant covalent structures.','Forgetting that allotropes are different forms of the same element.'],tip:'Diamond and graphite are both allotropes of carbon.'},
    {part:'2(d)',marks:3,question:'Explain why this allotrope conducts electricity.',answer:['The allotrope is graphite.','Each carbon atom forms three covalent bonds to other carbon atoms.','This leaves one electron from each carbon atom delocalised.','The delocalised electrons can move through the structure and carry electrical charge.'],breakdown:['each carbon forms three covalent bonds ✓','one delocalised electron per carbon atom / delocalised electrons present ✓','electrons can move and carry charge ✓'],explanation:'Graphite is unusual because it is a non-metal that can conduct electricity. Each carbon atom has four outer electrons but only uses three of them in covalent bonds. The fourth electron becomes delocalised and can move along the layers, allowing electrical charge to flow.',mistakes:['Saying ions move through graphite.','Saying graphite conducts because it is a metal.','Writing about layers sliding instead of electrical conductivity.','Forgetting the word delocalised.'],tip:'Graphite conducts because of delocalised electrons, not because of moving ions.'},
    {part:'2(e)',marks:2,question:'Figure 2 shows the particle diagram of an alloy. Explain why this alloy is harder than pure metal Y.',answer:['The alloy contains atoms of different sizes.','These different-sized atoms distort the layers, so the layers cannot slide over each other easily.'],breakdown:['different-sized atoms ✓','layers cannot slide easily ✓'],explanation:'In a pure metal, the atoms are the same size and arranged in regular layers. These layers can slide over one another when a force is applied. In an alloy, atoms of different sizes disrupt the regular arrangement. This makes it harder for layers to slide, so the alloy is harder.',mistakes:['Saying the alloy is harder because it has stronger ionic bonds.','Saying the atoms are different shapes rather than different sizes.','Forgetting to mention layers sliding.','Only saying “it is mixed” without explaining how this affects the structure.'],tip:'For alloy hardness, the exam answer almost always needs: different-sized atoms + layers cannot slide easily.'},
    {part:'2(f)',marks:1,question:'What kind of substances are alloys?',answer:['Mixtures'],breakdown:['mixtures ✓'],explanation:'Alloys are mixtures because they contain a metal mixed with one or more other elements. The elements are not chemically combined in a fixed ratio, so alloys are not compounds.',mistakes:['Choosing compounds.','Choosing elements because alloys often look like metals.','Forgetting that mixtures can still have useful properties.'],tip:'Alloys are mixtures, even when they behave like metals.'}
  ]},
  {id:'medium-q3',number:'Question 3',title:'Methane compared with sodium chloride',marks:1,parts:[{part:'3',marks:1,question:'Which explains why methane has a lower melting point than sodium chloride?',answer:['B. Intermolecular forces are weaker than ionic bonds.'],breakdown:['B selected ✓'],explanation:'Methane is a simple molecular substance. When methane melts, the weak intermolecular forces between methane molecules are overcome. Sodium chloride is a giant ionic lattice with strong ionic bonds between oppositely charged ions. These ionic bonds require much more energy to overcome, so sodium chloride has a much higher melting point.',mistakes:['Choosing A because it says covalent bonds are weaker than ionic bonds. Methane does not melt by breaking covalent bonds inside methane molecules.','Thinking the C–H bonds in methane are broken when it melts.','Confusing intermolecular forces with covalent bonds.'],tip:'For simple molecules, melting and boiling involve overcoming intermolecular forces, not breaking covalent bonds inside the molecules.'}]},
  {id:'medium-q4',number:'Question 4',title:'Using properties to identify an element',marks:1,parts:[{part:'4',marks:1,question:'Element X melts at 450 °C, boils at 1091 °C and forms an ion with a 2+ charge. Which is most likely to be element X?',answer:['B. Magnesium'],breakdown:['B selected ✓'],explanation:'The most important clue is that element X forms an ion with a 2+ charge. Magnesium is a Group 2 metal, and Group 2 metals form 2+ ions. Sodium forms 1+ ions, while carbon and oxygen do not typically form simple 2+ ions in GCSE ionic compounds.',mistakes:['Choosing sodium because it is also a metal.','Choosing carbon because it has a very high melting point.','Ignoring the 2+ ion clue.','Thinking oxygen is likely because it reacts with metals.'],tip:'For identification questions, use the ion charge as a key clue: Group 1 = 1+, Group 2 = 2+, Group 7 = 1−.'}]},
  {id:'medium-q5',number:'Question 5',title:'Alloys and diamond in marble cutting',marks:7,parts:[
    {part:'5(a)',marks:2,question:'Suggest two advantages of using a steel alloy instead of a pure metal for cutting marble blocks.',answer:['Any two from:','An alloy is harder than a pure metal.','An alloy is stronger than a pure metal.','An alloy is more resistant to wear.','An alloy may be more resistant to corrosion.','An alloy is less likely to bend or deform during cutting.'],breakdown:['first suitable advantage ✓','second suitable advantage ✓'],explanation:'Cutting marble requires a cable that can cope with friction, pressure and repeated use. Alloys are often harder and stronger than pure metals because their different-sized atoms stop the layers sliding easily. This makes the cable more durable during cutting.',mistakes:['Saying alloys are always lighter without evidence.','Saying alloys conduct electricity better, which is not relevant to cutting marble.','Giving two versions of the same point, such as hard and not soft, without adding a separate advantage.'],tip:'For practical alloy questions, think about hardness, strength, durability and resistance to corrosion.'},
    {part:'5(b)',marks:1,question:'For particularly dense marble, the cutting cable is encrusted with diamond dust. Suggest a reason why.',answer:['Diamond is extremely hard, so it can cut or wear away the dense marble.'],breakdown:['diamond is very hard / suitable for cutting ✓'],explanation:'Diamond has a very rigid giant covalent structure, making it extremely hard. This allows diamond dust to scratch, grind or cut through dense materials such as marble.',mistakes:['Saying diamond is used because it is shiny.','Writing about diamond having a high melting point instead of hardness.','Saying diamond reacts with marble.'],tip:'Diamond cutting tools use diamond because of hardness, not because of electrical conductivity or appearance.'},
    {part:'5(c)',marks:4,question:'Diamond has a very high melting point. Explain why in terms of the bonding arrangement.',answer:['Diamond has a giant covalent structure.','Each carbon atom forms four strong covalent bonds to other carbon atoms.','These strong covalent bonds extend throughout the whole structure.','A large amount of energy is needed to break the bonds, so diamond has a very high melting point.'],breakdown:['giant covalent structure ✓','each carbon forms four covalent bonds / many strong covalent bonds ✓','bonds extend throughout the structure ✓','large amount of energy needed to break bonds ✓'],explanation:'Diamond is not made of small molecules. It is a giant covalent lattice where carbon atoms are joined in a strong 3D network. Melting diamond requires many strong covalent bonds to be broken, which needs a very large amount of energy.',mistakes:['Saying diamond has strong intermolecular forces.','Describing diamond as made of molecules.','Only saying “diamond is hard” when the question asks about melting point.','Forgetting to mention energy needed to break bonds.'],tip:'For high melting point in diamond, use the chain: giant covalent structure → many strong covalent bonds → lots of energy needed.'}
  ]},
  {id:'medium-q6',number:'Question 6',title:'Diamond, carbon dioxide and metal conductivity',marks:6,parts:[
    {part:'6(a)',marks:3,question:'Explain why diamond has a higher melting and boiling point than carbon dioxide.',answer:['Diamond has a giant covalent structure with many strong covalent bonds.','Carbon dioxide is a simple molecular substance with weak intermolecular forces between molecules.','Much more energy is needed to break the covalent bonds in diamond than to overcome the intermolecular forces between carbon dioxide molecules.'],breakdown:['diamond is giant covalent with strong covalent bonds ✓','carbon dioxide is simple molecular with weak intermolecular forces ✓','more energy needed for diamond ✓'],explanation:'Diamond and carbon dioxide both contain covalent bonds, but their structures are very different. Diamond is a giant covalent structure, so melting or boiling it requires strong covalent bonds to be broken throughout the structure. Carbon dioxide is made of small molecules. When carbon dioxide changes state, the covalent bonds inside the molecules are not broken; only weak intermolecular forces between molecules are overcome.',mistakes:['Saying carbon dioxide has weak covalent bonds.','Forgetting that carbon dioxide contains strong covalent bonds inside each molecule.','Describing diamond as a molecule.','Only comparing the elements present rather than the structures.'],tip:'Always compare the forces being overcome during melting or boiling: giant covalent bonds in diamond versus intermolecular forces in carbon dioxide.'},
    {part:'6(b)',marks:3,question:'Metals are good conductors of electricity. Explain why.',answer:['Metals contain delocalised electrons.','These electrons are free to move through the metallic structure.','The moving electrons carry electrical charge.'],breakdown:['delocalised electrons ✓','electrons are free to move ✓','electrons carry charge ✓'],explanation:'In metallic bonding, the outer electrons from metal atoms become delocalised. This creates a lattice of positive metal ions surrounded by a sea of mobile electrons. When a potential difference is applied, these electrons move and carry charge through the metal.',mistakes:['Saying metal ions move through the solid metal.','Saying atoms carry the charge.','Forgetting to use the word delocalised.','Explaining heat conduction instead of electrical conduction.'],tip:'For metal conductivity, the answer is always about delocalised electrons that can move and carry charge.'}
  ]},
  {id:'medium-q7',number:'Question 7',title:'Properties of sodium chloride',marks:1,parts:[{part:'7',marks:1,question:'Which row represents sodium chloride?',answer:['C'],breakdown:['C selected ✓'],explanation:'Sodium chloride is an ionic compound. At room temperature it is a solid. It does not conduct electricity when solid because the ions are fixed in position. It does conduct when molten because the ions are free to move. It cannot be bent or shaped because ionic substances are brittle rather than malleable.',mistakes:['Choosing a row where sodium chloride conducts as a solid.','Choosing a row where it can be bent or shaped like a metal.','Forgetting that molten ionic compounds conduct electricity.','Confusing sodium chloride with sodium metal.'],tip:'Ionic substances are solid, brittle, non-conducting as solids and conducting when molten or dissolved.'}]},
  {id:'medium-q8',number:'Question 8',title:'State symbols in the limewater test',marks:1,parts:[{part:'8',marks:1,question:'Ca(OH)₂(aq) + CO₂(g) → CaCO₃(s) + H₂O(l). Which statement is not true about the reaction?',answer:['B. One product is a gas.'],breakdown:['B selected ✓'],explanation:'The products are calcium carbonate, CaCO₃(s), and water, H₂O(l). The state symbols show that calcium carbonate is a solid and water is a liquid. There is no gaseous product. The solid calcium carbonate is what makes limewater turn cloudy during the test for carbon dioxide.',mistakes:['Thinking CO₂ is a product because it appears in the equation. It is on the left-hand side, so it is a reactant.','Forgetting that (s) means solid.','Missing that Ca(OH)₂(aq) means calcium hydroxide is dissolved in water.','Not using the state symbols to answer the question.'],tip:'Use the arrow carefully: left side = reactants, right side = products. Then use the state symbols.'}]},
  {id:'medium-q9',number:'Question 9',title:'Hydrogen chloride bonding and state',marks:5,parts:[
    {part:'9(a)',marks:1,question:'Figure 1 represents a molecule of hydrogen chloride. What do the crosses represent?',answer:['Electrons'],breakdown:['electrons ✓'],explanation:'Dot and cross diagrams show the outer shell electrons involved in bonding. The dots and crosses are used to show electrons from different atoms. They do not represent protons, neutrons or whole atoms.',mistakes:['Writing protons.','Writing atoms.','Saying charges rather than electrons.','Forgetting that dot and cross diagrams show outer shell electrons only.'],tip:'In dot and cross diagrams, dots and crosses are both electrons; the different symbols show which atom they came from.'},
    {part:'9(b)',marks:1,question:'What type of bonding is present in hydrogen chloride?',answer:['Covalent bonding'],breakdown:['covalent ✓'],explanation:'Hydrogen and chlorine are both non-metals. They bond by sharing a pair of electrons, which is covalent bonding.',mistakes:['Saying ionic because chlorine can form chloride ions in other compounds.','Saying metallic because the diagram has a regular shape.','Forgetting that non-metal + non-metal usually means covalent.'],tip:'Non-metal + non-metal usually means covalent bonding.'},
    {part:'9(c)',marks:3,question:'Predict whether hydrogen chloride is a solid, liquid or gas at room temperature and pressure. Explain your answer.',answer:['Hydrogen chloride is a gas at room temperature and pressure.','It is a simple molecular substance.','There are weak intermolecular forces between hydrogen chloride molecules, so only a small amount of energy is needed to overcome them.'],breakdown:['gas ✓','simple molecular / weak intermolecular forces ✓','little energy needed to overcome the forces ✓'],explanation:'Hydrogen chloride consists of small molecules. Although the covalent bond within each molecule is strong, the forces between separate molecules are weak. These weak intermolecular forces are easily overcome at room temperature, so hydrogen chloride exists as a gas.',mistakes:['Saying the covalent bond breaks when hydrogen chloride boils.','Predicting liquid because hydrogen chloride can dissolve in water to form hydrochloric acid.','Forgetting to explain the state using intermolecular forces.','Saying all covalent substances are gases, which is too broad.'],tip:'For small molecular substances, use weak intermolecular forces to explain low melting and boiling points.'}
  ]},
  {id:'medium-q10',number:'Question 10',title:'PVC, polymers and intermolecular forces',marks:8,parts:[
    {part:'10(a)',marks:2,question:'State the term used to describe the units from which polymers are made and name the type of bonding between these units.',answer:['The units are called monomers.','The monomers are joined by covalent bonds.'],breakdown:['monomers ✓','covalent bonds ✓'],explanation:'Polymers are long molecules made by joining many small repeating units together. The small units are called monomers. In addition polymers such as PVC, the monomers join together by forming covalent bonds between carbon atoms.',mistakes:['Saying molecules instead of monomers.','Saying ionic bonds join the units.','Confusing polymers with alloys or mixtures.','Forgetting that the bonding along the chain is covalent.'],tip:'Mono means one. Polymer means many repeating monomer units joined together.'},
    {part:'10(b)',marks:3,question:'PVC softens and melts when heated. Use the diagram and your knowledge of structure and bonding to explain why this occurs.',answer:['PVC has long polymer chains with strong covalent bonds within each chain.','There are weaker intermolecular forces between the polymer chains.','When heated, these intermolecular forces are overcome, so the chains can move or slide past each other and the PVC softens or melts.'],breakdown:['strong covalent bonds within chains ✓','weak intermolecular forces between chains ✓','heating overcomes these forces so chains can move/slide ✓'],explanation:'The important distinction is between bonding within a polymer chain and forces between polymer chains. The covalent bonds within the PVC chains are strong and are not broken when PVC simply softens. Instead, heating provides enough energy to overcome the weaker forces between chains, allowing the chains to move past one another.',mistakes:['Saying covalent bonds in the chains break when PVC melts.','Only saying “it gets hot” without explaining forces.','Forgetting to mention forces between chains.','Describing PVC as a giant ionic lattice.'],tip:'For polymers melting or softening, focus on weak intermolecular forces between chains, not breaking the covalent bonds along the chain.'},
    {part:'10(c)',marks:3,question:'The basic unit of PVC is C₂H₃Cl. Draw a section of a chain of PVC showing three units joined together.',answer:['A correct section should show three repeating units joined together:','–CH₂–CHCl–CH₂–CHCl–CH₂–CHCl–','Continuation bonds should be shown at both ends of the chain section.'],breakdown:['correct repeating unit shown ✓','three units joined together ✓','continuation bonds / correct chain bonding at both ends ✓'],explanation:'PVC is made from repeating chloroethene units. In the polymer chain, each repeating unit has a –CH₂–CHCl– pattern. Showing three units means this pattern should appear three times in a continuous carbon chain. Each carbon must have four bonds overall, with chlorine attached to every second carbon in this simplified representation.',mistakes:['Leaving double bonds in the polymer chain.','Drawing only one repeating unit.','Missing the chlorine atoms.','Forgetting continuation bonds at the ends of the polymer section.','Giving the formula C₂H₃Cl without drawing or representing the chain.'],tip:'When drawing addition polymers, the C=C double bond from the monomer opens up and becomes single bonds in the polymer chain.'}
  ]}
];

const hardQuestions = [
  {id:'hard-q1',number:'Question 1',title:'Using melting point, boiling point and conductivity data',marks:9,parts:[
    {part:'1(a)',marks:1,question:'Table 1 gives melting and boiling points for substances A–E. Give the state symbol of substance B at −202 °C.',answer:['(l)'],breakdown:['liquid state symbol (l) ✓'],explanation:'Substance B melts at −220 °C and boils at −180 °C. A temperature of −202 °C is above the melting point but below the boiling point. This means substance B has melted but has not boiled, so it is a liquid. The correct state symbol for a liquid is (l).',mistakes:['Writing (g) because the temperature is very low and seems “gas-like”.','Writing liquid in words when the question asks for a state symbol.','Only comparing −202 °C with the boiling point and forgetting the melting point.','Thinking negative temperatures always mean solids.'],tip:'For state questions, compare the temperature with both the melting point and boiling point: below melting = solid, between = liquid, above boiling = gas.'},
    {part:'1(b)',marks:3,question:'Substance E conducts electricity when solid and molten. Explain why.',answer:['Substance E is most likely a metal.','Metals contain delocalised electrons.','These delocalised electrons are free to move through the structure and carry electrical charge in both the solid and molten states.'],breakdown:['identifies or implies metallic structure ✓','delocalised electrons present ✓','electrons are free to move and carry charge ✓'],explanation:'The key clue is that substance E conducts electricity when solid. Ionic compounds do not conduct when solid because their ions are fixed, but metals do conduct when solid because they have delocalised electrons. These electrons are still mobile when the metal is molten, so the substance conducts in both states.',mistakes:['Saying ions move through a solid metal.','Thinking any substance that conducts when molten must be ionic.','Forgetting to mention electrons carrying charge.','Saying atoms move and carry electricity.'],tip:'Solid conductor + molten conductor usually points to a metal. Metals conduct because of delocalised electrons.'},
    {part:'1(c)',marks:2,question:'One of the substances in the table is sodium chloride. Identify which substance is sodium chloride and give a reason.',answer:['Substance C is sodium chloride.','It has a high melting point and boiling point, does not conduct electricity as a solid, but does conduct when molten or dissolved. These are typical properties of an ionic compound.'],breakdown:['C identified ✓','reason linked to ionic properties: high melting point / non-conducting solid / conducting when molten or dissolved ✓'],explanation:'Sodium chloride is an ionic compound. It has a giant ionic lattice, so it has a high melting point. Its ions are fixed in place when solid, so it cannot conduct electricity as a solid. When molten or dissolved, the ions are free to move and carry charge, so it conducts electricity.',mistakes:['Choosing E because it conducts electricity.','Forgetting that sodium chloride does not conduct as a solid.','Choosing a substance with a very low melting point, which would not fit an ionic lattice.','Giving the answer without using the data as evidence.'],tip:'Use several pieces of evidence from the table, not just one. Ionic compounds usually have high melting points and conduct only when molten or dissolved.'},
    {part:'1(d)',marks:3,question:'Explain why substance A has a relatively low boiling point.',answer:['Substance A is likely to be a simple molecular substance.','There are weak intermolecular forces between its molecules.','Only a small amount of energy is needed to overcome these forces during boiling.'],breakdown:['simple molecular substance ✓','weak intermolecular forces between molecules ✓','little energy needed to overcome the forces ✓'],explanation:'A low boiling point suggests that the particles are held together by weak forces. In simple molecular substances, the covalent bonds inside the molecules are strong, but the forces between separate molecules are weak. Boiling only overcomes the intermolecular forces between molecules; it does not break the covalent bonds inside the molecules.',mistakes:['Saying covalent bonds are weak.','Saying atoms are boiled apart instead of molecules separating.','Forgetting the word intermolecular.','Explaining melting point when the question asks about boiling point.'],tip:'For simple molecular substances, low boiling point is explained by weak intermolecular forces, not weak covalent bonds.'}
  ]},
  {id:'hard-q2',number:'Question 2',title:'Silicon dioxide, conductivity and particle theory',marks:10,parts:[
    {part:'2(a)',marks:4,question:'Explain why silicon dioxide can be used to line furnaces.',answer:['Silicon dioxide has a giant covalent structure.','There are many strong covalent bonds throughout the structure.','A large amount of energy is needed to break these bonds.','Therefore silicon dioxide has a very high melting point and can withstand the high temperatures in a furnace.'],breakdown:['giant covalent structure ✓','many strong covalent bonds ✓','large amount of energy needed ✓','high melting point / suitable for high temperatures ✓'],explanation:'Silicon dioxide does not consist of small separate molecules. It forms a giant covalent network in which silicon and oxygen atoms are joined by strong covalent bonds. Because these strong bonds extend throughout the structure, a lot of energy is required to break enough of them for melting to occur. This makes silicon dioxide suitable for lining furnaces.',mistakes:['Saying silicon dioxide is ionic.','Saying it has strong intermolecular forces.','Only saying it is “heatproof” without explaining the bonding.','Describing it as made from molecules.'],tip:'For furnace lining questions, link the use to high melting point, then explain high melting point using giant covalent structure and strong covalent bonds.'},
    {part:'2(b)',marks:2,question:'Explain why silicon dioxide cannot conduct electricity.',answer:['Silicon dioxide has no charged particles that are free to move.','It has no delocalised electrons and no mobile ions.'],breakdown:['no mobile charged particles ✓','no delocalised electrons / no mobile ions ✓'],explanation:'Electrical conductivity requires charged particles that can move through the structure. In silicon dioxide, the electrons are held in covalent bonds and cannot move freely. The structure is not ionic, so there are no mobile ions either. This means it cannot conduct electricity.',mistakes:['Saying it cannot conduct because it is solid. Some solids, such as metals and graphite, do conduct.','Saying the ions are fixed when silicon dioxide is not ionic.','Forgetting that electrons must be mobile to conduct.','Confusing silicon dioxide with graphite.'],tip:'To explain conductivity, always ask: are there charged particles, and can they move?'},
    {part:'2(c)',marks:2,question:'Solids can be represented using a particle model. Describe two limitations of this model.',answer:['Any two from:','The particles are not shown to scale.','The model does not show particles vibrating in fixed positions.','The forces or bonds between particles are not shown.','The particles are shown as simple spheres, which may not represent their real shape.','The spaces between particles may not be accurately represented.'],breakdown:['first valid limitation ✓','second valid limitation ✓'],explanation:'A particle model is a simplified representation. It is useful for showing that particles in a solid are close together and regularly arranged, but it does not show everything about a real solid. For example, particles in solids are constantly vibrating, and the attractions or bonds between them are not usually shown in the model.',mistakes:['Describing what the model shows instead of what it fails to show.','Writing vague statements such as “it is wrong” without saying why.','Only saying particles are close together, which is a feature rather than a limitation.','Giving two limitations that mean the same thing.'],tip:'A limitation is a specific weakness of the model, such as missing movement, missing forces or inaccurate scale.'},
    {part:'2(d)',marks:2,question:'Explain how, using particle theory, silicon dioxide would change state from a solid to a liquid.',answer:['When heated, the particles gain energy and vibrate more strongly.','Eventually enough energy is supplied to overcome the forces or bonds holding the particles in fixed positions, so the structure becomes a liquid.'],breakdown:['particles gain energy / vibrate more strongly ✓','forces or bonds overcome so particles are no longer fixed / melting occurs ✓'],explanation:'In a solid, particles are held in fixed positions but vibrate. Heating transfers energy to the particles, increasing their kinetic energy. For silicon dioxide, a large amount of energy is needed because strong covalent bonds must be overcome before the structure can melt.',mistakes:['Saying particles expand rather than explaining increased movement.','Saying the particles disappear.','Forgetting that energy is needed to overcome attractions or bonds.','Saying silicon dioxide melts easily.'],tip:'For state changes, use the pattern: heating → particles gain energy → particles move/vibrate more → forces are overcome.'}
  ]},
  {id:'hard-q3',number:'Question 3',title:'Ethene, alkenes and addition polymerisation',marks:11,parts:[
    {part:'3(a)',marks:2,question:'Complete the dot and cross diagram for ethene, C₂H₄. Only show the outer shell electrons.',answer:['A correct diagram should show a double covalent bond between the two carbon atoms.','Each carbon should also form single covalent bonds to two hydrogen atoms, so each carbon has four bonds in total.'],breakdown:['C=C double bond shown with two shared pairs of electrons ✓','four C–H single bonds shown correctly with outer shell electrons only ✓'],explanation:'Ethene has the formula C₂H₄. Each carbon atom needs four bonds. The two carbon atoms share two pairs of electrons with each other, forming a double bond. Each carbon also shares one pair of electrons with each of two hydrogen atoms. This gives each carbon a full outer shell and each hydrogen a full first shell.',mistakes:['Drawing a single bond between the carbon atoms.','Giving carbon too many or too few bonds.','Showing inner shell electrons when the question asks for outer shell electrons only.','Forgetting that hydrogen forms only one bond.'],tip:'In GCSE dot and cross diagrams, carbon forms four bonds and hydrogen forms one bond. Ethene contains a C=C double bond.'},
    {part:'3(b)',marks:3,question:'Use the boiling points and structures of ethene, propene and butene to describe and explain the trend as the number of carbon atoms increases.',answer:['The boiling point increases as the number of carbon atoms increases.','The molecules become larger as the carbon chain gets longer.','Larger molecules have stronger intermolecular forces, so more energy is needed to overcome these forces during boiling.'],breakdown:['boiling point increases ✓','molecules become larger / longer carbon chains ✓','stronger intermolecular forces require more energy ✓'],explanation:'Ethene, propene and butene are simple molecular substances. The covalent bonds inside the molecules are strong, but boiling does not break these covalent bonds. As the molecules get larger, the intermolecular forces between molecules become stronger. This means more energy is needed to separate the molecules, so the boiling point increases.',mistakes:['Saying the covalent bonds get stronger down the series.','Only describing the pattern without explaining it.','Forgetting to mention intermolecular forces.','Saying more carbon atoms means ionic bonds form.'],tip:'For hydrocarbons in the same homologous series: longer chain → stronger intermolecular forces → higher boiling point.'},
    {part:'3(c)',marks:3,question:'Ethene can undergo addition polymerisation to form poly(ethene). Why is poly(ethene) a solid at room temperature?',answer:['Poly(ethene) is made of very long polymer chains.','There are many intermolecular forces between the chains.','A relatively large amount of energy is needed to overcome these forces, so poly(ethene) remains solid at room temperature.'],breakdown:['long polymer chains / large molecules ✓','many intermolecular forces between chains ✓','more energy needed so solid at room temperature ✓'],explanation:'Poly(ethene) is not a small molecule like ethene. It is made from many ethene monomers joined into long chains. The forces between any one small part of the chains may be weak, but there are many contact points along the long chains. Overall, more energy is needed to overcome these intermolecular forces, making poly(ethene) a solid at room temperature.',mistakes:['Saying poly(ethene) is a giant covalent lattice.','Saying it is solid because the covalent bonds in the chain are broken.','Forgetting to compare long polymer chains with small molecules.','Only saying “it is plastic” without explaining bonding or forces.'],tip:'Polymers are usually solid because their long chains have many intermolecular forces between them.'},
    {part:'3(d)',marks:3,question:'Complete the structure for poly(ethene).',answer:['A correct polymer structure should show the repeating unit:','–CH₂–CH₂–','It should have continuation bonds through the brackets and an n outside the brackets, for example [–CH₂–CH₂–]ₙ.'],breakdown:['correct –CH₂–CH₂– repeating unit ✓','single bonds only in the polymer chain ✓','brackets / continuation bonds and n shown correctly ✓'],explanation:'During addition polymerisation, the double bond in ethene opens up. The carbon atoms then form single bonds to neighbouring ethene units, creating a long chain. The repeating unit of poly(ethene) is therefore –CH₂–CH₂–. The n shows that this unit repeats many times.',mistakes:['Leaving the C=C double bond in the polymer.','Drawing only ethene rather than poly(ethene).','Missing the continuation bonds at the ends of the repeating unit.','Putting n in the wrong place or forgetting it completely.'],tip:'In addition polymers, the monomer double bond becomes single bonds in the polymer chain.'}
  ]},
  {id:'hard-q4',number:'Question 4',title:'Sodium chloride and diamond: melting point and conductivity',marks:10,parts:[
    {part:'4(a)',marks:4,question:'Sodium chloride has a melting point of 801 °C. Explain why sodium chloride has a high melting point.',answer:['Sodium chloride has a giant ionic lattice structure.','There are strong electrostatic attractions between oppositely charged sodium ions and chloride ions.','These attractions act throughout the lattice.','A large amount of energy is needed to overcome the ionic bonds, so sodium chloride has a high melting point.'],breakdown:['giant ionic lattice ✓','strong electrostatic attractions between oppositely charged ions ✓','attractions throughout the lattice ✓','large amount of energy needed to overcome them ✓'],explanation:'Sodium chloride is not made of separate NaCl molecules. It consists of a giant lattice of Na⁺ and Cl⁻ ions. Each ion is strongly attracted to oppositely charged ions around it. These strong attractions extend in all directions, so a lot of energy is needed to separate the ions enough for the solid to melt.',mistakes:['Saying sodium chloride has molecules.','Saying intermolecular forces are strong.','Forgetting to mention oppositely charged ions.','Only saying “ionic bonds are strong” without explaining the lattice or energy.'],tip:'For ionic melting point explanations, use: giant ionic lattice → strong electrostatic attractions → lots of energy needed.'},
    {part:'4(b)',marks:2,question:'Diamond has a melting point of 4500 °C. Explain why diamond has a higher melting point than sodium chloride. Refer to the structure of diamond.',answer:['Diamond has a giant covalent structure in which each carbon atom forms four strong covalent bonds.','More energy is needed to break these covalent bonds throughout the structure, so diamond has a higher melting point than sodium chloride.'],breakdown:['each carbon forms four strong covalent bonds / giant covalent structure ✓','more energy needed to break bonds ✓'],explanation:'Diamond has a very rigid 3D network of carbon atoms. Each carbon atom is bonded to four others by strong covalent bonds. Melting diamond requires many of these strong covalent bonds to be broken. This requires even more energy than melting sodium chloride.',mistakes:['Saying diamond has strong intermolecular forces.','Saying diamond is made of carbon molecules.','Forgetting to refer to four covalent bonds per carbon atom.','Only saying diamond is hard, which does not fully explain melting point.'],tip:'Diamond is a giant covalent structure, not a simple molecular substance.'},
    {part:'4(c)',marks:4,question:'Compare the electrical conductivity of sodium chloride and diamond. Explain your answer.',answer:['Diamond does not conduct electricity because it has no delocalised electrons or mobile ions.','All of diamond’s outer electrons are used in covalent bonds.','Solid sodium chloride does not conduct electricity because its ions are fixed in position and cannot move.','Molten or dissolved sodium chloride conducts electricity because its ions are free to move and carry charge.'],breakdown:['diamond does not conduct because no mobile charged particles ✓','all diamond electrons are held in covalent bonds / no delocalised electrons ✓','solid sodium chloride does not conduct because ions are fixed ✓','molten or aqueous sodium chloride conducts because ions are mobile and carry charge ✓'],explanation:'The comparison depends on both structure and state. Diamond is a giant covalent structure with no free charged particles, so it does not conduct in any normal state. Sodium chloride is ionic. As a solid, its ions are charged but cannot move. When molten or dissolved, the ions can move through the liquid or solution and carry charge.',mistakes:['Saying diamond conducts because graphite does.','Forgetting to specify solid versus molten sodium chloride.','Saying electrons conduct in sodium chloride.','Saying sodium chloride never conducts electricity.'],tip:'For ionic conductivity, always state the physical state. Solid ionic compounds do not conduct; molten or aqueous ionic compounds do.'}
  ]},
  {id:'hard-q5',number:'Question 5',title:'Metals, alloys and thermal conductivity',marks:9,parts:[
    {part:'5(a)',marks:4,question:'Iron is a typical metal. Explain why it has a high melting point.',answer:['Iron has a giant metallic structure.','There are strong electrostatic attractions between positive metal ions and delocalised electrons.','These metallic bonds act throughout the structure.','A large amount of energy is needed to overcome these attractions, so iron has a high melting point.'],breakdown:['giant metallic structure ✓','strong attraction between positive ions and delocalised electrons ✓','metallic bonding throughout the structure ✓','large amount of energy needed to overcome attractions ✓'],explanation:'In iron, metal atoms form a lattice of positive ions surrounded by delocalised electrons. The attraction between the positive ions and the negative delocalised electrons is strong. Because this metallic bonding extends throughout the giant structure, a large amount of energy is needed to separate the particles during melting.',mistakes:['Saying iron contains molecules.','Referring to intermolecular forces.','Forgetting delocalised electrons.','Only saying “metals are strong” without explaining the bonding.'],tip:'For metal melting points, use: giant metallic structure → strong attraction between positive ions and delocalised electrons → lots of energy needed.'},
    {part:'5(b)',marks:3,question:'Explain why stainless steel is harder than the iron it is made from.',answer:['Stainless steel is an alloy containing atoms of different elements, such as iron, chromium and nickel.','The different-sized atoms distort the regular layers in the metal structure.','This prevents the layers from sliding over each other easily, making stainless steel harder than pure iron.'],breakdown:['alloy contains different atoms / different-sized atoms ✓','regular layers are distorted ✓','layers cannot slide easily so alloy is harder ✓'],explanation:'Pure iron has atoms of the same size arranged in regular layers, so those layers can slide over each other more easily. Stainless steel contains atoms of different elements. These atoms disrupt the regular arrangement of layers, making it harder for the layers to slide when a force is applied.',mistakes:['Saying stainless steel is harder because it is a compound.','Only listing iron, chromium and nickel without explaining the structure.','Saying atoms are different shapes instead of different sizes.','Forgetting to mention layers sliding.'],tip:'For alloy hardness, the key chain is: different-sized atoms → distorted layers → layers cannot slide easily.'},
    {part:'5(c)',marks:1,question:'Early hip replacement joints were made from stainless steel. Apart from being harder, suggest one other useful property.',answer:['Any one from:','It is corrosion resistant.','It is strong.','It is durable.','It does not react easily with substances in the body.'],breakdown:['one suitable property ✓'],explanation:'A hip replacement material needs to survive inside the body for a long time. Stainless steel is useful because it is strong and resistant to corrosion, so it is less likely to react with body fluids or wear away quickly.',mistakes:['Repeating hardness when the question says apart from being harder.','Saying it is a good electrical conductor, which is not useful here.','Giving vague answers such as “it is good” without a specific property.'],tip:'For medical implant materials, think about strength, durability, corrosion resistance and low reactivity.'},
    {part:'5(d)',marks:1,question:'Explain why nickel and chromium are both good thermal conductors.',answer:['They contain delocalised electrons which can transfer thermal energy through the metal structure.'],breakdown:['delocalised electrons transfer thermal energy ✓'],explanation:'Metals conduct heat well because their delocalised electrons can move through the structure. These electrons transfer kinetic energy from the hotter region to cooler regions of the metal.',mistakes:['Saying ions move through the metal to transfer heat.','Only saying “because they are metals” without explaining why metals conduct heat.','Confusing thermal conductivity with electrical conductivity without mentioning energy transfer.'],tip:'Metals conduct heat and electricity well because of delocalised electrons.'}
  ]}
];

function SectionCard({ title, children, tone = 'slate' }) {
  const tones = {
    slate: 'border-slate-200 bg-white',
    green: 'border-emerald-200 bg-emerald-50',
    amber: 'border-amber-200 bg-amber-50',
    blue: 'border-sky-200 bg-sky-50',
    rose: 'border-rose-200 bg-rose-50'
  };
  return <div className={`rounded-2xl border ${tones[tone]} p-4 shadow-sm`}><h4 className="mb-2 text-sm font-bold uppercase tracking-wide text-slate-700">{title}</h4>{children}</div>;
}

function PartCard({ part }) {
  return <div className="mb-6 rounded-3xl border border-slate-200 bg-white p-5 shadow-sm">
    <div className="mb-4 flex flex-wrap items-center justify-between gap-3 border-b border-slate-100 pb-3">
      <h3 className="text-xl font-bold text-slate-900">{part.part}</h3>
      <span className="rounded-full bg-slate-100 px-3 py-1 text-sm font-semibold text-slate-700">{part.marks} {part.marks === 1 ? 'mark' : 'marks'}</span>
    </div>
    <SectionCard title="Question focus"><p className="leading-relaxed text-slate-700">{part.question}</p></SectionCard>
    <div className="mt-4 grid gap-4 lg:grid-cols-2">
      <SectionCard title="Model answer" tone="green"><ul className="space-y-2 text-slate-800">{part.answer.map((line, index) => <li key={index} className="leading-relaxed">{line}</li>)}</ul></SectionCard>
      <SectionCard title="Mark breakdown" tone="blue"><ul className="space-y-2 text-slate-800">{part.breakdown.map((line, index) => <li key={index} className="leading-relaxed">{line}</li>)}</ul></SectionCard>
    </div>
    <div className="mt-4 grid gap-4 lg:grid-cols-3">
      <SectionCard title="Explanation"><p className="leading-relaxed text-slate-700">{part.explanation}</p></SectionCard>
      <SectionCard title="Common mistakes" tone="rose"><ul className="list-disc space-y-2 pl-5 text-slate-700">{part.mistakes.map((line, index) => <li key={index} className="leading-relaxed">{line}</li>)}</ul></SectionCard>
      <SectionCard title="Exam tip" tone="amber"><p className="leading-relaxed text-slate-700">{part.tip}</p></SectionCard>
    </div>
  </div>;
}

function QuestionPanel({ question }) {
  return <div>
    <div className="mb-5 rounded-3xl border border-slate-200 bg-gradient-to-r from-slate-900 to-slate-700 p-6 text-white shadow-md">
      <p className="text-sm font-semibold uppercase tracking-wider text-slate-300">{question.number}</p>
      <h2 className="mt-1 text-2xl font-bold">{question.title}</h2>
      <p className="mt-2 text-sm text-slate-200">Total: {question.marks} marks</p>
    </div>
    {question.parts.map((part, index) => <PartCard key={index} part={part} />)}
  </div>;
}

  const questions = questionSets[difficulty];
  const currentQuestion = questions[selectedQuestion];
  const handleDifficulty = (level) => { setDifficulty(level); setSelectedQuestion(0); };
  return <div className="min-h-screen bg-slate-50 text-slate-900">
    <header className="border-b border-slate-200 bg-white">
      <div className="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
        <div className="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
          <div>
            <p className="text-sm font-bold uppercase tracking-[0.2em] text-sky-700">GCSE AQA Chemistry</p>
            <h1 className="mt-2 text-4xl font-black tracking-tight text-slate-950">2.2 Bonding & Substance Properties</h1>
            <p className="mt-3 max-w-3xl text-base leading-relaxed text-slate-600">Save My Exams style model answers with mark breakdowns, student-friendly explanations, common mistakes and exam tips.</p>
          </div>
          <div className="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700"><strong>Current content:</strong> Easy, Medium and Hard question content added.</div>
        </div>
      </div>
    </header>
    <main className="mx-auto grid max-w-7xl gap-6 px-4 py-6 sm:px-6 lg:grid-cols-[280px_1fr] lg:px-8">
      <aside className="h-fit rounded-3xl border border-slate-200 bg-white p-4 shadow-sm lg:sticky lg:top-6">
        <h2 className="mb-3 text-sm font-bold uppercase tracking-wide text-slate-600">Difficulty</h2>
        <div className="grid grid-cols-3 gap-2 lg:grid-cols-1">
          {['Easy','Medium','Hard'].map(level => <button key={level} onClick={() => handleDifficulty(level)} className={`rounded-2xl px-4 py-3 text-left text-sm font-bold transition ${difficulty === level ? 'bg-sky-700 text-white shadow-sm' : 'bg-slate-100 text-slate-700 hover:bg-slate-200'}`}>{level}<span className="block text-xs font-medium opacity-80">{questionSets[level].length} questions</span></button>)}
        </div>
        <div className="mt-6 border-t border-slate-200 pt-4">
          <h2 className="mb-3 text-sm font-bold uppercase tracking-wide text-slate-600">Questions</h2>
          <div className="space-y-2">
            {questions.map((question, index) => <button key={question.id} onClick={() => setSelectedQuestion(index)} className={`w-full rounded-2xl px-4 py-3 text-left transition ${selectedQuestion === index ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-700 hover:bg-slate-100'}`}><span className="block text-sm font-bold">{question.number}</span><span className="mt-1 block text-xs opacity-80">{question.marks} marks</span></button>)}
          </div>
        </div>
      </aside>
      <section>{currentQuestion && <QuestionPanel question={currentQuestion} />}</section>
    </main>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
