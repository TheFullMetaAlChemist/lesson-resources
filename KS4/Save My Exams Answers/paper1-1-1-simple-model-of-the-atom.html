function filteredQuestions(){const section=currentSection();if(!query.trim())return section.questions;const q=query.toLowerCase();return section.questions.filter(question=>question.title.toLowerCase().includes(q)||question.parts.some(part=>part.part.toLowerCase().includes(q)||part.answer.join(' ').toLowerCase().includes(q)||(part.explanation||'').toLowerCase().includes(q)));}
function currentQuestion(){const filtered=filteredQuestions();return filtered.find(q=>q.id===activeQuestion)||filtered[0]||currentSection().questions[0];}
function render(){const section=currentSection();const filtered=filteredQuestions();const question=currentQuestion();document.getElementById('sectionTitle').textContent=section.title;document.getElementById('sectionSubtitle').textContent=section.subtitle;document.getElementById('sectionTabs').innerHTML=sections.map(s=>`<button class="section-tab ${s.id===activeSection?'active':''}" data-section="${s.id}">${s.title.split(' ')[0]}</button>`).join('');document.getElementById('questionList').innerHTML=filtered.length?filtered.map(q=>`<button class="question-btn ${q.id===question.id?'active':''}" data-question="${q.id}">${esc(q.title)}</button>`).join(''):'<p class="no-results">No matching questions found.</p>';document.getElementById('questionTitle').textContent=question.title;document.getElementById('parts').innerHTML=question.parts.map((p,i)=>`<article class="part-card"><button class="part-toggle" data-part="${i}" aria-expanded="true"><span class="part-left"><span class="chev">${icons.down}</span><span class="part-title">${esc(p.part)}</span></span><span class="mark-badge">${p.marks} mark${p.marks===1?'':'s'}</span></button><div class="part-body"><div><h4 class="answer-heading">${icons.check} Model answer / marking points</h4><ul class="answer-list">${p.answer.map(a=>`<li>${esc(a)}</li>`).join('')}</ul></div>${p.explanation?`<div class="explanation"><strong>Explanation: </strong>${esc(p.explanation)}</div>`:''}</div></article>`).join('');bindDynamic();}
function bindDynamic(){document.querySelectorAll('[data-section]').forEach(btn=>btn.onclick=()=>{activeSection=btn.dataset.section;activeQuestion=currentSection().questions[0].id;query='';document.getElementById('searchInput').value='';closeMenu();render();});document.querySelectorAll('[data-question]').forEach(btn=>btn.onclick=()=>{activeQuestion=btn.dataset.question;closeMenu();render();});document.querySelectorAll('[data-part]').forEach(btn=>btn.onclick=()=>{const body=btn.parentElement.querySelector('.part-body');const chev=btn.querySelector('.chev');const isHidden=body.classList.toggle('hidden');btn.setAttribute('aria-expanded',String(!isHidden));chev.innerHTML=isHidden?icons.right:icons.down;});}
function closeMenu(){document.getElementById('sidebar').classList.remove('open');}
document.getElementById('openMenu').innerHTML=icons.menu;document.getElementById('closeMenu').innerHTML=icons.x;document.getElementById('searchIcon').innerHTML=icons.search;document.getElementById('openMenu').onclick=()=>document.getElementById('sidebar').classList.add('open');document.getElementById('closeMenu').onclick=closeMenu;document.getElementById('searchInput').addEventListener('input',e=>{query=e.target.value;render();});
(function tests(){const totalQuestions=sections.reduce((sum,s)=>sum+s.questions.length,0);const totalParts=sections.reduce((sum,s)=>sum+s.questions.reduce((qSum,q)=>qSum+q.parts.length,0),0);console.assert(sections.length===3,'Expected three sections');console.assert(totalQuestions===23,`Expected 23 questions, found ${totalQuestions}`);console.assert(totalParts>50,`Expected more than 50 question parts, found ${totalParts}`);console.assert(sections.every(s=>s.questions.every(q=>q.parts.every(p=>Array.isArray(p.answer)&&p.answer.length>0))),'Every part needs answer lines');})();
render();
</script>
