<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GCSE Chemistry — Structure and Bonding Comparison Tasks</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const QUESTIONS = [
      {
        title: "Question 1 — Methane and Sodium Chloride",
        shortTitle: "Methane vs Sodium Chloride",
        prompt: "Compare the structure and bonding in methane and sodium chloride.",
        mcqs: [
          {
            question: "What type of bonding is present in methane?",
            answer: 2,
            options: ["Ionic bonding", "Metallic bonding", "Covalent bonding", "Giant ionic bonding"],
            feedback: "Methane contains covalent bonds because carbon and hydrogen atoms share electrons.",
          },
          {
            question: "Which best describes the bonding in methane?",
            answer: 2,
            options: [
              "Electrons are transferred between atoms",
              "Positive ions are attracted to delocalised electrons",
              "Atoms share pairs of electrons",
              "Oppositely charged ions attract each other",
            ],
            feedback: "Covalent bonding means atoms share pairs of electrons.",
          },
          {
            question: "What structure does methane have?",
            answer: 2,
            options: ["Giant covalent lattice", "Giant metallic lattice", "Simple molecular structure", "Giant ionic lattice"],
            feedback: "Methane is made from small separate molecules, so it has a simple molecular structure.",
          },
          {
            question: "Which statement about methane is correct?",
            answer: 1,
            options: [
              "Strong covalent bonds exist between molecules",
              "Weak intermolecular forces exist between molecules",
              "Molecules are held together by ionic bonds",
              "It contains delocalised electrons",
            ],
            feedback: "The covalent bonds are inside each methane molecule. Weak intermolecular forces act between methane molecules.",
          },
          {
            question: "What type of bonding is present in sodium chloride?",
            answer: 2,
            options: ["Metallic bonding", "Covalent bonding", "Ionic bonding", "Intermolecular bonding"],
            feedback: "Sodium chloride contains ionic bonding between sodium ions and chloride ions.",
          },
          {
            question: "Which best describes the bonding in sodium chloride?",
            answer: 2,
            options: [
              "Atoms share electrons",
              "Positive metal ions attract delocalised electrons",
              "Oppositely charged ions attract each other",
              "Molecules are held together by weak forces",
            ],
            feedback: "Ionic bonding is the strong electrostatic attraction between oppositely charged ions.",
          },
          {
            question: "What structure does sodium chloride have?",
            answer: 1,
            options: ["Simple molecular structure", "Giant ionic lattice", "Giant covalent lattice", "Layered structure"],
            feedback: "Sodium chloride forms a giant ionic lattice: a regular repeating arrangement of positive and negative ions.",
          },
          {
            question: "Which statement about sodium chloride is correct?",
            answer: 2,
            options: [
              "It contains weak intermolecular forces",
              "It is made from neutral molecules",
              "It contains a regular arrangement of positive and negative ions",
              "It contains delocalised electrons",
            ],
            feedback: "Sodium chloride is not made from molecules. It is a regular lattice of positive sodium ions and negative chloride ions.",
          },
        ],
        modelAnswer:
          "Methane has covalent bonding because the atoms share pairs of electrons. It has a simple molecular structure with strong covalent bonds inside each molecule and weak intermolecular forces between the molecules. Sodium chloride has ionic bonding because there is attraction between oppositely charged ions. It has a giant ionic lattice with a regular arrangement of positive and negative ions held together by strong electrostatic forces. Both substances contain strong bonding forces, but methane is made from small molecules whereas sodium chloride forms a giant lattice structure.",
        markScheme: [
          "Methane has covalent bonding.",
          "Covalent bonding involves atoms sharing pairs of electrons.",
          "Methane has a simple molecular structure.",
          "There are weak intermolecular forces between methane molecules.",
          "Sodium chloride has ionic bonding.",
          "Ionic bonding is the attraction between oppositely charged ions.",
          "Sodium chloride has a giant ionic lattice.",
          "A comparison is made between simple molecules and a giant lattice structure.",
        ],
      },
      {
        title: "Question 2 — Diamond and Sodium",
        shortTitle: "Diamond vs Sodium",
        prompt: "Compare the structure and bonding in diamond and sodium.",
        mcqs: [
          {
            question: "What type of bonding is present in diamond?",
            answer: 2,
            options: ["Metallic bonding", "Ionic bonding", "Covalent bonding", "Intermolecular bonding"],
            feedback: "Diamond contains covalent bonds between carbon atoms.",
          },
          {
            question: "Which best describes the bonding in diamond?",
            answer: 2,
            options: [
              "Oppositely charged ions attract each other",
              "Positive ions attract delocalised electrons",
              "Carbon atoms share pairs of electrons",
              "Molecules are held together by weak forces",
            ],
            feedback: "In diamond, carbon atoms form covalent bonds by sharing pairs of electrons.",
          },
          {
            question: "What structure does diamond have?",
            answer: 1,
            options: ["Simple molecular structure", "Giant covalent tetrahedral structure", "Giant ionic lattice", "Layered metallic structure"],
            feedback: "Diamond has a giant covalent tetrahedral structure because each carbon atom is covalently bonded to four other carbon atoms in a three-dimensional arrangement.",
          },
          {
            question: "Which statement about diamond is correct?",
            answer: 2,
            options: [
              "It contains weak intermolecular forces",
              "It is made from separate molecules",
              "Each carbon atom is strongly bonded to four other carbon atoms",
              "It contains ions",
            ],
            feedback: "Each carbon atom in diamond forms strong covalent bonds with four other carbon atoms.",
          },
          {
            question: "What type of bonding is present in sodium?",
            answer: 1,
            options: ["Ionic bonding", "Metallic bonding", "Covalent bonding", "Intermolecular bonding"],
            feedback: "Sodium is a metal, so it has metallic bonding.",
          },
          {
            question: "Which best describes the bonding in sodium?",
            answer: 2,
            options: [
              "Atoms share electrons",
              "Oppositely charged ions attract each other",
              "Positive metal ions attract delocalised electrons",
              "Molecules are held together by weak forces",
            ],
            feedback: "Metallic bonding is the attraction between positive metal ions and delocalised electrons.",
          },
          {
            question: "What structure does sodium have?",
            answer: 2,
            options: ["Simple molecular structure", "Giant ionic lattice", "Giant metallic lattice", "Giant covalent lattice"],
            feedback: "Sodium has a giant metallic lattice made from positive metal ions and delocalised electrons.",
          },
          {
            question: "Which statement about sodium is correct?",
            answer: 1,
            options: [
              "It is made from molecules",
              "It contains delocalised electrons",
              "It contains weak intermolecular forces",
              "It is made from positive and negative ions",
            ],
            feedback: "Sodium contains delocalised electrons, which are involved in metallic bonding.",
          },
        ],
        modelAnswer:
          "Diamond has covalent bonding because carbon atoms share pairs of electrons. It has a giant covalent lattice where each carbon atom is strongly bonded to four other carbon atoms. Sodium has metallic bonding because positive metal ions are attracted to delocalised electrons. It has a giant metallic lattice structure. Both diamond and sodium have giant structures with strong bonding throughout their structures, but diamond contains covalent bonds whereas sodium contains metallic bonds involving delocalised electrons.",
        markScheme: [
          "Diamond has covalent bonding.",
          "Covalent bonding involves atoms sharing pairs of electrons.",
          "Diamond has a giant covalent lattice.",
          "Each carbon atom is bonded to four other carbon atoms.",
          "Sodium has metallic bonding.",
          "Metallic bonding involves attraction between positive metal ions and delocalised electrons.",
          "Sodium has a giant metallic lattice.",
          "A comparison is made between covalent bonding in diamond and metallic bonding in sodium.",
        ],
      },
      {
        title: "Question 3 — Diamond and Graphite",
        shortTitle: "Diamond vs Graphite",
        prompt: "Compare the structure and bonding in diamond and graphite.",
        mcqs: [
          {
            question: "What type of bonding is present in diamond?",
            answer: 2,
            options: ["Metallic bonding", "Ionic bonding", "Covalent bonding", "Intermolecular bonding"],
            feedback: "Diamond contains strong covalent bonds between carbon atoms.",
          },
          {
            question: "What type of bonding is present in graphite?",
            answer: 2,
            options: ["Metallic bonding", "Ionic bonding", "Covalent bonding", "Intermolecular bonding"],
            feedback: "Graphite also contains covalent bonds between carbon atoms.",
          },
          {
            question: "What structure does diamond have?",
            answer: 1,
            options: ["Simple molecular structure", "Giant covalent tetrahedral structure", "Giant ionic lattice", "Layered structure"],
            feedback: "Diamond has a giant covalent lattice structure.",
          },
          {
            question: "What structure does graphite have?",
            answer: 3,
            options: ["Simple molecular structure", "Giant ionic lattice", "Giant metallic lattice", "Giant covalent layered structure"],
            feedback: "Graphite has a giant covalent layered structure with strong covalent bonds within each layer.",
          },
          {
            question: "Which statement about diamond is correct?",
            answer: 2,
            options: [
              "Each carbon atom bonds to three other carbon atoms",
              "Diamond contains delocalised electrons",
              "Each carbon atom bonds to four other carbon atoms",
              "Diamond contains ions",
            ],
            feedback: "In diamond, each carbon atom forms four covalent bonds.",
          },
          {
            question: "Which statement about graphite is correct?",
            answer: 0,
            options: [
              "Each carbon atom bonds to three other carbon atoms",
              "Graphite is made from molecules",
              "Graphite contains ions",
              "Graphite contains weak covalent bonds",
            ],
            feedback: "In graphite, each carbon atom forms three covalent bonds.",
          },
          {
            question: "Which statement about graphite layers is correct?",
            answer: 1,
            options: [
              "The layers are joined by ionic bonds",
              "Weak forces act between the layers",
              "The layers are joined by metallic bonding",
              "There are no forces between the layers",
            ],
            feedback: "Weak forces between the layers allow graphite layers to slide over each other.",
          },
          {
            question: "Which statement is a similarity between diamond and graphite?",
            answer: 2,
            options: [
              "Both contain ions",
              "Both are simple molecular substances",
              "Both are giant covalent structures",
              "Both contain metallic bonding",
            ],
            feedback: "Diamond and graphite are both giant covalent forms of carbon.",
          },
        ],
        modelAnswer:
          "Diamond and graphite both contain covalent bonding and are giant covalent structures made from carbon atoms. In both substances, the carbon atoms are joined by strong covalent bonds. However, in diamond each carbon atom bonds to four other carbon atoms in a rigid three-dimensional lattice, whereas in graphite each carbon atom bonds to three other carbon atoms in layers. Graphite also has weak forces between the layers, allowing them to slide over each other.",
        markScheme: [
          "Diamond has covalent bonding.",
          "Graphite has covalent bonding.",
          "Both are giant covalent structures.",
          "Diamond has each carbon atom bonded to four others.",
          "Graphite has each carbon atom bonded to three others.",
          "Graphite has a layered structure.",
          "Weak forces exist between graphite layers.",
          "A valid comparison is made between the structures or bonding.",
        ],
      },
    ];

    function validateQuestionData(questions) {
      const errors = [];

      questions.forEach((question, questionIndex) => {
        if (!question.title || !question.prompt) {
          errors.push(`Question ${questionIndex + 1} is missing a title or prompt.`);
        }

        if (!Array.isArray(question.mcqs) || question.mcqs.length === 0) {
          errors.push(`Question ${questionIndex + 1} has no multiple choice questions.`);
        }

        question.mcqs.forEach((mcq, mcqIndex) => {
          if (!Array.isArray(mcq.options) || mcq.options.length !== 4) {
            errors.push(`Question ${questionIndex + 1}, MCQ ${mcqIndex + 1} must have exactly 4 options.`);
          }

          if (typeof mcq.answer !== "number" || mcq.answer < 0 || mcq.answer >= mcq.options.length) {
            errors.push(`Question ${questionIndex + 1}, MCQ ${mcqIndex + 1} has an invalid answer index.`);
          }
        });

        if (!Array.isArray(question.markScheme) || question.markScheme.length < 6) {
          errors.push(`Question ${questionIndex + 1} should have at least 6 mark scheme points.`);
        }
      });

      return errors;
    }

    const DATA_ERRORS = validateQuestionData(QUESTIONS);

    function StructureBondingSelfAssessment() {
      const [screen, setScreen] = React.useState(0);
      const totalScreens = QUESTIONS.length + 1;

      const goNext = () => setScreen((current) => Math.min(current + 1, totalScreens - 1));
      const goBack = () => setScreen((current) => Math.max(current - 1, 0));

      return (
        <div className="min-h-screen bg-slate-100 p-4 md:p-6">
          <div className="max-w-5xl mx-auto space-y-5">
            <Header screen={screen} totalScreens={totalScreens} setScreen={setScreen} />

            {DATA_ERRORS.length > 0 && (
              <div className="rounded-2xl border border-red-300 bg-red-50 p-6 text-red-900">
                <h2 className="text-xl font-bold mb-3">Content check warnings</h2>
                <ul className="list-disc list-inside space-y-2">
                  {DATA_ERRORS.map((error, index) => (
                    <li key={index}>{error}</li>
                  ))}
                </ul>
              </div>
            )}

            {screen === 0 ? <IntroScreen goNext={goNext} /> : <QuestionScreen question={QUESTIONS[screen - 1]} questionNumber={screen} />}

            <div className="flex justify-between items-center bg-white rounded-2xl shadow p-4 sticky bottom-4">
              <button
                type="button"
                onClick={goBack}
                disabled={screen === 0}
                className="px-5 py-3 rounded-xl font-semibold bg-slate-200 text-slate-800 hover:bg-slate-300 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                Back
              </button>

              <p className="text-sm md:text-base font-semibold text-slate-600">
                Screen {screen + 1} of {totalScreens}
              </p>

              <button
                type="button"
                onClick={goNext}
                disabled={screen === totalScreens - 1}
                className="px-5 py-3 rounded-xl font-semibold bg-blue-600 text-white hover:bg-blue-700 disabled:opacity-40 disabled:cursor-not-allowed"
              >
                Next
              </button>
            </div>
          </div>
        </div>
      );
    }

    function Header({ screen, totalScreens, setScreen }) {
      return (
        <header className="bg-white rounded-3xl shadow-xl p-6 md:p-8">
          <h1 className="text-3xl md:text-4xl font-bold mb-4 text-slate-800">GCSE Chemistry — Structure and Bonding Comparison Tasks</h1>
          <div className="flex flex-wrap gap-3">
            <button
              type="button"
              onClick={() => setScreen(0)}
              className={`px-4 py-2 rounded-full font-semibold ${screen === 0 ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200"}`}
            >
              Introduction
            </button>
            {QUESTIONS.map((question, index) => (
              <button
                key={question.title}
                type="button"
                onClick={() => setScreen(index + 1)}
                className={`px-4 py-2 rounded-full font-semibold ${screen === index + 1 ? "bg-blue-600 text-white" : "bg-slate-100 text-slate-700 hover:bg-slate-200"}`}
              >
                Q{index + 1}: {question.shortTitle}
              </button>
            ))}
          </div>
          <div className="mt-5 h-3 bg-slate-200 rounded-full overflow-hidden">
            <div className="h-full bg-blue-600 transition-all" style={{ width: `${((screen + 1) / totalScreens) * 100}%` }} />
          </div>
        </header>
      );
    }

    function IntroScreen({ goNext }) {
      return (
        <section className="bg-white rounded-3xl shadow-xl p-8 md:p-10 space-y-8">
          <div>
            <p className="text-sm font-bold tracking-wide text-blue-700 uppercase mb-2">Introduction</p>
            <h2 className="text-3xl font-bold text-slate-800 mb-4">How this task works</h2>
            <p className="text-lg text-slate-700 leading-8">
              You will practise three 6-mark comparison questions. First, use the multiple choice questions to remind yourself of the key structure and bonding facts. Then write a full comparison answer, mark it using the mark scheme, and finally compare it with the model answer.
            </p>
          </div>

          <div className="grid md:grid-cols-3 gap-5">
            <div className="bg-blue-50 border border-blue-100 rounded-2xl p-5">
              <h3 className="font-bold text-xl text-blue-900 mb-2">1. Check the facts</h3>
              <p className="text-slate-700">Choose an answer for each multiple choice question. You will get feedback immediately.</p>
            </div>
            <div className="bg-amber-50 border border-amber-100 rounded-2xl p-5">
              <h3 className="font-bold text-xl text-amber-900 mb-2">2. Write your answer</h3>
              <p className="text-slate-700">Use the facts to build a clear 6-mark comparison, not just two separate descriptions.</p>
            </div>
            <div className="bg-emerald-50 border border-emerald-100 rounded-2xl p-5">
              <h3 className="font-bold text-xl text-emerald-900 mb-2">3. Improve it</h3>
              <p className="text-slate-700">Use the mark scheme and model answer to review your work and improve your response.</p>
            </div>
          </div>

          <div className="bg-slate-50 border border-slate-200 rounded-2xl p-6">
            <h3 className="text-xl font-bold text-slate-800 mb-3">What makes a strong comparison?</h3>
            <ul className="list-disc list-inside space-y-2 text-slate-700 text-lg">
              <li>Use correct bonding words: covalent, ionic, metallic, intermolecular forces.</li>
              <li>Describe the structure clearly: simple molecular, giant ionic lattice, giant covalent lattice, or giant metallic lattice.</li>
              <li>Use comparison phrases such as “whereas”, “however”, “both”, and “unlike”.</li>
              <li>Link bonding and structure together rather than listing facts randomly.</li>
            </ul>
          </div>

          <button type="button" onClick={goNext} className="bg-blue-600 hover:bg-blue-700 text-white px-7 py-4 rounded-2xl font-bold text-lg">
            Start Question 1
          </button>
        </section>
      );
    }

    function QuestionScreen({ question, questionNumber }) {
      const [answers, setAnswers] = React.useState({});
      const [writtenAnswer, setWrittenAnswer] = React.useState("");
      const [showMarkScheme, setShowMarkScheme] = React.useState(false);
      const [showModel, setShowModel] = React.useState(false);
      const [selfMark, setSelfMark] = React.useState("");

      const score = question.mcqs.reduce((total, mcq, index) => total + (answers[index] === mcq.answer ? 1 : 0), 0);
      const answeredCount = Object.keys(answers).length;

      function handleSelectAnswer(mcqIndex, optionIndex) {
        setAnswers((previousAnswers) => ({ ...previousAnswers, [mcqIndex]: optionIndex }));
      }

      function resetQuestion() {
        setAnswers({});
        setWrittenAnswer("");
        setShowMarkScheme(false);
        setShowModel(false);
        setSelfMark("");
      }

      return (
        <section className="bg-white rounded-3xl shadow-xl p-6 md:p-8 space-y-8">
          <div>
            <p className="text-sm font-bold tracking-wide text-blue-700 uppercase mb-2">Question {questionNumber}</p>
            <h2 className="text-3xl font-bold text-slate-800 mb-3">{question.title}</h2>
            <div className="bg-slate-50 border-l-4 border-blue-600 rounded-2xl p-5">
              <p className="text-xl font-semibold text-slate-800">{question.prompt}</p>
              <p className="text-slate-600 mt-2">This question is worth 6 marks.</p>
            </div>
          </div>

          <div className="flex flex-wrap items-center gap-3 bg-blue-50 border border-blue-100 rounded-2xl p-4">
            <span className="font-bold text-blue-900">Multiple choice progress:</span>
            <span className="text-blue-900">{answeredCount} / {question.mcqs.length} answered</span>
            <span className="text-blue-900 font-semibold">Current score: {score} / {question.mcqs.length}</span>
          </div>

          <div className="space-y-6">
            {question.mcqs.map((mcq, index) => (
              <InstantFeedbackMcq key={index} mcq={mcq} index={index} selectedAnswer={answers[index]} onSelect={handleSelectAnswer} />
            ))}
          </div>

          <div className="border-t pt-8">
            <h3 className="text-2xl font-bold mb-3 text-slate-800">Written Comparison</h3>
            <p className="text-slate-600 mb-4">Now use your multiple choice answers to write a full comparison. Try to use words like “whereas”, “both”, “however” and “unlike”.</p>
            <textarea
              value={writtenAnswer}
              onChange={(event) => setWrittenAnswer(event.target.value)}
              placeholder="Write your full comparison answer here..."
              className="w-full h-60 border border-slate-300 rounded-2xl p-4 text-lg focus:outline-none focus:ring-2 focus:ring-blue-300"
            />
          </div>

          <div className="border-t pt-8 space-y-5">
            <div className="flex flex-wrap gap-4">
              <button type="button" onClick={() => setShowMarkScheme((current) => !current)} className="bg-amber-500 hover:bg-amber-600 text-white px-6 py-3 rounded-2xl font-semibold">
                {showMarkScheme ? "Hide" : "Show"} Mark Scheme
              </button>

              <button type="button" onClick={() => setShowModel((current) => !current)} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-semibold">
                {showModel ? "Hide" : "Show"} Model Answer
              </button>

              <button type="button" onClick={resetQuestion} className="bg-slate-200 hover:bg-slate-300 text-slate-800 px-6 py-3 rounded-2xl font-semibold">
                Reset Question
              </button>
            </div>

            {showMarkScheme && (
              <div className="bg-amber-50 border border-amber-200 rounded-2xl p-6">
                <h4 className="text-xl font-bold mb-4 text-amber-900">Self-Assessment Mark Scheme</h4>
                <p className="mb-4 text-slate-700">Use these points to decide your best-fit mark out of 6. A strong answer should compare both substances rather than describe them separately only.</p>
                <ul className="space-y-3 list-disc list-inside text-slate-700">
                  {question.markScheme.map((point, index) => (
                    <li key={index}>{point}</li>
                  ))}
                </ul>
                <div className="mt-6">
                  <label className="block font-semibold mb-2 text-slate-800">Give yourself a mark out of 6:</label>
                  <input
                    type="number"
                    min="0"
                    max="6"
                    value={selfMark}
                    onChange={(event) => setSelfMark(event.target.value)}
                    className="border border-slate-300 rounded-xl p-3 w-28 text-lg focus:outline-none focus:ring-2 focus:ring-amber-300"
                  />
                </div>
              </div>
            )}

            {showModel && (
              <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-6">
                <h4 className="text-xl font-bold mb-4 text-emerald-900">Model Answer</h4>
                <p className="text-slate-700 leading-8 text-lg">{question.modelAnswer}</p>
              </div>
            )}
          </div>
        </section>
      );
    }

    function InstantFeedbackMcq({ mcq, index, selectedAnswer, onSelect }) {
      const hasAnswered = selectedAnswer !== undefined;
      const isCorrect = selectedAnswer === mcq.answer;

      return (
        <div className="border border-slate-200 rounded-2xl p-5 bg-slate-50">
          <h3 className="font-semibold text-lg mb-4 text-slate-800">{index + 1}. {mcq.question}</h3>
          <div className="grid gap-3">
            {mcq.options.map((option, optionIndex) => {
              const selected = selectedAnswer === optionIndex;
              const correct = optionIndex === mcq.answer;

              let style = "border border-slate-300 bg-white hover:bg-slate-100";
              if (hasAnswered && correct) style = "border-green-500 bg-green-100";
              if (hasAnswered && selected && !correct) style = "border-red-500 bg-red-100";

              return (
                <button
                  type="button"
                  key={optionIndex}
                  onClick={() => onSelect(index, optionIndex)}
                  className={`text-left p-4 rounded-xl transition-all ${style}`}
                  aria-pressed={selected}
                >
                  <span className="font-medium mr-2">{String.fromCharCode(65 + optionIndex)}.</span>
                  {option}
                  {hasAnswered && correct && <span className="ml-3 font-semibold text-green-800">Correct answer</span>}
                  {hasAnswered && selected && !correct && <span className="ml-3 font-semibold text-red-800">Your answer</span>}
                </button>
              );
            })}
          </div>

          {hasAnswered && (
            <div className={`mt-4 rounded-xl p-4 border ${isCorrect ? "bg-green-50 border-green-200 text-green-900" : "bg-red-50 border-red-200 text-red-900"}`}>
              <p className="font-bold mb-1">{isCorrect ? "Correct" : "Not quite"}</p>
              <p>{mcq.feedback}</p>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<StructureBondingSelfAssessment />);
  </script>
</body>
</html>
