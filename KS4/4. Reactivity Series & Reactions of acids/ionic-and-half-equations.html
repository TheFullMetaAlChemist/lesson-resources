<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxidation & Reduction (HT) - Interactive Lesson</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM for interactive UI -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel to compile React JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- FontAwesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // --- DATA STATE ---

        const commonIons = [
            { name: "Hydrogen", formula: "H<sup>+</sup>" },
            { name: "Sodium", formula: "Na<sup>+</sup>" },
            { name: "Silver", formula: "Ag<sup>+</sup>" },
            { name: "Potassium", formula: "K<sup>+</sup>" },
            { name: "Magnesium", formula: "Mg<sup>2+</sup>" },
            { name: "Zinc", formula: "Zn<sup>2+</sup>" },
            { name: "Copper(II)", formula: "Cu<sup>2+</sup>" },
            { name: "Iron(II)", formula: "Fe<sup>2+</sup>" },
            { name: "Aluminium", formula: "Al<sup>3+</sup>" },
            { name: "Chloride", formula: "Cl<sup>-</sup>" },
            { name: "Bromide", formula: "Br<sup>-</sup>" },
            { name: "Iodide", formula: "I<sup>-</sup>" },
            { name: "Fluoride", formula: "F<sup>-</sup>" },
            { name: "Nitrate", formula: "NO<sub>3</sub><sup>-</sup>" },
            { name: "Sulfate", formula: "SO<sub>4</sub><sup>2-</sup>" }
        ];

        const ionicSteps = [
            {
                title: "Zinc & Copper Sulfate",
                full: "Zn<sub>(s)</sub> + CuSO<sub>4(aq)</sub> &rarr; ZnSO<sub>4(aq)</sub> + Cu<sub>(s)</sub>",
                dissociated: "Zn<sub>(s)</sub> + Cu<sup>2+</sup><sub>(aq)</sub> + SO<sub>4</sub><sup>2-</sup><sub>(aq)</sub> &rarr; Zn<sup>2+</sup><sub>(aq)</sub> + SO<sub>4</sub><sup>2-</sup><sub>(aq)</sub> + Cu<sub>(s)</sub>",
                removed: "Zn<sub>(s)</sub> + Cu<sup>2+</sup><sub>(aq)</sub> + <span class='text-red-400 strike'>SO<sub>4</sub><sup>2-</sup><sub>(aq)</sub></span> &rarr; Zn<sup>2+</sup><sub>(aq)</sub> + <span class='text-red-400 strike'>SO<sub>4</sub><sup>2-</sup><sub>(aq)</sub></span> + Cu<sub>(s)</sub>",
                net: "Zn<sub>(s)</sub> + Cu<sup>2+</sup><sub>(aq)</sub> &rarr; Zn<sup>2+</sup><sub>(aq)</sub> + Cu<sub>(s)</sub>",
                explanation: "Identify the ions that are (aq) on both sides. In this case, SO<sub>4</sub><sup>2-</sup> is the spectator ion."
            },
            {
                title: "Magnesium & Hydrochloric Acid",
                full: "Mg<sub>(s)</sub> + 2HCl<sub>(aq)</sub> &rarr; MgCl<sub>2(aq)</sub> + H<sub>2(g)</sub>",
                dissociated: "Mg<sub>(s)</sub> + 2H<sup>+</sup><sub>(aq)</sub> + 2Cl<sup>-</sup><sub>(aq)</sub> &rarr; Mg<sup>2+</sup><sub>(aq)</sub> + 2Cl<sup>-</sup><sub>(aq)</sub> + H<sub>2(g)</sub>",
                removed: "Mg<sub>(s)</sub> + 2H<sup>+</sup><sub>(aq)</sub> + <span class='text-red-400 strike'>2Cl<sup>-</sup><sub>(aq)</sub></span> &rarr; Mg<sup>2+</sup><sub>(aq)</sub> + <span class='text-red-400 strike'>2Cl<sup>-</sup><sub>(aq)</sub></span> + H<sub>2(g)</sub>",
                net: "Mg<sub>(s)</sub> + 2H<sup>+</sup><sub>(aq)</sub> &rarr; Mg<sup>2+</sup><sub>(aq)</sub> + H<sub>2(g)</sub>",
                explanation: "Cl<sup>-</sup> ions remain dissolved and unchanged throughout. They are removed to show the net reaction."
            },
            {
                title: "Iron & Silver Nitrate",
                full: "Fe<sub>(s)</sub> + 2AgNO<sub>3(aq)</sub> &rarr; Fe(NO<sub>3</sub>)<sub>2(aq)</sub> + 2Ag<sub>(s)</sub>",
                dissociated: "Fe<sub>(s)</sub> + 2Ag<sup>+</sup><sub>(aq)</sub> + 2NO<sub>3</sub><sup>-</sup><sub>(aq)</sub> &rarr; Fe<sup>2+</sup><sub>(aq)</sub> + 2NO<sub>3</sub><sup>-</sup><sub>(aq)</sub> + 2Ag<sub>(s)</sub>",
                removed: "Fe<sub>(s)</sub> + 2Ag<sup>+</sup><sub>(aq)</sub> + <span class='text-red-400 strike'>2NO<sub>3</sub><sup>-</sup><sub>(aq)</sub></span> &rarr; Fe<sup>2+</sup><sub>(aq)</sub> + <span class='text-red-400 strike'>2NO<sub>3</sub><sup>-</sup><sub>(aq)</sub></span> + 2Ag<sub>(s)</sub>",
                net: "Fe<sub>(s)</sub> + 2Ag<sup>+</sup><sub>(aq)</sub> &rarr; Fe<sup>2+</sup><sub>(aq)</sub> + 2Ag<sub>(s)</sub>",
                explanation: "Notice the nitrate ion (NO<sub>3</sub><sup>-</sup>) stays as (aq) before and after the reaction."
            },
            {
                title: "Chlorine & Sodium Bromide",
                full: "Cl<sub>2(g)</sub> + 2NaBr<sub>(aq)</sub> &rarr; 2NaCl<sub>(aq)</sub> + Br<sub>2(l)</sub>",
                dissociated: "Cl<sub>2(g)</sub> + 2Na<sup>+</sup><sub>(aq)</sub> + 2Br<sup>-</sup><sub>(aq)</sub> &rarr; 2Na<sup>+</sup><sub>(aq)</sub> + 2Cl<sup>-</sup><sub>(aq)</sub> + Br<sub>2(l)</sub>",
                removed: "Cl<sub>2(g)</sub> + <span class='text-red-400 strike'>2Na<sup>+</sup><sub>(aq)</sub></span> + 2Br<sup>-</sup><sub>(aq)</sub> &rarr; <span class='text-red-400 strike'>2Na<sup>+</sup><sub>(aq)</sub></span> + 2Cl<sup>-</sup><sub>(aq)</sub> + Br<sub>2(l)</sub>",
                net: "Cl<sub>2(g)</sub> + 2Br<sup>-</sup><sub>(aq)</sub> &rarr; 2Cl<sup>-</sup><sub>(aq)</sub> + Br<sub>2(l)</sub>",
                explanation: "In this halogen displacement, the sodium ions (Na<sup>+</sup>) are the spectators."
            },
            {
                title: "Aluminium & Copper Chloride",
                full: "2Al<sub>(s)</sub> + 3CuCl<sub>2(aq)</sub> &rarr; 2AlCl<sub>3(aq)</sub> + 3Cu<sub>(s)</sub>",
                dissociated: "2Al + 3Cu<sup>2+</sup> + 6Cl<sup>-</sup> &rarr; 2Al<sup>3+</sup> + 6Cl<sup>-</sup> + 3Cu",
                removed: "2Al + 3Cu<sup>2+</sup> + <span class='text-red-400 strike'>6Cl<sup>-</sup></span> &rarr; 2Al<sup>3+</sup> + <span class='text-red-400 strike'>6Cl<sup>-</sup></span> + 3Cu",
                net: "2Al<sub>(s)</sub> + 3Cu<sup>2+</sup><sub>(aq)</sub> &rarr; 2Al<sup>3+</sup><sub>(aq)</sub> + 3Cu<sub>(s)</sub>",
                explanation: "Balancing coefficients multiply through: 3 units of CuCl<sub>2</sub> provide 6Cl<sup>-</sup> ions."
            }
        ];

        const halfEqExamples = [
            { type: "Oxidation", eq: "Zn &rarr; Zn<sup>2+</sup> + 2e<sup>-</sup>", desc: "Zinc atom loses 2 electrons." },
            { type: "Oxidation", eq: "2Br<sup>-</sup> &rarr; Br<sub>2</sub> + 2e<sup>-</sup>", desc: "Two bromide ions lose 1 electron each." },
            { type: "Oxidation", eq: "Fe &rarr; Fe<sup>2+</sup> + 2e<sup>-</sup>", desc: "Iron atom loses 2 electrons." },
            { type: "Oxidation", eq: "Al &rarr; Al<sup>3+</sup> + 3e<sup>-</sup>", desc: "Aluminium atom loses 3 electrons." },
            { type: "Oxidation", eq: "Cu &rarr; Cu<sup>2+</sup> + 2e<sup>-</sup>", desc: "Copper atom loses 2 electrons." },
            { type: "Reduction", eq: "Cu<sup>2+</sup> + 2e<sup>-</sup> &rarr; Cu", desc: "Copper ion gains 2 electrons." },
            { type: "Reduction", eq: "2H<sup>+</sup> + 2e<sup>-</sup> &rarr; H<sub>2</sub>", desc: "Two hydrogen ions gain 1 electron each." },
            { type: "Reduction", eq: "Ag<sup>+</sup> + e<sup>-</sup> &rarr; Ag", desc: "Silver ion gains 1 electron." },
            { type: "Reduction", eq: "Cl<sub>2</sub> + 2e<sup>-</sup> &rarr; 2Cl<sup>-</sup>", desc: "Chlorine molecule gains 2 electrons." },
            { type: "Reduction", eq: "Fe<sup>3+</sup> + 3e<sup>-</sup> &rarr; Fe", desc: "Iron(III) ion gains 3 electrons." }
        ];

        const practiceIonic = [
            {
                full: "Ca<sub>(s)</sub> + 2AgNO<sub>3(aq)</sub> &rarr; Ca(NO<sub>3</sub>)<sub>2(aq)</sub> + 2Ag<sub>(s)</sub>",
                options: [
                    "Ca + 2Ag<sup>+</sup> &rarr; Ca<sup>2+</sup> + 2Ag",
                    "Ca + Ag<sup>+</sup> &rarr; Ca<sup>2+</sup> + Ag",
                    "Ca + 2NO<sub>3</sub><sup>-</sup> &rarr; Ca(NO<sub>3</sub>)<sub>2</sub>"
                ],
                correct: 0,
                explanation: "Nitrate (NO<sub>3</sub><sup>-</sup>) is the spectator. Atoms and charges (2+) must balance."
            },
            {
                full: "Zn<sub>(s)</sub> + H<sub>2</sub>SO<sub>4(aq)</sub> &rarr; ZnSO<sub>4(aq)</sub> + H<sub>2(g)</sub>",
                options: [
                    "Zn + SO<sub>4</sub><sup>2-</sup> &rarr; ZnSO<sub>4</sub>",
                    "Zn + 2H<sup>+</sup> &rarr; Zn<sup>2+</sup> + H<sub>2</sub>",
                    "Zn + H<sup>+</sup> &rarr; Zn<sup>+</sup> + H"
                ],
                correct: 1,
                explanation: "Sulfate (SO<sub>4</sub><sup>2-</sup>) is the spectator. Zn is oxidized by H<sup>+</sup> ions."
            },
            {
                full: "F<sub>2(g)</sub> + 2KI<sub>(aq)</sub> &rarr; 2KF<sub>(aq)</sub> + I<sub>2(s)</sub>",
                options: [
                    "F<sub>2</sub> + 2I<sup>-</sup> &rarr; 2F<sup>-</sup> + I<sub>2</sub>",
                    "F<sub>2</sub> + 2K<sup>+</sup> &rarr; 2K<sup>+</sup> + 2F<sup>-</sup>",
                    "F + I<sup>-</sup> &rarr; F<sup>-</sup> + I"
                ],
                correct: 0,
                explanation: "Potassium (K<sup>+</sup>) is the spectator. F<sub>2</sub> gains electrons from I<sup>-</sup>."
            }
        ];

        const quizQuestions = [
            { q: "Define Oxidation in terms of electrons.", options: ["Gain of electrons", "Loss of electrons", "Sharing of electrons"], a: 1 },
            { q: "Define Reduction in terms of electrons.", options: ["Gain of electrons", "Loss of electrons", "Loss of protons"], a: 0 },
            { q: "Identify the oxidation half-equation: Mg + Cu<sup>2+</sup> &rarr; Mg<sup>2+</sup> + Cu", options: ["Cu<sup>2+</sup> + 2e<sup>-</sup> &rarr; Cu", "Mg &rarr; Mg<sup>2+</sup> + 2e<sup>-</sup>", "Mg + 2e<sup>-</sup> &rarr; Mg<sup>2+</sup>"], a: 1 },
            { q: "Which species is reduced in: 2Fe + 3Cl<sub>2</sub> &rarr; 2FeCl<sub>3</sub>", options: ["Fe", "Cl<sub>2</sub>", "Fe<sup>3+</sup>"], a: 1 },
            { q: "In the equation Al &rarr; Al<sup>3+</sup> + 3e<sup>-</sup>, what has happened to Al?", options: ["It was oxidized", "It was reduced", "It gained 3 protons"], a: 0 },
            { q: "What is the charge of a 'spectator ion' after the reaction?", options: ["It becomes more positive", "It stays the same", "It becomes neutral"], a: 1 },
            { q: "Identify the reduction half-equation: 2H<sup>+</sup> + Zn &rarr; H<sub>2</sub> + Zn<sup>2+</sup>", options: ["Zn &rarr; Zn<sup>2+</sup> + 2e<sup>-</sup>", "2H<sup>+</sup> + 2e<sup>-</sup> &rarr; H<sub>2</sub>", "H<sub>2</sub> &rarr; 2H<sup>+</sup> + 2e<sup>-</sup>"], a: 1 },
            { q: "In a displacement reaction, which metal is always oxidized?", options: ["The more reactive metal", "The less reactive metal", "The metal already in the compound"], a: 0 },
            { q: "Complete the half-equation: Br<sub>2</sub> + 2e<sup>-</sup> &rarr; ...", options: ["Br<sup>-</sup>", "2Br<sup>-</sup>", "Br<sup>2-</sup>"], a: 1 },
            { q: "If an ion goes from a 2+ charge to a 0 charge, it has...", options: ["Lost 2 electrons", "Gained 2 electrons", "Gained 2 protons"], a: 1 }
        ];

        const practiceScenarios = [
            {
                reaction: "Mg + Pb<sup>2+</sup> &rarr; Mg<sup>2+</sup> + Pb",
                oxidized: "Mg",
                options: ["Mg", "Pb<sup>2+</sup>"],
                oxExplanation: "Mg loses 2 electrons to become Mg<sup>2+</sup>. Oxidation is loss."
            },
            {
                reaction: "2Ag<sup>+</sup> + Fe &rarr; 2Ag + Fe<sup>2+</sup>",
                oxidized: "Fe",
                options: ["Ag<sup>+</sup>", "Fe"],
                oxExplanation: "Iron (Fe) loses 2 electrons to become Fe<sup>2+</sup>. Oxidation is loss."
            },
            {
                reaction: "Cl<sub>2</sub> + 2I<sup>-</sup> &rarr; 2Cl<sup>-</sup> + I<sub>2</sub>",
                oxidized: "I<sup>-</sup>",
                options: ["Cl<sub>2</sub>", "I<sup>-</sup>"],
                oxExplanation: "The iodide ions (I<sup>-</sup>) lose electrons to become neutral Iodine atoms."
            }
        ];

        // --- COMPONENTS ---

        const RawHTML = ({ html, className = "" }) => (
            <span className={className} dangerouslySetInnerHTML={{ __html: html }} />
        );

        function IonReferenceModal({ isOpen, onClose }) {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col max-h-[80vh]">
                        <div className="bg-indigo-600 p-4 text-white flex justify-between items-center">
                            <h3 className="font-bold text-lg"><i className="fas fa-list-ul mr-2"></i>Ion Reference Table</h3>
                            <button onClick={onClose} className="hover:bg-indigo-500 rounded-full w-8 h-8 transition-colors"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="overflow-y-auto p-4">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="border-b-2 border-slate-100">
                                        <th className="py-2 text-slate-400 text-xs uppercase tracking-wider">Ion Name</th>
                                        <th className="py-2 text-slate-400 text-xs uppercase tracking-wider">Formula / Charge</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {commonIons.map((ion, idx) => (
                                        <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                            <td className="py-2 font-medium text-slate-700">{ion.name}</td>
                                            <td className="py-2 font-mono text-indigo-600 font-bold"><RawHTML html={ion.formula} /></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        <div className="bg-slate-50 p-3 text-center text-xs text-slate-500 italic">
                            Keep these charges in mind when balancing net ionic equations!
                        </div>
                    </div>
                </div>
            );
        }

        function LearnTab() {
            const [subTab, setSubTab] = useState('ionic');
            const [idx, setIdx] = useState(0);

            const data = subTab === 'ionic' ? ionicSteps : halfEqExamples;
            const item = data[idx];

            return (
                <div className="animate-fade-in">
                    <div className="flex space-x-4 mb-6">
                        <button onClick={() => {setSubTab('ionic'); setIdx(0);}} className={`px-4 py-2 rounded-full font-bold transition-colors ${subTab === 'ionic' ? 'bg-indigo-600 text-white' : 'bg-slate-200 hover:bg-slate-300'}`}>1. Ionic Equations</button>
                        <button onClick={() => {setSubTab('half'); setIdx(0);}} className={`px-4 py-2 rounded-full font-bold transition-colors ${subTab === 'half' ? 'bg-indigo-600 text-white' : 'bg-slate-200 hover:bg-slate-300'}`}>2. Half Equations</button>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 min-h-[400px]">
                        {subTab === 'ionic' ? (
                            <div key={idx} className="animate-fade-in">
                                <h3 className="text-xl font-bold text-indigo-600 mb-2">{item.title}</h3>
                                <div className="space-y-4 mt-6">
                                    <div className="group">
                                        <p className="text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">Full Symbol Equation</p>
                                        <div className="text-lg font-mono p-3 bg-slate-50 rounded-lg border border-slate-100 group-hover:border-indigo-100 transition-colors"><RawHTML html={item.full} /></div>
                                    </div>
                                    <div className="group">
                                        <p className="text-xs uppercase tracking-widest text-slate-400 font-bold mb-1">Separate the Aqueous (aq) Ions</p>
                                        <div className="text-lg font-mono p-3 bg-slate-50 rounded-lg border border-slate-100 group-hover:border-indigo-100 transition-colors"><RawHTML html={item.dissociated} /></div>
                                    </div>
                                    <div className="group">
                                        <p className="text-xs uppercase tracking-widest text-red-400 font-bold mb-1">Strike through the Spectators</p>
                                        <div className="text-lg font-mono p-3 bg-red-50/30 rounded-lg border border-red-100 group-hover:border-red-200 transition-colors"><RawHTML html={item.removed} /></div>
                                    </div>
                                    <div>
                                        <p className="text-xs uppercase tracking-widest text-green-600 font-bold mb-1">Net Ionic Equation</p>
                                        <div className="text-xl font-mono p-4 bg-green-50 rounded-lg border border-green-200 shadow-sm"><RawHTML html={item.net} /></div>
                                    </div>
                                    <div className="mt-4 p-3 bg-white border-l-4 border-indigo-400 text-sm italic text-slate-600 shadow-sm">
                                        <RawHTML html={item.explanation} />
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div key={idx} className="animate-fade-in flex flex-col items-center justify-center py-10">
                                <span className={`px-3 py-1 rounded-full text-sm font-bold mb-4 ${item.type === 'Oxidation' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}`}>
                                    {item.type}
                                </span>
                                <div className="text-4xl font-mono mb-6"><RawHTML html={item.eq} /></div>
                                <p className="text-xl text-slate-600">{item.desc}</p>
                                <div className="mt-8 p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300">
                                    <p className="font-bold text-center">{item.type === 'Oxidation' ? 'OIL: Oxidation Is Loss' : 'RIG: Reduction Is Gain'}</p>
                                    <p className="text-sm text-slate-500 mt-1">{item.type === 'Oxidation' ? 'Electrons are on the RIGHT (lost)' : 'Electrons are on the LEFT (gained)'}</p>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="flex justify-between items-center mt-6">
                        <button onClick={() => setIdx(Math.max(0, idx - 1))} className="px-4 py-2 bg-slate-200 rounded-lg font-bold hover:bg-slate-300 disabled:opacity-50 transition-all" disabled={idx === 0}>
                            <i className="fas fa-chevron-left mr-2"></i> Previous
                        </button>
                        <span className="font-bold text-slate-400">{idx + 1} / {data.length}</span>
                        <button onClick={() => setIdx(Math.min(data.length - 1, idx + 1))} className="px-4 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 disabled:opacity-50 transition-all shadow-md" disabled={idx === data.length - 1}>
                            Next <i className="fas fa-chevron-right ml-2"></i>
                        </button>
                    </div>
                </div>
            );
        }

        function PracticeTab() {
            const [mode, setMode] = useState('ionic');
            const [qIdx, setQIdx] = useState(0);
            const [feedback, setFeedback] = useState(null);

            const handleAnswer = (isCorrect, explanation) => {
                setFeedback({ isCorrect, explanation });
            };

            const reset = () => {
                setFeedback(null);
                setQIdx(prev => prev + 1);
            };

            const currentItem = practiceIonic[qIdx % practiceIonic.length];

            return (
                <div className="animate-fade-in">
                    <div className="flex flex-wrap gap-2 mb-6">
                        <button onClick={() => {setMode('ionic'); setQIdx(0); setFeedback(null);}} className={`px-4 py-2 rounded-full font-bold ${mode === 'ionic' ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-200 hover:bg-slate-300'}`}>Ionic Equations</button>
                        <button onClick={() => {setMode('identify'); setQIdx(0); setFeedback(null);}} className={`px-4 py-2 rounded-full font-bold ${mode === 'identify' ? 'bg-indigo-600 text-white shadow-sm' : 'bg-slate-200 hover:bg-slate-300'}`}>Identify Red/Ox</button>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 min-h-[300px]">
                        {mode === 'ionic' ? (
                            <div>
                                <h3 className="text-lg font-bold mb-4">Select the correct Net Ionic Equation for:</h3>
                                <div className="text-2xl font-mono text-center mb-8 p-4 bg-slate-50 rounded-lg border border-slate-100 shadow-inner"><RawHTML html={currentItem.full} /></div>
                                <div className="grid gap-3">
                                    {currentItem.options.map((opt, i) => (
                                        <button 
                                            key={i} 
                                            disabled={feedback?.isCorrect}
                                            onClick={() => handleAnswer(i === currentItem.correct, currentItem.explanation)}
                                            className={`p-4 text-left border-2 rounded-xl font-mono transition-all ${feedback && i === currentItem.correct ? 'border-green-500 bg-green-50 text-green-800' : 'border-slate-100 hover:border-indigo-200 hover:bg-indigo-50/30'}`}
                                        >
                                            <RawHTML html={opt} />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div>
                                <h3 className="text-lg font-bold mb-4">Which species is being <strong>oxidized</strong> in this reaction?</h3>
                                <div className="text-2xl font-mono text-center mb-8 p-4 bg-slate-50 rounded-lg border border-slate-100 shadow-inner">
                                    <RawHTML html={practiceScenarios[qIdx % practiceScenarios.length].reaction} />
                                </div>
                                <div className="flex flex-wrap justify-center gap-4">
                                    {practiceScenarios[qIdx % practiceScenarios.length].options.map((opt, i) => (
                                        <button 
                                            key={i}
                                            disabled={feedback?.isCorrect}
                                            onClick={() => handleAnswer(opt === practiceScenarios[qIdx % practiceScenarios.length].oxidized, practiceScenarios[qIdx % practiceScenarios.length].oxExplanation)}
                                            className="px-8 py-4 bg-white border-2 border-slate-200 rounded-xl font-bold text-xl hover:border-orange-400 hover:bg-orange-50/30 transition-all shadow-sm"
                                        >
                                            <RawHTML html={opt} />
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {feedback && (
                            <div className={`mt-6 p-4 rounded-lg animate-fade-in ${feedback.isCorrect ? 'bg-green-100 text-green-800 border-l-4 border-green-500' : 'bg-red-100 text-red-800 border-l-4 border-red-500'}`}>
                                <p className="font-bold mb-1">{feedback.isCorrect ? 'Correct!' : 'Try again!'}</p>
                                <p><RawHTML html={feedback.explanation} /></p>
                                {feedback.isCorrect && (
                                    <button onClick={reset} className="mt-4 px-6 py-2 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 transition-all shadow-md">Next Question</button>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function QuizTab() {
            const [currentQ, setCurrentQ] = useState(0);
            const [score, setScore] = useState(0);
            const [showResults, setShowResults] = useState(false);
            const [selected, setSelected] = useState(null);

            const question = quizQuestions[currentQ];

            const handleAnswer = (idx) => {
                if (selected !== null) return;
                setSelected(idx);
                if (idx === question.a) setScore(s => s + 1);
            };

            const next = () => {
                if (currentQ < quizQuestions.length - 1) {
                    setCurrentQ(c => c + 1);
                    setSelected(null);
                } else {
                    setShowResults(true);
                }
            };

            if (showResults) {
                return (
                    <div className="text-center py-10 animate-fade-in">
                        <div className="text-6xl mb-4">🎯</div>
                        <h2 className="text-3xl font-bold mb-2">Quiz Finished!</h2>
                        <p className="text-xl text-slate-600 mb-6">You scored {score} out of {quizQuestions.length}</p>
                        <div className="w-full bg-slate-200 rounded-full h-4 mb-8">
                            <div className="bg-indigo-600 h-4 rounded-full transition-all duration-1000" style={{width: `${(score/quizQuestions.length)*100}%`}}></div>
                        </div>
                        <button onClick={() => window.location.reload()} className="px-8 py-3 bg-indigo-600 text-white rounded-lg font-bold hover:bg-indigo-700 shadow-lg">Restart Entire Lesson</button>
                    </div>
                );
            }

            return (
                <div className="animate-fade-in">
                    <div className="flex justify-between items-center mb-4">
                        <span className="text-slate-400 font-bold uppercase text-xs tracking-widest">Question {currentQ + 1} of {quizQuestions.length}</span>
                        <span className="text-indigo-600 font-bold">Score: {score}</span>
                    </div>
                    <div className="bg-white rounded-2xl p-8 shadow-sm border border-slate-200">
                        <h3 className="text-xl font-bold mb-8 text-center leading-relaxed"><RawHTML html={question.q} /></h3>
                        <div className="grid gap-4">
                            {question.options.map((opt, i) => {
                                let style = "border-slate-200 hover:border-indigo-300 hover:bg-indigo-50/20";
                                if (selected !== null) {
                                    if (i === question.a) style = "border-green-500 bg-green-50 text-green-700 shadow-inner";
                                    else if (i === selected) style = "border-red-500 bg-red-50 text-red-700 shadow-inner";
                                    else style = "opacity-50 border-slate-100 bg-slate-50";
                                }
                                return (
                                    <button 
                                        key={i} 
                                        onClick={() => handleAnswer(i)}
                                        className={`p-4 text-left border-2 rounded-xl font-bold transition-all ${style}`}
                                    >
                                        <RawHTML html={opt} />
                                    </button>
                                );
                            })}
                        </div>
                        {selected !== null && (
                            <button onClick={next} className="w-full mt-8 py-4 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition-all">
                                {currentQ === quizQuestions.length - 1 ? 'See Results' : 'Next Question'}
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function App() {
            const [activeTab, setActiveTab] = useState('learn');
            const [isRefOpen, setIsRefOpen] = useState(false);

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-8 relative">
                    <header className="text-center mb-8">
                        <div className="inline-block bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold mb-2 uppercase tracking-widest">HT Only Content</div>
                        <h1 className="text-4xl font-extrabold text-slate-800 mb-2">Redox & Electrons</h1>
                        <p className="text-slate-500 text-lg">AQA Chemistry 4.4.1.4 — Master Ionic and Half-Equations</p>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        <div className="bg-orange-50 border border-orange-200 p-4 rounded-xl flex items-center shadow-sm">
                            <div className="text-3xl mr-4">🔥</div>
                            <div>
                                <h4 className="font-bold text-orange-800">Oxidation Is Loss</h4>
                                <p className="text-sm text-orange-700">Electrons are lost (OIL). Species becomes more positive.</p>
                            </div>
                        </div>
                        <div className="bg-blue-50 border border-blue-200 p-4 rounded-xl flex items-center shadow-sm">
                            <div className="text-3xl mr-4">💧</div>
                            <div>
                                <h4 className="font-bold text-blue-800">Reduction Is Gain</h4>
                                <p className="text-sm text-blue-700">Electrons are gained (RIG). Species becomes more negative.</p>
                            </div>
                        </div>
                    </div>

                    <nav className="flex bg-slate-200 p-1 rounded-xl mb-8 shadow-inner">
                        {['learn', 'practice', 'quiz'].map(tab => (
                            <button 
                                key={tab}
                                onClick={() => setActiveTab(tab)}
                                className={`flex-1 py-3 px-4 rounded-lg font-bold capitalize transition-all ${activeTab === tab ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-500 hover:text-slate-700 hover:bg-slate-300/40'}`}
                            >
                                {tab === 'learn' && <i className="fas fa-graduation-cap mr-2 text-indigo-400"></i>}
                                {tab === 'practice' && <i className="fas fa-vial mr-2 text-indigo-400"></i>}
                                {tab === 'quiz' && <i className="fas fa-check-double mr-2 text-indigo-400"></i>}
                                {tab}
                            </button>
                        ))}
                    </nav>

                    <main className="min-h-[500px]">
                        {activeTab === 'learn' && <LearnTab />}
                        {activeTab === 'practice' && <PracticeTab />}
                        {activeTab === 'quiz' && <QuizTab />}
                    </main>

                    <footer className="mt-12 pt-8 border-t border-slate-200 text-center text-slate-400 text-sm">
                        <p>&copy; GCSE Chemistry Interactive Resources — AQA Spec 4.4.1.4 (HT)</p>
                    </footer>

                    {/* Floating Toggle Button for Ion Reference */}
                    <button 
                        onClick={() => setIsRefOpen(true)}
                        className="fixed bottom-6 right-6 bg-slate-800 text-white w-14 h-14 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all flex items-center justify-center group z-40"
                        title="Open Ion Reference Table"
                    >
                        <i className="fas fa-book-open text-xl"></i>
                        <span className="absolute right-16 bg-slate-800 text-white px-3 py-1 rounded text-xs whitespace-nowrap opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">Ion Reference</span>
                    </button>

                    <IonReferenceModal isOpen={isRefOpen} onClose={() => setIsRefOpen(false)} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        .strike {
            text-decoration: line-through;
            opacity: 0.6;
            color: #f87171;
        }
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom scrollbar for reference modal */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</body>
</html>
