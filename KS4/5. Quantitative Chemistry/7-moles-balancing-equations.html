<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balancing Equations Using Moles - GCSE Chemistry Lesson</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media print {
      body * { visibility: hidden; }
      .printable, .printable * { visibility: visible; }
      .printable { position: absolute; inset: 0; background: white !important; padding: 0 !important; }
      .no-print { display: none !important; }
      table { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState } = React;

    function Card({ children, className = "" }) {
      return <div className={`rounded-2xl border border-slate-200 bg-white shadow-sm ${className}`}>{children}</div>;
    }

    function Tag({ children }) {
      return <span className="inline-flex items-center rounded-full bg-cyan-100 px-3 py-1 text-sm font-semibold text-cyan-700">{children}</span>;
    }

    function RevealBox({ title, children }) {
      const [open, setOpen] = useState(false);
      return (
        <div className="rounded-2xl border border-slate-200 bg-slate-50 p-4">
          <button onClick={() => setOpen(!open)} className="flex w-full items-center justify-between text-left font-semibold text-slate-800">
            <span>{title}</span>
            <span className="rounded-full bg-white px-3 py-1 text-sm text-cyan-700 shadow-sm">{open ? "Hide" : "Reveal"}</span>
          </button>
          {open && <div className="mt-4 text-slate-700 leading-relaxed">{children}</div>}
        </div>
      );
    }

    function Equation({ children }) {
      return <div className="rounded-2xl bg-slate-900 px-6 py-4 text-center text-2xl font-bold tracking-wide text-white shadow-inner">{children}</div>;
    }

    function RatioStrip({ values, labels }) {
      return (
        <div className="grid gap-3 md:grid-cols-3">
          {values.map((value, index) => (
            <div key={index} className="rounded-2xl bg-white p-5 text-center shadow-sm border border-slate-200">
              <div className="text-sm font-semibold uppercase tracking-wide text-slate-500">{labels[index]}</div>
              <div className="mt-2 text-4xl font-black text-cyan-700">{value}</div>
            </div>
          ))}
        </div>
      );
    }

    function RatioTable({ rows }) {
      return (
        <div className="overflow-x-auto rounded-2xl border border-slate-200 bg-white shadow-sm">
          <table className="w-full min-w-[760px] text-left text-lg">
            <thead className="bg-slate-900 text-white">
              <tr>
                <th className="p-4">Substance</th>
                <th className="p-4">Moles</th>
                <th className="p-4">÷ smallest</th>
                <th className="p-4">Divided ratio</th>
                <th className="p-4">Final whole-number ratio</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((row, index) => (
                <tr key={index} className="border-t">
                  <td className="p-4 font-bold">{row.substance}</td>
                  <td className="p-4">{row.moles}</td>
                  <td className="p-4 font-bold text-cyan-700">{row.divide}</td>
                  <td className="p-4 font-black text-cyan-800">{row.ratio}</td>
                  <td className="p-4 font-black text-emerald-700">{row.finalRatio ?? row.ratio}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function MoleParticles() {
      return (
        <div className="relative h-56 overflow-hidden rounded-3xl bg-gradient-to-br from-slate-900 via-slate-800 to-cyan-900 p-6 text-white">
          <div className="absolute inset-0 opacity-20" style={{ backgroundImage: "radial-gradient(circle at 20px 20px, white 2px, transparent 0)", backgroundSize: "38px 38px" }} />
          <div className="relative grid h-full grid-cols-3 items-center gap-4">
            <div className="text-center"><div className="mb-3 flex justify-center gap-2"><div className="h-12 w-12 rounded-full bg-cyan-300 shadow-lg" /><div className="h-12 w-12 rounded-full bg-cyan-300 shadow-lg" /></div><div className="text-3xl font-black">2H₂</div><div className="text-sm text-cyan-100">2 moles of hydrogen</div></div>
            <div className="text-center"><div className="mx-auto mb-3 flex h-12 w-24 items-center justify-center gap-1 rounded-full bg-orange-300 shadow-lg"><div className="h-9 w-9 rounded-full bg-orange-500" /><div className="h-9 w-9 rounded-full bg-orange-500" /></div><div className="text-3xl font-black">O₂</div><div className="text-sm text-cyan-100">1 mole of oxygen</div></div>
            <div className="text-center"><div className="mb-3 flex justify-center gap-2"><div className="relative h-14 w-14 rounded-full bg-blue-400 shadow-lg"><div className="absolute -left-2 top-5 h-5 w-5 rounded-full bg-cyan-200" /><div className="absolute -right-2 top-5 h-5 w-5 rounded-full bg-cyan-200" /></div><div className="relative h-14 w-14 rounded-full bg-blue-400 shadow-lg"><div className="absolute -left-2 top-5 h-5 w-5 rounded-full bg-cyan-200" /><div className="absolute -right-2 top-5 h-5 w-5 rounded-full bg-cyan-200" /></div></div><div className="text-3xl font-black">2H₂O</div><div className="text-sm text-cyan-100">2 moles of water</div></div>
          </div>
        </div>
      );
    }

    function MCQOption({ letter, text, correct = false }) {
      const [selected, setSelected] = useState(false);
      return (
        <button onClick={() => setSelected(!selected)} className={`w-full rounded-2xl border-2 p-5 text-left transition-all duration-200 hover:scale-[1.01] ${selected && correct ? "border-emerald-500 bg-emerald-50 shadow-lg" : selected && !correct ? "border-rose-500 bg-rose-50 shadow-lg" : "border-slate-200 bg-white hover:border-cyan-300"}`}>
          <div className="flex items-start gap-4">
            <div className={`flex h-10 w-10 items-center justify-center rounded-full font-black transition ${selected && correct ? "bg-emerald-600 text-white" : selected && !correct ? "bg-rose-600 text-white" : "bg-slate-200 text-slate-700"}`}>{letter}</div>
            <div className="flex-1 text-xl font-semibold tracking-wide text-slate-800">{text}</div>
            {selected && <div className={`rounded-full px-3 py-1 text-sm font-bold text-white ${correct ? "bg-emerald-600" : "bg-rose-600"}`}>{correct ? "Correct" : "Try again"}</div>}
          </div>
          {selected && <div className={`mt-4 rounded-xl p-3 text-base font-semibold ${correct ? "bg-emerald-100 text-emerald-900" : "bg-rose-100 text-rose-900"}`}>{correct ? "Correct — this option matches the calculated coefficient ratio." : "Not quite — check the reacting mole ratio and match the coefficients again."}</div>}
        </button>
      );
    }

    function MethodStep({ number, title, text }) {
      const [open, setOpen] = useState(false);
      return (
        <button onClick={() => setOpen(!open)} className={`flex w-full gap-4 rounded-2xl border p-5 text-left shadow-sm transition-all duration-200 hover:scale-[1.01] ${open ? "border-cyan-300 bg-cyan-50" : "border-slate-200 bg-white hover:border-cyan-300"}`}>
          <div className={`flex h-12 w-12 shrink-0 items-center justify-center rounded-full text-2xl font-black text-white ${open ? "bg-cyan-600" : "bg-slate-700"}`}>{number}</div>
          <div className="flex-1">
            <div className="flex items-center justify-between gap-3"><h3 className="text-xl font-bold text-slate-900">{title}</h3><span className={`rounded-full px-3 py-1 text-sm font-bold ${open ? "bg-cyan-600 text-white" : "bg-slate-100 text-slate-600"}`}>{open ? "Shown" : "Reveal"}</span></div>
            {open ? <p className="mt-3 text-lg leading-relaxed text-slate-700">{text}</p> : <p className="mt-3 text-base text-slate-500">Click to reveal this step.</p>}
          </div>
        </button>
      );
    }

    function LessonCalculator({ open, onClose }) {
      const [expression, setExpression] = useState("");
      const [answer, setAnswer] = useState("");
      const calculate = () => {
        try {
          const cleaned = expression.replaceAll("×", "*").replaceAll("÷", "/").replaceAll("−", "-");
          const allowed = "0123456789+-*/(). ";
          const safe = cleaned.split("").filter((char) => allowed.includes(char)).join("");
          if (!safe.trim()) { setAnswer(""); return; }
          const result = Function("return (" + safe + ")")();
          setAnswer(Number.isFinite(result) ? (Number.isInteger(result) ? String(result) : String(Number(result.toFixed(6)))) : "Error");
        } catch { setAnswer("Error"); }
      };
      const press = (value) => {
        if (value === "C") { setExpression(""); setAnswer(""); return; }
        if (value === "⌫") { setExpression((prev) => prev.slice(0, -1)); return; }
        if (value === "=") { calculate(); return; }
        setExpression((prev) => prev + value);
      };
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-[80] flex items-center justify-center bg-slate-900/50 p-6 backdrop-blur-sm">
          <div className="w-full max-w-md rounded-3xl border border-slate-200 bg-white p-6 shadow-2xl">
            <div className="mb-5 flex items-center justify-between gap-4"><div><h2 className="text-2xl font-black text-slate-900">Lesson Calculator</h2><p className="text-sm text-slate-500">Use for moles, masses and ratios.</p></div><button onClick={onClose} className="rounded-xl bg-slate-100 px-4 py-2 font-bold text-slate-700 hover:bg-slate-200">Close</button></div>
            <div className="rounded-2xl bg-slate-900 p-4 text-right text-white"><input value={expression} onChange={(event) => setExpression(event.target.value)} onKeyDown={(event) => { if (event.key === "Enter") calculate(); }} placeholder="e.g. 11.2 ÷ 56" className="w-full bg-transparent text-right text-3xl font-black outline-none placeholder:text-slate-500" /><div className="mt-2 min-h-8 text-2xl font-bold text-cyan-300">{answer}</div></div>
            <div className="mt-4 grid grid-cols-4 gap-2">{["7", "8", "9", "÷", "4", "5", "6", "×", "1", "2", "3", "−", "0", ".", "=", "+"].map((key) => <button key={key} onClick={() => press(key)} className={`rounded-2xl p-4 text-xl font-black shadow-sm transition hover:scale-[1.02] ${key === "=" ? "bg-cyan-600 text-white" : "bg-slate-100 text-slate-900 hover:bg-slate-200"}`}>{key}</button>)}<button onClick={() => press("C")} className="rounded-2xl bg-rose-100 p-4 text-xl font-black text-rose-700 hover:bg-rose-200">C</button><button onClick={() => press("⌫")} className="rounded-2xl bg-amber-100 p-4 text-xl font-black text-amber-800 hover:bg-amber-200">⌫</button><button onClick={() => press("(")} className="rounded-2xl bg-slate-100 p-4 text-xl font-black text-slate-900 hover:bg-slate-200">(</button><button onClick={() => press(")")} className="rounded-2xl bg-slate-100 p-4 text-xl font-black text-slate-900 hover:bg-slate-200">)</button></div>
            <div className="mt-5 grid gap-2 md:grid-cols-3"><button onClick={() => setExpression("mass ÷ Mr")} className="rounded-2xl border border-cyan-200 bg-cyan-50 p-3 text-sm font-bold text-cyan-900 hover:bg-cyan-100">n = mass ÷ Mr</button><button onClick={() => setExpression("moles × Mr")} className="rounded-2xl border border-cyan-200 bg-cyan-50 p-3 text-sm font-bold text-cyan-900 hover:bg-cyan-100">mass = n × Mr</button><button onClick={() => setExpression("mass ÷ moles")} className="rounded-2xl border border-cyan-200 bg-cyan-50 p-3 text-sm font-bold text-cyan-900 hover:bg-cyan-100">Mr = mass ÷ n</button></div>
            <p className="mt-4 rounded-2xl bg-amber-50 p-3 text-sm text-amber-900">Replace words such as mass, Mr or moles with numbers before pressing equals.</p>
          </div>
        </div>
      );
    }

    const slides = [
      { section: "Phase Structure", title: "How this lesson is organised", subtitle: "Each GCSE question type is grouped together so students can build fluency through repetition.", content: <div className="grid gap-6 md:grid-cols-2"><Card className="p-6 border-cyan-200 bg-cyan-50"><h2 className="text-2xl font-bold text-cyan-900">Phase 1 — Selecting equations</h2><ul className="mt-4 space-y-3 text-lg text-cyan-900"><li>• direct mole ratio questions</li><li>• fractional ratio questions</li><li>• masses → moles → equations</li><li>• repeated GCSE-style multiple choice practice</li></ul></Card><Card className="p-6 border-emerald-200 bg-emerald-50"><h2 className="text-2xl font-bold text-emerald-900">Phase 2 — Advanced applications</h2><ul className="mt-4 space-y-3 text-lg text-emerald-900"><li>• identifying product formulae</li><li>• writing full balanced equations</li><li>• practical data questions</li><li>• comparing competing equations</li></ul></Card></div> },
      { section: "Starter & Retrieval", title: "Balancing Equations Using Moles", subtitle: "Using masses, moles and simplest whole number ratios to build balanced symbol equations.", content: <div className="grid gap-6 md:grid-cols-2"><Card className="p-6"><h2 className="mb-4 text-2xl font-bold">In this lesson you will:</h2><ul className="space-y-3 text-lg text-slate-700"><li>• convert masses into moles</li><li>• calculate simplest mole ratios</li><li>• use ratios to balance equations</li><li>• decide which equation matches experimental data</li><li>• rearrange the mole formula confidently</li></ul></Card><div className="rounded-3xl bg-gradient-to-br from-cyan-500 to-blue-700 p-6 text-white shadow-lg"><h2 className="mb-4 text-2xl font-bold">The key idea</h2><p className="text-xl leading-relaxed text-cyan-50">The balancing numbers in a symbol equation tell us the reacting ratio in moles.</p><div className="mt-8 rounded-2xl bg-white/20 p-5 text-center text-3xl font-black backdrop-blur-sm">mass → moles → ratio → equation</div></div></div> },
      { section: "Starter & Retrieval", title: "Starter: Can you still do these?", subtitle: "These are the skills needed before we can balance equations from masses.", content: <div className="grid gap-4 md:grid-cols-2"><RevealBox title="1. Calculate the Mr of H₂O">H₂O = 2 × 1 + 16 = <strong>18</strong></RevealBox><RevealBox title="2. Calculate moles in 9 g of water">n = m ÷ Mr = 9 ÷ 18 = <strong>0.5 mol</strong></RevealBox><RevealBox title="3. Simplify the ratio 0.20 : 0.40">Divide both values by 0.20, so the ratio becomes <strong>1 : 2</strong>.</RevealBox><RevealBox title="4. Balance: H₂ + O₂ → H₂O"><strong>2H₂ + O₂ → 2H₂O</strong></RevealBox></div> },
      { section: "Starter & Retrieval", title: "Why mole ratios matter", subtitle: "Balanced equations are not just symbols. They show reacting amounts in moles.", content: <div className="space-y-6"><Equation>2H₂ + O₂ → 2H₂O</Equation><MoleParticles/><div className="grid gap-4 md:grid-cols-3"><Card className="p-5"><Tag>Coefficient</Tag><p className="mt-3 text-lg">The big number in front tells you the number of moles.</p></Card><Card className="p-5"><Tag>Ratio</Tag><p className="mt-3 text-lg">2 : 1 : 2 is the mole ratio for this reaction.</p></Card><Card className="p-5"><Tag>Exam link</Tag><p className="mt-3 text-lg">If we calculate moles from masses, we can discover the balancing numbers.</p></Card></div></div> },
      { section: "The Core Method", title: "Step 1: Convert mass into moles", subtitle: "Exam questions usually give masses. Equations need mole ratios.", content: <div className="grid gap-6 md:grid-cols-2"><Card className="p-8"><h2 className="text-2xl font-bold">Formula</h2><div className="my-6 rounded-2xl bg-cyan-50 p-6 text-center text-5xl font-black text-cyan-700">n = m ÷ Mr</div><p className="text-lg text-slate-700">Use this whenever you are given a mass in grams and need the amount in moles.</p></Card><Card className="p-8"><h2 className="text-2xl font-bold">Worked mini-example</h2><div className="mt-4 space-y-3 text-lg"><p>Mass of magnesium = <strong>12 g</strong></p><p>Ar of magnesium = <strong>24</strong></p><p className="rounded-xl bg-slate-100 p-4 font-semibold">moles = 12 ÷ 24 = 0.5 mol</p></div></Card></div> },
      { section: "The Core Method", title: "Step 2: Organise the mole values clearly", subtitle: "For equation selection, compare the substances exactly as they appear in the balanced equation.", content: <div className="space-y-6"><Equation>2Mg + O₂ → 2MgO</Equation><div className="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"><table className="w-full text-left text-lg"><thead className="bg-slate-900 text-white"><tr><th className="p-4">Substance</th><th className="p-4">Mass</th><th className="p-4">Mr / Ar</th><th className="p-4">Moles</th></tr></thead><tbody><tr className="border-t"><td className="p-4 font-bold">Mg</td><td className="p-4">12 g</td><td className="p-4">24</td><td className="p-4 font-bold text-cyan-700">0.50</td></tr><tr className="border-t"><td className="p-4 font-bold">O₂</td><td className="p-4">16 g</td><td className="p-4">32</td><td className="p-4 font-bold text-cyan-700">0.50</td></tr></tbody></table></div><div className="rounded-2xl bg-amber-50 p-5 text-lg text-amber-900 border border-amber-200 space-y-3"><p><strong>Why use O₂ here?</strong></p><p>For selecting an equation, it is often clearest to compare the substances as they appear in the equation. Oxygen appears as O₂, so use Mr = 32 for oxygen molecules.</p><p>This gives a direct reactant ratio of Mg : O₂ = 1 : 1, which helps identify the coefficients in the equation.</p></div></div> },
      { section: "The Core Method", title: "Step 3: Divide by the smallest number of moles", subtitle: "This turns the mole amounts into a simple ratio.", content: <div className="space-y-6"><RatioStrip labels={["moles of A", "moles of B", "smallest"]} values={["0.20", "0.40", "0.20"]}/><div className="rounded-3xl bg-slate-50 p-8 text-center border border-slate-200"><div className="text-2xl font-bold text-slate-700">0.20 : 0.40</div><div className="my-4 text-xl text-slate-500">divide both by 0.20</div><div className="text-5xl font-black text-cyan-700">1 : 2</div></div><p className="text-lg text-slate-700">This is the same idea as simplifying a fraction. You are not changing the chemistry — just writing the ratio in its simplest form.</p></div> },
      { section: "The Core Method", title: "Step 4: Make the ratio whole numbers", subtitle: "Sometimes dividing by the smallest gives decimals such as 1.5 or 2.5.", content: <div className="grid gap-6 md:grid-cols-2"><Card className="p-6"><h2 className="text-2xl font-bold">Example A</h2><div className="mt-6 text-center text-4xl font-black text-slate-800">1 : 1.5</div><div className="my-4 text-center text-lg text-slate-500">multiply both by 2</div><div className="rounded-2xl bg-cyan-50 p-5 text-center text-5xl font-black text-cyan-700">2 : 3</div></Card><Card className="p-6"><h2 className="text-2xl font-bold">Example B</h2><div className="mt-6 text-center text-4xl font-black text-slate-800">1 : 2.5</div><div className="my-4 text-center text-lg text-slate-500">multiply both by 2</div><div className="rounded-2xl bg-cyan-50 p-5 text-center text-5xl font-black text-cyan-700">2 : 5</div></Card><div className="md:col-span-2 rounded-2xl bg-rose-50 p-5 border border-rose-200 text-rose-900 text-lg">Do not round 1.5 to 2. Multiply the whole ratio so every part becomes a whole number.</div></div> },
      { section: "The Core Method", title: "The complete method", subtitle: "This is the method students should repeat in every exam question.", content: <div className="grid gap-4 md:grid-cols-4">{[["1","Convert masses to moles","Use n = m ÷ Mr"],["2","Write mole values clearly","Place values under each substance"],["3","Divide by the smallest","Create the simplest ratio"],["4","Use whole numbers","These become coefficients"]].map(([num,title,text])=><Card key={num} className="p-6 text-center"><div className="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-full bg-cyan-600 text-2xl font-black text-white">{num}</div><h2 className="text-xl font-bold">{title}</h2><p className="mt-3 text-slate-600">{text}</p></Card>)}<div className="md:col-span-4 rounded-3xl bg-slate-900 p-8 text-white"><h2 className="text-2xl font-bold">Exam sentence to remember</h2><p className="mt-3 text-xl text-slate-200">The balancing numbers in a symbol equation can be found by converting masses to moles and simplifying the mole ratio.</p></div></div> },
      { section: "Phase 1 — Selecting Equations from Ratios", title: "Worked Example — Selecting the correct equation", subtitle: "The exam skill is identifying the reacting ratio from moles and matching it to the correct equation.", content: <div className="space-y-8"><Card className="p-6 bg-slate-50"><h2 className="mb-4 text-2xl font-bold">Exam Question</h2><p className="text-lg leading-relaxed text-slate-700">A transition metal reacts with chlorine gas. 0.12 mol of metal atoms reacts with 0.18 mol of chlorine molecules. Which equation matches the reacting ratio?</p></Card><div className="grid gap-4 md:grid-cols-4"><MethodStep number="1" title="Divide by the smallest number" text="The smallest value is 0.12. Divide both mole values by 0.12."/><MethodStep number="2" title="Find the divided ratio" text="0.12 ÷ 0.12 = 1 and 0.18 ÷ 0.12 = 1.5. The ratio is 1 : 1.5."/><MethodStep number="3" title="Convert to whole numbers" text="Multiply both parts of 1 : 1.5 by 2 to get 2 : 3."/><MethodStep number="4" title="Identify coefficients and select" text="Look for an equation with 2 in front of M and 3 in front of Cl₂."/></div><RevealBox title="Reveal full ratio method and conclusion"><div className="space-y-6"><RatioTable rows={[{substance:"M",moles:"0.12",divide:"0.12 ÷ 0.12 = 1",ratio:"1",finalRatio:"2"},{substance:"Cl₂",moles:"0.18",divide:"0.18 ÷ 0.12 = 1.5",ratio:"1.5",finalRatio:"3"}]}/><div className="rounded-3xl border border-cyan-200 bg-cyan-50 p-6 text-center"><div className="text-2xl font-bold text-cyan-900">1 : 1.5</div><div className="my-3 text-lg text-cyan-800">multiply both parts by 2</div><div className="text-5xl font-black text-cyan-700">2 : 3</div><p className="mt-4 text-lg text-cyan-900">The correct option must contain coefficients <strong>2M</strong> and <strong>3Cl₂</strong>.</p></div></div></RevealBox><div className="grid gap-4"><MCQOption letter="A" text="M + Cl₂ → MCl₂"/><MCQOption letter="B" text="M + 3Cl₂ → MCl₆"/><MCQOption letter="C" text="2M + Cl₂ → 2MCl"/><MCQOption letter="D" text="2M + 3Cl₂ → 2MCl₃" correct/></div></div> },
      { section: "Phase 1 — Selecting Equations from Ratios", title: "Guided Practice — Coefficient ratios", subtitle: "Students must repeatedly practise linking mole ratios to balancing coefficients.", content: <div className="space-y-8"><Card className="p-6 bg-slate-50"><h2 className="mb-4 text-2xl font-bold">Exam Question</h2><p className="text-lg leading-relaxed text-slate-700">A metal reacts with sulfur. 0.30 mol of metal atoms reacts with 0.15 mol of sulfur atoms. Which equation is correct?</p></Card><RevealBox title="Reveal ratio table and conclusion"><div className="space-y-5"><RatioTable rows={[{substance:"M",moles:"0.30",divide:"0.30 ÷ 0.15 = 2",ratio:"2",finalRatio:"2"},{substance:"S",moles:"0.15",divide:"0.15 ÷ 0.15 = 1",ratio:"1",finalRatio:"1"}]}/><div className="rounded-2xl border border-amber-200 bg-amber-50 p-5 text-lg text-amber-900">The final whole-number ratio is 2 : 1, so the correct equation needs coefficients 2M and 1S.</div></div></RevealBox><div className="grid gap-4"><MCQOption letter="A" text="M + S → MS"/><MCQOption letter="B" text="2M + S → M₂S" correct/><MCQOption letter="C" text="M + 2S → MS₂"/><MCQOption letter="D" text="4M + 2S → 2M₂S"/></div></div> },
      { section: "Phase 1 — Selecting Equations from Ratios", title: "Worked Example — Using masses to find ratios", subtitle: "Using the relative mass of O₂ makes the reacting ratio clearer and links directly to the balanced equation.", content: <div className="space-y-8"><Card className="p-6 bg-slate-50"><h2 className="mb-4 text-2xl font-bold">Exam Question</h2><p className="text-lg leading-relaxed text-slate-700">A metal reacts with oxygen. 5.6 g of metal reacts with 3.2 g of oxygen. Ar of metal = 56. Which equation is correct?</p></Card><RevealBox title="Reveal moles and ratio table"><RatioTable rows={[{substance:"M",moles:"5.6 ÷ 56 = 0.10",divide:"0.10 ÷ 0.10 = 1",ratio:"1",finalRatio:"1"},{substance:"O₂",moles:"3.2 ÷ 32 = 0.10",divide:"0.10 ÷ 0.10 = 1",ratio:"1",finalRatio:"1"}]}/></RevealBox><div className="rounded-2xl border border-cyan-200 bg-cyan-50 p-5 text-lg text-cyan-900">Using O₂ directly gives a reacting ratio of 1 : 1. This matches the coefficients in the correct balanced equation.</div><div className="grid gap-4"><MCQOption letter="A" text="M + O₂ → MO₂" correct/><MCQOption letter="B" text="2M + O₂ → 2MO"/><MCQOption letter="C" text="M + O₂ → MO"/><MCQOption letter="D" text="2M + 2O₂ → 2MO₂"/></div></div> },
      { section: "Phase 1 — Selecting Equations from Ratios", title: "Worked Example — Fractional ratios", subtitle: "Exam questions often use ratios such as 1 : 1.5 that must be converted into whole numbers.", content: <div className="space-y-8"><Card className="p-6 bg-slate-50"><h2 className="mb-4 text-2xl font-bold">Exam Question</h2><p className="text-lg leading-relaxed text-slate-700">A metal reacts with chlorine. 0.20 mol of metal reacts with 0.30 mol of chlorine molecules. Which equation is correct?</p></Card><div className="grid gap-5 md:grid-cols-4"><MethodStep number="1" title="Find the smallest value" text="The smallest value is 0.20 mol."/><MethodStep number="2" title="Divide both values" text="0.20 ÷ 0.20 = 1 and 0.30 ÷ 0.20 = 1.5."/><MethodStep number="3" title="Make whole numbers" text="Multiply both parts by 2, so 1 : 1.5 becomes 2 : 3."/><MethodStep number="4" title="Choose the matching equation" text="The correct equation must contain coefficients in the final whole-number ratio 2 : 3."/></div><RevealBox title="Reveal ratio table"><RatioTable rows={[{substance:"M",moles:"0.20",divide:"0.20 ÷ 0.20 = 1",ratio:"1",finalRatio:"2"},{substance:"Cl₂",moles:"0.30",divide:"0.30 ÷ 0.20 = 1.5",ratio:"1.5",finalRatio:"3"}]}/></RevealBox><div className="grid gap-4"><MCQOption letter="A" text="M + Cl₂ → MCl₂"/><MCQOption letter="B" text="2M + 3Cl₂ → 2MCl₃" correct/><MCQOption letter="C" text="M + 2Cl₂ → MCl₄"/><MCQOption letter="D" text="2M + Cl₂ → 2MCl"/></div></div> },
      { section: "Phase 1 — Selecting Equations from Ratios", title: "Independent Practice — Equation selection", subtitle: "Students now complete the full method independently.", content: <div className="grid gap-6 md:grid-cols-2"><Card className="p-6"><h2 className="text-2xl font-bold mb-4">Question</h2><p className="text-lg leading-relaxed text-slate-700">A metal reacts with bromine. 0.16 mol of metal reacts with 0.24 mol of bromine molecules. Which equation is correct?</p><div className="mt-6 grid gap-3"><MCQOption letter="A" text="M + Br₂ → MBr₂"/><MCQOption letter="B" text="2M + Br₂ → 2MBr"/><MCQOption letter="C" text="2M + 3Br₂ → 2MBr₃" correct/><MCQOption letter="D" text="M + 3Br₂ → MBr₆"/></div></Card><RevealBox title="Reveal worked solution"><div className="space-y-5 text-lg"><RatioTable rows={[{substance:"M",moles:"0.16",divide:"0.16 ÷ 0.16 = 1",ratio:"1",finalRatio:"2"},{substance:"Br₂",moles:"0.24",divide:"0.24 ÷ 0.16 = 1.5",ratio:"1.5",finalRatio:"3"}]}/><p>The final whole-number ratio is 2 : 3, so the correct equation must contain coefficients 2M and 3Br₂.</p><div className="rounded-xl bg-slate-900 p-4 text-center text-2xl font-black text-white">2M + 3Br₂ → 2MBr₃</div></div></RevealBox></div> },
      { section: "Phase 1 — Fluency Practice", title: "Fluency Practice — Selecting the correct equation from mole ratios", subtitle: "Students calculate the reacting ratio and identify which balanced equation matches the experimental data.", content: <FluencyDirect/> },
      { section: "Phase 1 — Fluency Practice", title: "Fluency Practice — Using masses to identify the correct equation", subtitle: "Students convert masses into moles, calculate the reacting ratio and identify the balanced equation.", content: <MassPractice/> },
      { section: "Phase 1 — Selecting Equations from Ratios", title: "Review — Common mistakes", subtitle: "Students often select the wrong option for predictable reasons.", content: <Mistakes/> },
      { section: "Phase 2 — Advanced Exam Question Types", title: "Worked Example — Identifying product formulae", subtitle: "Students should always divide by the smallest value first before deciding whether the ratio needs simplifying further.", content: <ProductFormula/> },
      { section: "Phase 2 — Advanced Exam Question Types", title: "Worked Example — From masses to product formula and full equation", subtitle: "Students should carefully follow the full sequence: masses → moles → divide by smallest → simplify → formula → equation.", content: <MassFormulaEquation/> },
      { section: "Phase 2 — Advanced Exam Question Types", title: "Guided Practice — Formula and full equation", subtitle: "Students now practise finding the formula and then building the balanced equation.", content: <GuidedFormula/> },
      { section: "Phase 2 — Advanced Exam Question Types", title: "Worked Example — Choosing between equations", subtitle: "Students must compare experimental data against proposed equations.", content: <ChoosingEquations/> },

    function FluencyDirect(){
      const items=[
        {q:"A metal reacts with oxygen. 0.24 mol of metal atoms reacts with 0.12 mol of oxygen molecules. Which balanced equation matches the reacting ratio?", options:["M + O₂ → MO₂","2M + O₂ → 2MO","M + O₂ → MO","2M + 2O₂ → 2MO₂"], correct:1, answer:"2M + O₂ → 2MO"},
        {q:"A metal reacts with chlorine. 0.10 mol of metal atoms reacts with 0.15 mol of chlorine molecules. Which balanced equation is correct?", options:["M + Cl₂ → MCl₂","2M + 3Cl₂ → 2MCl₃","2M + Cl₂ → 2MCl","M + 2Cl₂ → MCl₄"], correct:1, answer:"2M + 3Cl₂ → 2MCl₃"},
        {q:"A metal reacts with sulfur. 0.40 mol of metal atoms reacts with 0.20 mol of sulfur atoms. Which equation matches the reacting ratio?", options:["M + S → MS","2M + S → M₂S","M + 2S → MS₂","4M + 2S → 2M₂S"], correct:1, answer:"2M + S → M₂S"},
        {q:"A metal reacts with bromine. 0.18 mol of metal atoms reacts with 0.27 mol of bromine molecules. Which balanced equation is correct?", options:["M + Br₂ → MBr₂","2M + 3Br₂ → 2MBr₃","2M + Br₂ → 2MBr","M + 3Br₂ → MBr₆"], correct:1, answer:"2M + 3Br₂ → 2MBr₃"}
      ];
      return <div className="grid gap-6 md:grid-cols-2">{items.map((item,index)=><Card key={index} className="p-6"><h2 className="text-xl font-bold">Question {index+1}</h2><p className="mt-4 text-lg leading-relaxed text-slate-700">{item.q}</p><div className="mt-6 grid gap-3">{item.options.map((option,i)=><MCQOption key={i} letter={String.fromCharCode(65+i)} text={option} correct={i===item.correct}/>)}</div><RevealBox title="Reveal ratio method and answer"><div className="space-y-4"><div className="rounded-2xl bg-cyan-50 p-4 text-lg text-cyan-900">Divide both mole values by the smallest number to find the simplest whole-number ratio.</div><div className="rounded-xl bg-slate-900 p-4 text-center text-2xl font-black text-white">{item.answer}</div></div></RevealBox></Card>)}</div>
    }
    function MassPractice(){ const items=[{q:"A metal reacts with oxygen. 5.6 g of metal reacts with 4.8 g of oxygen. Relative atomic mass of the metal = 56. Which balanced equation matches the reacting ratio?",ratio:"1 : 3",eq:"2M + 3O₂ → 2MO₃"},{q:"A metal reacts with sulfur. 10.8 g of metal reacts with 9.6 g of sulfur. Relative atomic mass of the metal = 54. Which balanced equation is correct?",ratio:"2 : 3",eq:"2M + 3S → M₂S₃"},{q:"A metal reacts with chlorine. 11.2 g of metal reacts with 12.8 g of chlorine. Relative atomic mass of the metal = 56. Identify the correct balanced equation.",ratio:"1 : 4",eq:"M + 2Cl₂ → MCl₄"}]; return <div className="space-y-6">{items.map((item,index)=><Card key={index} className="p-6"><h2 className="text-xl font-bold">GCSE Practice {index+1}</h2><p className="mt-4 text-lg text-slate-700">{item.q}</p><RevealBox title="Reveal mole ratio method and equation"><div className="space-y-4"><div className="rounded-2xl bg-cyan-50 p-4 text-center text-3xl font-black text-cyan-700">Ratio = {item.ratio}</div><div className="rounded-2xl bg-slate-900 p-4 text-center text-2xl font-black text-white">{item.eq}</div></div></RevealBox></Card>)}</div> }
    function Mistakes(){ const data=[["Using the product formula","Students sometimes guess the answer from chemistry knowledge instead of calculating the reacting ratio."],["Ignoring the coefficients","The balancing numbers are the important part — not just the product formula."],["Not simplifying the ratio","0.20 : 0.30 is not the final answer. It must become 2 : 3."],["Forgetting diatomic molecules","Cl₂, Br₂, O₂ and H₂ exist as molecules in equations."]]; return <div className="grid gap-5 md:grid-cols-2">{data.map(([title,text],i)=><Card key={i} className="p-6 border-rose-200 bg-rose-50"><h2 className="text-2xl font-bold text-rose-800">{title}</h2><p className="mt-4 text-lg leading-relaxed text-rose-900">{text}</p></Card>)}</div> }
    function ProductFormula(){ return <div className="space-y-8"><Card className="p-6 bg-slate-50"><h2 className="text-2xl font-bold mb-4">Exam Question</h2><p className="text-lg leading-relaxed text-slate-700">A transition metal reacts with oxygen. 0.15 mol of metal atoms reacts with 0.20 mol of oxygen atoms. Which formula is correct for the oxide formed?</p></Card><div className="grid gap-4 md:grid-cols-5"><MethodStep number="1" title="Find the smallest value" text="The smallest number of moles is 0.15."/><MethodStep number="2" title="Divide BOTH values" text="0.15 ÷ 0.15 = 1 and 0.20 ÷ 0.15 = 1.33"/><MethodStep number="3" title="Write the ratio" text="The ratio is now 1 : 1.33"/><MethodStep number="4" title="Convert into whole numbers" text="1.33 is approximately 1⅓, so multiply BOTH parts by 3. 1 : 1.33 becomes 3 : 4."/><MethodStep number="5" title="Build the formula" text="The oxide contains 3 metal atoms for every 4 oxygen atoms, so the formula is M₃O₄."/></div><RevealBox title="Reveal full ratio method and conclusion"><div className="space-y-5"><RatioTable rows={[{substance:"M",moles:"0.15",divide:"0.15 ÷ 0.15 = 1",ratio:"1",finalRatio:"3"},{substance:"O",moles:"0.20",divide:"0.20 ÷ 0.15 = 1.33",ratio:"1.33",finalRatio:"4"}]}/><div className="rounded-3xl border border-cyan-200 bg-cyan-50 p-6 text-center"><div className="text-xl font-bold text-cyan-900">The divided ratio is 1 : 1.33, so multiply both parts by 3.</div><div className="mt-4 text-5xl font-black text-cyan-700">Final whole-number ratio = 3 : 4</div></div></div></RevealBox><div className="grid gap-4"><MCQOption letter="A" text="MO"/><MCQOption letter="B" text="MO₂"/><MCQOption letter="C" text="M₂O₃"/><MCQOption letter="D" text="M₃O₄" correct/></div></div> }
    function MassFormulaEquation(){ return <div className="space-y-8"><Card className="p-6 bg-slate-50"><h2 className="text-2xl font-bold mb-4">Exam Question</h2><p className="text-lg leading-relaxed text-slate-700">A transition metal reacts with oxygen. 11.2 g of metal reacts with 9.6 g of oxygen. Relative atomic mass of the metal = 56. Determine the simplest ratio, formula of oxide and full balanced equation.</p></Card><div className="grid gap-4 md:grid-cols-6"><MethodStep number="1" title="Convert metal mass into moles" text="11.2 ÷ 56 = 0.20 mol metal"/><MethodStep number="2" title="Convert oxygen mass into moles" text="9.6 ÷ 16 = 0.60 mol oxygen atoms"/><MethodStep number="3" title="Find the smallest value" text="The smallest value is 0.20."/><MethodStep number="4" title="Divide BOTH values" text="0.20 ÷ 0.20 = 1 and 0.60 ÷ 0.20 = 3"/><MethodStep number="5" title="Identify the formula" text="The ratio 1 : 3 means the oxide formula is MO₃."/><MethodStep number="6" title="Write the balanced equation" text="Oxygen is diatomic, so the balanced equation is 2M + 3O₂ → 2MO₃."/></div><RevealBox title="Reveal full ratio method and balanced equation"><div className="space-y-5"><RatioTable rows={[{substance:"M",moles:"11.2 ÷ 56 = 0.20",divide:"0.20 ÷ 0.20 = 1",ratio:"1",finalRatio:"1"},{substance:"O",moles:"9.6 ÷ 16 = 0.60",divide:"0.60 ÷ 0.20 = 3",ratio:"3",finalRatio:"3"}]}/><div className="rounded-3xl border border-cyan-200 bg-cyan-50 p-6 text-center"><div className="text-xl font-bold text-cyan-900">Final ratio = 1 : 3, so formula = MO₃</div><div className="mt-3 text-3xl font-black text-cyan-700">2M + 3O₂ → 2MO₃</div></div></div></RevealBox></div> }
    function GuidedFormula(){ return <div className="grid gap-6 md:grid-cols-2"><Card className="p-6"><h2 className="text-2xl font-bold mb-4">Question</h2><p className="text-lg leading-relaxed text-slate-700">A metal reacts with sulfur. 5.4 g of metal reacts with 4.8 g of sulfur. Relative atomic mass of the metal = 27.</p><ul className="mt-5 space-y-2 text-lg text-slate-700"><li>• Find the simplest ratio.</li><li>• Determine the formula of the sulfide.</li><li>• Write the balanced equation.</li></ul></Card><RevealBox title="Reveal worked solution"><div className="space-y-5 text-lg"><RatioTable rows={[{substance:"M",moles:"5.4 ÷ 27 = 0.20",divide:"0.20 ÷ 0.15 = 1.33",ratio:"1.33",finalRatio:"4"},{substance:"S",moles:"4.8 ÷ 32 = 0.15",divide:"0.15 ÷ 0.15 = 1",ratio:"1",finalRatio:"3"}]}/><p>The divided ratio is 1.33 : 1. Multiply both parts by 3 to get the final whole-number ratio 4 : 3.</p><p>Formula = M₄S₃</p><div className="rounded-xl bg-slate-900 p-4 text-center text-2xl font-black text-white">4M + 3S → M₄S₃</div></div></RevealBox></div> }
    function ChoosingEquations(){ return <div className="space-y-8"><Card className="p-6 bg-slate-50"><h2 className="text-2xl font-bold mb-4">Exam Question</h2><p className="text-lg leading-relaxed text-slate-700">Copper oxide reacts with hydrogen. The reaction produced 2.54 g of copper and 0.72 g of water. Relative atomic mass: Cu = 63.5. Which equation matches the evidence?</p></Card><div className="grid gap-6 md:grid-cols-2"><Card className="p-6 border-cyan-200 bg-cyan-50"><h2 className="text-2xl font-bold text-cyan-900">Equation 1</h2><div className="mt-5 rounded-2xl bg-white p-5 text-center text-3xl font-black text-slate-900">Cu₂O + H₂ → 2Cu + H₂O</div><p className="mt-5 text-lg text-cyan-900">This equation predicts a 2 : 1 ratio between copper atoms and water molecules.</p></Card><Card className="p-6 border-emerald-200 bg-emerald-50"><h2 className="text-2xl font-bold text-emerald-900">Equation 2</h2><div className="mt-5 rounded-2xl bg-white p-5 text-center text-3xl font-black text-slate-900">CuO + H₂ → Cu + H₂O</div><p className="mt-5 text-lg text-emerald-900">This equation predicts a 1 : 1 ratio between copper atoms and water molecules.</p></Card></div><div className="grid gap-4 md:grid-cols-3"><MethodStep number="1" title="Convert copper mass to moles" text="2.54 g Cu ÷ 63.5 = 0.04 mol"/><MethodStep number="2" title="Convert water mass to moles" text="0.72 g ÷ 18 = 0.04 mol"/><MethodStep number="3" title="Compare the ratio" text="Divide both values by the smallest value, 0.04. The final whole-number ratio is 1 : 1, so Equation 2 fits the data."/></div><RevealBox title="Reveal ratio table"><RatioTable rows={[{substance:"Cu",moles:"2.54 ÷ 63.5 = 0.04",divide:"0.04 ÷ 0.04 = 1",ratio:"1",finalRatio:"1"},{substance:"H₂O",moles:"0.72 ÷ 18 = 0.04",divide:"0.04 ÷ 0.04 = 1",ratio:"1",finalRatio:"1"}]}/></RevealBox><RevealBox title="Reveal conclusion"><div className="rounded-3xl border border-emerald-200 bg-emerald-50 p-6 text-center"><div className="text-2xl font-bold text-emerald-900">Correct conclusion</div><div className="mt-4 text-4xl font-black text-emerald-700">Equation 2 is correct</div></div></RevealBox></div> }
    function PracticalData(){ return <div className="space-y-8"><Card className="p-6 bg-slate-50"><h2 className="text-2xl font-bold mb-4">Exam Question</h2><p className="text-lg leading-relaxed text-slate-700">A metal reacts with chlorine gas in a heated tube. Use the mass data to determine the balanced equation.</p></Card><div className="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm"><table className="w-full text-left text-lg"><thead className="bg-slate-900 text-white"><tr><th className="p-4">Measurement</th><th className="p-4">Mass</th></tr></thead><tbody><tr className="border-t"><td className="p-4 font-bold">Tube only</td><td className="p-4">51.56 g</td></tr><tr className="border-t"><td className="p-4 font-bold">Tube + metal</td><td className="p-4">56.04 g</td></tr><tr className="border-t"><td className="p-4 font-bold">Tube + metal chloride</td><td className="p-4">64.56 g</td></tr></tbody></table></div><div className="grid gap-4 md:grid-cols-4"><MethodStep number="1" title="Find metal mass" text="56.04 − 51.56 = 4.48 g"/><MethodStep number="2" title="Find chlorine mass" text="64.56 − 56.04 = 8.52 g"/><MethodStep number="3" title="Convert into moles" text="Metal: 4.48 ÷ 56 = 0.08 mol. Chlorine atoms: 8.52 ÷ 35.5 = 0.24 mol."/><MethodStep number="4" title="Use the ratio table" text="Divide both mole values by the smallest value, 0.08, then use the final whole-number ratio to identify the formula and equation."/></div><RevealBox title="Reveal ratio table"><RatioTable rows={[{substance:"M",moles:"4.48 ÷ 56 = 0.08",divide:"0.08 ÷ 0.08 = 1",ratio:"1",finalRatio:"1"},{substance:"Cl atoms",moles:"8.52 ÷ 35.5 = 0.24",divide:"0.24 ÷ 0.08 = 3",ratio:"3",finalRatio:"3"}]}/></RevealBox><div className="grid gap-4"><MCQOption letter="A" text="M + Cl₂ → MCl₂"/><MCQOption letter="B" text="2M + Cl₂ → 2MCl"/><MCQOption letter="C" text="2M + 3Cl₂ → 2MCl₃" correct/><MCQOption letter="D" text="M + 3Cl₂ → MCl₆"/></div></div> }

    function WorksheetModal({ open, onClose }) {

ample</h2><p className="mt-4 text-xl leading-relaxed text-slate-700">A metal reacts with chlorine. 0.12 mol of metal atoms reacts with 0.18 mol of chlorine molecules. Which equation is correct?</p><BlankRatioTable rows={["M","Cl₂"]} moles={["0.12","0.18"]}/></Card><Card className="p-8"><h2 className="text-3xl font-black">Independent GCSE Practice</h2><div className="mt-8 space-y-8"><WorksheetQuestion title="Question 1" text="A metal reacts with oxygen. 5.6 g of metal reacts with 3.2 g of oxygen. Relative atomic mass of the metal = 56. Determine the balanced equation."/><WorksheetQuestion title="Question 2" text="A metal reacts with sulfur. 10.8 g of metal reacts with 9.6 g of sulfur. Relative atomic mass of the metal = 54. Determine the formula of the sulfide."/></div></Card></div></div></div>
    }
    function BlankRatioTable({rows,moles}) { return <div className="mt-8 overflow-x-auto rounded-2xl border border-slate-200"><table className="w-full min-w-[760px] text-left text-lg"><thead className="bg-slate-900 text-white"><tr><th className="p-4">Substance</th><th className="p-4">Moles</th><th className="p-4">÷ smallest</th><th className="p-4">Ratio</th><th className="p-4">Final whole-number ratio</th></tr></thead><tbody>{rows.map((r,i)=><tr key={r} className="border-t"><td className="p-4 font-bold">{r}</td><td className="p-4">{moles?.[i]||""}</td><td className="p-4 h-16"></td><td className="p-4"></td><td className="p-4"></td></tr>)}</tbody></table></div> }
    function WorksheetQuestion({title,text}){ return <div><h3 className="text-2xl font-bold">{title}</h3><p className="mt-3 text-lg leading-relaxed text-slate-700">{text}</p><div className="mt-6 h-40 rounded-2xl border-2 border-dashed border-slate-300 bg-slate-50" /></div> }

    function App() {
      const [currentSlide, setCurrentSlide] = useState(0);
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [calculatorOpen, setCalculatorOpen] = useState(false);
      const [worksheetOpen, setWorksheetOpen] = useState(false);
      const sections = useMemo(() => { const grouped=[]; slides.forEach((slide,index)=>{ let group=grouped.find((item)=>item.title===slide.section); if(!group){group={title:slide.section,slides:[]}; grouped.push(group);} group.slides.push({title:slide.title,index}); }); return grouped; }, []);
      const slide = slides[currentSlide];

      return (
        <div className="flex h-screen overflow-hidden bg-slate-100 text-slate-900">
          <aside className={`relative flex flex-col overflow-y-auto border-r border-slate-700 bg-slate-900 text-white transition-all duration-300 ${sidebarOpen ? "w-80" : "w-0 overflow-hidden border-r-0"}`}>
            <div className="sticky top-0 z-10 border-b border-slate-700 bg-slate-900 p-6"><h1 className="text-2xl font-bold leading-tight">Balancing Equations Using Moles</h1><p className="mt-2 text-sm text-slate-300">GCSE Chemistry Digital Lesson</p><div className="mt-4 h-2 overflow-hidden rounded-full bg-slate-700"><div className="h-full bg-cyan-400" style={{ width: `${progress}%` }}/></div><p className="mt-2 text-xs text-slate-400">Progress: {progress}%</p></div>
            <div className="space-y-5 p-4">{sections.map((section)=><div key={section.title} className="space-y-2"><h2 className="border-b border-slate-700 pb-1 text-lg font-semibold text-cyan-300">{section.title}</h2><div className="space-y-1">{section.slides.map((item)=><button key={item.index} onClick={()=>setCurrentSlide(item.index)} className={`w-full rounded-xl px-3 py-2 text-left text-sm transition ${currentSlide === item.index ? "bg-cyan-600 text-white shadow" : "bg-slate-800 text-slate-200 hover:bg-cyan-700"}`}>{item.index + 1}. {item.title}</button>)}</div></div>)}</div>
          </aside>
          <LessonCalculator open={calculatorOpen} onClose={() => setCalculatorOpen(false)} />
          <WorksheetModal open={worksheetOpen} onClose={() => setWorksheetOpen(false)} />
          <main className="relative flex-1 overflow-y-auto"><button onClick={() => setSidebarOpen(!sidebarOpen)} className="fixed left-4 top-4 z-50 flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-900 text-2xl font-black text-white shadow-xl transition hover:bg-cyan-700">{sidebarOpen ? "←" : "☰"}</button>
            <div className="mx-auto flex min-h-screen max-w-6xl flex-col p-8"><div className="mb-6 flex justify-end gap-3"><button className="rounded-xl border border-slate-200 bg-white px-4 py-2 shadow hover:bg-slate-50">Formula Sheet</button><button onClick={() => setCalculatorOpen(true)} className="rounded-xl border border-slate-200 bg-white px-4 py-2 shadow hover:bg-slate-50">Calculator</button><button onClick={() => setWorksheetOpen(true)} className="rounded-xl bg-cyan-600 px-4 py-2 text-white shadow hover:bg-cyan-700">Printable Worksheet</button></div>
              <div className="flex flex-1 flex-col justify-between rounded-3xl border border-slate-200 bg-white p-10 shadow-xl"><div><div className="mb-6 inline-block rounded-full bg-cyan-100 px-4 py-1 text-sm font-medium text-cyan-700">{slide.section}</div><h1 className="mb-4 text-5xl font-bold leading-tight">{slide.title}</h1><p className="mb-8 max-w-4xl text-xl leading-relaxed text-slate-600">{slide.subtitle}</p>{slide.content}</div><div className="mt-10 flex items-center justify-between border-t border-slate-200 pt-6"><button onClick={() => setCurrentSlide((s)=>Math.max(0,s-1))} disabled={currentSlide===0} className={`rounded-2xl px-6 py-3 transition ${currentSlide===0 ? "cursor-not-allowed bg-slate-200 text-slate-500" : "bg-slate-900 text-white hover:bg-slate-700"}`}>Previous</button><div className="font-medium text-slate-500">Slide {currentSlide + 1} of {slides.length}</div><button onClick={() => setCurrentSlide((s)=>Math.min(slides.length-1,s+1))} disabled={currentSlide===slides.length-1} className={`rounded-2xl px-6 py-3 shadow-lg transition ${currentSlide===slides.length-1 ? "cursor-not-allowed bg-slate-200 text-slate-500" : "bg-cyan-600 text-white hover:bg-cyan-700"}`}>Next</button></div></div>
            </div>
          </main>
        </div>
      )
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
