<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcium Oxide Method Resource</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --muted: #f8fafc;
      --text: #0f172a;
      --sub: #475569;
      --border: #e2e8f0;
      --dark: #0f172a;
      --green: #dcfce7;
      --amber: #fef3c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 28px; }
    .top { display: flex; justify-content: space-between; gap: 20px; align-items: flex-start; margin-bottom: 16px; }
    .kicker { font-size: 14px; color: #64748b; font-weight: 700; }
    h1 { margin: 4px 0 4px; font-size: clamp(28px, 4vw, 44px); line-height: 1.1; }
    .subtitle { margin: 0; color: var(--sub); font-size: 17px; }
    .progressBox { background: white; border-radius: 18px; padding: 14px 18px; box-shadow: 0 1px 4px #0001; text-align: center; min-width: 100px; }
    .progressNum { font-size: 28px; font-weight: 800; }
    .progressLabel { color: #64748b; font-size: 12px; }
    .bar { height: 12px; background: white; border-radius: 999px; overflow: hidden; margin: 14px 0 20px; }
    .barInner { height: 100%; background: var(--dark); width: 0%; transition: width .25s ease; }
    .card { background: white; border-radius: 28px; box-shadow: 0 1px 6px #0001; padding: clamp(20px, 3vw, 34px); min-height: 500px; }
    .grid2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .panel { background: var(--muted); border-radius: 20px; padding: 20px; }
    .borderPanel { border: 1px solid var(--border); border-radius: 20px; padding: 20px; background: white; }
    .step { background: var(--muted); border-radius: 18px; padding: 16px 18px; margin: 12px 0; font-size: 19px; }
    .bigText { font-size: 19px; line-height: 1.65; }
    .modelList { font-size: 18px; line-height: 1.55; }
    .modelList li { margin-bottom: 12px; padding-left: 6px; }
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
    button, .btn {
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 15px;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
    }
    button.primary { background: var(--dark); color: white; border-color: var(--dark); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    .marks { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    .markBtn { width: 46px; height: 46px; padding: 0; }
    .markBtn.selected { background: var(--dark); color: white; border-color: var(--dark); }
    .feedback { margin-top: 12px; padding: 12px; border-radius: 14px; font-size: 14px; }
    .good { background: var(--green); }
    .warn { background: var(--amber); }
    .rubricGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .tickBtn, .checkBtn {
      width: 100%;
      text-align: left;
      background: white;
      border: 1px solid var(--border);
      padding: 10px 12px;
      border-radius: 12px;
      font-weight: 600;
    }
    .tickBtn.active, .checkBtn.active { background: var(--green); }
    .tickGrid { display: grid; gap: 8px; margin-top: 12px; }
    .revealContent { display: none; margin-top: 14px; }
    .revealContent.open { display: block; }
    textarea {
      width: 100%;
      min-height: 90px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font: inherit;
      resize: vertical;
      background: white;
    }
    .finalBox { min-height: 280px; }
    input.blank {
      display: inline-block;
      width: 130px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      text-align: center;
      font: inherit;
      margin: 0 4px;
    }
    .gapText { font-size: 19px; line-height: 2.4; }
    .pill { display: inline-block; background: white; border-radius: 12px; padding: 10px 12px; margin: 4px; box-shadow: 0 1px 3px #0001; }
    .expected.yes { color: #15803d; font-weight: 800; }
    .expected.no { color: #64748b; }
    svg { max-width: 100%; }
    .equipmentTitle { font-weight: 800; font-size: 19px; margin-bottom: 12px; }
    .muted { color: var(--sub); }
    .taskCheck { display: flex; gap: 10px; align-items: center; background: var(--muted); border-radius: 12px; padding: 12px; font-weight: 700; }
    .taskCheck input { transform: scale(1.2); }
    .footerCount { color: #64748b; font-size: 14px; }
    @media (max-width: 800px) {
      .wrap { padding: 16px; }
      .grid2, .grid3, .rubricGrid { grid-template-columns: 1fr; }
      .progressBox { display: none; }
      .card { min-height: auto; }
    }
    @media print {
      body { background: white; }
      .nav, .bar, .progressBox { display: none; }
      .wrap { max-width: none; padding: 0; }
      .card { box-shadow: none; border: none; min-height: auto; }
      button { display: none; }
      .revealContent { display: block !important; }
      textarea { min-height: 120px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="kicker">GCSE Chemistry Practical Planning</div>
        <h1 id="title"></h1>
        <p class="subtitle" id="subtitle"></p>
      </div>
      <div class="progressBox">
        <div class="progressNum" id="progressNum">0%</div>
        <div class="progressLabel">complete</div>
      </div>
    </div>
    <div class="bar"><div class="barInner" id="barInner"></div></div>
    <main class="card" id="content"></main>
    <div class="nav">
      <button id="backBtn" onclick="go(-1)">← Back</button>
      <div class="footerCount" id="count"></div>
      <button id="nextBtn" class="primary" onclick="go(1)">Next →</button>
    </div>
  </div>

<script>
const perfectMethodSteps = [
  "Measure 50 cm³ of water into a polystyrene cup.",
  "Measure and record the initial temperature of the water using a thermometer.",
  "Measure 1.0 g of calcium oxide using a balance.",
  "Add the calcium oxide to the water and stir the mixture.",
  "Record the highest temperature reached.",
  "Calculate the temperature change by subtracting the initial temperature from the highest temperature.",
  "Repeat the experiment using different masses of calcium oxide, such as 2.0 g, 3.0 g, 4.0 g and 5.0 g.",
  "Repeat each mass three times.",
  "Calculate a mean temperature change for each mass.",
  "Keep the volume of water, starting temperature and apparatus used the same throughout."
];
const examinerReasons = [
  ["Step 1", "Gives a clear volume of water and uses an insulating cup."],
  ["Step 2", "Records the initial temperature so temperature change can be calculated."],
  ["Step 3", "Measures the independent variable using a balance."],
  ["Steps 4–5", "Shows how to collect the final temperature data."],
  ["Step 6", "Explains how to calculate the dependent variable."],
  ["Steps 7–9", "Improves reliability by using several masses, repeats and a mean."],
  ["Step 10", "States control variables so the investigation is a fair test."]
];
const slides = [
  {title:"Mastering 6-Mark Practical Methods", subtitle:"Calcium oxide + water: planning a method", type:"intro"},
  {title:"Step 1: Identify the variables", subtitle:"Before writing the method, work out what changes, what is measured, and what must stay the same.", type:"variables"},
  {title:"Step 2: Choose the equipment", subtitle:"A strong method names the apparatus and explains why key equipment is used.", type:"equipment"},
  {title:"Step 3: Build the method", subtitle:"Copy each step carefully. Every sentence should earn marks.", type:"build1"},
  {title:"Step 4: Finish the method", subtitle:"Add repeats, means and control variables to move towards full marks.", type:"build2"},
  {title:"Full-mark model answer", subtitle:"Use this as your copied reference version.", type:"model"},
  {title:"Mark Student Answer A", subtitle:"Award a mark, then reveal the examiner comments.", type:"markA"},
  {title:"Recover the Lost Marks", subtitle:"Identify exactly what is missing from the answer.", type:"recoverA"},
  {title:"Mark Student Answer B", subtitle:"This answer is better, but still not full marks.", type:"markB"},
  {title:"Method Surgery", subtitle:"Fill in the missing parts from memory.", type:"surgery"},
  {title:"Final Challenge", subtitle:"Now write the method yourself without using the copied full version.", type:"final"}
];
let index = 0;
const state = { marks:{}, ticks:{}, gaps:Array(9).fill(""), finalChecks:[] };

function iconFor(i){ return i===0?' ⚗️':i===1?' 🌡️':i===2?' ⚖️':i===5?' 🧮':i===7?' 🔁':''; }
function reveal(label, html){ const id='r'+Math.random().toString(36).slice(2); return `<div class="borderPanel" style="margin-top:16px"><button onclick="toggleReveal('${id}', this)">${label}</button><div id="${id}" class="revealContent">${html}</div></div>`; }
function toggleReveal(id, btn){ const el=document.getElementById(id); el.classList.toggle('open'); btn.textContent = el.classList.contains('open') ? 'Hide' : btn.getAttribute('data-label') || btn.textContent; }
function setMark(slideType, mark, low, high){ state.marks[slideType]=mark; render(); setTimeout(()=>{ const m=document.getElementById('markFeedback'); if(m) m.scrollIntoView({block:'nearest'}); }, 0); }
function toggleTick(group, item){ state.ticks[group] = state.ticks[group] || []; const arr=state.ticks[group]; const i=arr.indexOf(item); if(i>=0) arr.splice(i,1); else arr.push(item); render(); }
function suggestedBand(count){ if(count<=3) return '1–2 marks'; if(count<=6) return '3–4 marks'; if(count<=8) return '5 marks'; return '6 marks'; }
function markingRubric(group, expectedTicks){
  const features=["Volume of water stated","Mass of calcium oxide stated","Initial temperature recorded","Highest temperature recorded","Temperature change calculated","Different masses tested","Control variables included","Repeats included","Mean calculated"];
  const checked=state.ticks[group]||[];
  return `<div class="borderPanel" style="margin:20px 0">
    <h3>☑ Student marking rubric</h3>
    <div class="rubricGrid">
      <div class="panel"><b>Mark band guide</b>
        <p><b>1–2 marks:</b> Basic idea only. Mentions water, calcium oxide or temperature, but lacks detail.</p>
        <p><b>3–4 marks:</b> Some scientific detail. Includes measurements or different masses, but misses key reliability or fair test details.</p>
        <p><b>5 marks:</b> Nearly complete. Clear method, but one important feature is missing.</p>
        <p><b>6 marks:</b> Complete, clear, repeatable method with controls, repeats and mean.</p>
      </div>
      <div class="panel"><b>Tick the evidence you can find</b>
        <div class="tickGrid">${features.map(f=>`<button class="tickBtn ${checked.includes(f)?'active':''}" onclick="toggleTick('${group}','${f}')">${checked.includes(f)?'✓':'○'} ${f}</button>`).join('')}</div>
        <div class="pill" style="margin-top:12px"><b>Evidence ticked:</b> ${checked.length}/9 → suggested band: ${suggestedBand(checked.length)}</div>
        ${reveal('Show expected evidence', features.map(f=>`<div class="expected ${expectedTicks.includes(f)?'yes':'no'}">${expectedTicks.includes(f)?'✓':'✗'} ${f}</div>`).join(''))}
      </div>
    </div>
  </div>`;
}
function markSelector(group, low, high){
  const mark = state.marks[group];
  const ok = mark>=low && mark<=high;
  return `<div><b>Your final mark:</b><div class="marks">${[1,2,3,4,5,6].map(m=>`<button class="markBtn ${mark===m?'selected':''}" onclick="setMark('${group}',${m},${low},${high})">${m}</button>`).join('')}</div>${mark?`<div id="markFeedback" class="feedback ${ok?'good':'warn'}">${ok?'Good judgement — that mark is in the expected range.':'Think carefully: has the answer included quantities, repeats, means and controls? Use the rubric above to check.'}</div>`:''}</div>`;
}
function equipment(){ return `<div class="grid2"><div class="borderPanel"><div class="equipmentTitle">Calorimetry setup</div><svg viewBox="0 0 360 260"><line x1="180" y1="20" x2="180" y2="138" stroke="currentColor" stroke-width="6" stroke-linecap="round"/><rect x="171" y="18" width="18" height="130" rx="8" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="180" cy="155" r="15" fill="none" stroke="currentColor" stroke-width="3"/><path d="M90 110 L270 110 L245 230 L115 230 Z" fill="none" stroke="currentColor" stroke-width="4"/><path d="M115 165 C150 150 210 180 245 162" fill="none" stroke="currentColor" stroke-width="3"/><line x1="235" y1="72" x2="205" y2="122" stroke="currentColor" stroke-width="4" stroke-linecap="round"/><text x="206" y="58" font-size="18" font-weight="700">stir</text><text x="35" y="44" font-size="18" font-weight="700">thermometer</text><line x1="140" y1="42" x2="170" y2="42" stroke="currentColor" stroke-width="2"/><text x="82" y="252" font-size="18" font-weight="700">polystyrene cup</text></svg></div><div class="borderPanel"><div class="equipmentTitle">Why this equipment?</div><p><b>Measuring cylinder:</b> measures the volume of water.</p><p><b>Balance:</b> measures the mass of calcium oxide.</p><p><b>Thermometer:</b> measures initial and highest temperature.</p><p><b>Polystyrene cup:</b> reduces heat loss to the surroundings.</p></div></div>`; }
function gapFill(){
  const answers=["50","polystyrene","initial","1.0","highest","temperature","masses","three","mean"];
  const score=state.gaps.reduce((t,v,i)=>t+(v.trim().toLowerCase()===answers[i]?1:0),0);
  const blank=i=>`<input class="blank" value="${state.gaps[i]||''}" oninput="state.gaps[${i}]=this.value">`;
  return `<div class="panel gapText">Measure ${blank(0)} cm³ of water into a ${blank(1)} cup. Record the ${blank(2)} temperature. Add ${blank(3)} g of calcium oxide. Record the ${blank(4)} temperature reached. Calculate the ${blank(5)} change. Repeat using different ${blank(6)} of calcium oxide. Repeat each experiment ${blank(7)} times and calculate a ${blank(8)}.</div><p><button class="primary" onclick="alert('Score: ${score}/9')">Check score</button> <button onclick="state.gaps=Array(9).fill(''); render();">Reset</button></p>${reveal('Reveal answers','<p>50, polystyrene, initial, 1.0, highest, temperature, masses, three, mean</p>')}`;
}
function checklist(){
  const items=["Independent variable","Dependent variable","Measured volume of water","Measured mass of calcium oxide","Initial temperature","Highest temperature","Temperature change calculation","Different masses","Repeats","Mean","Control variables"];
  return `<div class="grid2">${items.map(item=>`<button class="checkBtn ${state.finalChecks.includes(item)?'active':''}" onclick="toggleFinal('${item}')">${state.finalChecks.includes(item)?'✓':'○'} ${item}</button>`).join('')}</div>`;
}
function toggleFinal(item){ const a=state.finalChecks; const i=a.indexOf(item); if(i>=0) a.splice(i,1); else a.push(item); render(); }
function contentFor(slide){
  switch(slide.type){
    case 'intro': return `<div class="grid2"><div><div class="panel"><h3>⚗️ Exam question</h3><p class="bigText">When solid calcium oxide is added to water, the temperature of the reaction mixture changes.</p><p class="bigText"><b>Plan a method to investigate how changing the mass of calcium oxide affects the temperature change of the reaction mixture. [6 marks]</b></p></div><div class="panel" style="margin-top:16px"><b>Lesson goal</b><p>Build a full-mark method, mark weaker examples, recover missing marks, then write your own from memory.</p></div></div><div class="borderPanel"><h3>🏆 What examiners reward</h3><ul><li>Clear measurements and quantities</li><li>A fair test with control variables</li><li>Initial and highest temperature readings</li><li>Temperature change calculation</li><li>Different masses of calcium oxide</li><li>Repeats and a mean</li></ul></div></div>`;
    case 'variables': return `<div class="grid3">${[["Independent variable","Mass of calcium oxide","The thing we change."],["Dependent variable","Temperature change","The thing we measure."],["Control variables","Volume of water, starting temperature, same cup, same thermometer, same stirring time","The things we keep the same."]].map(v=>`<div class="panel"><h3>${v[0]}</h3><p class="bigText"><b>${v[1]}</b></p><p class="muted">${v[2]}</p></div>`).join('')}</div>`;
    case 'equipment': return equipment();
    case 'build1': return ['Measure 50 cm³ of water into a polystyrene cup.','Measure and record the initial temperature of the water.','Measure 1.0 g of calcium oxide using a balance.','Add the calcium oxide to the water and stir the mixture.','Record the highest temperature reached.'].map((s,i)=>`<div class="step"><b>Step ${i+1}:</b> ${s}</div>`).join('');
    case 'build2': return ['Calculate the temperature change by subtracting the initial temperature from the highest temperature.','Repeat using different masses, such as 2 g, 3 g, 4 g and 5 g.','Repeat each mass three times.','Calculate a mean temperature change.','Keep the volume of water, starting temperature and apparatus used the same throughout.'].map((s,i)=>`<div class="step"><b>Step ${i+6}:</b> ${s}</div>`).join('');
    case 'model': return `<div class="panel"><h3>✍️ Copy this as numbered steps</h3><ol class="modelList">${perfectMethodSteps.map((s,i)=>`<li><b>${s}</b>${iconFor(i)}</li>`).join('')}</ol></div><div class="borderPanel" style="margin-top:18px"><h3>☑ Examiner checklist</h3>${["Quantity of water","Polystyrene cup","Initial temperature","Mass of calcium oxide","Highest temperature","Temperature change calculation","Different masses","Repeats","Mean","Control variables"].map(i=>`<span class="pill">☐ ${i}</span>`).join('')}</div>${reveal('Why this earns marks', examinerReasons.map(r=>`<div class="panel" style="margin:8px 0"><b>${r[0]}:</b> ${r[1]}</div>`).join(''))}`;
    case 'markA': return `<div class="panel bigText">Put water into a cup. Add calcium oxide. Measure the temperature. Repeat with different amounts.</div>${markingRubric('markA',["Different masses tested"])}${markSelector('markA',1,2)}${reveal('Reveal examiner comments','<p><b>Likely mark: 1–2.</b></p><p>It mentions the basic idea, but it is missing quantities, initial temperature, highest temperature, temperature change calculation, control variables, repeats and a mean.</p>')}`;
    case 'recoverA': return `<div class="panel bigText">Put water into a cup.<br><br>Add calcium oxide.<br><br>Measure the temperature.<br><br>Repeat with different amounts.</div><div class="borderPanel" style="margin-top:18px"><h3>Task 1: Tick the missing features</h3><div class="grid2">${["Volume of water","Mass of calcium oxide","Initial temperature","Highest temperature","Temperature change calculation","Control variables","Repeats","Mean"].map(i=>`<label class="taskCheck"><input type="checkbox"> ${i}</label>`).join('')}</div></div><div class="borderPanel" style="margin-top:18px"><h3>Task 2: Recover some marks</h3><p>Write one sentence that would add each missing feature.</p><textarea placeholder="Add a sentence giving the volume of water..."></textarea><textarea placeholder="Add a sentence explaining repeats..."></textarea><textarea placeholder="Add a sentence explaining how to calculate a mean..."></textarea></div>${reveal('Show examiner answer','<ul><li>Measure 50 cm³ of water into a polystyrene cup.</li><li>Measure 1.0 g of calcium oxide using a balance.</li><li>Record the initial temperature.</li><li>Record the highest temperature reached.</li><li>Calculate the temperature change.</li><li>Repeat each mass three times.</li><li>Calculate a mean.</li><li>Keep control variables the same.</li></ul>')}`;
    case 'markB': return `<div class="panel bigText">Measure 50 cm³ of water into a cup. Measure the temperature. Add different masses of calcium oxide. Record the highest temperature.</div>${markingRubric('markB',["Volume of water stated","Highest temperature recorded","Different masses tested"])}${markSelector('markB',3,4)}${reveal('Reveal examiner comments','<p><b>Likely mark: 3–4.</b></p><p>It includes a volume of water, temperature measurement, different masses and highest temperature. It loses marks because it does not clearly calculate temperature change, include repeats, calculate a mean, or state control variables.</p>')}`;
    case 'surgery': return gapFill();
    case 'final': return `<div class="panel bigText"><b>Plan a method to investigate how changing the mass of calcium oxide affects the temperature change of the reaction mixture. [6 marks]</b></div><textarea class="finalBox" placeholder="Write your full method here without using the copied model answer..."></textarea><h3>Self-assessment checklist</h3>${checklist()}`;
  }
}
function render(){
  const slide=slides[index];
  document.getElementById('title').textContent=slide.title;
  document.getElementById('subtitle').textContent=slide.subtitle;
  const progress=Math.round(((index+1)/slides.length)*100);
  document.getElementById('progressNum').textContent=progress+'%';
  document.getElementById('barInner').style.width=progress+'%';
  document.getElementById('content').innerHTML=contentFor(slide);
  document.getElementById('count').textContent=(index+1)+' / '+slides.length;
  document.getElementById('backBtn').disabled=index===0;
  document.getElementById('nextBtn').disabled=index===slides.length-1;
}
function go(delta){ index=Math.max(0, Math.min(slides.length-1, index+delta)); render(); window.scrollTo({top:0, behavior:'smooth'}); }
render();
</script>
</body>
</html>
