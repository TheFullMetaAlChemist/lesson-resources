top:12px}.run-btn{min-height:64px;width:100%;font-size:1rem}.reading-panel{min-height:126px;border:1px solid var(--slate-200);background:var(--slate-50);border-radius:16px;padding:14px}.reading-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center}.reading-box{background:white;border:1px solid var(--slate-200);border-radius:12px;padding:8px}.reading-label{font-size:.75rem;color:var(--slate-500)}.reading-value{font-weight:900}.calc-input{width:100%;border:1px solid var(--slate-300);border-radius:10px;padding:6px 8px;text-align:center;font-weight:900}.feedback{border-radius:16px;border:1px solid var(--amber-200);background:var(--amber-50);color:var(--amber-900);padding:10px;font-size:.9rem;margin-top:10px}.feedback.good{border-color:var(--emerald-200);background:var(--emerald-50);color:var(--emerald-900)}.results-wrap{overflow-x:auto;border:1px solid var(--slate-200);border-radius:16px}.results-table{border-collapse:collapse;width:100%;min-width:1050px;background:white;font-size:.9rem}.results-table th{background:var(--slate-900);color:white;padding:10px;border-right:1px solid var(--slate-700);text-align:center}.results-table tr:nth-child(2) th{background:var(--slate-800);font-weight:600}.results-table td{padding:10px;text-align:center;border-top:1px solid var(--slate-200);border-right:1px solid var(--slate-200)}.results-table td:first-child{text-align:left;font-weight:800}.mean-cell{background:var(--cyan-50)}.mean-input{width:82px;border:1px solid var(--slate-300);border-radius:10px;padding:6px;text-align:center;font-weight:900}.mean-input.correct{border-color:var(--emerald-400);background:var(--emerald-50)}.mean-input.check{border-color:#f59e0b;background:var(--amber-50)}.status-text{font-size:.75rem;margin-top:3px}.status-text.correct{color:var(--emerald-700)}.status-text.check{color:var(--amber-700)}.status-text.calc{color:var(--slate-500)}.analysis-grid{display:grid;grid-template-columns:1fr 320px;gap:16px;margin-bottom:16px}.choice-card dius:12px;padding:10px;font-weight:900;font-size:1.05rem;cursor:pointer}.calc-btn.op{background:var(--slate-100)}.calc-btn.eq{background:var(--cyan-600);color:#fff}.hidden{display:none!important}@keyframes particleBurst{0%{opacity:0;transform:translate(62px,108px) scale(.4)}40%{opacity:1}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.8)}}@keyframes cupBounce{0%,100%{transform:translateY(0)}25%{transform:translateY(-4px)}50%{transform:translateY(0)}75%{transform:translateY(-3px)}}

<body>
  <div id="app" class="app"></div>
<script>
const TRIALS_PER_VARIABLE = 3;
const BASELINE_TEMP = 20;
const EXPERIMENTS = {
  neutralisation:{id:'neutralisation',title:'Neutralisation',description:'Investigate how acid concentration affects the temperature change during neutralisation.',independentVariableName:'Acid concentration',independentVariableUnit:'mol dm⁻³',independentVariableType:'continuous',variableOptions:[0.5,1.0,1.5,2.0],variableLabel:v=>Number(v).toFixed(1),variableFullLabel:v=>Number(v).toFixed(1)+' mol dm⁻³',rowHeader:'Acid concentration / mol dm⁻³',reactionText:'Hydrochloric acid + sodium hydroxide → sodium chloride + water',runButton:'Run neutralisation',setupHelp:'Change only the acid concentration. Keep acid volume, alkali volume and alkali concentration the same.',startMessage:'Start with Trial 1 for 0.5 mol dm⁻³, then save the result.',controlsTip:'Tip: complete 3 repeats before changing concentration.',continuousGraphExplanation:'For this investigation, both acid concentration and mean temperature change are continuous numerical variables.',correctGraph:'line',graphRule:'Use a line/scatter graph when the independent variable is continuous, such as concentration.',xAxisLabel:'Acid concentration / mol dm⁻³',yMax:12,xDomain:[0,2.1],xTicks:[0.5,1.0,1.5,2.0],controlledVariables:[['Acid volume','25 cm³'],['NaOH volume','25 cm³'],['NaOH concentration','1.0 mol dm⁻³'],['Starting temperature','about 20°C']],setupRows:[['Investigation','Neutralisation'],['Acid','HCl'],['Alkali','NaOH']],explanation:'Neutralisation is exothermic, so the temperature should increase. Larger concentration gives more reacting particles in the same volume.',bestFit:true,particleClass:'rose',solutionClass:'',getExpectedDelta:v=>v===0.5?3.1:v===1.0?6.0:v===1.5?8.6:v===2.0?10.9:6.0,anomalyThreshold:.8},
  displacement:{id:'displacement',title:'Metal displacement',description:'Investigate temperature changes when different metals are added to copper sulfate solution.',independentVariableName:'Metal added',independentVariableUnit:'',independentVariableType:'categoric',variableOptions:['Mg','Zn','Fe','Cu'],variableLabel:v=>v,variableFullLabel:v=>({Mg:'Magnesium',Zn:'Zinc',Fe:'Iron',Cu:'Copper'}[v]||v),rowHeader:'Metal added',reactionText:'Metal + copper sulfate solution → metal sulfate + copper, if displacement occurs',runButton:'Run displacement reaction',setupHelp:'Change only the metal added. Keep the volume and concentration of copper sulfate and the mass of metal the same.',startMessage:'Start with Trial 1 for magnesium, then save the result.',controlsTip:'Tip: complete 3 repeats before changing metal.',continuousGraphExplanation:'For this investigation, the metal is a categoric independent variable, while temperature change is numerical.',correctGraph:'bar',graphRule:'Use a bar chart when the independent variable is categoric, such as different metals.',xAxisLabel:'Metal added',yMax:18,controlledVariables:[['CuSO₄ volume','25 cm³'],['CuSO₄ concentration','1.0 mol dm⁻³'],['Mass of metal','0.50 g'],['Starting temperature','about 20°C']],setupRows:[['Investigation','Displacement'],['Solution','Copper sulfate'],['Metal mass','0.50 g']],explanation:'Metals more reactive than copper displace copper from copper sulfate. Magnesium gives the largest temperature rise, zinc and iron are smaller, and copper gives no temperature change.',bestFit:false,particleClass:'orange',solutionClass:'blue',getExpectedDelta:v=>v==='Mg'?15.2:v==='Zn'?8.4:v==='Fe'?4.6:v==='Cu'?0:2.0,hasNoTemperatureChange:v=>v==='Cu',anomalyThreshold:1.0}
};
let state = {screen:'lab',experimentId:'neutralisation',selectedOption:0.5,selectedTrial:0,isRunning:false,reactionActive:false,reactionRunId:0,latestTrial:null,studentChangeInput:'',changeFeedback:'',displayTemperature:BASELINE_TEMP,resultsByExperiment:{neutralisation:createEmptyResults(EXPERIMENTS.neutralisation),displacement:createEmptyResults(EXPERIMENTS.displacement)},meanInputsByExperiment:{neutralisation:createEmptyMeanInputs(EXPERIMENTS.neutralisation),displacement:createEmptyMeanInputs(EXPERIMENTS.displacement)},showHelp:true,studentConclusion:'',guidanceMessage:EXPERIMENTS.neutralisation.startMessage,calculatorOpen:false,calculator:{x:24,y:120,display:'',answer:'',dragging:false,dx:0,dy:0},selectedGraph:null,graphAnswer:null};
let runInterval=null;
function getExp(){return EXPERIMENTS[state.experimentId]}function key(v){return String(v)}function randomBetween(min,max){return Math.random()*(max-min)+min}function createEmptyResults(exp){return exp.variableOptions.reduce((a,o)=>{a[key(o)]=Array(TRIALS_PER_VARIABLE).fill(null);return a},{})}function createEmptyMeanInputs(exp){return exp.variableOptions.reduce((a,o)=>{a[key(o)]='';return a},{})}function getTrials(results,opt){return results[key(opt)]||Array(TRIALS_PER_VARIABLE).fill(null)}function mean(vals){const nums=vals.filter(Boolean).map(v=>v.change);return nums.length?Number((nums.reduce((a,b)=>a+b,0)/nums.length).toFixed(1)):null}function parseStudentNumber(v){if(v===''||v==null)return null;const n=Number(v);return Number.isFinite(n)?n:null}function isCloseEnough(v,correct,t=.05){const n=parseStudentNumber(v);return n!==null&&Math.abs(n-correct)<=t}function areMeansCorrect(exp,results,inputs){return exp.variableOptions.every(o=>{const trials=getTrials(results,o);if(trials.some(t=>t===null))return false;return isCloseEnough(inputs[key(o)],mean(trials))})}function getStatus(exp,results){const complete=exp.variableOptions.reduce((s,o)=>s+getTrials(results,o).filter(Boolean).length,0);const total=exp.variableOptions.length*TRIALS_PER_VARIABLE;return{complete,total,isComplete:complete===total}}function getNextIncompleteOption(exp,results,current){const i=exp.variableOptions.indexOf(current);const ordered=[...exp.variableOptions.slice(i+1),...exp.variableOptions.slice(0,i+1)];return ordered.find(o=>getTrials(results,o).some(t=>t===null))??null}function generateTrial(exp,opt){const start=Number(randomBetween(19.8,20.3).toFixed(1));const expected=exp.getExpectedDelta(opt);if(exp.hasNoTemperatureChange&&exp.hasNoTemperatureChange(opt))return{min:start,max:start,change:0,anomaly:false};const noise=randomBetween(-.35,.35);const anomaly=Math.random()<.08?randomBetween(-1.2,1.2):0;const change=Number(Math.max(0,expected+noise+anomaly).toFixed(1));const max=Number((start+change).toFixed(1));return{min:start,max,change,anomaly:Math.abs(change-expected)>exp.anomalyThreshold}}
function lineFit(data){const pts=data.filter(p=>p.meanChange!=null&&typeof p.numericValue==='number').map(p=>({x:p.numericValue,y:p.meanChange}));if(pts.length<2)return[];const n=pts.length,sx=pts.reduce((s,p)=>s+p.x,0),sy=pts.reduce((s,p)=>s+p.y,0),sxy=pts.reduce((s,p)=>s+p.x*p.y,0),sx2=pts.reduce((s,p)=>s+p.x*p.x,0);const m=(n*sxy-sx*sy)/(n*sx2-sx*sx),b=(sy-m*sx)/n,minX=Math.min(...pts.map(p=>p.x)),maxX=Math.max(...pts.map(p=>p.x));return[{numericValue:minX,fittedChange:Number((m*minX+b).toFixed(2))},{numericValue:maxX,fittedChange:Number((m*maxX+b).toFixed(2))}]}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}function cls(...x){return x.filter(Boolean).join(' ')}
function render(){const app=document.getElementById('app'),exp=getExp(),results=state.resultsByExperiment[state.experimentId],means=state.meanInputsByExperiment[state.experimentId],trials=getTrials(results,state.selectedOption),status=getStatus(exp,results),progress=Math.round(status.complete/status.total*100),slotSaved=!!trials[state.selectedTrial],meansDone=areMeansCorrect(exp,results,means),canAnalyse=status.isComplete&&meansDone;const rowComplete=trials.filter(Boolean).length;const step=progress===100?'All trials complete':slotSaved?'Choose the next setup':rowComplete===TRIALS_PER_VARIABLE?`Change the independent variable: ${exp.independentVariableName}`:`Ready to run: ${exp.variableFullLabel(state.selectedOption)} — Trial ${state.selectedTrial+1}`;
app.innerHTML = `${headerHtml(exp,progress)}${experimentChooserHtml()}${navHtml(canAnalyse)}${guidanceHtml(step,progress,canAnalyse,exp.controlsTip)}${state.screen==='lab'?labHtml(exp,results,trials,slotSaved):''}${state.screen==='analysis'?analysisHtml(exp,results,means,canAnalyse):''}${state.screen==='questions'?questionsHtml(exp):''}${state.calculatorOpen?calculatorHtml():''}`;
bindEvents(canAnalyse);if(state.calculatorOpen) bindCalculator();}
function headerHtml(exp,progress){return `<header class="card header"><div class="row space-between align-center wrap"><div><div class="tag">⚗️ GCSE Required Practical 4</div><h1>Temperature changes in reacting solutions</h1><p class="muted" style="margin-top:8px;max-width:760px">${escapeHtml(exp.description)}</p></div><div class="progress-wrap"><div style="font-weight:700;margin-bottom:8px">Investigation progress</div><div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div><div class="muted" style="font-size:.9rem;margin-top:4px">${progress}% complete</div></div></div></header>`}
function experimentChooserHtml(){return `<section class="card card-pad"><div class="row space-between align-center wrap"><div><div class="muted" style="font-weight:700;font-size:.9rem">Choose experiment</div><h3>Which reacting solution practical are you investigating?</h3></div><div class="experiment-grid">${Object.values(EXPERIMENTS).map(e=>`<button data-exp="${e.id}" class="experiment-option ${state.experimentId===e.id?'active':''}"><div style="font-weight:900">${e.title}</div><div class="muted" style="font-size:.9rem">Independent variable: ${e.independentVariableName}</div></button>`).join('')}</div></div></section>`}
function navHtml(canAnalyse){return `<nav class="top-nav"><button data-screen="lab" class="btn ${state.screen==='lab'?'active':'outline'}">🧪 Virtual lab</button><button id="analysisBtn" class="btn ${state.screen==='analysis'?'active':'outline'}">📊 Analysis</button><button data-screen="questions" class="btn ${state.screen==='questions'?'active':'outline'}">📋 Questions</button><button id="calcToggle" class="btn ${state.calculatorOpen?'active':'outline'}">🧮 Calculator</button><button id="resetBtn" class="btn outline reset">↻ Reset this experiment</button></nav>`}
function guidanceHtml(step,progress,canAnalyse,tip){return `<section class="guidance"><div><div class="guidance-title">Current step</div><div class="guidance-step">${escapeHtml(step)}</div><div class="muted" style="margin-top:4px;color:var(--indigo-900)">${escapeHtml(state.guidanceMessage)}</div></div>${canAnalyse?'<button id="goAnalysis" class="btn">Go to analysis</button>':progress===100?'<div class="tip" style="background:var(--amber-50);border-color:var(--amber-200);color:var(--amber-900)">Calculate all means to unlock analysis.</div>':`<div class="tip">${escapeHtml(tip)}</div>`}</section>`}
function labHtml(exp,results,trials,slotSaved){return `<main class="lab-grid"><section class="stack"><div class="card"><div class="card-pad"><div class="bench-grid">${reactionBenchHtml(exp)}${currentSetupHtml(exp,trials)}</div>${runPanelHtml(exp,slotSaved)}</div></div>${resultsTableHtml(exp,results)}</section></main>`}
function reactionBenchHtml(exp){const isDisp=exp.id==='displacement', liquidCls=exp.solutionClass==='blue'?'blue':'';const thermoH=Math.min(86,Math.max(24,state.displayTemperature*2.25));let particles='';if(state.reactionActive){for(let i=0;i<(isDisp?20:16);i++){particles+=`<span class="particle ${exp.particleClass}" style="--tx:${randomBetween(18,110)}px;--ty:${randomBetween(45,120)}px;animation-delay:${i*.015}s"></span>`}}return `<div class="bench"><h2>Reaction bench</h2><p class="muted" style="font-size:.9rem;margin-top:4px">${escapeHtml(exp.reactionText)}</p><div class="bench-stage"><div class="desk"></div><div class="desk-line"></div><div class="apparatus"><div class="cup ${state.reactionActive?'bounce':''}"><div class="cup-rim"></div><div class="liquid ${liquidCls}" style="height:${state.reactionActive?'62':state.latestTrial?'56':'48'}%"></div>${isDisp?`<div class="metal-bits">${Array.from({length:state.selectedOption==='Cu'?3:8}).map(()=>'<span class="metal-bit"></span>').join('')}</div>`:''}${isDisp&&state.latestTrial&&state.selectedOption!=='Cu'?'<div class="copper-label">copper forms</div>':''}${particles}<div class="foam"></div><div class="cup-label">POLYSTYRENE CUP</div></div><div class="thermo-wrap"><div class="thermo-tube"><div class="thermo-fill" style="height:${thermoH}%"></div></div><div class="thermo-bulb"></div><div class="temp-card"><div class="reading-label">Temperature</div><div class="value">${state.displayTemperature.toFixed(1)}</div><div class="reading-label">°C</div></div></div></div></div></div>`}
function currentSetupHtml(exp,trials){return `<aside class="setup-card"><div class="row space-between align-center"><h3>Set up this run</h3><button id="helpBtn" class="btn outline" style="padding:6px 10px">?</button></div>${state.showHelp?`<div class="help">${escapeHtml(exp.setupHelp)}</div>`:''}<div class="form-group"><label>${exp.independentVariableName}${exp.independentVariableUnit?' / '+exp.independentVariableUnit:''}</label><select id="optionSelect" class="select">${exp.variableOptions.map(o=>`<option value="${key(o)}" ${key(o)===key(state.selectedOption)?'selected':''}>${escapeHtml(exp.variableFullLabel(o))}</option>`).join('')}</select></div><div class="form-group"><label>Trial number</label><select id="trialSelect" class="select">${[0,1,2].map(i=>`<option value="${i}" ${state.selectedTrial===i?'selected':''}>Trial ${i+1}${trials[i]?' — saved':' — empty'}</option>`).join('')}</select></div><div style="margin-top:16px">${exp.setupRows.map(([l,v])=>`<div class="info-row"><span>${escapeHtml(l)}</span><strong>${escapeHtml(v)}</strong></div>`).join('')}<div class="info-row"><span>Trials complete here</span><strong>${trials.filter(Boolean).length}/3</strong></div></div><div class="info-box">${escapeHtml(exp.explanation)}</div></aside>`}
function runPanelHtml(exp,slotSaved){return `<div class="run-panel"><div><button id="runBtn" class="btn cyan run-btn" ${state.isRunning||slotSaved?'disabled':''}>▶ ${state.isRunning?'Reaction running...':exp.runButton}</button>${slotSaved?'<div class="feedback">This slot already has a saved result. Select the next trial or variable before running again.</div>':''}</div><div class="reading-panel">${state.latestTrial?latestReadingHtml():`<div style="min-height:94px;display:flex;align-items:center;justify-content:center;text-align:center;color:var(--slate-500);flex-direction:column"><div style="font-size:1.8rem">🌡️</div><div style="font-weight:800;color:var(--slate-700)">Latest reading will appear here</div><div style="font-size:.9rem;margin-top:4px">Check the setup, run the trial, calculate ΔT, then save the result.</div></div>`}</div></div>`}
function latestReadingHtml(){const t=state.latestTrial;return `<div class="stack small-gap"><div class="row space-between align-center"><strong style="color:var(--emerald-900)">Latest reading</strong>${t.anomaly?'<span style="color:var(--amber-800);font-size:.9rem">⚠️ Possible anomaly</span>':''}</div><div class="reading-grid"><div class="reading-box"><div class="reading-label">Minimum</div><div class="reading-value">${t.min}°C</div></div><div class="reading-box"><div class="reading-label">Maximum</div><div class="reading-value">${t.max}°C</div></div><div class="reading-box"><label class="reading-label">Your change / °C</label><input id="changeInput" class="calc-input" inputmode="decimal" placeholder="max − min" value="${escapeHtml(state.studentChangeInput)}"></div></div>${state.changeFeedback?`<div class="feedback ${state.changeFeedback.startsWith('Correct')?'good':''}">${escapeHtml(state.changeFeedback)}</div>`:''}<button id="saveBtn" class="btn secondary" style="width:100%">Check calculation and save</button></div>`}
function resultsTableHtml(exp,results){const means=state.meanInputsByExperiment[state.experimentId];return `<section class="card card-pad"><h2 style="margin-bottom:12px">Results table</h2><div class="results-wrap"><table class="results-table"><thead><tr><th rowspan="2" style="text-align:left">${escapeHtml(exp.rowHeader)}</th>${[1,2,3].map(t=>`<th colspan="3">Trial ${t}</th>`).join('')}<th rowspan="2">Mean change / °C</th></tr><tr>${[1,2,3].flatMap(()=>['Minimum / °C','Maximum / °C','Change / °C']).map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${exp.variableOptions.map(o=>{const row=getTrials(results,o),rowMean=mean(row),complete=row.every(Boolean),meanVal=means[key(o)]||'',correct=complete&&isCloseEnough(meanVal,rowMean),attempt=meanVal!=='';return `<tr><td>${escapeHtml(exp.variableFullLabel(o))}</td>${row.map(tr=>`<td>${tr?tr.min:'—'}</td><td>${tr?tr.max:'—'}</td><td style="font-weight:800">${tr?tr.change:'—'}</td>`).join('')}<td class="mean-cell">${complete?`<input data-mean="${key(o)}" class="mean-input ${correct?'correct':attempt?'check':''}" inputmode="decimal" placeholder="mean" value="${escapeHtml(meanVal)}"><div class="status-text ${correct?'correct':attempt?'check':'calc'}">${correct?'correct':attempt?'check':'calculate'}</div>`:'—'}</td></tr>`}).join('')}</tbody></table></div><p class="muted" style="font-size:.9rem;margin-top:10px">Calculate each mean to 1 decimal place. The analysis graph unlocks when all completed rows have correct means.</p></section>`}
function analysisHtml(exp,results,means,canAnalyse){return `<main class="stack">${resultsTableHtml(exp,results)}${canAnalyse?analysisGraphHtml(exp,buildAnalysisData(exp,results,means)):`<section class="card card-pad"><h2>Analysis locked</h2><p class="muted" style="margin-top:8px">Calculate the mean temperature change for every completed row in the results table. The graph will appear when all means are correct.</p></section>`}</main>`}
function buildAnalysisData(exp,results,means){return exp.variableOptions.map(o=>({option:o,label:exp.variableLabel(o),fullLabel:exp.variableFullLabel(o),numericValue:typeof o==='number'?o:null,meanChange:isCloseEnough(means[key(o)],mean(getTrials(results,o)))?Number(means[key(o)]):null}))}
function analysisGraphHtml(exp,data){if(!state.selectedGraph)state.selectedGraph=exp.correctGraph;const isLine=state.selectedGraph==='line';return `<section class="card card-pad"><h2>Analysis graph</h2><p class="muted" style="margin-top:4px;margin-bottom:14px">Choose the most appropriate graph for this investigation, then use it to describe the relationship.</p><div class="analysis-grid"><div class="choice-card"><strong>Which graph is most appropriate?</strong><p class="muted" style="font-size:.9rem;margin-top:6px">${escapeHtml(exp.continuousGraphExplanation)}</p><div class="row wrap" style="margin-top:10px"><button data-graph="bar" class="btn ${state.selectedGraph==='bar'?'active':'outline'}">Bar chart</button><button data-graph="line" class="btn ${state.selectedGraph==='line'?'active':'outline'}">Scatter/line graph</button></div></div><div class="choice-card indigo"><strong>Check your graph choice</strong><div class="row" style="margin-top:10px"><button data-answer="bar" class="btn ${state.graphAnswer==='bar'?'active':'outline'}">Bar chart</button><button data-answer="line" class="btn ${state.graphAnswer==='line'?'active':'outline'}">Line/scatter</button></div>${state.graphAnswer?graphFeedback(exp):''}</div></div><div class="graph-box">${svgGraph(exp,data,isLine)}</div>${isLine?legendHtml(exp,data):''}<div class="info-box"><strong>GCSE graphing rule:</strong> ${escapeHtml(exp.graphRule)}</div></section>`}
function graphFeedback(exp){const good=state.graphAnswer===exp.correctGraph;const msg=good?(exp.correctGraph==='line'?'Correct. A line/scatter graph is best because both variables are continuous.':'Correct. A bar chart is best because the independent variable is categoric.'):(exp.correctGraph==='line'?'Not for this investigation. Use a line/scatter graph because the independent variable is continuous.':'Not for this investigation. Use a bar chart because the independent variable is categoric, such as different metals.');return `<div class="feedback ${good?'good':''}">${msg}</div>`}
function svgGraph(exp,data,isLine){const w=800,h=360,p={l:60,r:24,t:20,b:58},plotW=w-p.l-p.r,plotH=h-p.t-p.b;const yMax=exp.yMax;function y(v){return p.t+plotH-(v/yMax)*plotH}let html=`<svg class="graph-svg" viewBox="0 0 ${w} ${h}" role="img" aria-label="Graph"><rect x="0" y="0" width="${w}" height="${h}" fill="white"/>`;for(let i=0;i<=5;i++){const yy=p.t+plotH*i/5;html+=`<line x1="${p.l}" y1="${yy}" x2="${w-p.r}" y2="${yy}" stroke="#e2e8f0"/><text x="${p.l-10}" y="${yy+4}" text-anchor="end" font-size="12" fill="#475569">${Math.round(yMax-(yMax*i/5))}</text>`}html+=`<line x1="${p.l}" y1="${p.t}" x2="${p.l}" y2="${p.t+plotH}" stroke="#334155"/><line x1="${p.l}" y1="${p.t+plotH}" x2="${w-p.r}" y2="${p.t+plotH}" stroke="#334155"/><text x="${w/2}" y="${h-14}" text-anchor="middle" font-size="14" fill="#334155">${escapeHtml(exp.xAxisLabel)}</text><text transform="translate(16 ${h/2}) rotate(-90)" text-anchor="middle" font-size="14" fill="#334155">Mean temperature change / °C</text>`;
if(isLine&&exp.independentVariableType==='continuous'){const pts=data.filter(d=>d.meanChange!=null);const domain=exp.xDomain||[Math.min(...pts.map(d=>d.numericValue)),Math.max(...pts.map(d=>d.numericValue))];const xVal=v=>p.l+((v-domain[0])/(domain[1]-domain[0]))*plotW;(exp.xTicks||pts.map(d=>d.numericValue)).forEach(t=>{html+=`<text x="${xVal(t)}" y="${p.t+plotH+20}" text-anchor="middle" font-size="12" fill="#475569">${t}</text>`});pts.forEach(d=>{html+=`<circle cx="${xVal(d.numericValue)}" cy="${y(d.meanChange)}" r="7" fill="#0891b2" stroke="#0f172a" stroke-width="2"/>`});const fit=lineFit(data);if(fit.length===2){html+=`<line x1="${xVal(fit[0].numericValue)}" y1="${y(fit[0].fittedChange)}" x2="${xVal(fit[1].numericValue)}" y2="${y(fit[1].fittedChange)}" stroke="#dc2626" stroke-width="4"/>`}}
else{const vals=data,barGap=20,barW=(plotW-barGap*(vals.length+1))/vals.length;vals.forEach((d,i)=>{const x=p.l+barGap+i*(barW+barGap);const bh=d.meanChange==null?0:(d.meanChange/yMax)*plotH;html+=`<rect x="${x}" y="${p.t+plotH-bh}" width="${barW}" height="${bh}" rx="8" fill="#0891b2"/><text x="${x+barW/2}" y="${p.t+plotH+20}" text-anchor="middle" font-size="12" fill="#475569">${escapeHtml(d.label)}</text>`})}return html+'</svg>'}
function legendHtml(exp,data){const fit=lineFit(data);return `<div class="legend"><div class="row align-center small-gap"><span class="legend-dot"></span> Mean result points</div>${fit.length===2?'<div class="row align-center small-gap"><span class="legend-line"></span> Line of best fit</div>':''}</div>`}
function questionsHtml(exp){const isDisp=exp.id==='displacement';return `<main><section class="card card-pad"><h2>Conclusion and exam-style questions</h2><div class="question-grid" style="margin-top:16px"><div class="question-card"><h3>1. Identify the variables</h3><p>What was the independent variable, dependent variable and one control variable in this investigation?</p><details><summary>Show model answer</summary><p class="muted">The independent variable was ${exp.independentVariableName.toLowerCase()}. The dependent variable was the temperature change. One control variable was ${exp.controlledVariables[0][0].toLowerCase()}.</p></details></div><div class="question-card"><h3>2. Describe the trend or pattern</h3><p>${isDisp?'Which metal produced the largest temperature change, and which produced the smallest?':'Describe the relationship between acid concentration and mean temperature change.'}</p><details><summary>Show model answer</summary><p class="muted">${isDisp?'Magnesium should produce the largest temperature change because it is the most reactive metal tested. Copper should produce no temperature change because it cannot displace copper from copper sulfate.':'As the acid concentration increased, the mean temperature change increased.'}</p></details></div><div class="question-card"><h3>3. Explain the results</h3><p>${isDisp?'Explain why magnesium produces a larger temperature rise than iron or copper.':'Explain why increasing the concentration causes a larger temperature change.'}</p><details><summary>Show model answer</summary><p class="muted">${isDisp?'Magnesium is more reactive than iron and much more reactive than copper. It displaces copper ions more readily from copper sulfate, releasing more energy to the surroundings and giving a larger temperature rise.':'A higher concentration contains more acid particles in the same volume. More acid particles react with hydroxide ions, so more energy is transferred to the surroundings, causing a larger temperature rise.'}</p></details></div><div class="question-card"><h3>4. Evaluate the method</h3><p>Suggest two ways to improve the accuracy or reliability of the investigation.</p><details><summary>Show model answer</summary><p class="muted">Repeat each test and calculate a mean. Use a lid or better insulation to reduce heat loss. Use a digital temperature probe to measure the maximum temperature more accurately.</p></details></div></div><div style="margin-top:16px"><label style="font-weight:800;display:block;margin-bottom:8px">Write your conclusion</label><textarea id="conclusion" class="conclusion" placeholder="Use your results to describe the pattern, support it with data and explain why it happened...">${escapeHtml(state.studentConclusion)}</textarea></div></section></main>`}
function calculatorHtml(){const c=state.calculator;return `<div id="calculator" class="calculator" style="left:${c.x}px;top:${c.y}px"><div id="calcHead" class="calc-head"><strong>☰ Drag calculator</strong><button id="calcClose" class="btn outline" style="padding:5px 10px">Close</button></div><div class="calc-display"><div class="calc-line">${escapeHtml(c.display)||'0'}</div><div class="calc-answer">${c.answer?'= '+escapeHtml(c.answer):''}</div></div><div class="calc-grid three"><button data-calc="C" class="calc-btn" style="background:var(--amber-50);color:var(--amber-900)">C</button><button data-calc="back" class="calc-btn">⌫</button><button data-calc="(" class="calc-btn">(</button><button data-calc=")" class="calc-btn">)</button><button data-calc="/" class="calc-btn">/</button><button data-calc="*" class="calc-btn">*</button></div><div class="calc-grid four">${['7','8','9','÷','4','5','6','×','1','2','3','−','0','.','=','+'].map(b=>`<button data-calc="${b}" class="calc-btn ${b==='='?'eq':['÷','×','−','+'].includes(b)?'op':''}">${b}</button>`).join('')}</div><p class="muted" style="font-size:.78rem;margin:10px 0 0">Drag from the title bar to reposition. Close it using the button above.</p></div>`}
function bindEvents(canAnalyse){document.querySelectorAll('[data-exp]').forEach(b=>b.onclick=()=>chooseExperiment(b.dataset.exp));document.querySelectorAll('[data-screen]').forEach(b=>b.onclick=()=>{state.screen=b.dataset.screen;render()});const analysisBtn=document.getElementById('analysisBtn');if(analysisBtn)analysisBtn.onclick=()=>{state.screen='analysis';if(!canAnalyse)state.guidanceMessage='Analysis is locked until all trials are saved and all mean temperature changes are calculated correctly in the results table.';render()};const go=document.getElementById('goAnalysis');if(go)go.onclick=()=>{state.screen='analysis';render()};const reset=document.getElementById('resetBtn');if(reset)reset.onclick=resetCurrentExperiment;const calc=document.getElementById('calcToggle');if(calc)calc.onclick=()=>{state.calculatorOpen=!state.calculatorOpen;render()};const help=document.getElementById('helpBtn');if(help)help.onclick=()=>{state.showHelp=!state.showHelp;render()};const opt=document.getElementById('optionSelect');if(opt)opt.onchange=e=>selectOption(getExp().variableOptions.find(o=>key(o)===e.target.value));const tr=document.getElementById('trialSelect');if(tr)tr.onchange=e=>selectTrial(Number(e.target.value));const run=document.getElementById('runBtn');if(run)run.onclick=runTrial;const ch=document.getElementById('changeInput');if(ch)ch.oninput=e=>{state.studentChangeInput=e.target.value;state.changeFeedback=''};const save=document.getElementById('saveBtn');if(save)save.onclick=saveTrial;document.querySelectorAll('[data-mean]').forEach(inp=>inp.oninput=e=>{state.meanInputsByExperiment[state.experimentId][e.target.dataset.mean]=e.target.value;render()});document.querySelectorAll('[data-graph]').forEach(b=>b.onclick=()=>{state.selectedGraph=b.dataset.graph;render()});document.querySelectorAll('[data-answer]').forEach(b=>b.onclick=()=>{state.graphAnswer=b.dataset.answer;render()});const conc=document.getElementById('conclusion');if(conc)conc.oninput=e=>{state.studentConclusion=e.target.value}}
function chooseExperiment(id){const exp=EXPERIMENTS[id];resetBench();state.experimentId=id;state.selectedOption=exp.variableOptions[0];state.selectedTrial=0;state.guidanceMessage=exp.startMessage;state.screen='lab';state.selectedGraph=null;state.graphAnswer=null;render()}function resetBench(){stopRun();state.latestTrial=null;state.studentChangeInput='';state.changeFeedback='';state.displayTemperature=BASELINE_TEMP}function stopRun(){if(runInterval){clearInterval(runInterval);runInterval=null}state.isRunning=false;state.reactionActive=false}function selectOption(opt){const exp=getExp(),results=state.resultsByExperiment[state.experimentId];resetBench();state.selectedOption=opt;const first=getTrials(results,opt).findIndex(t=>t===null);state.selectedTrial=first===-1?0:first;state.guidanceMessage=first===-1?`${exp.variableFullLabel(opt)} already has three saved trials. Choose another ${exp.independentVariableName.toLowerCase()} or go to Analysis if the table is complete.`:`You are now testing ${exp.variableFullLabel(opt)}. Run Trial ${state.selectedTrial+1} and save the result.`;render()}function selectTrial(i){const exp=getExp(),results=state.resultsByExperiment[state.experimentId];resetBench();state.selectedTrial=i;state.guidanceMessage=getTrials(results,state.selectedOption)[i]?`Trial ${i+1} for ${exp.variableFullLabel(state.selectedOption)} already has a saved result. You can rerun it to replace the value, or choose the next empty trial.`:`Run Trial ${i+1} for ${exp.variableFullLabel(state.selectedOption)}, then save the result.`;render()}function runTrial(){const exp=getExp();if(state.isRunning)return;resetBench();state.reactionRunId++;state.isRunning=true;state.reactionActive=true;const target=generateTrial(exp,state.selectedOption),targetTemp=target.max;let current=BASELINE_TEMP;render();runInterval=setInterval(()=>{current=Number((current+.3).toFixed(1));if(current>=targetTemp){clearInterval(runInterval);runInterval=null;state.displayTemperature=targetTemp;state.latestTrial=target;state.isRunning=false;state.reactionActive=false;render()}else{state.displayTemperature=current;render()}},45)}function saveTrial(){const exp=getExp();if(!state.latestTrial)return;if(!isCloseEnough(state.studentChangeInput,state.latestTrial.change)){state.changeFeedback='Check your calculation: maximum temperature − minimum temperature. Round to 1 decimal place.';render();return}const results=state.resultsByExperiment[state.experimentId];results[key(state.selectedOption)]=[...getTrials(results,state.selectedOption)];results[key(state.selectedOption)][state.selectedTrial]=state.latestTrial;state.latestTrial=null;state.studentChangeInput='';state.changeFeedback='';state.displayTemperature=BASELINE_TEMP;const updated=getTrials(results,state.selectedOption),next=updated.findIndex(t=>t===null),status=getStatus(exp,results);if(status.isComplete)state.guidanceMessage='All trial results have been collected. Now calculate the mean temperature change for each row in the results table before going to Analysis.';else if(next!==-1)state.guidanceMessage=`Result saved. Now select Trial ${next+1} for ${exp.variableFullLabel(state.selectedOption)} using the trial dropdown, then run the reaction again.`;else{const no=getNextIncompleteOption(exp,results,state.selectedOption);if(no!==null)state.guidanceMessage=`You have completed three repeats for ${exp.variableFullLabel(state.selectedOption)}. Now change ${exp.independentVariableName.toLowerCase()} to ${exp.variableFullLabel(no)} using the dropdown, select Trial 1, and run the next test.`}render()}function resetCurrentExperiment(){const exp=getExp();stopRun();state.resultsByExperiment[state.experimentId]=createEmptyResults(exp);state.meanInputsByExperiment[state.experimentId]=createEmptyMeanInputs(exp);state.latestTrial=null;state.studentChangeInput='';state.changeFeedback='';state.displayTemperature=BASELINE_TEMP;state.selectedOption=exp.variableOptions[0];state.selectedTrial=0;state.studentConclusion='';state.guidanceMessage=exp.startMessage;state.selectedGraph=null;state.graphAnswer=null;render()}
function bindCalculator(){const calc=document.getElementById('calculator'),head=document.getElementById('calcHead');document.getElementById('calcClose').onclick=()=>{state.calculatorOpen=false;render()};document.querySelectorAll('[data-calc]').forEach(b=>b.onclick=()=>calcPress(b.dataset.calc));function pos(e){if(e.touches&&e.touches[0])return{x:e.touches[0].clientX,y:e.touches[0].clientY};return{x:e.clientX,y:e.clientY}}function clamp(x,y){const w=340,h=430;return{x:Math.min(Math.max(8,x),Math.max(8,innerWidth-w-8)),y:Math.min(Math.max(8,y),Math.max(8,innerHeight-h-8))}}function down(e){const p=pos(e);state.calculator.dragging=true;state.calculator.dx=p.x-state.calculator.x;state.calculator.dy=p.y-state.calculator.y;e.preventDefault()}function move(e){if(!state.calculator.dragging)return;const p=pos(e),c=clamp(p.x-state.calculator.dx,p.y-state.calculator.dy);state.calculator.x=c.x;state.calculator.y=c.y;calc.style.left=c.x+'px';calc.style.top=c.y+'px';e.preventDefault()}function up(){state.calculator.dragging=false}head.onmousedown=down;head.ontouchstart=down;document.onmousemove=move;document.onmouseup=up;document.ontouchmove=move;document.ontouchend=up}function calcPress(v){const c=state.calculator;if(v==='C'){c.display='';c.answer=''}else if(v==='back'){c.display=c.display.slice(0,-1);c.answer=''}else if(v==='='){try{const expr=c.display.replaceAll('×','*').replaceAll('÷','/').replaceAll('−','-');const safe=expr.split('').every(ch=>'0123456789+-*/(). '.includes(ch));if(!safe)throw Error();const res=Function('return ('+expr+')')();c.answer=Number.isFinite(res)?Number(res.toFixed(6)).toString():'Error'}catch{c.answer='Error'}}else{c.display+=v;c.answer=''}render()}
render();
</script>
